- name: Lint workflow YAML
  run: |
    set -euo pipefail
    printf '%s\n' \
      'extends: default' \
      'rules:' \
      '  brackets: disable' \
      '  truthy: disable' \
      '  document-start: disable' \
      '  line-length:' \
      '    max: 140' \
      '    level: warning' \
      > .yamllint-ci.yml
    yamllint -c .yamllint-ci.yml .github/workflows/python-app.yml

- name: Ruff check
  run: |
    set -euo pipefail
    ruff check .

- name: Black
  run: |
    set -euo pipefail
    black --check .

- name: Pytest
  run: |
    set -euo pipefail
    pytest -q --maxfail=1 --disable-warnings \
      --junitxml=junit-py${{ matrix.python-version }}.xml

- name: Upload test artifacts
  if: always()
  uses: actions/upload-artifact@v4
  with:
    name: ci-artifacts-py${{ matrix.python-version }}
    if-no-files-found: ignore
    path: |
      .pytest_cache
      **/.pytest_cache
      **/pytest*.log
      **/junit-*.xml
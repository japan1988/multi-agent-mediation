name: Python App CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
            pylock.*.toml

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest yamllint

      - name: Yamllint workflows
        run: |
          set -euo pipefail
          printf '%s\n' \
            'extends: default' \
            'rules:' \
            '  brackets: disable' \
            '  truthy: disable' \
            '  document-start: disable' \
            '  line-length:' \
            '    max: 140' \
            '    level: warning' \
            > .yamllint-ci.yml
          yamllint -c .yamllint-ci.yml .github/workflows/*.yml

      - name: Run pytest
        run: |
          set -euo pipefail
          pytest -q

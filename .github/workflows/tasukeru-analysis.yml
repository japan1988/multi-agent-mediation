                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
                  "draft": result,
              }
              write_json(readme_refinement_json_path, payload)

              with readme_refinement_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru README Refinement Draft\n\n")
                  f.write("## Decision\n\n")
                  f.write("- Status: `DRAFT_ONLY`\n")
                  f.write("- Human decision required: `true`\n")
                  f.write("- Auto apply: `false`\n")
                  f.write("- Auto branch creation: `false`\n")
                  f.write("- Auto PR creation: `false`\n")
                  f.write("- Auto commit: `false`\n")
                  f.write("- Auto push: `false`\n")
                  f.write("- Auto fix: `false`\n")
                  f.write("- Auto merge: `false`\n\n")
                  f.write("This artifact contains a draft-only README refinement proposal. It does not modify repository files.\n\n")
                  f.write("## Summary\n\n")
                  f.write(f"- Target file: `{result.get('target_file', 'README.md')}`\n")
                  f.write(f"- Draft status: `{result.get('draft_status', 'UNKNOWN')}`\n")
                  added_sections = result.get("added_sections") or []
                  f.write(f"- Added sections: {len(added_sections)}\n")
                  for section in added_sections:
                      f.write(f"  - {section}\n")
                  f.write("\n## Checks\n\n")

# v5.1.2 boundary regression policy:
# Purpose:
# - Detect regressions for the boundary issues found in v5.1.2.
# Required:
# - Deterministic boundary-case checks.
# Not required:
# - 1000-run / 10000-run stress tests.
# - Randomized stress loops.
# - Long-running load tests.
name: Tasukeru Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/tasukeru-analysis.yml"
      - "README*.md"
      - "SECURITY.md"
      - "LICENSE*"
      - "LICENSE_POLICY.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "NOTICE"
      - "TRADEMARKS.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "log_codebook*.json"
      - "tasukeru_self_definition*.json"
      - "tasukeru_self_definition_chain*.jsonl"
      - "**/*.jsonl"
  workflow_dispatch:

# Read-only workflow. Advisory results and PR-comment text are uploaded only as
# DRAFT artifacts for human review; this workflow does not post PR comments.
permissions:
  contents: read

concurrency:
  group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  advisory-analysis:
    name: advisory analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Detect changed files
        id: changed
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs
          : > tasukeru_changed_files.txt
          : > tasukeru_logs/changed-files.txt
          : > tasukeru_logs/changed-files-all.txt

          relevant_regex='(\.py$|\.ipynb$|^pyproject\.toml$|^requirements.*\.txt$|^README.*\.md$|^SECURITY\.md$|^LICENSE|^LICENSE_POLICY\.md$|^CONTRIBUTING\.md$|^CODE_OF_CONDUCT\.md$|^NOTICE$|^TRADEMARKS\.md$|^docs/|^\.github/ISSUE_TEMPLATE/|^\.github/PULL_REQUEST_TEMPLATE\.md$|^\.github/workflows/tasukeru-analysis\.yml$|^log_codebook.*\.json$|^tasukeru_self_definition.*\.json$|^tasukeru_self_definition_chain.*\.jsonl$|\.jsonl$)'

          # Preferred source: GitHub pull-request files API. This avoids shallow
          # checkout ambiguity and keeps PR Draft changed-files grounded in the
          # actual PR diff. This is read-only metadata access.
          python - <<'PY' > tasukeru_logs/changed-files-api.txt || true
          import json
          import os
          import urllib.error
          import urllib.request

          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          token = os.environ.get("GITHUB_TOKEN", "")
          if not event_path or not os.path.exists(event_path):
              raise SystemExit(0)

          with open(event_path, "r", encoding="utf-8") as file_obj:
              event = json.load(file_obj)

          pull_request = event.get("pull_request") or {}
          files_url = str(pull_request.get("url") or "").rstrip("/") + "/files?per_page=100"
          if not files_url.startswith("https://"):
              raise SystemExit(0)

          seen = set()
          while files_url:
              request = urllib.request.Request(
                  files_url,
                  method="GET",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      **({"Authorization": f"Bearer {token}"} if token else {}),
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      page = json.loads(response.read().decode("utf-8"))
                      if isinstance(page, list):
                          for item in page:
                              filename = str(item.get("filename", "")).strip()
                              if filename and filename not in seen:
                                  print(filename)
                                  seen.add(filename)
                      link = response.headers.get("Link", "")
                      next_url = ""
                      for part in link.split(","):
                          if 'rel="next"' in part:
                              start = part.find("<")
                              end = part.find(">")
                              if start >= 0 and end > start:
                                  next_url = part[start + 1 : end]
                                  break
                      files_url = next_url
              except urllib.error.HTTPError:
                  break
              except urllib.error.URLError:
                  break
          PY

          if [ -s tasukeru_logs/changed-files-api.txt ]; then
            cp tasukeru_logs/changed-files-api.txt tasukeru_logs/changed-files-all.txt
          fi

          # Git fallback 1: explicit base/head SHA diff.
          if [ ! -s tasukeru_logs/changed-files-all.txt ]; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA" || true
            git fetch --no-tags --depth=1 origin "$HEAD_SHA" || true

            if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null && git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              git diff --name-only "$BASE_SHA" "$HEAD_SHA" > tasukeru_logs/changed-files-git-sha.txt || true
              if [ -s tasukeru_logs/changed-files-git-sha.txt ]; then
                cp tasukeru_logs/changed-files-git-sha.txt tasukeru_logs/changed-files-all.txt
              fi
            fi
          fi

          # Git fallback 2: merge-base style diff against the fetched base branch.
          if [ ! -s tasukeru_logs/changed-files-all.txt ]; then
            git fetch --no-tags --depth=50 origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" || true
            git diff --name-only "origin/${BASE_REF}...HEAD" > tasukeru_logs/changed-files-git-merge-base.txt || true
            if [ -s tasukeru_logs/changed-files-git-merge-base.txt ]; then
              cp tasukeru_logs/changed-files-git-merge-base.txt tasukeru_logs/changed-files-all.txt
            fi
          fi

          if [ -s tasukeru_logs/changed-files-all.txt ]; then
            grep -E "$relevant_regex" tasukeru_logs/changed-files-all.txt | sort -u > tasukeru_changed_files.txt || true
          fi

          cp tasukeru_changed_files.txt tasukeru_logs/changed-files.txt

          if [ ! -s tasukeru_changed_files.txt ]; then
            echo "No relevant changed files."
          else
            echo "Relevant changed files:"
            sed 's/^/- /' tasukeru_changed_files.txt
          fi

      - name: Install advisory tools only
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" "bandit[toml]" "pip-audit"

      - name: Run advisory tools
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates

          if [ "${{ github.event_name }}" = "pull_request" ] && [ -s tasukeru_changed_files.txt ]; then
            mapfile -t changed_files < tasukeru_changed_files.txt
          else
            mapfile -t changed_files < <(find . -type f \( -name '*.py' -o -name '*.ipynb' -o -name '*.md' -o -name '*.toml' \) \
              -not -path './.git/*' -not -path './.venv/*' -not -path './venv/*' -not -path './archive/*')
          fi

          printf '%s\n' "${changed_files[@]}" > tasukeru_logs/scanned-files.txt

          # Split scan targets by tool responsibility.
          #
          # Ruff and Bandit must not receive Markdown or policy documents:
          # - Ruff is for Python / notebook linting.
          # - Bandit is for Python security scanning.
          # - README / docs / LICENSE / SECURITY / CONTRIBUTING remain covered by
          #   Tasukeru documentation review and logic review below.
          ruff_files=()
          py_files=()
          doc_files=()
          for f in "${changed_files[@]}"; do
            [ -f "$f" ] || continue
            case "$f" in
              *.py)
                ruff_files+=("$f")
                py_files+=("$f")
                ;;
              *.ipynb)
                ruff_files+=("$f")
                ;;
              README*.md|SECURITY.md|LICENSE*|LICENSE_POLICY.md|CONTRIBUTING.md|CODE_OF_CONDUCT.md|NOTICE|TRADEMARKS.md|docs/*|.github/ISSUE_TEMPLATE/*|.github/PULL_REQUEST_TEMPLATE.md)
                doc_files+=("$f")
                ;;
            esac
          done

          printf '%s\n' "${ruff_files[@]}" > tasukeru_logs/ruff-scanned-files.txt
          printf '%s\n' "${py_files[@]}" > tasukeru_logs/bandit-scanned-files.txt
          printf '%s\n' "${doc_files[@]}" > tasukeru_logs/documentation-scanned-files.txt

          set +e

          if [ "${#ruff_files[@]}" -gt 0 ]; then
            ruff check "${ruff_files[@]}" --output-format=json > tasukeru_logs/ruff.json 2> tasukeru_logs/ruff.stderr
            ruff_exit=$?
          else
            echo "[]" > tasukeru_logs/ruff.json
            ruff_exit=0
          fi

          if [ "${#py_files[@]}" -gt 0 ]; then
            bandit "${py_files[@]}" -f json -o tasukeru_logs/bandit.json \
              > tasukeru_logs/bandit.stdout 2> tasukeru_logs/bandit.stderr
            bandit_exit=$?
          else
            echo '{"results":[]}' > tasukeru_logs/bandit.json
            bandit_exit=0
          fi

          echo '{"dependencies":[],"vulnerabilities":[]}' > tasukeru_logs/pip-audit.json
          pip_exit=0

          for req in requirements.txt requirements-dev.txt; do
            if [ -f "$req" ]; then
              python -m pip_audit -r "$req" -f json -o "tasukeru_logs/pip-audit-${req}.json" \
                > "tasukeru_logs/pip-audit-${req}.stdout" \
                2> "tasukeru_logs/pip-audit-${req}.stderr"
              this_exit=$?
              [ "$this_exit" -ne 0 ] && pip_exit=$this_exit
            fi
          done

          if [ -f pyproject.toml ]; then
            python - <<'PY'
          from __future__ import annotations

          import tomllib
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          output = Path("tasukeru_logs/pip-audit-pyproject-requirements.txt")
          requirements: list[str] = []

          try:
              data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          except Exception:
              data = {}

          project = data.get("project") if isinstance(data, dict) else {}
          if isinstance(project, dict):
              deps = project.get("dependencies")
              if isinstance(deps, list):
                  requirements.extend(str(dep) for dep in deps if str(dep).strip())

              optional_deps = project.get("optional-dependencies")
              if isinstance(optional_deps, dict):
                  for values in optional_deps.values():
                      if isinstance(values, list):
                          requirements.extend(str(dep) for dep in values if str(dep).strip())

          output.write_text("\n".join(requirements) + ("\n" if requirements else ""), encoding="utf-8")
          PY

            if [ -s tasukeru_logs/pip-audit-pyproject-requirements.txt ]; then
              python -m pip_audit -r tasukeru_logs/pip-audit-pyproject-requirements.txt -f json -o tasukeru_logs/pip-audit-pyproject.json \
                > tasukeru_logs/pip-audit-pyproject.stdout \
                2> tasukeru_logs/pip-audit-pyproject.stderr
              this_exit=$?
              [ "$this_exit" -ne 0 ] && pip_exit=$this_exit
            fi
          fi

          # Aggregate per-requirements and pyproject-derived pip-audit reports into the canonical file
          # consumed by Tasukeru's advisory parser. This keeps the summary from
          # silently ignoring dependency findings.
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          log_dir = Path("tasukeru_logs")
          aggregate = {
              "dependencies": [],
              "vulnerabilities": [],
              "sources": [],
          }

          for path in sorted(log_dir.glob("pip-audit-*.json")):
              if path.name == "pip-audit.json":
                  continue
              try:
                  payload = json.loads(path.read_text(encoding="utf-8") or "{}")
              except Exception as exc:
                  aggregate["sources"].append(
                      {
                          "path": str(path),
                          "parsed": False,
                          "error": type(exc).__name__,
                      }
                  )
                  continue

              aggregate["sources"].append({"path": str(path), "parsed": True})

              dependencies = payload.get("dependencies")
              if isinstance(dependencies, list):
                  for item in dependencies:
                      if isinstance(item, dict):
                          enriched = dict(item)
                          enriched.setdefault("source_file", str(path))
                          aggregate["dependencies"].append(enriched)

              vulnerabilities = payload.get("vulnerabilities")
              if isinstance(vulnerabilities, list):
                  for item in vulnerabilities:
                      if isinstance(item, dict):
                          enriched = dict(item)
                          enriched.setdefault("source_file", str(path))
                          aggregate["vulnerabilities"].append(enriched)

          log_dir.joinpath("pip-audit.json").write_text(
              json.dumps(aggregate, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          set -e

          echo "$ruff_exit" > tasukeru_logs/ruff.exit
          echo "$bandit_exit" > tasukeru_logs/bandit.exit
          echo "$pip_exit" > tasukeru_logs/pip-audit.exit

          echo "ruff_exit=${ruff_exit}"
          echo "bandit_exit=${bandit_exit}"
          echo "pip_exit=${pip_exit}"

      - name: Generate Tasukeru advisory review
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates

          python - <<'PY'
          from __future__ import annotations

          import difflib
          import hashlib
          import hmac
          import json
          import math
          import os
          import re
          import textwrap
          from collections import Counter, defaultdict
          from pathlib import Path
          from typing import Any

          repo = Path(".")
          log_dir = Path("tasukeru_logs")

          summary_path = Path("tasukeru_advisory_summary.md")
          hitl_md_path = Path("tasukeru_hitl_review.md")
          hitl_json_path = Path("tasukeru_hitl_review.json")
          notification_state_path = Path("tasukeru_notification_state.json")
          pr_comment_path = Path("tasukeru_pr_comment.md")
          dradm_md_path = Path("tasukeru_dradm_draft.md")
          dradm_json_path = Path("tasukeru_dradm_draft.json")
          confidence_md_path = Path("tasukeru_confidence_report.md")
          confidence_json_path = Path("tasukeru_confidence_report.json")
          readme_refinement_md_path = Path("tasukeru_readme_refinement_draft.md")
          readme_refinement_json_path = Path("tasukeru_readme_refinement_draft.json")
          arl_jsonl_path = Path("tasukeru_arl.jsonl")
          arl_verify_json_path = Path("tasukeru_arl_verify.json")
          self_definition_source_path = Path("tasukeru_self_definition.json")
          self_definition_effective_path = Path("tasukeru_self_definition_effective.json")
          self_definition_chain_path = Path("tasukeru_self_definition_chain.jsonl")
          self_definition_verify_path = Path("tasukeru_self_definition_verify.json")
          gate_flags_path = Path("tasukeru_gate_flags.json")
          gate_adoption_log_path = Path("tasukeru_gate_adoption_log.jsonl")
          gate_adoption_verify_path = Path("tasukeru_gate_adoption_verify.json")
          decision_diary_md_path = Path("tasukeru_decision_diary.md")
          decision_diary_jsonl_path = Path("tasukeru_decision_diary.jsonl")
          decision_diary_verify_path = Path("tasukeru_decision_diary_verify.json")
          announcement_md_path = Path("tasukeru_announcement.md")
          announcement_json_path = Path("tasukeru_announcement.json")
          result_consistency_report_md_path = Path("tasukeru_result_consistency_report.md")
          result_consistency_report_json_path = Path("tasukeru_result_consistency_report.json")
          result_consistency_verify_path = Path("tasukeru_result_consistency_verify.json")
          finding_validation_report_md_path = Path("tasukeru_finding_validation_report.md")
          finding_validation_report_json_path = Path("tasukeru_finding_validation_report.json")
          finding_validation_verify_path = Path("tasukeru_finding_validation_verify.json")
          clean_run_draft_md_path = Path("tasukeru_clean_run_draft.md")
          clean_run_draft_json_path = Path("tasukeru_clean_run_draft.json")
          clean_run_draft_verify_path = Path("tasukeru_clean_run_draft_verify.json")
          pr_draft_md_path = Path("tasukeru_pr_draft.md")
          pr_draft_json_path = Path("tasukeru_pr_draft.json")
          pr_draft_verify_path = Path("tasukeru_pr_draft_verify.json")
          three_d_vaf_md_path = Path("tasukeru_3d_vulnerability_review.md")
          three_d_vaf_json_path = Path("tasukeru_3d_vulnerability_review.json")
          sis_md_path = Path("tasukeru_safety_impact_simulation.md")
          sis_json_path = Path("tasukeru_safety_impact_simulation.json")
          trust_boundary_risk_md_path = Path("tasukeru_trust_boundary_risk_report.md")
          trust_boundary_risk_json_path = Path("tasukeru_trust_boundary_risk_report.json")
          trust_boundary_risk_verify_path = Path("tasukeru_trust_boundary_risk_verify.json")
          dimension_dependency_md_path = Path("tasukeru_dimension_dependency_report.md")
          dimension_dependency_json_path = Path("tasukeru_dimension_dependency_report.json")
          dimension_dependency_verify_path = Path("tasukeru_dimension_dependency_verify.json")
          probabilistic_escalation_md_path = Path("tasukeru_probabilistic_escalation_report.md")
          probabilistic_escalation_json_path = Path("tasukeru_probabilistic_escalation_report.json")
          probabilistic_escalation_verify_path = Path("tasukeru_probabilistic_escalation_verify.json")

          AUTO_FALSE = {
              "auto_branch_allowed": False,
              "auto_pr_creation_allowed": False,
              "auto_commit_allowed": False,
              "auto_push_allowed": False,
              "auto_merge_allowed": False,
              "autofix_allowed": False,
              "human_decision_required": True,
              "suggestion_only": True,
              "verified": False,
          }

          DEFAULT_SELF_DEFINITION: dict[str, Any] = {
              "schema_version": "self-definition-v1",
              "identity": (
                  "Tasukeru Analysis is an advisory-only review assistant. "
                  "It detects, classifies, records, summarizes, and escalates findings for human review, "
                  "but does not act as an autonomous change agent."
              ),
              "must_not": {
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "self_definition_auto_update_allowed": False,
                  "rule_auto_tuning_allowed": False,
                  "workflow_auto_edit_allowed": False,
              },
              "must": {
                  "hitl_required_must_require_human_review": True,
                  "public_comments_must_not_include_payloads": True,
                  "public_comments_must_not_include_attack_steps": True,
                  "rfl_must_not_be_sealed": True,
                  "pause_for_hitl_must_not_be_sealed": True,
                  "sealed_only_by_ethics_or_acc": True,
                  "self_definition_change_requires_hitl": True,
                  "self_definition_change_must_be_recorded": True,
              },
              "allowed_actions": [
                  "read",
                  "detect",
                  "classify",
                  "summarize",
                  "record_artifacts",
                  "verify_hash_chains",
                  "generate_draft_only_suggestions",
                  "request_hitl_review",
              ],
              "prohibited_actions": [
                  "auto_create_branch",
                  "auto_create_pull_request",
                  "auto_commit",
                  "auto_push",
                  "auto_fix",
                  "auto_merge",
                  "auto_update_self_definition",
                  "auto_tune_rules_from_history",
                  "publish_exploit_payloads_or_attack_steps",
              ],
              "change_policy": {
                  "read_only_verify_allowed": True,
                  "change_detection_decision": "HITL_REQUIRED",
                  "change_gate_decision": "STOPPED",
                  "change_layer": "acc_gate",
                  "auto_apply_allowed": False,
                  "human_decision_required": True,
              },
          }

          SKIP_DIRS = {
              ".git",
              ".venv",
              "venv",
              "__pycache__",
              ".pytest_cache",
              ".mypy_cache",
              ".ruff_cache",
              "archive",
          }

          TEXT_EXTS = {
              ".py",
              ".yml",
              ".yaml",
              ".md",
              ".txt",
              ".json",
              ".jsonl",
              ".toml",
              ".cfg",
              ".ini",
              ".rst",
          }

          ALLOWED_DECISIONS = {"RUN", "PAUSE_FOR_HITL", "STOPPED"}
          ETHICS_OR_ACC_LAYERS = {"ethics_gate", "acc_gate"}
          RFL_LAYERS = {"relativity_gate", "rfl", "RFL"}
          REQUIRED_ARL_KEYS = {
              "run_id",
              "layer",
              "decision",
              "sealed",
              "overrideable",
              "final_decider",
              "reason_code",
          }
          CONTROL_BYPASS_PATTERNS = [
              ("AUTO_MERGE_TRUE", re.compile(r'["\']?auto[_-]?merge[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("AUTO_FIX_TRUE", re.compile(r'["\']?auto(?:fix|[_-]?fix)[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("AUTO_PUSH_TRUE", re.compile(r'["\']?auto[_-]?push[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("AUTO_PR_TRUE", re.compile(r'["\']?auto[_-]?pr[_-]?creation[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("HITL_REQUIRED_FALSE", re.compile(r'["\']?human[_-]?decision[_-]?required["\']?\s*[:=]\s*false', re.IGNORECASE)),
          ]

          # Phase 1.1 abuse-pattern review.
          #
          # Purpose:
          # - Detect likely unsafe external effects, credential transfer, destructive
          #   side effects, and dynamic execution.
          # - Do not fail the GitHub Actions job.
          # - Stop on the Tasukeru side by emitting HITL_REQUIRED + gate_decision=STOPPED
          #   for active/protected paths.
          # - Keep PR-comment DRAFT artifacts sanitized and folded.
          #
          # This is deliberately conservative and avoids known false positives:
          # - workflow's own read-only GitHub PR-files API calls
          # - *_TOKENS vocabulary constants
          # - known state-store reset unlink calls
          # - nosec + HITL-gated + shell=False subprocess calls
          ABUSE_NETWORK_SEND_PATTERNS = [
              re.compile(r"\brequests\.(post|put|patch|delete)\s*\(", re.IGNORECASE),
              re.compile(r"\burllib\.request\.urlopen\s*\(", re.IGNORECASE),
              re.compile(r"\bhttp\.client\.", re.IGNORECASE),
          ]
          ABUSE_CREDENTIAL_WORDS = re.compile(
              r"\b(secret|token|api[_-]?key|password|credential|private[_-]?key)\b",
              re.IGNORECASE,
          )
          ABUSE_DESTRUCTIVE_PATTERNS = [
              re.compile(r"\bshutil\.rmtree\s*\(", re.IGNORECASE),
              re.compile(r"\bos\.(remove|unlink|rmdir)\s*\(", re.IGNORECASE),
              re.compile(r"\.unlink\s*\(", re.IGNORECASE),
              re.compile(r"\brm\s+-rf\b", re.IGNORECASE),
          ]
          ABUSE_DYNAMIC_EXEC_PATTERNS = [
              re.compile(r"\beval\s*\(", re.IGNORECASE),
              re.compile(r"\bexec\s*\(", re.IGNORECASE),
              re.compile(r"\bsubprocess\.(run|Popen|call)\s*\(", re.IGNORECASE),
          ]
          ABUSE_ALLOWED_SELF_WORKFLOW_PATHS = {
              ".github/workflows/tasukeru-analysis.yml",
              "github/workflows/tasukeru-analysis.yml",
          }
          ABUSE_KNOWN_STATE_RESET_MARKERS = {
              "trust_store_path",
              "grants_store_path",
              "eval_state_path",
          }

          RULE_PROFILES: dict[str, dict[str, str]] = {
              "B101": {

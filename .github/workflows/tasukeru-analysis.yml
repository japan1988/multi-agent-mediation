                  result_consistency_report_json_path,
                  result_consistency_verify_path,
                  three_d_vaf_md_path,
                  three_d_vaf_json_path,
                  sis_md_path,
                  sis_json_path,
                  trust_boundary_risk_md_path,
                  trust_boundary_risk_json_path,
                  trust_boundary_risk_verify_path,
                  dimension_dependency_md_path,
                  dimension_dependency_json_path,
                  dimension_dependency_verify_path,
                  probabilistic_escalation_md_path,
                  probabilistic_escalation_json_path,
                  probabilistic_escalation_verify_path,
                  pr_draft_md_path,
                  pr_draft_json_path,
                  pr_draft_verify_path,
              ]
              self_artifact_paths = {
                  str(pr_draft_md_path),
                  str(pr_draft_json_path),
                  str(pr_draft_verify_path),
              }
              artifacts: list[dict[str, Any]] = []
              for path in artifact_paths:
                  exists = path.exists()
                  path_text = str(path)
                  status = "present" if exists else "not_present_yet"
                  if not exists and path_text in self_artifact_paths:
                      status = "will_be_generated_by_this_layer"
                  artifacts.append(
                      {
                          "path": path_text,
                          "exists": exists,
                          "status": status,
                          "size_bytes": path.stat().st_size if exists else 0,
                          "sha256": sha256_text(read_text(path, "")) if exists and path.is_file() else "",
                      }
                  )
              return artifacts

          def build_pr_draft_markdown(draft: dict[str, Any]) -> str:
              lines: list[str] = []
              lines.append("# Tasukeru PR Draft")
              lines.append("")
              lines.append("This is a draft-only PR description generated for human review.")
              lines.append("It does not create a pull request, commit changes, push changes, apply fixes, or merge anything.")
              lines.append("")
              lines.append("## Summary")
              lines.append("")
              lines.append("- Tasukeru Analysis reviewed the relevant changed files and generated advisory artifacts.")
              lines.append("- This draft summarizes the actual PR changed files, Tasukeru-relevant changed files, generated artifacts, verification results, and automation policy.")
              lines.append("- Human review is required before any merge or external adoption.")
              lines.append("")
              lines.append("## Changed files")
              lines.append("")
              changed_files = draft.get("changed_files", []) or []
              if changed_files:
                  for file_path in changed_files:
                      lines.append(f"- `{file_path}`")
              else:
                  lines.append("- No changed files were recorded by `tasukeru_logs/changed-files-all.txt` or fallback changed-file artifacts.")
              lines.append("")
              lines.append("## Tasukeru-relevant changed files")
              lines.append("")
              relevant_changed_files = draft.get("relevant_changed_files", []) or []
              if relevant_changed_files:
                  for file_path in relevant_changed_files:
                      lines.append(f"- `{file_path}`")
              else:
                  lines.append("- No relevant changed files were recorded by `tasukeru_changed_files.txt` or `tasukeru_logs/changed-files.txt`.")
              lines.append("")
              lines.append("## What changed")
              lines.append("")
              lines.append("- See the listed changed files and the repository diff for the exact content changes.")
              lines.append("- Tasukeru generated review artifacts to support human verification.")
              lines.append("- This draft intentionally avoids claims of complete resolution, automatic approval, or merge readiness.")
              lines.append("")
              lines.append("## What did not change")
              lines.append("")
              for item in draft.get("unchanged_policy_claims", []) or []:
                  lines.append(f"- {item}")
              lines.append("")
              lines.append("## Generated artifacts")
              lines.append("")
              for artifact in draft.get("generated_artifacts", []) or []:
                  status = str(artifact.get("status") or ("present" if artifact.get("exists") else "not_present_yet"))
                  marker = status.replace("_", " ")
                  lines.append(f"- `{artifact.get('path')}`: {marker}")
              lines.append("")
              lines.append("## Verification results")
              lines.append("")
              for key, value in (draft.get("verification_results", {}) or {}).items():
                  lines.append(f"- {key}: `{value}`")
              lines.append("")
              lines.append("## Review queue")
              lines.append("")
              for key, value in (draft.get("review_queue", {}) or {}).items():
                  lines.append(f"- {key}: `{value}`")
              lines.append("")
              lines.append("## Automation policy")
              lines.append("")
              for key, value in (draft.get("automation_policy", {}) or {}).items():
                  lines.append(f"- {key}: `{value}`")
              lines.append("")
              lines.append("## Human review required")
              lines.append("")
              lines.append("This PR draft is advisory-only. A human maintainer must review the diff, artifacts, and CI results before merge.")
              lines.append("")
              return "\n".join(lines) + "\n"

          def validate_pr_draft_markdown(markdown_text: str, draft: dict[str, Any]) -> list[dict[str, Any]]:
              contradictions: list[dict[str, Any]] = []
              forbidden_patterns = {
                  "FORBIDDEN_READY_TO_MERGE": r"\bready\s+to\s+merge\b",
                  "FORBIDDEN_FULLY_SAFE": r"\bfully\s+safe\b",
                  "FORBIDDEN_AUTOMATICALLY_APPROVED": r"\bautomatically\s+approved\b",
                  "FORBIDDEN_ALL_ISSUES_FIXED": r"\ball\s+issues\s+fixed\b",
                  "FORBIDDEN_NO_RISK": r"\bno\s+risk\b",
                  "FORBIDDEN_AUTO_PR_ENABLED": r"\bauto(?:matic)?\s+pr\s+(?:enabled|allowed)\b",
                  "FORBIDDEN_AUTO_MERGE_ENABLED": r"\bauto(?:matic)?\s+merge\s+(?:enabled|allowed)\b",
              }
              for reason_code, pattern in forbidden_patterns.items():
                  if re.search(pattern, markdown_text, re.IGNORECASE):
                      contradictions.append(
                          {
                              "reason_code": reason_code,
                              "message": "Forbidden overclaim or automation-enabling phrase detected in PR draft.",
                          }
                      )

              if os.environ.get("GITHUB_EVENT_NAME") == "pull_request" and not draft.get("changed_files"):
                  contradictions.append(
                      {
                          "reason_code": "PR_DRAFT_CHANGED_FILES_UNAVAILABLE",
                          "message": "Pull request event did not provide a changed-files list for the PR draft.",
                      }
                  )

              for file_path in draft.get("changed_files", []) or []:
                  if f"`{file_path}`" not in markdown_text:
                      contradictions.append(
                          {
                              "reason_code": "PR_DRAFT_CHANGED_FILE_MISSING",
                              "message": f"Changed file is missing from markdown draft: {file_path}",
                          }
                      )

              for file_path in draft.get("relevant_changed_files", []) or []:
                  if f"`{file_path}`" not in markdown_text:
                      contradictions.append(
                          {
                              "reason_code": "PR_DRAFT_RELEVANT_CHANGED_FILE_MISSING",
                              "message": f"Relevant changed file is missing from markdown draft: {file_path}",
                          }
                      )

              policy = draft.get("automation_policy", {}) or {}
              blocked_flags = (
                  "auto_pr_creation_allowed",
                  "auto_commit_allowed",
                  "auto_push_allowed",
                  "autofix_allowed",
                  "auto_merge_allowed",
                  "workflow_auto_edit_allowed",
                  "self_definition_auto_update_allowed",
              )
              for flag in blocked_flags:
                  if bool(policy.get(flag)):
                      contradictions.append(
                          {
                              "reason_code": "PR_DRAFT_AUTOMATION_POLICY_CONTRADICTION",
                              "message": f"Automation policy must remain false: {flag}",
                          }
                      )

              return contradictions

          def build_tasukeru_pr_draft(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
              announcement: dict[str, Any],
              result_consistency: dict[str, Any],
          ) -> dict[str, Any]:
              """Generate a PR body draft that stays consistent with observed process data.

              This layer is artifact-only and draft-only. It does not create PRs,
              commit, push, apply fixes, merge, auto-edit workflows, or update
              self-definition automatically.
              """
              counts = Counter(entry.get("decision", "UNKNOWN") for entry in entries)
              changed_files = read_pr_draft_changed_files()
              relevant_changed_files = read_pr_draft_relevant_changed_files()
              scanned_files = read_pr_draft_scanned_files()
              generated_artifacts = collect_pr_draft_artifact_status()
              finding_validation = metadata.get("finding_validation", {}) if isinstance(metadata, dict) else {}
              clean_run_draft = metadata.get("clean_run_draft", {}) if isinstance(metadata, dict) else {}
              self_definition = metadata.get("self_definition", {}) if isinstance(metadata, dict) else {}
              middle_layer = metadata.get("middle_layer", {}) if isinstance(metadata, dict) else {}
              middle_verify = middle_layer.get("verify", {}) if isinstance(middle_layer, dict) else {}

              automation_policy = {
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "workflow_auto_edit_allowed": False,
                  "self_definition_auto_update_allowed": False,
                  "github_pr_creation_performed": False,
                  "human_decision_required_for_merge": True,
              }
              verification_results = {
                  "arl_verified": bool(arl_verification.get("verified")),
                  "result_consistency_verified": bool(result_consistency.get("verified")),
                  "result_consistency_mismatch_count": int(result_consistency.get("mismatch_count", 0) or 0),
                  "finding_validation_verified": bool(finding_validation.get("verified")),
                  "finding_validation_policy_violations": int(finding_validation.get("policy_violation_count", 0) or 0),
                  "clean_run_draft_generated": bool(clean_run_draft.get("generated")),
                  "clean_run_ready": bool(clean_run_draft.get("clean_run_ready")),
                  "self_definition_verified": bool(self_definition.get("verified")),
                  "middle_layer_verified": bool(middle_verify.get("verified")),
              }
              review_queue = {
                  "HITL_REQUIRED": int(counts.get("HITL_REQUIRED", 0)),
                  "FIX_RECOMMENDED": int(counts.get("FIX_RECOMMENDED", 0)),
                  "REVIEW_RECOMMENDED": int(counts.get("REVIEW_RECOMMENDED", 0)),
                  "NOISE_CANDIDATE": int(counts.get("NOISE_CANDIDATE", 0)),
                  "INFO_ONLY": int(counts.get("INFO_ONLY", 0)),
              }
              draft: dict[str, Any] = {
                  "schema_version": "pr-draft-consistency-layer-v1",
                  "generated": True,
                  "verified": False,
                  "decision": "PAUSE_FOR_HITL",
                  "reason_code": "PR_DRAFT_PENDING_VERIFICATION",
                  "draft_only": True,
                  "artifact_only": True,
                  "changed_files": changed_files,
                  "changed_file_count": len(changed_files),
                  "relevant_changed_files": relevant_changed_files,
                  "relevant_changed_file_count": len(relevant_changed_files),
                  "scanned_files": scanned_files,
                  "scanned_file_count": len(scanned_files),
                  "generated_artifacts": generated_artifacts,
                  "generated_artifact_count": sum(1 for artifact in generated_artifacts if artifact.get("exists")),
                  "verification_results": verification_results,
                  "review_queue": review_queue,
                  "automation_policy": automation_policy,
                  "unchanged_policy_claims": [
                      "No automatic PR creation was performed.",
                      "No automatic commit was performed.",
                      "No automatic push was performed.",
                      "No automatic fix was applied.",
                      "No automatic merge was performed.",
                      "No workflow self-editing was performed.",
                      "No self-definition auto-update was performed.",
                  ],
                  "source_of_truth": {
                      "changed_files": "tasukeru_logs/changed-files-all.txt, with filtered changed-files fallback",
                      "relevant_changed_files": "tasukeru_changed_files.txt or tasukeru_logs/changed-files.txt",
                      "scanned_files": "tasukeru_logs/scanned-files.txt",
                      "generated_artifacts": "artifact path existence at generation time",
                      "verification_results": "Tasukeru verification metadata",
                      "automation_policy": "hard-coded false policy in this layer",
                  },
              }
              markdown_text = build_pr_draft_markdown(draft)
              contradictions = validate_pr_draft_markdown(markdown_text, draft)
              verified = not contradictions
              draft["markdown"] = markdown_text
              draft["contradictions"] = contradictions
              draft["contradiction_count"] = len(contradictions)
              draft["verified"] = verified
              draft["decision"] = "RUN" if verified else "PAUSE_FOR_HITL"
              draft["reason_code"] = "PR_DRAFT_CONSISTENCY_VERIFIED" if verified else "PR_DRAFT_CONSISTENCY_MISMATCH"
              draft["markdown_sha256"] = sha256_text(markdown_text)
              draft["draft_sha256"] = canonical_hash(
                  {
                      "schema_version": draft["schema_version"],
                      "generated": draft["generated"],
                      "verified": draft["verified"],
                      "decision": draft["decision"],
                      "reason_code": draft["reason_code"],
                      "changed_files": draft["changed_files"],
                      "relevant_changed_files": draft["relevant_changed_files"],
                      "generated_artifact_count": draft["generated_artifact_count"],
                      "verification_results": draft["verification_results"],
                      "review_queue": draft["review_queue"],
                      "automation_policy": draft["automation_policy"],
                      "contradiction_count": draft["contradiction_count"],
                      "contradictions": draft["contradictions"],
                  }
              )
              return draft

          def write_tasukeru_pr_draft(draft: dict[str, Any]) -> None:
              pr_draft_md_path.write_text(str(draft.get("markdown", "")), encoding="utf-8")
              json_payload = {key: value for key, value in draft.items() if key != "markdown"}
              write_json(pr_draft_json_path, json_payload)
              verify_payload = {
                  "schema_version": "pr-draft-consistency-verify-v1",
                  "verified": bool(draft.get("verified")),
                  "generated": bool(draft.get("generated")),
                  "decision": draft.get("decision"),
                  "reason_code": draft.get("reason_code"),
                  "changed_file_count": draft.get("changed_file_count"),
                  "relevant_changed_file_count": draft.get("relevant_changed_file_count"),
                  "scanned_file_count": draft.get("scanned_file_count"),
                  "generated_artifact_count": draft.get("generated_artifact_count"),
                  "contradiction_count": draft.get("contradiction_count"),
                  "contradictions": draft.get("contradictions", []),
                  "report_artifact": str(pr_draft_json_path),
                  "summary_artifact": str(pr_draft_md_path),
                  "draft_sha256": draft.get("draft_sha256"),
                  "markdown_sha256": draft.get("markdown_sha256"),
                  "artifact_only": True,
                  "draft_only": True,
                  "auto_apply_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "auto_fix_allowed": False,
                  "auto_merge_allowed": False,
                  "workflow_auto_edit_allowed": False,
                  "self_definition_auto_update_allowed": False,
                  "human_decision_required_for_merge": True,
              }
              write_json(pr_draft_verify_path, verify_payload)

          def generate_tasukeru_pr_draft(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
              announcement: dict[str, Any],
              result_consistency: dict[str, Any],
          ) -> dict[str, Any]:
              draft = build_tasukeru_pr_draft(entries, state, metadata, arl_verification, announcement, result_consistency)
              write_tasukeru_pr_draft(draft)
              return draft

          def parse_summary_decision_counts(summary_text: str) -> dict[str, int]:
              parsed: dict[str, int] = {}
              for level in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY"):
                  match = re.search(rf"^\s*-\s+{re.escape(level)}:\s+(\d+)\s*$", summary_text, re.MULTILINE)
                  if match:
                      parsed[level] = int(match.group(1))
              return parsed

          def compare_result_field(
              mismatches: list[dict[str, Any]],
              *,
              field: str,
              process_value: Any,
              output_value: Any,
              artifact: str,
              reason_code: str,
          ) -> None:
              if process_value != output_value:
                  mismatches.append(
                      {
                          "field": field,
                          "process_value": process_value,
                          "output_value": output_value,
                          "artifact": artifact,
                          "reason_code": reason_code,
                      }
                  )

          def build_result_consistency_report(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
              announcement: dict[str, Any],
          ) -> dict[str, Any]:
              """Audit whether process records and generated result artifacts agree.

              This is report-only. It does not modify findings, rewrite artifacts,
              create branches, create PRs, commit, push, auto-fix, or auto-merge.
              """
              counts = Counter(entry.get("decision", "UNKNOWN") for entry in entries)
              normalized_counts = {
                  level: int(counts.get(level, 0))
                  for level in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY")
              }
              mismatches: list[dict[str, Any]] = []

              hitl_payload = read_json(hitl_json_path, {})
              notification_payload = read_json(notification_state_path, {})
              announcement_payload = read_json(announcement_json_path, {})
              arl_verify_payload = read_json(arl_verify_json_path, {})
              gate_flags_payload = read_json(gate_flags_path, {})
              gate_adoption_verify_payload = read_json(gate_adoption_verify_path, {})
              self_definition_verify_payload = read_json(self_definition_verify_path, {})
              decision_diary_verify_payload = read_json(decision_diary_verify_path, {})
              finding_validation_verify_payload = read_json(finding_validation_verify_path, {})
              clean_run_draft_verify_payload = read_json(clean_run_draft_verify_path, {})
              pr_draft_verify_payload = read_json(pr_draft_verify_path, {})
              summary_text = read_text(summary_path, "")
              summary_counts = parse_summary_decision_counts(summary_text)
              three_d_vaf_payload = read_json(three_d_vaf_json_path, {})
              sis_payload = read_json(sis_json_path, {})
              dimension_dependency_payload = read_json(dimension_dependency_json_path, {})
              dimension_dependency_verify_payload = read_json(dimension_dependency_verify_path, {})
              probabilistic_escalation_payload = read_json(probabilistic_escalation_json_path, {})
              probabilistic_escalation_verify_payload = read_json(probabilistic_escalation_verify_path, {})
              trust_boundary_risk_payload = read_json(trust_boundary_risk_json_path, {})
              trust_boundary_risk_verify_payload = read_json(trust_boundary_risk_verify_path, {})
              pr_comment_text = read_text(pr_comment_path, "")

              # 3D-VAF / SIS / 3D-DAC / PR-comment consistency.
              three_d_metadata = metadata.get("three_d_vaf", {}) if isinstance(metadata, dict) else {}
              sis_metadata = metadata.get("safety_impact_simulation", {}) if isinstance(metadata, dict) else {}
              dimension_dependency_metadata = metadata.get("dimension_dependency", {}) if isinstance(metadata, dict) else {}
              probabilistic_escalation_metadata = metadata.get("probabilistic_escalation", {}) if isinstance(metadata, dict) else {}
              trust_boundary_risk_metadata = metadata.get("trust_boundary_risk", {}) if isinstance(metadata, dict) else {}
              three_d_counts = three_d_vaf_payload.get("counts", {}) if isinstance(three_d_vaf_payload, dict) else {}
              sis_counts = sis_payload.get("counts", {}) if isinstance(sis_payload, dict) else {}
              dimension_dependency_counts = dimension_dependency_payload.get("counts", {}) if isinstance(dimension_dependency_payload, dict) else {}
              probabilistic_escalation_counts = probabilistic_escalation_payload.get("counts", {}) if isinstance(probabilistic_escalation_payload, dict) else {}
              probabilistic_escalation_summary = probabilistic_escalation_payload.get("probability_summary", {}) if isinstance(probabilistic_escalation_payload, dict) else {}
              trust_boundary_risk_counts = trust_boundary_risk_payload.get("counts", {}) if isinstance(trust_boundary_risk_payload, dict) else {}
              sis_comment_policy = sis_payload.get("comment_policy", {}) if isinstance(sis_payload, dict) else {}
              sis_overall_risk_level = str(sis_payload.get("overall_risk_level", "UNKNOWN")) if isinstance(sis_payload, dict) else "UNKNOWN"

              compare_result_field(
                  mismatches,
                  field="3d_vaf.entry_count",
                  process_value=len(entries),
                  output_value=int(three_d_counts.get("entry_count", -1)),
                  artifact=str(three_d_vaf_json_path),
                  reason_code="RESULT_3D_VAF_ENTRY_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="3d_vaf.metadata_entry_count",
                  process_value=int(three_d_counts.get("entry_count", -1)),
                  output_value=int(three_d_metadata.get("entry_count", -1)),
                  artifact=str(three_d_vaf_json_path),
                  reason_code="RESULT_3D_VAF_METADATA_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="3d_vaf.fallback_required",
                  process_value=int(three_d_counts.get("fallback_required", -1)),
                  output_value=int(three_d_metadata.get("fallback_required", -1)),
                  artifact=str(three_d_vaf_json_path),
                  reason_code="RESULT_3D_VAF_FALLBACK_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="sis.entry_count",
                  process_value=len(entries),
                  output_value=int(sis_counts.get("entry_count", -1)),
                  artifact=str(sis_json_path),
                  reason_code="RESULT_SIS_ENTRY_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="sis.hitl_required",
                  process_value=int(normalized_counts.get("HITL_REQUIRED", 0)),
                  output_value=int(sis_counts.get("hitl_required", -1)),
                  artifact=str(sis_json_path),
                  reason_code="RESULT_SIS_HITL_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="sis.metadata_risk_level",
                  process_value=sis_overall_risk_level,
                  output_value=str(sis_metadata.get("overall_risk_level", "UNKNOWN")),
                  artifact=str(sis_json_path),
                  reason_code="RESULT_SIS_RISK_LEVEL_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="sis.metadata_hitl_required",
                  process_value=int(sis_counts.get("hitl_required", -1)),
                  output_value=int(sis_metadata.get("hitl_required", -1)),
                  artifact=str(sis_json_path),
                  reason_code="RESULT_SIS_METADATA_HITL_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="3d_dac.entry_count",
                  process_value=len(entries),
                  output_value=int(dimension_dependency_counts.get("entry_count", -1)),
                  artifact=str(dimension_dependency_json_path),
                  reason_code="RESULT_3D_DAC_ENTRY_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="3d_dac.metadata_dependency_mismatch_count",
                  process_value=int(dimension_dependency_counts.get("dependency_mismatch_count", -1)),
                  output_value=int(dimension_dependency_metadata.get("dependency_mismatch_count", -1)),
                  artifact=str(dimension_dependency_json_path),
                  reason_code="RESULT_3D_DAC_METADATA_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="3d_dac.verify_verified",
                  process_value=bool(dimension_dependency_payload.get("verified", False)),
                  output_value=bool(dimension_dependency_verify_payload.get("verified", False)),
                  artifact=str(dimension_dependency_verify_path),
                  reason_code="RESULT_3D_DAC_VERIFY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="3d_dac.verify_decision",
                  process_value=str(dimension_dependency_payload.get("decision", "UNKNOWN")),
                  output_value=str(dimension_dependency_verify_payload.get("decision", "UNKNOWN")),
                  artifact=str(dimension_dependency_verify_path),
                  reason_code="RESULT_3D_DAC_DECISION_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.entry_count",
                  process_value=len(entries),
                  output_value=int(probabilistic_escalation_counts.get("entry_count", -1)),
                  artifact=str(probabilistic_escalation_json_path),
                  reason_code="RESULT_PEL_ENTRY_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.metadata_escalation_candidate_count",
                  process_value=int(probabilistic_escalation_counts.get("escalation_candidate_count", -1)),
                  output_value=int(probabilistic_escalation_metadata.get("escalation_candidate_count", -1)),
                  artifact=str(probabilistic_escalation_json_path),
                  reason_code="RESULT_PEL_METADATA_ESCALATION_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.metadata_mandatory_hitl_count",
                  process_value=int(probabilistic_escalation_counts.get("mandatory_hitl_count", -1)),
                  output_value=int(probabilistic_escalation_metadata.get("mandatory_hitl_count", -1)),
                  artifact=str(probabilistic_escalation_json_path),
                  reason_code="RESULT_PEL_METADATA_MANDATORY_HITL_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.metadata_threshold",
                  process_value=float(probabilistic_escalation_payload.get("threshold", -1.0)),
                  output_value=float(probabilistic_escalation_metadata.get("threshold", -1.0)),
                  artifact=str(probabilistic_escalation_json_path),
                  reason_code="RESULT_PEL_METADATA_THRESHOLD_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.metadata_max_probability",
                  process_value=float(probabilistic_escalation_summary.get("max_probability", -1.0)),
                  output_value=float(probabilistic_escalation_metadata.get("max_probability", -1.0)),
                  artifact=str(probabilistic_escalation_json_path),
                  reason_code="RESULT_PEL_METADATA_MAX_PROBABILITY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.verify_decision",
                  process_value=str(probabilistic_escalation_payload.get("decision", "UNKNOWN")),
                  output_value=str(probabilistic_escalation_verify_payload.get("decision", "UNKNOWN")),
                  artifact=str(probabilistic_escalation_verify_path),
                  reason_code="RESULT_PEL_VERIFY_DECISION_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.verify_escalation_candidate_count",
                  process_value=int(probabilistic_escalation_counts.get("escalation_candidate_count", -1)),
                  output_value=int(probabilistic_escalation_verify_payload.get("escalation_candidate_count", -1)),
                  artifact=str(probabilistic_escalation_verify_path),
                  reason_code="RESULT_PEL_VERIFY_ESCALATION_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.verify_no_auto_control",
                  process_value=False,
                  output_value=bool(probabilistic_escalation_verify_payload.get("auto_control_executed", True)),
                  artifact=str(probabilistic_escalation_verify_path),
                  reason_code="RESULT_PEL_AUTO_CONTROL_POLICY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="pel.verify_no_decision_mutation",
                  process_value=False,
                  output_value=bool(probabilistic_escalation_verify_payload.get("changes_existing_decisions", True)),
                  artifact=str(probabilistic_escalation_verify_path),
                  reason_code="RESULT_PEL_DECISION_MUTATION_POLICY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="tbrl.entry_count",
                  process_value=len(entries),
                  output_value=int(trust_boundary_risk_counts.get("entry_count", -1)),
                  artifact=str(trust_boundary_risk_json_path),
                  reason_code="RESULT_TBRL_ENTRY_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="tbrl.metadata_review_candidate_count",
                  process_value=int(trust_boundary_risk_counts.get("review_candidate_count", -1)),
                  output_value=int(trust_boundary_risk_metadata.get("review_candidate_count", -1)),
                  artifact=str(trust_boundary_risk_json_path),
                  reason_code="RESULT_TBRL_METADATA_REVIEW_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="tbrl.metadata_high_signal_count",
                  process_value=int(trust_boundary_risk_counts.get("high_signal_count", -1)),
                  output_value=int(trust_boundary_risk_metadata.get("high_signal_count", -1)),
                  artifact=str(trust_boundary_risk_json_path),
                  reason_code="RESULT_TBRL_METADATA_HIGH_SIGNAL_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="tbrl.verify_decision",
                  process_value=str(trust_boundary_risk_payload.get("decision", "UNKNOWN")),
                  output_value=str(trust_boundary_risk_verify_payload.get("decision", "UNKNOWN")),
                  artifact=str(trust_boundary_risk_verify_path),
                  reason_code="RESULT_TBRL_VERIFY_DECISION_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="tbrl.verify_no_offensive_details",
                  process_value=False,
                  output_value=bool(trust_boundary_risk_verify_payload.get("offensive_details_included", True)),
                  artifact=str(trust_boundary_risk_verify_path),
                  reason_code="RESULT_TBRL_OFFENSIVE_DETAIL_POLICY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="tbrl.verify_no_auto_control",
                  process_value=False,
                  output_value=bool(trust_boundary_risk_verify_payload.get("auto_control_executed", True)),
                  artifact=str(trust_boundary_risk_verify_path),
                  reason_code="RESULT_TBRL_AUTO_CONTROL_POLICY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="tbrl.verify_no_decision_mutation",
                  process_value=False,
                  output_value=bool(trust_boundary_risk_verify_payload.get("changes_existing_decisions", True)),
                  artifact=str(trust_boundary_risk_verify_path),
                  reason_code="RESULT_TBRL_DECISION_MUTATION_POLICY_MISMATCH",
              )

              # Public-comment consistency is intentionally coarse: the comment must
              # either be absent/no-critical for clean runs, or expose only risk level
              # and HITL status for human-review cases. Full details stay in artifacts.
              hitl_count_for_comment = int(normalized_counts.get("HITL_REQUIRED", 0))
              pr_has_critical_marker = "tasukeru-analysis:critical-summary" in pr_comment_text
              pr_has_no_critical_marker = "tasukeru-analysis:no-critical" in pr_comment_text
              pr_mentions_risk_level = f"Risk level: `{sis_overall_risk_level}`" in pr_comment_text
              pr_mentions_hitl_count = f"HITL_REQUIRED: `{hitl_count_for_comment}`" in pr_comment_text
              pr_mentions_artifacts = "workflow artifacts" in pr_comment_text and "Tasukeru logs" in pr_comment_text
              pr_forbidden_tokens_present = any(
                  token in pr_comment_text.lower()
                  for token in ("exploit steps", "attack instructions", "credential values", "detailed attack paths")
              )

              if hitl_count_for_comment <= 0:
                  compare_result_field(
                      mismatches,
                      field="pr_comment.clean_run_marker",
                      process_value=True,
                      output_value=pr_has_no_critical_marker,
                      artifact=str(pr_comment_path),
                      reason_code="RESULT_PR_COMMENT_CLEAN_RUN_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="pr_comment.no_critical_marker_absent",
                      process_value=False,
                      output_value=pr_has_critical_marker,
                      artifact=str(pr_comment_path),
                      reason_code="RESULT_PR_COMMENT_UNEXPECTED_CRITICAL_MARKER",
                  )
              else:
                  compare_result_field(
                      mismatches,
                      field="pr_comment.critical_marker",
                      process_value=True,
                      output_value=pr_has_critical_marker,
                      artifact=str(pr_comment_path),
                      reason_code="RESULT_PR_COMMENT_CRITICAL_MARKER_MISSING",
                  )
                  compare_result_field(
                      mismatches,
                      field="pr_comment.risk_level",
                      process_value=True,
                      output_value=pr_mentions_risk_level,
                      artifact=str(pr_comment_path),
                      reason_code="RESULT_PR_COMMENT_RISK_LEVEL_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="pr_comment.hitl_count",
                      process_value=True,
                      output_value=pr_mentions_hitl_count,
                      artifact=str(pr_comment_path),
                      reason_code="RESULT_PR_COMMENT_HITL_COUNT_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="pr_comment.artifact_pointer",
                      process_value=True,
                      output_value=pr_mentions_artifacts,
                      artifact=str(pr_comment_path),
                      reason_code="RESULT_PR_COMMENT_ARTIFACT_POINTER_MISSING",
                  )
              compare_result_field(
                  mismatches,
                  field="pr_comment.public_details_policy",
                  process_value=False,
                  output_value=pr_forbidden_tokens_present,
                  artifact=str(pr_comment_path),
                  reason_code="RESULT_PR_COMMENT_FORBIDDEN_DETAIL_PRESENT",
              )
              compare_result_field(
                  mismatches,
                  field="sis.comment_policy.comment_when_no_problem",
                  process_value=False,
                  output_value=bool(sis_comment_policy.get("comment_when_no_problem", False)),
                  artifact=str(sis_json_path),
                  reason_code="RESULT_SIS_COMMENT_POLICY_MISMATCH",
              )

              # Decision count consistency.
              compare_result_field(
                  mismatches,
                  field="decision_counts.hitl_review_json",
                  process_value=normalized_counts,
                  output_value={level: int(hitl_payload.get("counts", {}).get(level, 0)) for level in normalized_counts},
                  artifact=str(hitl_json_path),
                  reason_code="RESULT_COUNTS_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="decision_counts.summary_md",
                  process_value=normalized_counts,
                  output_value={level: int(summary_counts.get(level, 0)) for level in normalized_counts},
                  artifact=str(summary_path),
                  reason_code="RESULT_COUNTS_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="decision_counts.announcement_json",
                  process_value=normalized_counts,
                  output_value={level: int(announcement_payload.get("decision_counts", {}).get(level, 0)) for level in normalized_counts},
                  artifact=str(announcement_json_path),
                  reason_code="RESULT_COUNTS_MISMATCH",
              )

              # HITL / critical notification consistency.
              hitl_count = int(normalized_counts.get("HITL_REQUIRED", 0))
              critical_count = int(state.get("critical_count", 0) or 0)
              compare_result_field(
                  mismatches,
                  field="critical_count.state_vs_process_hitl",
                  process_value=hitl_count,
                  output_value=critical_count,
                  artifact=str(notification_state_path),
                  reason_code="RESULT_CRITICAL_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="critical_count.notification_json",
                  process_value=critical_count,
                  output_value=int(notification_payload.get("critical_count", 0) or 0),
                  artifact=str(notification_state_path),
                  reason_code="RESULT_CRITICAL_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="review_queue.hitl_required",
                  process_value=critical_count,
                  output_value=int(announcement_payload.get("review_queue", {}).get("hitl_required", 0) or 0),
                  artifact=str(announcement_json_path),
                  reason_code="RESULT_REVIEW_QUEUE_MISMATCH",
              )

              # ARL verification consistency.
              compare_result_field(
                  mismatches,
                  field="arl.verified",
                  process_value=bool(arl_verification.get("verified")),
                  output_value=bool(arl_verify_payload.get("verified")),
                  artifact=str(arl_verify_json_path),
                  reason_code="RESULT_ARL_VERIFY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="arl.row_count",
                  process_value=arl_verification.get("row_count"),
                  output_value=arl_verify_payload.get("row_count"),
                  artifact=str(arl_verify_json_path),
                  reason_code="RESULT_ARL_ROW_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="announcement.arl.verified",
                  process_value=bool(arl_verification.get("verified")),
                  output_value=bool(announcement_payload.get("arl", {}).get("verified")),
                  artifact=str(announcement_json_path),
                  reason_code="RESULT_ANNOUNCEMENT_ARL_MISMATCH",
              )

              # Middle Layer Pack consistency.
              middle_layer = metadata.get("middle_layer", {}) if isinstance(metadata, dict) else {}
              middle_flags = middle_layer.get("flags", {}) if isinstance(middle_layer, dict) else {}
              middle_verify = middle_layer.get("verify", {}) if isinstance(middle_layer, dict) else {}
              adopted_from_flags = sum(
                  1 for stage in gate_flags_payload.get("stages", []) or []
                  if isinstance(stage, dict) and stage.get("adopted_as_gate") is True
              )
              compare_result_field(
                  mismatches,
                  field="middle_layer.verify",
                  process_value=bool(middle_verify.get("verified")),
                  output_value=bool(gate_adoption_verify_payload.get("verified")),
                  artifact=str(gate_adoption_verify_path),
                  reason_code="RESULT_MIDDLE_LAYER_VERIFY_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="middle_layer.adopted_stage_count",
                  process_value=middle_flags.get("adopted_stage_count"),
                  output_value=gate_flags_payload.get("adopted_stage_count"),
                  artifact=str(gate_flags_path),
                  reason_code="RESULT_MIDDLE_LAYER_COUNT_MISMATCH",
              )
              compare_result_field(
                  mismatches,
                  field="middle_layer.adopted_stage_count_from_stages",
                  process_value=gate_flags_payload.get("adopted_stage_count"),
                  output_value=adopted_from_flags,
                  artifact=str(gate_flags_path),
                  reason_code="RESULT_MIDDLE_LAYER_STAGE_MISMATCH",
              )

              # Guard artifact consistency.
              self_definition = metadata.get("self_definition", {}) if isinstance(metadata, dict) else {}
              compare_result_field(
                  mismatches,
                  field="self_definition.verified",
                  process_value=bool(self_definition.get("verified")),
                  output_value=bool(self_definition_verify_payload.get("verified")),
                  artifact=str(self_definition_verify_path),
                  reason_code="RESULT_SELF_DEFINITION_MISMATCH",
              )
              if decision_diary_verify_path.exists():
                  compare_result_field(
                      mismatches,
                      field="decision_diary.verified",
                      process_value=True,
                      output_value=bool(decision_diary_verify_payload.get("verified")),
                      artifact=str(decision_diary_verify_path),
                      reason_code="RESULT_DECISION_DIARY_MISMATCH",
                  )
              finding_validation = metadata.get("finding_validation", {}) if isinstance(metadata, dict) else {}
              if finding_validation_verify_path.exists():
                  compare_result_field(
                      mismatches,
                      field="finding_validation.verified",
                      process_value=bool(finding_validation.get("verified")),
                      output_value=bool(finding_validation_verify_payload.get("verified")),
                      artifact=str(finding_validation_verify_path),
                      reason_code="RESULT_FINDING_VALIDATION_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="finding_validation.finding_count",
                      process_value=finding_validation.get("finding_count"),
                      output_value=finding_validation_verify_payload.get("finding_count"),
                      artifact=str(finding_validation_verify_path),
                      reason_code="RESULT_FINDING_VALIDATION_COUNT_MISMATCH",
                  )
              clean_run_draft = metadata.get("clean_run_draft", {}) if isinstance(metadata, dict) else {}
              if clean_run_draft_verify_path.exists():
                  compare_result_field(
                      mismatches,
                      field="clean_run_draft.generated",
                      process_value=bool(clean_run_draft.get("generated")),
                      output_value=bool(clean_run_draft_verify_payload.get("generated")),
                      artifact=str(clean_run_draft_verify_path),
                      reason_code="RESULT_CLEAN_RUN_DRAFT_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="clean_run_draft.clean_run_ready",
                      process_value=bool(clean_run_draft.get("clean_run_ready")),
                      output_value=bool(clean_run_draft_verify_payload.get("clean_run_ready")),
                      artifact=str(clean_run_draft_verify_path),
                      reason_code="RESULT_CLEAN_RUN_DRAFT_READY_MISMATCH",
                  )
              pr_draft = metadata.get("pr_draft", {}) if isinstance(metadata, dict) else {}
              if pr_draft_verify_path.exists():
                  compare_result_field(
                      mismatches,
                      field="pr_draft.verified",
                      process_value=bool(pr_draft.get("verified")),
                      output_value=bool(pr_draft_verify_payload.get("verified")),
                      artifact=str(pr_draft_verify_path),
                      reason_code="RESULT_PR_DRAFT_VERIFY_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="pr_draft.changed_file_count",
                      process_value=pr_draft.get("changed_file_count"),
                      output_value=pr_draft_verify_payload.get("changed_file_count"),
                      artifact=str(pr_draft_verify_path),
                      reason_code="RESULT_PR_DRAFT_CHANGED_FILES_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="pr_draft.scanned_file_count",
                      process_value=pr_draft.get("scanned_file_count"),
                      output_value=pr_draft_verify_payload.get("scanned_file_count"),
                      artifact=str(pr_draft_verify_path),
                      reason_code="RESULT_PR_DRAFT_SCANNED_FILES_MISMATCH",
                  )
                  compare_result_field(
                      mismatches,
                      field="pr_draft.contradiction_count",
                      process_value=pr_draft.get("contradiction_count"),
                      output_value=pr_draft_verify_payload.get("contradiction_count"),
                      artifact=str(pr_draft_verify_path),
                      reason_code="RESULT_PR_DRAFT_CONTRADICTION_MISMATCH",
                  )

              # Automation policy must remain false across the result layer.
              automation_policy = {
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "workflow_auto_edit_allowed": False,
                  "self_definition_auto_update_allowed": False,
              }

              verified = not mismatches
              report = {
                  "schema_version": "result-consistency-auditor-v1",
                  "verified": verified,
                  "decision": "RUN" if verified else "PAUSE_FOR_HITL",
                  "reason_code": "RESULT_CONSISTENCY_VERIFIED" if verified else "RESULT_PROCESS_OUTPUT_MISMATCH",
                  "mismatch_count": len(mismatches),
                  "mismatches": mismatches,
                  "checked_artifacts": [
                      str(summary_path),
                      str(hitl_json_path),
                      str(notification_state_path),
                      str(announcement_json_path),
                      str(arl_verify_json_path),
                      str(gate_flags_path),
                      str(gate_adoption_verify_path),
                      str(self_definition_verify_path),
                      str(decision_diary_verify_path),
                      str(finding_validation_verify_path),
                      str(clean_run_draft_verify_path),
                      str(pr_draft_verify_path),
                      str(three_d_vaf_md_path),
                      str(three_d_vaf_json_path),
                      str(sis_md_path),
                      str(sis_json_path),
                      str(trust_boundary_risk_md_path),
                      str(trust_boundary_risk_json_path),
                      str(trust_boundary_risk_verify_path),
                      str(dimension_dependency_md_path),
                      str(dimension_dependency_json_path),
                      str(dimension_dependency_verify_path),
                      str(probabilistic_escalation_md_path),
                      str(probabilistic_escalation_json_path),
                      str(probabilistic_escalation_verify_path),
                      str(pr_comment_path),
                  ],
                  "process_counts": normalized_counts,
                  "summary_counts": summary_counts,
                  "policy": automation_policy | {
                      "report_only": True,
                      "auto_apply_allowed": False,
                      "human_decision_required_on_mismatch": True,
                  },
              }
              report["report_sha256"] = canonical_hash(
                  {
                      "schema_version": report["schema_version"],
                      "verified": report["verified"],
                      "decision": report["decision"],
                      "reason_code": report["reason_code"],
                      "mismatch_count": report["mismatch_count"],
                      "mismatches": report["mismatches"],
                  }
              )
              return report

          def write_result_consistency_report(report: dict[str, Any]) -> None:
              write_json(result_consistency_report_json_path, report)
              verify_payload = {
                  "schema_version": "result-consistency-verify-v1",
                  "verified": bool(report.get("verified")),
                  "decision": report.get("decision"),
                  "reason_code": report.get("reason_code"),
                  "mismatch_count": report.get("mismatch_count"),
                  "report_artifact": str(result_consistency_report_json_path),
                  "summary_artifact": str(result_consistency_report_md_path),
                  "report_sha256": report.get("report_sha256"),
                  "auto_apply_allowed": False,
                  "human_decision_required_on_mismatch": True,
              }
              write_json(result_consistency_verify_path, verify_payload)

              with result_consistency_report_md_path.open("w", encoding="utf-8") as file_obj:
                  file_obj.write("# Tasukeru Result Consistency Auditor\n\n")
                  file_obj.write("This report is advisory-only. It checks whether process records and generated result artifacts agree.\n\n")
                  file_obj.write("## Result\n\n")
                  file_obj.write(f"- Verified: `{report.get('verified')}`\n")
                  file_obj.write(f"- Decision: `{report.get('decision')}`\n")
                  file_obj.write(f"- Reason code: `{report.get('reason_code')}`\n")
                  file_obj.write(f"- Mismatch count: `{report.get('mismatch_count')}`\n")
                  file_obj.write(f"- Report hash: `{report.get('report_sha256')}`\n")
                  file_obj.write("\n## Process counts\n\n")
                  for level, count in report.get("process_counts", {}).items():
                      file_obj.write(f"- {level}: `{count}`\n")
                  file_obj.write("\n## Mismatches\n\n")
                  mismatches = report.get("mismatches", []) or []
                  if not mismatches:
                      file_obj.write("- None\n")
                  else:
                      for item in mismatches:
                          file_obj.write(
                              f"- `{item.get('reason_code')}` `{item.get('field')}` "
                              f"process=`{item.get('process_value')}` output=`{item.get('output_value')}` "
                              f"artifact=`{item.get('artifact')}`\n"
                          )
                  file_obj.write("\n## Policy\n\n")
                  file_obj.write("- Report-only: `true`\n")
                  file_obj.write("- Auto branch creation: `false`\n")
                  file_obj.write("- Auto PR creation: `false`\n")
                  file_obj.write("- Auto commit: `false`\n")
                  file_obj.write("- Auto push: `false`\n")
                  file_obj.write("- Auto fix: `false`\n")
                  file_obj.write("- Auto merge: `false`\n")

          def generate_tasukeru_result_consistency_report(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
              announcement: dict[str, Any],
          ) -> dict[str, Any]:
              report = build_result_consistency_report(entries, state, metadata, arl_verification, announcement)
              write_result_consistency_report(report)
              return report

          def clamp_score(value: float, minimum: float = 0.0, maximum: float = 1.0) -> float:
              return round(max(minimum, min(maximum, value)), 3)

          def confidence_level(score: float) -> str:
              if score >= 0.90:
                  return "VERY_HIGH"
              if score >= 0.75:
                  return "HIGH"
              if score >= 0.55:
                  return "MEDIUM"
              if score >= 0.35:
                  return "LOW"
              return "VERY_LOW"

          def calculate_entry_confidence(entry: dict[str, Any]) -> dict[str, Any]:
              basis: list[str] = []
              penalties: list[str] = []
              components = {
                  "evidence_quality": 0.0,
                  "rule_profile_confidence": 0.0,
                  "path_profile_confidence": 0.0,
                  "classification_clarity": 0.0,
                  "fix_prediction_clarity": 0.0,
                  "fix_verification_status": 0.0,
              }

              evidence = entry.get("evidence", {}) if isinstance(entry.get("evidence"), dict) else {}
              source = str(entry.get("source", ""))
              rule_id = str(entry.get("rule_id", ""))
              file_path = str(entry.get("file", ""))
              line = entry.get("line")
              snippet = str(entry.get("code_snippet", ""))
              artifact = str(evidence.get("artifact", ""))
              path_profile = str(entry.get("path_profile", ""))
              classification_reason = str(entry.get("classification_reason", ""))
              rule_profile = entry.get("rule_profile", {}) if isinstance(entry.get("rule_profile"), dict) else {}
              fix_prediction = entry.get("fix_prediction", {}) if isinstance(entry.get("fix_prediction"), dict) else {}
              fix_verification = entry.get("fix_verification", {}) if isinstance(entry.get("fix_verification"), dict) else {}

              if source:
                  components["evidence_quality"] += 0.05
                  basis.append("source tool is recorded")
              if rule_id:
                  components["evidence_quality"] += 0.05
                  basis.append("rule_id is recorded")
              if file_path:
                  components["evidence_quality"] += 0.05
                  basis.append("target file is recorded")
              if line or source in {"Documentation Review", "pip-audit"}:
                  components["evidence_quality"] += 0.04
                  basis.append("line or document-level scope is recorded")
              if snippet or source in {"Documentation Review", "pip-audit"}:
                  components["evidence_quality"] += 0.03
                  basis.append("snippet or document-level evidence is available")
              if artifact:
                  components["evidence_quality"] += 0.03
                  basis.append("artifact reference is recorded")
              components["evidence_quality"] = min(0.25, components["evidence_quality"])

              if rule_id in RULE_PROFILES:
                  components["rule_profile_confidence"] = 0.20
                  basis.append("rule_id has an explicit RULE_PROFILES entry")
              elif source in {"Documentation Review", "Tasukeru Logic Review", "pip-audit"}:
                  components["rule_profile_confidence"] = 0.16
                  basis.append("source-specific repository policy handles this finding type")
              elif rule_profile:
                  components["rule_profile_confidence"] = 0.12
                  basis.append("fallback rule profile is present")
              else:
                  components["rule_profile_confidence"] = 0.08
                  penalties.append("rule_id is not explicitly profiled")

              if path_profile and path_profile not in {"unknown", "general"}:
                  components["path_profile_confidence"] = 0.20
                  basis.append(f"path_profile is resolved as {path_profile}")
              elif path_profile == "general":
                  components["path_profile_confidence"] = 0.14
                  basis.append("path_profile is general but explicitly resolved")
              else:
                  components["path_profile_confidence"] = 0.08
                  penalties.append("path_profile is missing or unknown")

              if classification_reason:
                  components["classification_clarity"] = 0.15
                  basis.append("classification_reason explains the decision")
              else:
                  components["classification_clarity"] = 0.07
                  penalties.append("classification_reason is missing")

              if fix_prediction.get("expected_effect_ja"):
                  components["fix_prediction_clarity"] = 0.10
                  basis.append("fix_prediction includes expected effect")
              else:
                  components["fix_prediction_clarity"] = 0.04
                  penalties.append("fix_prediction is incomplete")

              if fix_verification.get("verified") is True:
                  components["fix_verification_status"] = 0.10
                  basis.append("fix_verification is verified")
              elif fix_verification:
                  components["fix_verification_status"] = 0.02
                  penalties.append("fix_verification is advisory-only and not verified")
              else:
                  components["fix_verification_status"] = 0.0
                  penalties.append("fix_verification data is missing")

              score = sum(components.values())

              if source in {"Ruff", "Bandit"} and not line:
                  score -= 0.03
                  penalties.append("tool finding has no line number")
              if source in {"Ruff", "Bandit"} and not snippet:
                  score -= 0.03
                  penalties.append("tool finding has no code snippet")
              if entry.get("decision") == "HITL_REQUIRED" and fix_verification.get("verified") is not True:
                  score -= 0.02
                  penalties.append("critical finding still requires human review")

              cap = 1.0 if fix_verification.get("verified") is True else 0.90
              if cap < 1.0:
                  basis.append("score is capped below 1.0 because fix_verification is not verified")
              score = clamp_score(score, 0.0, cap)

              return {
                  "confidence_score": score,
                  "confidence_level": confidence_level(score),
                  "score_semantics": "Confidence in Tasukeru's classification/suggestion evidence, not a safety guarantee.",
                  "components": {key: round(value, 3) for key, value in components.items()},
                  "basis": basis,
                  "penalties": penalties,
                  "policy": {
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def attach_confidence_scores(entries: list[dict[str, Any]]) -> list[dict[str, Any]]:
              for entry in entries:
                  assessment = calculate_entry_confidence(entry)
                  entry["confidence_assessment"] = assessment
                  entry["confidence_score"] = assessment["confidence_score"]
                  entry["confidence_level"] = assessment["confidence_level"]
              return entries

          def build_file_confidence_summary(entries: list[dict[str, Any]]) -> list[dict[str, Any]]:
              grouped: dict[str, list[dict[str, Any]]] = defaultdict(list)
              for entry in entries:
                  grouped[str(entry.get("file", "repository"))].append(entry)

              summaries: list[dict[str, Any]] = []
              for file_path, file_entries in sorted(grouped.items()):
                  scores = [float(entry.get("confidence_score", 0.0)) for entry in file_entries]
                  avg_score = clamp_score(sum(scores) / len(scores)) if scores else 0.0
                  decision_counts = Counter(str(entry.get("decision", "UNKNOWN")) for entry in file_entries)
                  reason_codes = sorted({str(entry.get("reason_code", "")) for entry in file_entries if entry.get("reason_code")})
                  path_profiles = sorted({str(entry.get("path_profile", "")) for entry in file_entries if entry.get("path_profile")})
                  basis = [
                      f"{len(file_entries)} finding(s) grouped for this file",
                      f"decision_counts={dict(decision_counts)}",
                  ]
                  if path_profiles:
                      basis.append(f"path_profiles={path_profiles}")
                  penalties: list[str] = []
                  if any(entry.get("decision") in {"HITL_REQUIRED", "REVIEW_RECOMMENDED"} for entry in file_entries):
                      penalties.append("file still contains findings that require human review or contextual review")
                  if any(entry.get("fix_verification", {}).get("verified") is not True for entry in file_entries):
                      penalties.append("one or more findings are not verified by fix_verification")
                  summaries.append(
                      {
                          "file": file_path,
                          "file_confidence_score": avg_score,
                          "file_confidence_level": confidence_level(avg_score),
                          "finding_count": len(file_entries),
                          "decision_counts": dict(decision_counts),
                          "reason_codes": reason_codes,
                          "path_profiles": path_profiles,
                          "basis": basis,
                          "penalties": penalties,
                      }
                  )
              return summaries

          def build_total_confidence_summary(entries: list[dict[str, Any]], state: dict[str, Any], metadata: dict[str, Any]) -> dict[str, Any]:
              scores = [float(entry.get("confidence_score", 0.0)) for entry in entries]
              entry_average = sum(scores) / len(scores) if scores else 0.0
              basis: list[str] = []
              penalties: list[str] = []

              structural_score = 0.70
              if metadata.get("ruff_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("Ruff findings are zero")
              if metadata.get("pip_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("pip-audit vulnerabilities are zero")
              if metadata.get("logic_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("Tasukeru logic review findings are zero")
              if state.get("critical_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("HITL_REQUIRED critical incidents are zero")
              structural_score = clamp_score(structural_score)

              total = (entry_average * 0.75) + (structural_score * 0.25)

              if metadata.get("documentation_count", 0):
                  penalties.append("documentation review still has findings")
                  total -= 0.02
              if state.get("critical_count", 0):
                  penalties.append("HITL_REQUIRED incidents remain")
                  total -= 0.08
              if not any(entry.get("fix_verification", {}).get("verified") is True for entry in entries):
                  penalties.append("no finding is fully verified by fix_verification; scores remain advisory")
                  total = min(total, 0.90)
              if not entries:
                  penalties.append("no entries were available to score")

              total = clamp_score(total)
              return {
                  "total_confidence_score": total,
                  "total_confidence_level": confidence_level(total),
                  "entry_average_score": clamp_score(entry_average),
                  "structural_score": structural_score,
                  "basis": basis,
                  "penalties": penalties,
                  "score_semantics": "Confidence in this Tasukeru review run's classification/suggestion evidence, not a guarantee that the repository is safe.",
                  "policy": {
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def build_confidence_report_payload(entries: list[dict[str, Any]], state: dict[str, Any], metadata: dict[str, Any]) -> dict[str, Any]:
              file_summaries = build_file_confidence_summary(entries)
              total_summary = build_total_confidence_summary(entries, state, metadata)
              return {
                  "schema_version": "1.0",
                  "tool": "tasukeru_confidence_scoring",
                  "status": "ADVISORY_ONLY",
                  "score_max": 1.0,
                  "score_semantics": "Scores represent confidence in Tasukeru's evidence/classification/suggestion, not permission to auto-apply changes.",
                  "total": total_summary,
                  "files": file_summaries,
                  "entries": [
                      {
                          "source": entry.get("source"),
                          "decision": entry.get("decision"),
                          "reason_code": entry.get("reason_code"),
                          "file": entry.get("file"),
                          "line": entry.get("line"),
                          "confidence_score": entry.get("confidence_score"),
                          "confidence_level": entry.get("confidence_level"),
                          "confidence_basis": entry.get("confidence_assessment", {}).get("basis", []),
                          "confidence_penalties": entry.get("confidence_assessment", {}).get("penalties", []),
                          "classification_reason": entry.get("classification_reason"),
                          "path_profile": entry.get("path_profile"),
                      }
                      for entry in entries
                  ],
                  "policy": {
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def write_confidence_report(payload: dict[str, Any]) -> None:
              write_json(confidence_json_path, payload)
              total = payload.get("total", {})
              with confidence_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru Confidence Report\n\n")
                  f.write("This report is advisory-only. Scores do not authorize auto-fix, auto-PR, auto-push, or auto-merge.\n\n")
                  f.write("## Total confidence\n\n")
                  f.write(f"- Score: `{total.get('total_confidence_score', 0.0)}` / `1.0`\n")
                  f.write(f"- Level: `{total.get('total_confidence_level', 'UNKNOWN')}`\n")
                  f.write(f"- Entry average: `{total.get('entry_average_score', 0.0)}`\n")
                  f.write(f"- Structural score: `{total.get('structural_score', 0.0)}`\n\n")
                  f.write("## Basis\n\n")
                  for item in total.get("basis", []) or ["No positive basis recorded."]:
                      f.write(f"- {item}\n")
                  f.write("\n## Penalties / limitations\n\n")
                  for item in total.get("penalties", []) or ["No penalties recorded."]:
                      f.write(f"- {item}\n")
                  f.write("\n## File confidence\n\n")
                  files = payload.get("files", [])

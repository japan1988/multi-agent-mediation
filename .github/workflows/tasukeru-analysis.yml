name: Tasukeru Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/tasukeru-analysis.yml"
      - "README*.md"
      - "SECURITY.md"
      - "LICENSE*"
      - "LICENSE_POLICY.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "NOTICE"
      - "TRADEMARKS.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "log_codebook*.json"
      - "tasukeru_self_definition*.json"
      - "tasukeru_self_definition_chain*.jsonl"
      - "**/*.jsonl"
  workflow_dispatch:

# Default to read-only. Write permission is granted only in the
# post-critical-comment job, which does not checkout or execute PR code.
permissions:
  contents: read

concurrency:
  group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  advisory-analysis:
    name: advisory analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Detect changed files
        id: changed
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '(\.py$|\.ipynb$|^pyproject\.toml$|^requirements.*\.txt$|^README.*\.md$|^SECURITY\.md$|^LICENSE|^LICENSE_POLICY\.md$|^CONTRIBUTING\.md$|^CODE_OF_CONDUCT\.md$|^NOTICE$|^TRADEMARKS\.md$|^docs/|^\.github/ISSUE_TEMPLATE/|^\.github/PULL_REQUEST_TEMPLATE\.md$|^\.github/workflows/tasukeru-analysis\.yml$|^log_codebook.*\.json$|^tasukeru_self_definition.*\.json$|^tasukeru_self_definition_chain.*\.jsonl$|\.jsonl$)' \
            > tasukeru_changed_files.txt || true

          if [ ! -s tasukeru_changed_files.txt ]; then
            echo "No relevant changed files."
          fi

      - name: Install advisory tools only
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" "bandit[toml]" "pip-audit"

      - name: Run advisory tools
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates

          if [ "${{ github.event_name }}" = "pull_request" ] && [ -s tasukeru_changed_files.txt ]; then
            mapfile -t changed_files < tasukeru_changed_files.txt
          else
            mapfile -t changed_files < <(find . -type f \( -name '*.py' -o -name '*.ipynb' -o -name '*.md' -o -name '*.toml' \) \
              -not -path './.git/*' -not -path './.venv/*' -not -path './venv/*' -not -path './archive/*')
          fi

          printf '%s\n' "${changed_files[@]}" > tasukeru_logs/scanned-files.txt

          # Split scan targets by tool responsibility.
          #
          # Ruff and Bandit must not receive Markdown or policy documents:
          # - Ruff is for Python / notebook linting.
          # - Bandit is for Python security scanning.
          # - README / docs / LICENSE / SECURITY / CONTRIBUTING remain covered by
          #   Tasukeru documentation review and logic review below.
          ruff_files=()
          py_files=()
          doc_files=()
          for f in "${changed_files[@]}"; do
            [ -f "$f" ] || continue
            case "$f" in
              *.py)
                ruff_files+=("$f")
                py_files+=("$f")
                ;;
              *.ipynb)
                ruff_files+=("$f")
                ;;
              README*.md|SECURITY.md|LICENSE*|LICENSE_POLICY.md|CONTRIBUTING.md|CODE_OF_CONDUCT.md|NOTICE|TRADEMARKS.md|docs/*|.github/ISSUE_TEMPLATE/*|.github/PULL_REQUEST_TEMPLATE.md)
                doc_files+=("$f")
                ;;
            esac
          done

          printf '%s\n' "${ruff_files[@]}" > tasukeru_logs/ruff-scanned-files.txt
          printf '%s\n' "${py_files[@]}" > tasukeru_logs/bandit-scanned-files.txt
          printf '%s\n' "${doc_files[@]}" > tasukeru_logs/documentation-scanned-files.txt

          set +e

          if [ "${#ruff_files[@]}" -gt 0 ]; then
            ruff check "${ruff_files[@]}" --output-format=json > tasukeru_logs/ruff.json 2> tasukeru_logs/ruff.stderr
            ruff_exit=$?
          else
            echo "[]" > tasukeru_logs/ruff.json
            ruff_exit=0
          fi

          if [ "${#py_files[@]}" -gt 0 ]; then
            bandit "${py_files[@]}" -f json -o tasukeru_logs/bandit.json \
              > tasukeru_logs/bandit.stdout 2> tasukeru_logs/bandit.stderr
            bandit_exit=$?
          else
            echo '{"results":[]}' > tasukeru_logs/bandit.json
            bandit_exit=0
          fi

          echo '{"dependencies":[],"vulnerabilities":[]}' > tasukeru_logs/pip-audit.json
          pip_exit=0

          for req in requirements.txt requirements-dev.txt; do
            if [ -f "$req" ]; then
              python -m pip_audit -r "$req" -f json -o "tasukeru_logs/pip-audit-${req}.json" \
                > "tasukeru_logs/pip-audit-${req}.stdout" \
                2> "tasukeru_logs/pip-audit-${req}.stderr"
              this_exit=$?
              [ "$this_exit" -ne 0 ] && pip_exit=$this_exit
            fi
          done

          set -e

          echo "$ruff_exit" > tasukeru_logs/ruff.exit
          echo "$bandit_exit" > tasukeru_logs/bandit.exit
          echo "$pip_exit" > tasukeru_logs/pip-audit.exit

          echo "ruff_exit=${ruff_exit}"
          echo "bandit_exit=${bandit_exit}"
          echo "pip_exit=${pip_exit}"

      - name: Generate Tasukeru advisory review
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates

          python - <<'PY'
          from __future__ import annotations

          import difflib
          import hashlib
          import hmac
          import json
          import os
          import re
          import textwrap
          from collections import Counter, defaultdict
          from pathlib import Path
          from typing import Any

          repo = Path(".")
          log_dir = Path("tasukeru_logs")

          summary_path = Path("tasukeru_advisory_summary.md")
          hitl_md_path = Path("tasukeru_hitl_review.md")
          hitl_json_path = Path("tasukeru_hitl_review.json")
          notification_state_path = Path("tasukeru_notification_state.json")
          pr_comment_path = Path("tasukeru_pr_comment.md")
          dradm_md_path = Path("tasukeru_dradm_draft.md")
          dradm_json_path = Path("tasukeru_dradm_draft.json")
          confidence_md_path = Path("tasukeru_confidence_report.md")
          confidence_json_path = Path("tasukeru_confidence_report.json")
          readme_refinement_md_path = Path("tasukeru_readme_refinement_draft.md")
          readme_refinement_json_path = Path("tasukeru_readme_refinement_draft.json")
          arl_jsonl_path = Path("tasukeru_arl.jsonl")
          arl_verify_json_path = Path("tasukeru_arl_verify.json")
          self_definition_source_path = Path("tasukeru_self_definition.json")
          self_definition_effective_path = Path("tasukeru_self_definition_effective.json")
          self_definition_chain_path = Path("tasukeru_self_definition_chain.jsonl")
          self_definition_verify_path = Path("tasukeru_self_definition_verify.json")
          announcement_md_path = Path("tasukeru_announcement.md")
          announcement_json_path = Path("tasukeru_announcement.json")

          AUTO_FALSE = {
              "auto_branch_allowed": False,
              "auto_pr_creation_allowed": False,
              "auto_commit_allowed": False,
              "auto_push_allowed": False,
              "auto_merge_allowed": False,
              "autofix_allowed": False,
              "human_decision_required": True,
              "suggestion_only": True,
              "verified": False,
          }

          DEFAULT_SELF_DEFINITION: dict[str, Any] = {
              "schema_version": "self-definition-v1",
              "identity": (
                  "Tasukeru Analysis is an advisory-only review assistant. "
                  "It detects, classifies, records, summarizes, and escalates findings for human review, "
                  "but does not act as an autonomous change agent."
              ),
              "must_not": {
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "self_definition_auto_update_allowed": False,
                  "rule_auto_tuning_allowed": False,
                  "workflow_auto_edit_allowed": False,
              },
              "must": {
                  "hitl_required_must_require_human_review": True,
                  "public_comments_must_not_include_payloads": True,
                  "public_comments_must_not_include_attack_steps": True,
                  "rfl_must_not_be_sealed": True,
                  "pause_for_hitl_must_not_be_sealed": True,
                  "sealed_only_by_ethics_or_acc": True,
                  "self_definition_change_requires_hitl": True,
                  "self_definition_change_must_be_recorded": True,
              },
              "allowed_actions": [
                  "read",
                  "detect",
                  "classify",
                  "summarize",
                  "record_artifacts",
                  "verify_hash_chains",
                  "generate_draft_only_suggestions",
                  "request_hitl_review",
              ],
              "prohibited_actions": [
                  "auto_create_branch",
                  "auto_create_pull_request",
                  "auto_commit",
                  "auto_push",
                  "auto_fix",
                  "auto_merge",
                  "auto_update_self_definition",
                  "auto_tune_rules_from_history",
                  "publish_exploit_payloads_or_attack_steps",
              ],
              "change_policy": {
                  "read_only_verify_allowed": True,
                  "change_detection_decision": "HITL_REQUIRED",
                  "change_gate_decision": "STOPPED",
                  "change_layer": "acc_gate",
                  "auto_apply_allowed": False,
                  "human_decision_required": True,
              },
          }

          SKIP_DIRS = {
              ".git",
              ".venv",
              "venv",
              "__pycache__",
              ".pytest_cache",
              ".mypy_cache",
              ".ruff_cache",
              "archive",
          }

          TEXT_EXTS = {
              ".py",
              ".yml",
              ".yaml",
              ".md",
              ".txt",
              ".json",
              ".jsonl",
              ".toml",
              ".cfg",
              ".ini",
              ".rst",
          }

          ALLOWED_DECISIONS = {"RUN", "PAUSE_FOR_HITL", "STOPPED"}
          ETHICS_OR_ACC_LAYERS = {"ethics_gate", "acc_gate"}
          RFL_LAYERS = {"relativity_gate", "rfl", "RFL"}
          REQUIRED_ARL_KEYS = {
              "run_id",
              "layer",
              "decision",
              "sealed",
              "overrideable",
              "final_decider",
              "reason_code",
          }
          CONTROL_BYPASS_PATTERNS = [
              ("AUTO_MERGE_TRUE", re.compile(r'["\']?auto[_-]?merge[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("AUTO_FIX_TRUE", re.compile(r'["\']?auto(?:fix|[_-]?fix)[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("AUTO_PUSH_TRUE", re.compile(r'["\']?auto[_-]?push[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("AUTO_PR_TRUE", re.compile(r'["\']?auto[_-]?pr[_-]?creation[_-]?allowed["\']?\s*[:=]\s*true', re.IGNORECASE)),
              ("HITL_REQUIRED_FALSE", re.compile(r'["\']?human[_-]?decision[_-]?required["\']?\s*[:=]\s*false', re.IGNORECASE)),
          ]

          # Phase 1.1 abuse-pattern review.
          #
          # Purpose:
          # - Detect likely unsafe external effects, credential transfer, destructive
          #   side effects, and dynamic execution.
          # - Do not fail the GitHub Actions job.
          # - Stop on the Tasukeru side by emitting HITL_REQUIRED + gate_decision=STOPPED
          #   for active/protected paths.
          # - Keep public PR comments sanitized and folded.
          #
          # This is deliberately conservative and avoids known false positives:
          # - workflow's own GitHub PR-comment API calls
          # - *_TOKENS vocabulary constants
          # - known state-store reset unlink calls
          # - nosec + HITL-gated + shell=False subprocess calls
          ABUSE_NETWORK_SEND_PATTERNS = [
              re.compile(r"\brequests\.(post|put|patch|delete)\s*\(", re.IGNORECASE),
              re.compile(r"\burllib\.request\.urlopen\s*\(", re.IGNORECASE),
              re.compile(r"\bhttp\.client\.", re.IGNORECASE),
          ]
          ABUSE_CREDENTIAL_WORDS = re.compile(
              r"\b(secret|token|api[_-]?key|password|credential|private[_-]?key)\b",
              re.IGNORECASE,
          )
          ABUSE_DESTRUCTIVE_PATTERNS = [
              re.compile(r"\bshutil\.rmtree\s*\(", re.IGNORECASE),
              re.compile(r"\bos\.(remove|unlink|rmdir)\s*\(", re.IGNORECASE),
              re.compile(r"\.unlink\s*\(", re.IGNORECASE),
              re.compile(r"\brm\s+-rf\b", re.IGNORECASE),
          ]
          ABUSE_DYNAMIC_EXEC_PATTERNS = [
              re.compile(r"\beval\s*\(", re.IGNORECASE),
              re.compile(r"\bexec\s*\(", re.IGNORECASE),
              re.compile(r"\bsubprocess\.(run|Popen|call)\s*\(", re.IGNORECASE),
          ]
          ABUSE_ALLOWED_SELF_WORKFLOW_PATHS = {
              ".github/workflows/tasukeru-analysis.yml",
              "github/workflows/tasukeru-analysis.yml",
          }
          ABUSE_KNOWN_STATE_RESET_MARKERS = {
              "trust_store_path",
              "grants_store_path",
              "eval_state_path",
          }

          RULE_PROFILES: dict[str, dict[str, str]] = {
              "B101": {
                  "default_decision": "NOISE_CANDIDATE",
                  "summary_ja": "pytest assert またはシミュレーション上の assert は、runtime safety gate でない限り通常はPR通知対象外です。",
              },
              "B108": {
                  "default_decision": "REVIEW_RECOMMENDED",
                  "summary_ja": "一時ファイル/一時ディレクトリの扱いは、active path では文脈確認が必要です。",
              },
              "B110": {
                  "default_decision": "REVIEW_RECOMMENDED",
                  "summary_ja": "try/except/pass は失敗を隠す可能性があるため、active path では確認対象です。",
              },
              "B311": {
                  "default_decision": "NOISE_CANDIDATE",
                  "summary_ja": "非暗号用途の random はシミュレーションでは許容される場合がありますが、秘密値・認証・セキュリティ用途では不可です。",
              },
              "B404": {
                  "default_decision": "REVIEW_RECOMMENDED",
                  "summary_ja": "subprocess import は単体では直ちに危険ではありませんが、active path では使い方確認が必要です。",
              },
              "B603": {
                  "default_decision": "REVIEW_RECOMMENDED",
                  "summary_ja": "subprocess 呼び出しは入力・shell指定・実行対象の確認が必要です。",
              },
              "B607": {
                  "default_decision": "REVIEW_RECOMMENDED",
                  "summary_ja": "partial executable path はCI/環境依存の誤実行につながる可能性があるため確認対象です。",
              },
              "F401": {
                  "default_decision": "FIX_RECOMMENDED",
                  "summary_ja": "未使用importは機械的修正候補ですが、自動修正はせず人間が確認します。",
              },
              "F841": {
                  "default_decision": "FIX_RECOMMENDED",
                  "summary_ja": "未使用変数は機械的修正候補ですが、自動修正はせず人間が確認します。",
              },
              "I001": {
                  "default_decision": "FIX_RECOMMENDED",
                  "summary_ja": "import順序の整形候補です。active path では人間確認後に手動修正します。",
              },
              "W291": {
                  "default_decision": "FIX_RECOMMENDED",
                  "summary_ja": "末尾空白の整形候補です。inactive historical では通知対象外へ下げられます。",
              },
              "W293": {
                  "default_decision": "FIX_RECOMMENDED",
                  "summary_ja": "空行の空白整形候補です。inactive historical では通知対象外へ下げられます。",
              },
          }

          def read_text(path: Path, default: str = "") -> str:
              try:
                  return path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  try:
                      return path.read_text(encoding="utf-8", errors="replace")
                  except Exception:
                      return default
              except Exception:
                  return default

          def read_json(path: Path, default: Any) -> Any:
              try:
                  text = path.read_text(encoding="utf-8").strip()
                  if not text:
                      return default
                  return json.loads(text)
              except Exception:
                  return default

          def write_json(path: Path, obj: Any) -> None:
              path.write_text(
                  json.dumps(obj, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          def read_exit(name: str) -> int:
              text = read_text(log_dir / name, "0").strip()
              try:
                  return int(text)
              except ValueError:
                  return 0

          def is_skipped(path: Path) -> bool:
              return any(part in SKIP_DIRS for part in path.parts)

          def is_text_candidate(path: Path) -> bool:
              if is_skipped(path) or not path.is_file():
                  return False
              try:
                  if path.stat().st_size > 2_000_000:
                      return False
              except OSError:
                  return False
              return path.suffix in TEXT_EXTS or path.name in {"LICENSE", "NOTICE"}

          def iter_text_files() -> list[Path]:
              return sorted(path for path in repo.rglob("*") if is_text_candidate(path))

          def sha256_text(text: str) -> str:
              return hashlib.sha256(text.encode("utf-8")).hexdigest()

          def canonical_hash(obj: Any) -> str:
              payload = json.dumps(
                  obj,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )
              return hashlib.sha256(payload.encode("utf-8")).hexdigest()

          def normalize_path(path: str) -> str:
              return path.replace("\\", "/").lstrip("./")

          def normalized_message(message: str) -> str:
              text = message.lower()
              text = re.sub(r"\b\d+\b", "<num>", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def one_line(value: Any, limit: int = 240) -> str:
              text = str(value).replace("\n", " ").strip()
              if len(text) > limit:
                  return text[: limit - 1] + "…"
              return text

          def safe_snippet(path: str, line: int | None, radius: int = 0) -> str:
              if not path or path == "?":
                  return ""
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              try:
                  lines = p.read_text(encoding="utf-8", errors="replace").splitlines()
              except Exception:
                  return ""
              if not line or line < 1 or line > len(lines):
                  return ""
              start = max(1, line - radius)
              end = min(len(lines), line + radius)
              return "\n".join(lines[start - 1:end])[:1200]

          def is_test_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              parts = normalized.split("/")
              return (
                  "tests" in parts
                  or normalized.startswith("test_")
                  or "/test_" in normalized
                  or normalized.endswith("_test.py")
              )

          def is_workflow_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              return normalized.startswith(".github/workflows/")

          def is_documentation_or_policy_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              protected_names = {
                  "readme.md",
                  "readme.ja.md",
                  "security.md",
                  "license",
                  "license_policy.md",
                  "contributing.md",
                  "code_of_conduct.md",
                  "notice",
                  "trademarks.md",
                  "pull_request_template.md",
              }
              return (
                  normalized.startswith("docs/")
                  or normalized.startswith(".github/issue_template/")
                  or name in protected_names
                  or name.startswith("readme")
                  or name.startswith("license")
              )

          def is_safety_or_hitl_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              safety_markers = (
                  "tasukeru",
                  "kage",
                  "orchestrator",
                  "mediation",
                  "hitl",
                  "rfl",
                  "arl",
                  "ethics",
                  "acc",
                  "checkpoint",
                  "audit",
                  "codebook",
                  "emergency_contract",
                  "task_contract",
              )
              return any(marker in name or marker in normalized for marker in safety_markers)

          def is_active_safety_or_hitl_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              active_exact_names = {
                  "tasukeru-analysis.yml",
                  "log_codebook.json",
                  "log_codebook_demo.json",
                  "emergency_contract_kage_orchestrator_v1_0.py",
                  "test_emergency_contract_kage_orchestrator_v1_0.py",
                  "ai_doc_orchestrator_kage3_v1_3_5.py",
                  "ai_doc_orchestrator_kage3_v1_2_7_task_contract_dispatch.py",
                  "mediation_emergency_contract_sim_v5_1_2.py",
                  "ai_doc_orchestrator_with_mediator_v1_0.py",
              }
              active_markers = (
                  "v5_1_2",
                  "v1_3_5",
                  "v1_2_7_task_contract_dispatch",
                  "tasukeru-analysis",
                  "log_codebook",
              )
              if name in active_exact_names:
                  return True
              return any(marker in name or marker in normalized for marker in active_markers)

          def is_active_mainline_or_metadata_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              active_names = {
                  "readme.md",
                  "readme.ja.md",
                  "security.md",
                  "license",
                  "license_policy.md",
                  "contributing.md",
                  "code_of_conduct.md",
                  "notice",
                  "trademarks.md",
                  "requirements.txt",
                  "requirements-dev.txt",
                  "pyproject.toml",
                  "emergency_contract_kage_orchestrator_v1_0.py",
                  "test_emergency_contract_kage_orchestrator_v1_0.py",
                  "ai_doc_orchestrator_kage3_v1_3_5.py",
                  "ai_doc_orchestrator_kage3_v1_2_7_task_contract_dispatch.py",
                  "mediation_emergency_contract_sim_v5_1_2.py",
                  "ai_doc_orchestrator_with_mediator_v1_0.py",
              }
              if name in active_names:
                  return True
              if is_test_path(path):
                  return True
              if is_workflow_path(path):
                  return True
              if is_documentation_or_policy_path(path):
                  return True
              if normalized.startswith(("log_codebook", ".github/")):
                  return True
              if is_active_safety_or_hitl_path(path):
                  return True
              return False

          def is_superseded_historical_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              parts = normalized.split("/")
              if is_active_mainline_or_metadata_path(path):
                  return False
              if "archive" in parts or normalized.startswith("archive/"):
                  return True

              active_markers = ("v5_1_2", "v1_3_5", "v1_2_7")
              historical_markers = (
                  "_v1",
                  "_v2",
                  "_v3",
                  "_v4",
                  "_v5_0",
                  "v1_",
                  "v2_",
                  "v3_",
                  "v4_",
                  "v5_0_",
                  "fixed_regex",
                  "full..",
                  "legacy",
                  "deprecated",
                  "old",
              )
              if any(marker in name for marker in active_markers):
                  return False
              return any(marker in name for marker in historical_markers)

          def classify_path_profile(file_path: str) -> str:
              normalized = normalize_path(file_path).lower()
              if is_workflow_path(normalized):
                  return "workflow"
              if is_test_path(normalized):
                  return "tests"
              if is_documentation_or_policy_path(normalized):
                  return "docs_or_policy"
              if is_active_safety_or_hitl_path(normalized):
                  return "safety_or_hitl"
              if is_superseded_historical_path(normalized):
                  return "historical"
              if normalized.startswith("archive/") or "/archive/" in normalized:
                  return "archive"
              if is_safety_or_hitl_path(normalized):
                  return "safety_or_hitl_inactive_candidate"
              if is_active_mainline_or_metadata_path(normalized):
                  return "active_mainline"
              return "general"

          def get_rule_profile(rule_id: str) -> dict[str, str]:
              return RULE_PROFILES.get(
                  rule_id,
                  {
                      "default_decision": "REVIEW_RECOMMENDED",
                      "summary_ja": "明示プロファイル未定義のため、人間確認候補として扱います。",
                  },
              )

          def classify_ruff_decision(rule_id: str, file_path: str, message: str) -> tuple[str, str, str]:
              profile = get_rule_profile(rule_id)
              path_profile = classify_path_profile(file_path)
              mechanical_rule = rule_id in {"F401", "F841", "I001", "W291", "W293"}

              if path_profile in {"workflow", "docs_or_policy", "safety_or_hitl", "active_mainline"}:
                  if mechanical_rule:
                      return (
                          "FIX_RECOMMENDED",
                          f"{rule_id} on {path_profile}: active/protected path; manual mechanical fix candidate.",
                          "active/protected領域の機械的修正候補です。自動修正せず、人間が差分を確認してください。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} on {path_profile}: protected path requires human review.",
                      "active/protected領域の指摘です。仕様・公開方針・安全境界への影響を確認してください。",
                  )

              if path_profile == "tests":
                  if mechanical_rule:
                      return (
                          "FIX_RECOMMENDED",
                          f"{rule_id} in tests: mechanical fix candidate, but tests are protected from autofix.",
                          "tests配下の機械的修正候補です。テスト意図を確認してから手動修正してください。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} in tests: review test intent before changing.",
                      "tests配下の指摘です。テスト意図を確認してください。",
                  )

              if path_profile in {"historical", "archive"}:
                  if mechanical_rule:
                      return (
                          "INFO_ONLY",
                          f"{rule_id} in inactive {path_profile}: stored as info; no PR notification.",
                          "inactive historical/archive の機械的指摘です。即時対応せずartifactに集約します。",
                      )
                  return (
                      "NOISE_CANDIDATE",
                      f"{rule_id} in inactive {path_profile}: not active execution path.",
                      "inactive historical/archive の指摘です。active化する場合のみ確認してください。",
                  )

              if mechanical_rule:
                  return (
                      "FIX_RECOMMENDED",
                      f"{rule_id} default mechanical rule: manual fix recommended.",
                      profile["summary_ja"],
                  )

              return (
                  "REVIEW_RECOMMENDED",
                  f"{rule_id} default: human review recommended.",
                  profile["summary_ja"],
              )

          def classify_bandit_decision(
              rule_id: str,
              file_path: str,
              message: str,
              bandit_severity: str,
          ) -> tuple[str, str, str]:
              profile = get_rule_profile(rule_id)
              path_profile = classify_path_profile(file_path)
              severity = bandit_severity.upper()

              if severity == "HIGH":
                  return (
                      "HITL_REQUIRED",
                      f"{rule_id} severity HIGH: requires human review regardless of path profile {path_profile}.",
                      "HIGH security finding です。防御目的の範囲で人間が確認してください。",
                  )

              if path_profile == "workflow":
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} in workflow: CI permissions/execution behavior may be affected.",
                      "workflow配下のsecurity findingです。CI権限・実行条件への影響を確認してください。",
                  )

              if path_profile in {"docs_or_policy", "safety_or_hitl", "active_mainline"}:
                  if severity == "MEDIUM":
                      return (
                          "REVIEW_RECOMMENDED",
                          f"{rule_id} MEDIUM on {path_profile}: protected path requires human review.",
                          "active/protected領域のMEDIUM security findingです。文脈確認が必要です。",
                      )
                  if rule_id == "B311":
                      return (
                          "NOISE_CANDIDATE",
                          f"{rule_id} LOW on {path_profile}: likely acceptable for simulation if not used for secrets.",
                          "非暗号用途のrandomであればPR通知不要ですが、秘密値・認証用途でないことをartifactで確認可能にします。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} LOW on {path_profile}: protected path stays reviewable.",
                      "active/protected領域のLOW security findingです。重大通知は不要ですが、確認候補に残します。",
                  )

              if path_profile == "tests":
                  if rule_id == "B101":
                      return (
                          "NOISE_CANDIDATE",
                          "B101 in tests: pytest assert is expected unless used as runtime safety gate.",
                          "tests配下のpytest assertとして妥当な可能性が高いため、PR通知対象外にします。",
                      )
                  if rule_id == "B311":
                      return (
                          "NOISE_CANDIDATE",
                          "B311 in tests: deterministic/randomized test data is usually acceptable.",
                          "tests配下の非暗号randomは通常テストデータ用途のため、PR通知対象外にします。",
                      )
                  if rule_id == "B110":
                      return (
                          "REVIEW_RECOMMENDED",
                          "B110 in tests: except/pass can hide broken tests and should remain reviewable.",
                          "tests配下でも except/pass はテスト失敗を隠す可能性があるため確認候補に残します。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} in tests: review test intent before changing.",
                      "tests配下のsecurity findingです。テスト意図を確認してください。",
                  )

              if path_profile in {"historical", "archive"}:
                  if rule_id in {"B101", "B311"}:
                      return (
                          "NOISE_CANDIDATE",
                          f"{rule_id} in inactive {path_profile}: low-risk known pattern in non-active file.",
                          "inactive historical/archive の低リスク既知パターンとしてPR通知対象外にします。",
                      )
                  return (
                      "INFO_ONLY",
                      f"{rule_id} in inactive {path_profile}: info-only unless file becomes active.",
                      "inactive historical/archive の指摘です。active化する場合のみ確認してください。",
                  )

              if severity == "MEDIUM":
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} MEDIUM default: human review recommended.",
                      profile["summary_ja"],
                  )

              if rule_id in {"B101", "B311"}:
                  return (
                      "NOISE_CANDIDATE",
                      f"{rule_id} LOW default: likely acceptable in non-security context.",
                      profile["summary_ja"],
                  )

              return (
                  "NOISE_CANDIDATE",
                  f"{rule_id} LOW default: stored in artifacts only.",
                  profile["summary_ja"],
              )

          def classify_autofix_policy(entry: dict[str, Any]) -> dict[str, Any]:
              level = str(entry.get("decision", entry.get("level", "")))
              file_path = str(entry.get("file", ""))
              source = str(entry.get("source", ""))
              rule_id = str(entry.get("rule_id", entry.get("code", "")))
              path_profile = str(entry.get("path_profile", classify_path_profile(file_path)))

              base = {
                  "safe_autofix_candidate": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "policy": "AUTOFIX_BLOCKED",
                  "reason": "Autofix is disabled by default.",
              }

              if level in {"HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED"}:
                  return {
                      **base,
                      "policy": "HUMAN_REVIEW_REQUIRED",
                      "reason": "Active review queue findings must not be automatically modified.",
                  }

              if path_profile in {"workflow", "docs_or_policy", "safety_or_hitl", "active_mainline", "tests"}:
                  return {
                      **base,
                      "policy": "BLOCKED_PROTECTED_PATH",
                      "reason": "Protected paths must not be automatically modified.",
                  }

              if path_profile not in {"historical", "archive"}:
                  return {
                      **base,
                      "policy": "BLOCKED_NOT_INACTIVE_HISTORICAL",
                      "reason": "Autofix candidates are limited to inactive historical/archive files.",
                  }

              if source == "Ruff" and rule_id in {"F401", "F841", "W291", "W293", "I001"}:
                  return {
                      **base,
                      "safe_autofix_candidate": True,
                      "policy": "SAFE_AUTOFIX_CANDIDATE",
                      "reason": "Inactive historical/archive file with a low-risk mechanical Ruff finding. Human review is still required.",
                  }

              if source == "Bandit" and rule_id == "B311":
                  return {
                      **base,
                      "safe_autofix_candidate": True,
                      "policy": "SAFE_AUTOFIX_CANDIDATE",
                      "reason": "Inactive historical/archive simulator file with a low-risk advisory finding. Human review is still required.",
                  }

              return base

          def make_entry(
              *,
              source: str,
              decision: str,
              severity: str,
              category: str,
              reason_code: str,
              rule_id: str,
              file: str,
              message: str,
              suggestion: str,
              why_problematic_ja: str,
              why_fix_ja: str,
              impact_ja: str,
              line: int | None = None,
              column: int | None = None,
              confidence: str = "MEDIUM",
              risk_type: str = "review",
              classification_reason: str = "",
              path_profile: str = "",
              rule_profile: dict[str, str] | None = None,
          ) -> dict[str, Any]:
              code_snippet = safe_snippet(file, line)
              resolved_path_profile = path_profile or classify_path_profile(file)
              resolved_rule_profile = rule_profile or get_rule_profile(rule_id)
              fingerprint = {
                  "rule_id": rule_id,
                  "category": category,
                  "reason_code": reason_code,
                  "normalized_message": normalized_message(message),
                  "normalized_file_path": normalize_path(file),
                  "normalized_code_pattern": normalized_message(code_snippet or rule_id),
                  "risk_type": risk_type,
                  "path_profile": resolved_path_profile,
              }
              fingerprint_hash = canonical_hash(fingerprint)

              before_hash = ""
              if file and Path(file).exists():
                  before_hash = sha256_text(read_text(Path(file)))

              entry = {
                  "source": source,
                  "decision": decision,
                  "level": decision,
                  "severity": severity,
                  "category": category,
                  "reason_code": reason_code,
                  "rule_id": rule_id,
                  "code": rule_id,
                  "file": file,
                  "line": line,
                  "column": column,
                  "message": one_line(message, 600),
                  "code_snippet": code_snippet,
                  "suggestion": suggestion,
                  "classification_reason": classification_reason,
                  "path_profile": resolved_path_profile,
                  "rule_profile": resolved_rule_profile,
                  "fingerprint": fingerprint,
                  "fingerprint_hash": fingerprint_hash,
                  "incident_id": "",
                  **AUTO_FALSE,
                  "evidence": {
                      "source": source,
                      "rule_id": rule_id,
                      "file": file,
                      "line": line,
                      "column": column,
                      "code_snippet": code_snippet,
                      "policy_reference": "Tasukeru Security Review Output Policy",
                      "reason_code": reason_code,
                      "classification_reason": classification_reason,
                      "path_profile": resolved_path_profile,
                      "artifact": f"tasukeru_logs/{source.lower().replace(' ', '-')}.json",
                  },
                  "explanation": {
                      "why_problematic_ja": why_problematic_ja,
                      "why_fix_ja": why_fix_ja,
                      "why_this_classification_ja": classification_reason or "分類理由は rule/path profile に基づきます。",
                      "human_review_checklist_ja": [
                          "active mainline / tests / workflows / docs / safety invariant / HITL logic に関係するか確認する",
                          "既存仕様への影響を確認する",
                          "必要なら人間が手動で修正・コミット・PR作成・マージする",
                      ],
                  },
                  "fix_prediction": {
                      "expected_effect_ja": impact_ja,
                      "expected_effect_en": "This change may improve maintainability, traceability, or safety depending on the reviewed context.",
                      "risk_reduction_ja": "対象リスクを下げる可能性がありますが、最終確認には人間レビューとテストが必要です。",
                      "side_effects_to_check_ja": [
                          "既存の正常系動作が変わらないこと",
                          "ログや出力に秘密情報が含まれないこと",
                          "修正が契約外の変更を含まないこと",
                      ],
                      "confidence": confidence,
                      "verified": False,
                  },
                  "fix_verification": {
                      "enabled": False,
                      "mode": "ephemeral_candidate_only",
                      "modifies_repository": False,
                      "auto_commit_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_merge_allowed": False,
                      "target_fingerprint_hash": fingerprint_hash,
                      "before": {
                          "file": file,
                          "sha256": before_hash,
                      },
                      "after_candidate": {
                          "file": file,
                          "sha256": "",
                      },
                      "diff_artifact": "",
                      "rescan_result": {
                          "target_hitl_required_resolved": None,
                          "remaining_hitl_required": None,
                          "remaining_review_recommended": None,
                      },
                      "verified": False,
                      "verification_note": "No repository files were modified. Candidate verification is advisory-only.",
                  },
              }
              entry["autofix"] = classify_autofix_policy(entry)
              return entry

          def normalize_ruff_items(raw: Any) -> list[dict[str, Any]]:
              if isinstance(raw, list):
                  return [item for item in raw if isinstance(item, dict)]
              if isinstance(raw, dict):
                  for key in ("diagnostics", "results", "items"):
                      value = raw.get(key)
                      if isinstance(value, list):
                          return [item for item in value if isinstance(item, dict)]
              return []

          def normalize_bandit_items(raw: Any) -> list[dict[str, Any]]:
              if isinstance(raw, dict):
                  value = raw.get("results")
                  if isinstance(value, list):
                      return [item for item in value if isinstance(item, dict)]
              if isinstance(raw, list):
                  return [item for item in raw if isinstance(item, dict)]
              return []

          def normalize_pip_vulns(raw: Any) -> list[dict[str, Any]]:
              vulns: list[dict[str, Any]] = []
              if isinstance(raw, dict):
                  dependencies = raw.get("dependencies")
                  if isinstance(dependencies, list):
                      for dep in dependencies:
                          if not isinstance(dep, dict):
                              continue
                          name = str(dep.get("name", "?"))
                          version = str(dep.get("version", "?"))
                          for vuln in dep.get("vulns", []) or []:
                              if isinstance(vuln, dict):
                                  vulns.append(
                                      {
                                          "name": name,
                                          "version": version,
                                          "id": str(vuln.get("id", "?")),
                                          "fix_versions": vuln.get("fix_versions", []) or [],
                                      }
                                  )
                  direct = raw.get("vulnerabilities")
                  if isinstance(direct, list):
                      for item in direct:
                          if isinstance(item, dict):
                              vulns.append(
                                  {
                                      "name": str(item.get("name", item.get("package", "?"))),
                                      "version": str(item.get("version", "?")),
                                      "id": str(item.get("id", "?")),
                                      "fix_versions": item.get("fix_versions", []) or [],
                                  }
                              )
              elif isinstance(raw, list):
                  for item in raw:
                      if isinstance(item, dict):
                          vulns.append(
                              {
                                  "name": str(item.get("name", item.get("package", "?"))),
                                  "version": str(item.get("version", "?")),
                                  "id": str(item.get("id", "?")),
                                  "fix_versions": item.get("fix_versions", []) or [],
                              }
                          )
              return vulns

          def parse_bool(value: Any) -> bool:
              if isinstance(value, bool):
                  return value
              if isinstance(value, str):
                  return value.strip().lower() in {"true", "1", "yes", "y"}
              return bool(value)

          def collect_reason_codes(obj: Any, found: set[str]) -> None:
              if isinstance(obj, dict):
                  for key, value in obj.items():
                      if key == "reason_code" and isinstance(value, str):
                          found.add(value)
                      elif key in {"reason_codes", "allowed_reason_codes"} and isinstance(value, list):
                          for item in value:
                              if isinstance(item, str):
                                  found.add(item)
                              elif isinstance(item, dict):
                                  code = item.get("code") or item.get("reason_code")
                                  if isinstance(code, str):
                                      found.add(code)
                      else:
                          collect_reason_codes(value, found)
              elif isinstance(obj, list):
                  for item in obj:
                      collect_reason_codes(item, found)

          def add_logic_hitl(
              entries: list[dict[str, Any]],
              code: str,
              msg: str,
              file: str = "repository",
              line: int | None = None,
          ) -> None:
              entries.append(
                  make_entry(
                      source="Tasukeru Logic Review",
                      decision="HITL_REQUIRED",
                      severity="CRITICAL",
                      category="safety_invariant_violation",
                      reason_code=code,
                      rule_id=code,
                      file=file,
                      line=line,
                      message=msg,
                      suggestion="人間が該当箇所を確認し、KAGE/Tasukeru 不変条件に従って手動修正してください。",
                      why_problematic_ja="安全不変条件またはHITL境界に関わるため、自動判断で進めるべきではありません。",
                      why_fix_ja="人間確認を挟むことで、sealed / overrideable / final_decider / reason_code の整合を維持できます。",
                      impact_ja="人間確認により、HITL迂回や封印条件の破損を防ぎやすくなることが期待されます。",
                      confidence="HIGH",
                      risk_type="safety_invariant",
                      classification_reason="Safety invariant violations always require HITL.",
                  )
              )

          def add_abuse_pattern_entry(
              entries: list[dict[str, Any]],
              code: str,
              msg: str,
              file: str,
              line: int | None = None,
              *,
              path_profile: str = "",
              decision: str | None = None,
              severity: str | None = None,
              gate_decision: str | None = None,
              sealed: bool | None = None,
              overrideable: bool | None = None,
              classification_reason: str = "",
          ) -> None:
              resolved_path_profile = path_profile or classify_path_profile(file)

              if decision is None:
                  if resolved_path_profile in {"tests"}:
                      decision = "REVIEW_RECOMMENDED"
                  elif resolved_path_profile in {"historical", "archive"}:
                      decision = "INFO_ONLY"
                  else:
                      decision = "HITL_REQUIRED"

              if gate_decision is None:
                  gate_decision = "STOPPED" if decision == "HITL_REQUIRED" else "PAUSE_FOR_HITL"
              if severity is None:
                  severity = "CRITICAL" if decision == "HITL_REQUIRED" else "MEDIUM"
              if sealed is None:
                  sealed = decision == "HITL_REQUIRED"
              if overrideable is None:
                  overrideable = not sealed

              entry = make_entry(
                  source="Tasukeru Abuse Pattern Review",
                  decision=decision,
                  severity=severity,
                  category="offensive_or_abuse_pattern",
                  reason_code=code,
                  rule_id=code,
                  file=file,
                  line=line,
                  message=msg,
                  suggestion="安全な防御・テスト目的か、未承認の外部送信・破壊的副作用・HITL迂回がないかを人間が確認してください。",
                  why_problematic_ja="攻撃的または悪用可能な意図を持つコードに見える場合、通常のOK判定として通すべきではありません。",
                  why_fix_ja="人間確認へ戻すことで、危険な副作用や未承認の外部効果を通常経路から排除できます。",
                  impact_ja="検知時にTasukeru上で停止し、詳細はartifactに残すことで、CIを失敗させずに人間確認へ戻せます。",
                  confidence="MEDIUM",
                  risk_type="abuse_pattern",
                  classification_reason=classification_reason
                  or "Phase 1.1 abuse-pattern review detected a potentially unsafe code pattern.",
                  path_profile=resolved_path_profile,
              )
              entry.update(
                  {
                      "gate_decision": gate_decision,
                      "layer": "acc_gate",
                      "sealed": sealed,
                      "overrideable": overrideable,
                      "final_decider": "SYSTEM",
                      "failure_mode": "tasukeru_stopped_not_ci_failed",
                      "public_output_policy": {
                          "include_exploit_payloads": False,
                          "include_attack_steps": False,
                          "focus": "detection_and_safe_remediation",
                      },
                  }
              )
              entries.append(entry)

          def line_has_network_send(line: str) -> bool:
              return any(pattern.search(line) for pattern in ABUSE_NETWORK_SEND_PATTERNS)

          def line_has_destructive_effect(line: str) -> bool:
              return any(pattern.search(line) for pattern in ABUSE_DESTRUCTIVE_PATTERNS)

          def line_has_dynamic_execution(line: str) -> bool:
              return any(pattern.search(line) for pattern in ABUSE_DYNAMIC_EXEC_PATTERNS)

          def line_has_credential_reference(line: str) -> bool:
              if "_tokens" in line.lower() or "side_effect_tokens" in line.lower():
                  return False
              return bool(ABUSE_CREDENTIAL_WORDS.search(line))

          def is_allowed_self_workflow_path(path: Path) -> bool:
              normalized = normalize_path(str(path)).lower()
              return normalized in ABUSE_ALLOWED_SELF_WORKFLOW_PATHS

          def is_known_state_store_reset_line(line: str) -> bool:
              lower = line.lower()
              return ".unlink" in lower and any(marker in lower for marker in ABUSE_KNOWN_STATE_RESET_MARKERS)

          def is_safe_hitl_gated_subprocess_line(line: str) -> bool:
              lower = line.lower()
              return (
                  "subprocess.run" in lower
                  and "nosec" in lower
                  and "hitl-gated" in lower
                  and "shell=false" in lower
              )

          def should_skip_abuse_pattern_file(path: Path) -> bool:
              if is_allowed_self_workflow_path(path):
                  # Avoid self-triggering on the advisory workflow's own GitHub API
                  # comment posting code. Dedicated self-review remains covered by
                  # control-bypass, permissions, and HITL boundary checks.
                  return True
              return path.suffix not in {".py", ".yml", ".yaml"}

          def run_abuse_pattern_review_for_file(
              entries: list[dict[str, Any]],
              path: Path,
              text: str,
          ) -> None:
              if should_skip_abuse_pattern_file(path):
                  return

              normalized_path = normalize_path(str(path))
              profile = classify_path_profile(normalized_path)
              hits = 0

              for idx, line in enumerate(text.splitlines(), start=1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  lower = stripped.lower()

                  if line_has_network_send(stripped):
                      if "approved" not in lower and "hitl" not in lower and "allowlist" not in lower:
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_UNAPPROVED_EXTERNAL_EFFECT",
                              "Potential unapproved external-effect code was detected.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              classification_reason="Network send/update pattern without an obvious approval/HITL marker.",
                          )
                          hits += 1

                  if line_has_credential_reference(stripped) and (
                      line_has_network_send(stripped)
                      or "send" in lower
                      or "upload" in lower
                      or "exfil" in lower
                  ):
                      add_abuse_pattern_entry(
                          entries,
                          "ABUSE_CREDENTIAL_ACCESS_PATTERN",
                          "Potential credential access combined with outbound or transfer behavior was detected.",
                          normalized_path,
                          idx,
                          path_profile=profile,
                          classification_reason="Credential-like term appears near outbound/transfer behavior.",
                      )
                      hits += 1

                  if line_has_destructive_effect(stripped):
                      if is_known_state_store_reset_line(stripped):
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_STATE_STORE_RESET_REVIEW",
                              "Known state-store reset operation was detected and downgraded for review.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              decision="REVIEW_RECOMMENDED",
                              severity="MEDIUM",
                              gate_decision="PAUSE_FOR_HITL",
                              sealed=False,
                              overrideable=True,
                              classification_reason="Known trust/grant/eval state-store reset path; reviewable but not a critical abuse stop.",
                          )
                          hits += 1
                      elif "tmp_path" not in lower and "temporary" not in lower and "test" not in lower:
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_DESTRUCTIVE_SIDE_EFFECT_PATTERN",
                              "Potential destructive file-system side effect was detected.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              classification_reason="Destructive file operation without an obvious test/temporary context.",
                          )
                          hits += 1

                  if line_has_dynamic_execution(stripped):
                      if is_safe_hitl_gated_subprocess_line(stripped):
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_DYNAMIC_EXECUTION_REVIEW_ONLY",
                              "HITL-gated subprocess execution was detected and downgraded for review.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              decision="REVIEW_RECOMMENDED",
                              severity="MEDIUM",
                              gate_decision="PAUSE_FOR_HITL",
                              sealed=False,
                              overrideable=True,
                              classification_reason="nosec + HITL-gated + shell=False subprocess line; reviewable but not a critical abuse stop.",
                          )
                          hits += 1
                      elif "literal_eval" not in lower and "pytest" not in lower:
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_EVASION_OR_DYNAMIC_EXECUTION_PATTERN",
                              "Potential dynamic execution or command execution pattern was detected.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              classification_reason="Dynamic execution can bypass static review or hide unsafe behavior.",
                          )
                          hits += 1

                  if hits >= 5:
                      break

          def add_rfl_readability_review(
              entries: list[dict[str, Any]],
              code: str,
              msg: str,
              file: str,
              line: int | None = None,
          ) -> None:
              entries.append(
                  make_entry(
                      source="Tasukeru RFL Review",
                      decision="REVIEW_RECOMMENDED",
                      severity="MEDIUM",
                      category="relativity_human_readability",
                      reason_code=code,
                      rule_id=code,
                      file=file,
                      line=line,
                      message=msg,
                      suggestion="AIにとって処理しやすくても、人間が安全に読める形へ分割・命名・コメント補助を検討してください。",
                      why_problematic_ja="AI向けに圧縮・抽象化されたコードは、人間の確認負荷を増やし、安全性・仕様・副作用の確認を難しくする可能性があります。",
                      why_fix_ja="人間が読みやすい粒度に戻すことで、レビュー品質・保守性・HITL判断の信頼性を維持できます。",
                      impact_ja="人間の可読性と保守性が改善し、AI側の最適化が人間側の負荷増につながるリスクを下げられる可能性があります。",
                      confidence="MEDIUM",
                      risk_type="human_readability",
                      classification_reason="RFL human readability check: AI-readable code must not reduce human readability, maintainability, or reviewability.",
                  )
              )

          def is_human_readability_risk_line(line: str) -> bool:
              stripped = line.strip()
              if not stripped or stripped.startswith("#"):
                  return False
              if "# noqa" in stripped or "# type: ignore" in stripped:
                  return False
              if len(stripped) < 180:
                  return False
              logic_markers = (
                  " and ",
                  " or ",
                  " if ",
                  " else ",
                  " for ",
                  " lambda ",
                  " with ",
              )
              marker_score = sum(stripped.count(marker) for marker in logic_markers)
              structure_score = sum(stripped.count(char) for char in "([{,")
              chain_score = stripped.count(".") + stripped.count("[")
              return marker_score >= 3 or structure_score >= 10 or chain_score >= 10

          def run_logic_review() -> tuple[list[dict[str, Any]], dict[str, Any]]:
              logic_entries: list[dict[str, Any]] = []
              for path in iter_text_files():
                  text = read_text(path)
                  for idx, line in enumerate(text.splitlines(), start=1):
                      stripped = line.strip()
                      if stripped.startswith("<<<<<<< ") or stripped == "=======" or stripped.startswith(">>>>>>> "):
                          add_logic_hitl(
                              logic_entries,
                              "MERGE_CONFLICT_MARKER",
                              "Unresolved merge conflict marker was found.",
                              str(path),
                              idx,
                          )

                  if normalize_path(str(path)) == ".github/workflows/tasukeru-analysis.yml":
                      continue

                  for code, pattern in CONTROL_BYPASS_PATTERNS:
                      for match in pattern.finditer(text):
                          line_no = text[: match.start()].count("\n") + 1
                          add_logic_hitl(
                              logic_entries,
                              "CONTROL_BYPASS_ATTEMPT",
                              f"Automation control-bypass pattern detected: {code}.",
                              str(path),
                              line_no,
                          )

                  run_abuse_pattern_review_for_file(logic_entries, path, text)

                  if path.suffix == ".py" and not is_superseded_historical_path(str(path)):
                      readability_hits = 0
                      for idx, line in enumerate(text.splitlines(), start=1):
                          if is_human_readability_risk_line(line):
                              add_rfl_readability_review(
                                  logic_entries,
                                  "REL_HUMAN_READABILITY_LOST",
                                  "AI-readable but human-readability-risky dense code pattern detected.",
                                  str(path),
                                  idx,
                              )
                              readability_hits += 1
                              if readability_hits >= 3:
                                  break

              required_rfl = {
                  "REL_BOUNDARY_UNSTABLE",
                  "REL_REF_MISSING",
                  "REL_SYMMETRY_BREAK",
                  "REL_HUMAN_READABILITY_LOST",
              }
              codebooks = sorted(repo.glob("log_codebook*.json"))
              if codebooks:
                  for path in codebooks:
                      data = read_json(path, {})
                      found: set[str] = set()
                      collect_reason_codes(data, found)
                      raw = read_text(path)
                      found.update(code for code in required_rfl if code in raw)
                      missing = sorted(required_rfl - found)
                      if missing:
                          add_logic_hitl(
                              logic_entries,
                              "REQUIRED_REASON_CODES_MISSING",
                              f"Required RFL reason codes are missing from codebook: {', '.join(missing)}",
                              str(path),
                          )

              for path in iter_text_files():
                  name = path.name.lower()
                  if path.suffix != ".jsonl" or not any(token in name for token in ("arl", "audit", "incident")):
                      continue
                  with path.open("r", encoding="utf-8", errors="replace") as file_obj:
                      for idx, line in enumerate(file_obj, start=1):
                          if idx > 5000:
                              break
                          line = line.strip()
                          if not line:
                              continue
                          try:
                              row = json.loads(line)
                          except Exception:
                              continue
                          if not isinstance(row, dict):
                              continue

                          layer = str(row.get("layer", ""))
                          decision = str(row.get("decision", ""))
                          sealed = parse_bool(row.get("sealed", False))
                          overrideable = parse_bool(row.get("overrideable", False))
                          final_decider = str(row.get("final_decider", ""))

                          missing = sorted(key for key in REQUIRED_ARL_KEYS if key not in row)
                          if missing:
                              logic_entries.append(
                                  make_entry(
                                      source="Tasukeru Logic Review",
                                      decision="REVIEW_RECOMMENDED",
                                      severity="MEDIUM",
                                      category="arl",
                                      reason_code="ARL_REQUIRED_KEYS_MISSING",
                                      rule_id="ARL_REQUIRED_KEYS_MISSING",
                                      file=str(path),
                                      line=idx,
                                      message=f"ARL row is missing required keys: {', '.join(missing)}",
                                      suggestion="ARL必須キーを補い、監査行として一貫した形式にしてください。",
                                      why_problematic_ja="必須キーが欠けると、後から停止理由や責任分界を追跡しにくくなります。",
                                      why_fix_ja="必須キーを揃えることで、監査と再現確認がしやすくなります。",
                                      impact_ja="ARLの追跡性が改善することが期待されます。",
                                      confidence="MEDIUM",
                                      risk_type="arl",
                                      classification_reason="ARL schema inconsistency is reviewable but not critical unless core invariants are broken.",
                                  )
                              )

                          if decision and decision not in ALLOWED_DECISIONS:
                              logic_entries.append(
                                  make_entry(
                                      source="Tasukeru Logic Review",
                                      decision="REVIEW_RECOMMENDED",
                                      severity="MEDIUM",
                                      category="arl",
                                      reason_code="ARL_UNKNOWN_DECISION",
                                      rule_id="ARL_UNKNOWN_DECISION",
                                      file=str(path),
                                      line=idx,
                                      message=f"ARL decision is outside canonical decision set: {decision}",
                                      suggestion="decision を RUN / PAUSE_FOR_HITL / STOPPED のいずれかに揃えてください。",
                                      why_problematic_ja="decision語彙が揺れると、CIや監査で判定しにくくなります。",
                                      why_fix_ja="語彙を固定すると、集計・監査・テストが安定します。",
                                      impact_ja="ログ解析の安定性が上がることが期待されます。",
                                      confidence="MEDIUM",
                                      risk_type="arl",
                                      classification_reason="Unknown ARL decisions reduce audit consistency.",
                                  )
                              )

                          if sealed and layer not in ETHICS_OR_ACC_LAYERS:
                              add_logic_hitl(
                                  logic_entries,
                                  "SEALED_LAYER_NOT_ETHICS_OR_ACC",
                                  "sealed=true is only allowed for ethics_gate or acc_gate.",
                                  str(path),
                                  idx,
                              )
                          if layer in RFL_LAYERS and sealed:
                              add_logic_hitl(
                                  logic_entries,
                                  "RFL_MUST_NOT_BE_SEALED",
                                  "RFL / relativity_gate rows must never be sealed.",
                                  str(path),
                                  idx,
                              )
                          if sealed and overrideable:
                              add_logic_hitl(
                                  logic_entries,
                                  "SEALED_MUST_NOT_BE_OVERRIDEABLE",
                                  "sealed=true implies overrideable=false.",
                                  str(path),
                                  idx,
                              )
                          if sealed and final_decider != "SYSTEM":
                              add_logic_hitl(
                                  logic_entries,
                                  "SEALED_FINAL_DECIDER_MUST_BE_SYSTEM",
                                  "sealed=true implies final_decider=SYSTEM.",
                                  str(path),
                                  idx,
                              )
                          if decision == "PAUSE_FOR_HITL" and sealed:
                              add_logic_hitl(
                                  logic_entries,
                                  "PAUSE_FOR_HITL_MUST_NOT_BE_SEALED",
                                  "PAUSE_FOR_HITL must remain unsealed.",
                                  str(path),
                                  idx,
                              )

              result = {
                  "schema_version": "1.0",
                  "tool": "tasukeru_logic_review",
                  "findings_count": len(logic_entries),
                  "severity_counts": dict(Counter(entry["severity"] for entry in logic_entries)),
                  "category_counts": dict(Counter(entry["category"] for entry in logic_entries)),
                  "findings": logic_entries,
              }
              write_json(log_dir / "logic-review.json", result)
              with (log_dir / "logic-review.md").open("w", encoding="utf-8") as f:
                  f.write("### Tasukeru logic review\n\n")
                  f.write(f"- Findings: {len(logic_entries)}\n")
                  f.write(f"- HITL_REQUIRED: {sum(1 for e in logic_entries if e['decision'] == 'HITL_REQUIRED')}\n")
                  f.write(f"- REVIEW_RECOMMENDED: {sum(1 for e in logic_entries if e['decision'] == 'REVIEW_RECOMMENDED')}\n\n")
              return logic_entries, result

          def run_documentation_review() -> tuple[list[dict[str, Any]], dict[str, Any]]:
              entries: list[dict[str, Any]] = []
              readme = read_text(Path("README.md"))
              readme_ja = read_text(Path("README.ja.md"))
              security = read_text(Path("SECURITY.md"))
              license_policy = read_text(Path("LICENSE_POLICY.md"))
              contributing = read_text(Path("CONTRIBUTING.md"))
              combined_readme = f"{readme}\n{readme_ja}".lower()

              def add_doc(decision: str, reason_code: str, file: str, message: str, suggestion: str) -> None:
                  entries.append(
                      make_entry(
                          source="Documentation Review",
                          decision=decision,
                          severity="CRITICAL" if decision == "HITL_REQUIRED" else "MEDIUM",
                          category="documentation_policy",
                          reason_code=reason_code,
                          rule_id=reason_code,
                          file=file,
                          message=message,
                          suggestion=suggestion,
                          why_problematic_ja="公開文書の説明と実装方針がずれると、利用者がTasukeruを自動修正Botまたは自動マージBotと誤解する可能性があります。",
                          why_fix_ja="advisory-only、自動PRなし、自動修正なし、自動マージなしを明記すると、利用者の誤解と運用リスクを下げられます。",
                          impact_ja="OSS利用者がプロジェクトの安全境界を理解しやすくなることが期待されます。",
                          confidence="MEDIUM",
                          risk_type="documentation",
                          classification_reason="Documentation review findings are advisory unless they create serious public safety or license ambiguity.",
                      )
                  )

              if readme or readme_ja:
                  if "advisory-only" not in combined_readme and "review helper" not in combined_readme:
                      add_doc(
                          "REVIEW_RECOMMENDED",
                          "DOC_ADVISORY_ONLY_NOT_CLEAR",
                          "README.md / README.ja.md",
                          "README does not clearly describe Tasukeru Analysis as advisory-only.",
                          "READMEに、Tasukeru Analysis は advisory-only のレビュー補助であり、自動修正・自動PR・自動マージを行わないと明記してください。",
                      )

                  combined_raw = f"{readme}\n{readme_ja}"
                  auto_merge_policy_present = (
                      "auto-merge" in combined_readme
                      or "auto merge" in combined_readme
                      or "merge pull requests automatically" in combined_readme
                      or "merge prs automatically" in combined_readme
                      or "自動マージ" in combined_raw
                  )
                  if not auto_merge_policy_present:
                      add_doc(
                          "REVIEW_RECOMMENDED",
                          "DOC_AUTO_MERGE_POLICY_MISSING",
                          "README.md / README.ja.md",
                          "README may not clearly state that auto-merge is prohibited.",
                          "READMEのTasukeru説明に Auto merge: false / 自動マージなし を追加してください。",
                      )
              else:
                  add_doc(
                      "FIX_RECOMMENDED",
                      "DOC_POLICY_MISSING",
                      "README.md",
                      "README.md / README.ja.md was not found.",
                      "プロジェクト目的、advisory-only、安全方針、ライセンス参照を含むREADMEを追加してください。",
                  )

              if not security:
                  add_doc(
                      "FIX_RECOMMENDED",
                      "DOC_SECURITY_POLICY_MISSING",
                      "SECURITY.md",
                      "SECURITY.md was not found.",
                      "SECURITY.mdを追加し、攻撃手段・payload・悪用手順を公開PRコメントに載せない方針を明記してください。",
                  )

              if not license_policy:
                  add_doc(
                      "REVIEW_RECOMMENDED",
                      "DOC_LICENSE_POLICY_REFERENCE_MISSING",
                      "LICENSE_POLICY.md",
                      "LICENSE_POLICY.md was not found.",
                      "必要であれば、コード・文書・名称の扱いを LICENSE_POLICY.md に分離して整理してください。",
                  )

              if not contributing:
                  add_doc(
                      "REVIEW_RECOMMENDED",
                      "DOC_CONTRIBUTING_POLICY_MISSING",
                      "CONTRIBUTING.md",
                      "CONTRIBUTING.md was not found.",
                      "CONTRIBUTING.mdに、advisory-only、自動修正禁止、自動マージ禁止、HITL_REQUIREDの扱いを明記してください。",
                  )

              result = {
                  "schema_version": "1.0",
                  "tool": "tasukeru_documentation_review",
                  "findings_count": len(entries),
                  "counts": dict(Counter(entry["decision"] for entry in entries)),
                  "findings": entries,
              }
              write_json(log_dir / "documentation-review.json", result)
              with (log_dir / "documentation-review.md").open("w", encoding="utf-8") as f:
                  f.write("### Tasukeru documentation review\n\n")
                  f.write(f"- Findings: {len(entries)}\n")
                  for key, count in Counter(entry["decision"] for entry in entries).items():
                      f.write(f"- {key}: {count}\n")
              return entries, result

          def entries_from_ruff(raw: Any) -> list[dict[str, Any]]:
              items = normalize_ruff_items(raw)
              entries: list[dict[str, Any]] = []
              for item in items:
                  rule_id = str(item.get("code", "RUFF"))
                  file = str(item.get("filename", "?"))
                  location = item.get("location") or {}
                  line = location.get("row") if isinstance(location, dict) else None
                  column = location.get("column") if isinstance(location, dict) else None
                  message = str(item.get("message", "Ruff finding"))
                  decision, classification_reason, suggestion = classify_ruff_decision(rule_id, file, message)
                  profile = get_rule_profile(rule_id)
                  entries.append(
                      make_entry(
                          source="Ruff",
                          decision=decision,
                          severity="LOW",
                          category="style_or_correctness",
                          reason_code=f"RUFF_{rule_id}",
                          rule_id=rule_id,
                          file=file,
                          line=line,
                          column=column,
                          message=message,
                          suggestion=suggestion,
                          why_problematic_ja="静的解析上、可読性・保守性・軽微な正しさに関わる可能性があります。",
                          why_fix_ja="指摘箇所を整理すると、不要な差分や将来の誤読を減らしやすくなります。",
                          impact_ja="コードの読みやすさとCI安定性が改善することが期待されます。",
                          confidence="MEDIUM",
                          risk_type="lint",
                          classification_reason=classification_reason,
                          path_profile=classify_path_profile(file),
                          rule_profile=profile,
                      )
                  )
              return entries

          def entries_from_bandit(raw: Any) -> list[dict[str, Any]]:
              items = normalize_bandit_items(raw)
              entries: list[dict[str, Any]] = []
              for item in items:
                  rule_id = str(item.get("test_id", "BANDIT"))
                  file = str(item.get("filename", "?"))
                  line = item.get("line_number")
                  message = str(item.get("issue_text", "Bandit finding"))
                  bandit_severity = str(item.get("issue_severity", "LOW")).upper()
                  decision, classification_reason, suggestion = classify_bandit_decision(
                      rule_id,
                      file,
                      message,
                      bandit_severity,
                  )
                  profile = get_rule_profile(rule_id)
                  entries.append(
                      make_entry(
                          source="Bandit",
                          decision=decision,
                          severity=bandit_severity,
                          category="security_advisory",
                          reason_code=f"BANDIT_{rule_id}",
                          rule_id=rule_id,
                          file=file,
                          line=line,
                          message=message,
                          suggestion=suggestion,
                          why_problematic_ja="このパターンは実行文脈によって安全性・保守性の確認が必要になる可能性があります。",
                          why_fix_ja="入力検証、安全なAPI利用、明示的な例外処理などに寄せることで、想定外の副作用を抑えやすくなります。",
                          impact_ja="防御上の確認ポイントが明確になり、レビュー漏れを減らせる可能性があります。",
                          confidence="MEDIUM",
                          risk_type="security",
                          classification_reason=classification_reason,
                          path_profile=classify_path_profile(file),
                          rule_profile=profile,
                      )
                  )
              return entries

          def entries_from_pip_audit(raw: Any) -> list[dict[str, Any]]:
              vulns = normalize_pip_vulns(raw)
              entries: list[dict[str, Any]] = []
              for vuln in vulns:
                  package = vuln["name"]
                  vuln_id = vuln["id"]
                  fixes = ", ".join(map(str, vuln.get("fix_versions") or [])) or "not specified"
                  entries.append(
                      make_entry(
                          source="pip-audit",
                          decision="FIX_RECOMMENDED",
                          severity="MEDIUM",
                          category="dependency_vulnerability",
                          reason_code="PIP_AUDIT_VULNERABILITY",
                          rule_id=str(vuln_id),
                          file="requirements.txt / requirements-dev.txt",
                          message=f"Dependency vulnerability found: {package} {vuln.get('version')} ({vuln_id})",
                          suggestion=f"依存更新候補を確認してください。fix_versions: {fixes}",
                          why_problematic_ja="依存パッケージの既知脆弱性は、利用文脈によってリスクになる可能性があります。",
                          why_fix_ja="修正版へ更新すると、既知の問題を避けられる可能性があります。",
                          impact_ja="依存関係リスクを下げられることが期待されます。ただし互換性テストが必要です。",
                          confidence="MEDIUM",
                          risk_type="dependency",
                          classification_reason="Dependency vulnerabilities are FIX_RECOMMENDED unless critical policy requires HITL.",
                          path_profile="dependency",
                      )
                  )
              return entries

          def stable_json_text(obj: Any) -> str:
              return json.dumps(
                  obj,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )

          def self_definition_sha256(definition: dict[str, Any]) -> str:
              return hashlib.sha256(stable_json_text(definition).encode("utf-8")).hexdigest()

          def load_effective_self_definition() -> tuple[dict[str, Any], str]:
              if self_definition_source_path.exists():
                  loaded = read_json(self_definition_source_path, {})
                  if isinstance(loaded, dict) and loaded:
                      return loaded, "repository"
              return dict(DEFAULT_SELF_DEFINITION), "embedded_default"

          def changed_files_set() -> set[str]:
              changed_path = Path("tasukeru_changed_files.txt")
              if not changed_path.exists():
                  return set()
              return {
                  normalize_path(line.strip())
                  for line in changed_path.read_text(encoding="utf-8", errors="replace").splitlines()
                  if line.strip()
              }

          def validate_self_definition_contract(definition: dict[str, Any]) -> list[str]:
              errors: list[str] = []
              must_not = definition.get("must_not")
              must = definition.get("must")
              change_policy = definition.get("change_policy")

              if not isinstance(must_not, dict):
                  errors.append("must_not_missing_or_invalid")
                  must_not = {}
              if not isinstance(must, dict):
                  errors.append("must_missing_or_invalid")
                  must = {}
              if not isinstance(change_policy, dict):
                  errors.append("change_policy_missing_or_invalid")
                  change_policy = {}

              required_false = {
                  "auto_branch_allowed",
                  "auto_pr_creation_allowed",
                  "auto_commit_allowed",
                  "auto_push_allowed",
                  "autofix_allowed",
                  "auto_merge_allowed",
                  "self_definition_auto_update_allowed",
                  "rule_auto_tuning_allowed",
                  "workflow_auto_edit_allowed",
              }
              required_true = {
                  "hitl_required_must_require_human_review",
                  "public_comments_must_not_include_payloads",
                  "public_comments_must_not_include_attack_steps",
                  "rfl_must_not_be_sealed",
                  "pause_for_hitl_must_not_be_sealed",
                  "sealed_only_by_ethics_or_acc",
                  "self_definition_change_requires_hitl",
                  "self_definition_change_must_be_recorded",
              }

              for key in sorted(required_false):
                  if must_not.get(key) is not False:
                      errors.append(f"must_not.{key}_must_be_false")
              for key in sorted(required_true):
                  if must.get(key) is not True:
                      errors.append(f"must.{key}_must_be_true")

              if change_policy.get("auto_apply_allowed") is not False:
                  errors.append("change_policy.auto_apply_allowed_must_be_false")
              if change_policy.get("human_decision_required") is not True:
                  errors.append("change_policy.human_decision_required_must_be_true")
              if change_policy.get("change_detection_decision") != "HITL_REQUIRED":
                  errors.append("change_policy.change_detection_decision_must_be_HITL_REQUIRED")
              if change_policy.get("change_gate_decision") != "STOPPED":
                  errors.append("change_policy.change_gate_decision_must_be_STOPPED")

              identity = str(definition.get("identity", "")).lower()
              if "advisory-only" not in identity or "review assistant" not in identity:
                  errors.append("identity_must_state_advisory_only_review_assistant")

              return errors

          def build_self_definition_chain_row(
              *,
              seq: int,
              event: str,
              definition_hash: str,
              source: str,
              previous_definition_hash: str,
              decision: str,
              gate_decision: str,
              reason_code: str,
              prev_hash: str,
              evidence: dict[str, Any],
          ) -> dict[str, Any]:
              row = {
                  "seq": seq,
                  "event": event,
                  "definition_sha256": definition_hash,
                  "previous_definition_sha256": previous_definition_hash,
                  "source": source,
                  "decision": decision,
                  "gate_decision": gate_decision,
                  "layer": "self_definition_guard",
                  "sealed": gate_decision == "STOPPED",
                  "overrideable": gate_decision != "STOPPED",
                  "final_decider": "SYSTEM",
                  "reason_code": reason_code,
                  "auto_apply_allowed": False,
                  "human_decision_required": True,
                  "prev_hash": prev_hash,
                  "evidence": evidence,
              }
              payload = {
                  key: value
                  for key, value in row.items()
                  if key != "chain_hash"
              }
              row["chain_hash"] = canonical_hash({"prev_hash": prev_hash, "row": payload})
              return row

          def read_existing_self_definition_chain() -> tuple[list[dict[str, Any]], list[dict[str, Any]], str, str]:
              rows: list[dict[str, Any]] = []
              errors: list[dict[str, Any]] = []
              prev_hash = "GENESIS"
              head_hash = "GENESIS"
              previous_definition_hash = ""
              if not self_definition_chain_path.exists():
                  return rows, errors, head_hash, previous_definition_hash

              for seq, line in enumerate(self_definition_chain_path.read_text(encoding="utf-8", errors="replace").splitlines(), start=1):
                  if not line.strip():
                      continue
                  try:
                      row = json.loads(line)
                  except Exception as exc:
                      errors.append({"seq": seq, "reason": "json_decode_failed", "error": str(exc)})
                      continue
                  if not isinstance(row, dict):
                      errors.append({"seq": seq, "reason": "row_not_object"})
                      continue
                  actual = row.get("chain_hash")
                  payload = {
                      key: value
                      for key, value in row.items()
                      if key != "chain_hash"
                  }
                  expected = canonical_hash({"prev_hash": row.get("prev_hash", prev_hash), "row": payload})
                  if row.get("prev_hash") != prev_hash:
                      errors.append({"seq": seq, "reason": "prev_hash_mismatch", "expected": prev_hash, "actual": row.get("prev_hash")})
                  if actual != expected:
                      errors.append({"seq": seq, "reason": "chain_hash_mismatch", "expected": expected, "actual": actual})
                  prev_hash = str(actual or expected)
                  head_hash = prev_hash
                  if row.get("definition_sha256"):
                      previous_definition_hash = str(row.get("definition_sha256"))
                  rows.append(row)
              return rows, errors, head_hash, previous_definition_hash

          def add_self_definition_hitl(
              entries: list[dict[str, Any]],
              reason_code: str,
              message: str,
              evidence: dict[str, Any],
          ) -> None:
              entry = make_entry(
                  source="Tasukeru Self-Definition Guard",
                  decision="HITL_REQUIRED",
                  severity="CRITICAL",
                  category="self_definition",
                  reason_code=reason_code,
                  rule_id=reason_code,
                  file=str(self_definition_source_path),
                  message=message,
                  suggestion="自己定義は助ける君の境界条件です。変更・破損・契約違反が意図したものかを人間が確認してください。",
                  why_problematic_ja="自己定義がズレると、HITL、自動化禁止、公開コメント制限、RFL/ACC境界の意味が静かに変わる可能性があります。",
                  why_fix_ja="自己定義変更をHITLで止め、ハッシュチェーンに記録することで、サイレントエロージョンと自己修正化を抑制できます。",
                  impact_ja="人間確認により、助ける君が補助AIの範囲を超えないことを確認できます。",
                  confidence="HIGH",
                  risk_type="self_definition",
                  classification_reason="Self-definition changes or contract violations are non-automatic HITL events.",
                  path_profile="safety_or_hitl",
              )
              entry.update(
                  {
                      "gate_decision": "STOPPED",
                      "layer": "acc_gate",
                      "sealed": True,
                      "overrideable": False,
                      "final_decider": "SYSTEM",
                      "self_definition_evidence": evidence,
                  }
              )
              entries.append(entry)

          def run_self_definition_guard() -> tuple[list[dict[str, Any]], dict[str, Any]]:
              entries: list[dict[str, Any]] = []
              definition, source = load_effective_self_definition()
              definition_hash = self_definition_sha256(definition)
              contract_errors = validate_self_definition_contract(definition)
              existing_rows, chain_errors, existing_head, previous_definition_hash = read_existing_self_definition_chain()
              changed = normalize_path(str(self_definition_source_path)) in changed_files_set()
              change_detected = bool(previous_definition_hash and previous_definition_hash != definition_hash)
              first_registration = not previous_definition_hash

              event = "SELF_DEFINITION_VERIFIED"
              reason_code = "SELF_DEFINITION_VERIFIED"
              decision = "RUN"
              gate_decision = "RUN"

              if first_registration:
                  event = "SELF_DEFINITION_REGISTERED"
                  reason_code = "SELF_DEFINITION_REGISTERED"

              if changed or change_detected:
                  event = "SELF_DEFINITION_CHANGE_DETECTED"
                  reason_code = "SELF_DEFINITION_CHANGE_REQUIRES_HITL"
                  decision = "HITL_REQUIRED"
                  gate_decision = "STOPPED"
                  add_self_definition_hitl(
                      entries,
                      reason_code,
                      "Self-definition file was changed or differs from the previous recorded definition hash.",
                      {
                          "definition_source": source,
                          "definition_sha256": definition_hash,
                          "previous_definition_sha256": previous_definition_hash,
                          "changed_in_pr": changed,
                          "change_detected_from_chain": change_detected,
                      },
                  )

              if contract_errors:
                  event = "SELF_DEFINITION_CONTRACT_VIOLATION"
                  reason_code = "SELF_DEFINITION_CONTRACT_VIOLATION"
                  decision = "HITL_REQUIRED"
                  gate_decision = "STOPPED"
                  add_self_definition_hitl(
                      entries,
                      reason_code,
                      "Self-definition contract violation was detected.",
                      {
                          "definition_source": source,
                          "definition_sha256": definition_hash,
                          "contract_errors": contract_errors,
                      },
                  )

              if chain_errors:
                  event = "SELF_DEFINITION_CHAIN_VERIFY_FAILED"
                  reason_code = "SELF_DEFINITION_CHAIN_VERIFY_FAILED"
                  decision = "HITL_REQUIRED"
                  gate_decision = "STOPPED"
                  add_self_definition_hitl(
                      entries,
                      reason_code,
                      "Self-definition hash chain verification failed.",
                      {
                          "definition_source": source,
                          "definition_sha256": definition_hash,
                          "chain_errors": chain_errors,
                      },
                  )

              output_rows = list(existing_rows)
              prev_hash = existing_head if existing_rows else "GENESIS"
              row = build_self_definition_chain_row(
                  seq=len(output_rows) + 1,
                  event=event,
                  definition_hash=definition_hash,
                  source=source,
                  previous_definition_hash=previous_definition_hash,
                  decision=decision,
                  gate_decision=gate_decision,
                  reason_code=reason_code,
                  prev_hash=prev_hash,
                  evidence={
                      "contract_errors": contract_errors,
                      "changed_in_pr": changed,
                      "change_detected_from_chain": change_detected,
                      "existing_chain_error_count": len(chain_errors),
                      "auto_apply_allowed": False,
                  },
              )
              output_rows.append(row)

              write_json(self_definition_effective_path, definition)
              with self_definition_chain_path.open("w", encoding="utf-8") as file_obj:
                  for item in output_rows:
                      file_obj.write(json.dumps(item, ensure_ascii=False, sort_keys=True) + "\n")

              verify = {
                  "schema_version": "self-definition-verify-v1",
                  "verified": not contract_errors and not chain_errors,
                  "source": source,
                  "definition_sha256": definition_hash,
                  "previous_definition_sha256": previous_definition_hash,
                  "chain_head": row["chain_hash"],
                  "row_count": len(output_rows),
                  "changed_in_pr": changed,
                  "change_detected_from_chain": change_detected,
                  "contract_errors": contract_errors,
                  "chain_errors": chain_errors,
                  "policy": {
                      "read_only_verify_allowed": True,
                      "auto_apply_allowed": False,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required_for_change": True,
                  },
              }
              write_json(self_definition_verify_path, verify)
              return entries, verify

          def assign_incidents(entries: list[dict[str, Any]]) -> list[dict[str, Any]]:
              critical = [entry for entry in entries if entry["decision"] == "HITL_REQUIRED"]
              by_hash: dict[str, list[dict[str, Any]]] = defaultdict(list)
              for entry in critical:
                  by_hash[entry["fingerprint_hash"]].append(entry)
              incident_for_hash = {
                  fp_hash: f"INC#{idx:06d}"
                  for idx, fp_hash in enumerate(sorted(by_hash.keys()), start=1)
              }
              for entry in entries:
                  fp_hash = entry["fingerprint_hash"]
                  if fp_hash in incident_for_hash:
                      entry["incident_id"] = incident_for_hash[fp_hash]
                      entry["fix_verification"]["target_incident_id"] = incident_for_hash[fp_hash]
              return entries

          def build_notification_state(entries: list[dict[str, Any]]) -> dict[str, Any]:
              critical = [entry for entry in entries if entry["decision"] == "HITL_REQUIRED"]
              by_hash: dict[str, list[dict[str, Any]]] = defaultdict(list)
              for entry in critical:
                  by_hash[entry["fingerprint_hash"]].append(entry)
              incidents: list[dict[str, Any]] = []
              for fp_hash, grouped in sorted(by_hash.items()):
                  rep = grouped[0]
                  incidents.append(
                      {
                          "incident_id": rep.get("incident_id") or "",
                          "fingerprint_hash": fp_hash,
                          "decision": "HITL_REQUIRED",
                          "severity": rep.get("severity", "CRITICAL"),
                          "reason_code": rep.get("reason_code", ""),
                          "category": rep.get("category", ""),
                          "count": len(grouped),
                          "representative_file": rep.get("file", ""),
                          "representative_line": rep.get("line"),
                          "notification_required": True,
                          "already_notified": False,
                      }
                  )
              counts = Counter(entry["decision"] for entry in entries)
              safe_autofix = sum(
                  1 for entry in entries
                  if entry.get("autofix", {}).get("safe_autofix_candidate")
              )
              return {
                  "schema_version": "1.0",
                  "notification_policy": "critical_only_single_comment",
                  "critical_decision": "HITL_REQUIRED",
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "auto_merge_allowed": False,
                  "autofix_allowed": False,
                  "critical_count": counts.get("HITL_REQUIRED", 0),
                  "noncritical_count": len(entries) - counts.get("HITL_REQUIRED", 0),
                  "noise_count": counts.get("NOISE_CANDIDATE", 0),
                  "safe_autofix_candidate_count": safe_autofix,
                  "documentation_review_count": sum(
                      1 for entry in entries if entry.get("source") == "Documentation Review"
                  ),
                  "abuse_pattern_review_count": sum(
                      1 for entry in entries if entry.get("source") == "Tasukeru Abuse Pattern Review"
                  ),
                  "self_definition_guard_count": sum(
                      1 for entry in entries if entry.get("source") == "Tasukeru Self-Definition Guard"
                  ),
                  "stopped_gate_count": sum(
                      1 for entry in entries if entry.get("gate_decision") == "STOPPED"
                  ),
                  "fix_verification_count": sum(
                      1 for entry in entries
                      if entry.get("fix_verification", {}).get("enabled")
                  ),
                  "new_critical_incident_count": len(incidents),
                  "suppressed_duplicate_critical_incident_count": max(0, len(critical) - len(incidents)),
                  "incidents": incidents,
              }

          def write_entry_bullet(file_obj: Any, entry: dict[str, Any]) -> None:
              location = entry.get("file") or "repository"
              if entry.get("line"):
                  location = f"{location}:{entry['line']}"
              file_obj.write(f"- **{entry['decision']}** `{entry['reason_code']}` at `{location}`\n")
              file_obj.write(f"  - Source: {entry['source']}\n")
              file_obj.write(f"  - Message: {one_line(entry['message'], 260)}\n")
              file_obj.write(f"  - Classification: {one_line(entry.get('classification_reason', ''), 260)}\n")
              file_obj.write(f"  - Suggested action: {one_line(entry['suggestion'], 260)}\n")
              file_obj.write(f"  - Path profile: `{entry.get('path_profile', '')}`\n")
              file_obj.write(f"  - Autofix policy: `{entry.get('autofix', {}).get('policy', 'AUTOFIX_BLOCKED')}`\n")
              file_obj.write(f"  - Fingerprint: `{entry['fingerprint_hash']}`\n")

          def make_unified_diff(
              *,
              file_path: str,
              before: str,
              after: str,
          ) -> str:
              if before == after:
                  return ""
              before_lines = before.splitlines()
              after_lines = after.splitlines()
              diff_lines = list(
                  difflib.unified_diff(
                      before_lines,
                      after_lines,
                      fromfile=f"a/{file_path}",
                      tofile=f"b/{file_path}",
                      lineterm="\n",
                  )
              )
              if not diff_lines:
                  return ""
              return "\n".join(diff_lines) + "\n"

          def insert_after_marker_once(text: str, marker: str, addition: str) -> str:
              if addition.strip() in text:
                  return text
              index = text.find(marker)
              if index == -1:
                  suffix = "" if text.endswith("\n") else "\n"
                  return text + suffix + "\n" + addition.strip() + "\n"
              insert_at = index + len(marker)
              return text[:insert_at] + "\n\n" + addition.strip() + text[insert_at:]


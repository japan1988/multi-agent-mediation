                  if checks:
                      for check in checks:
                          f.write(f"- `{check.get('name', 'unknown')}`: `{check.get('status', 'UNKNOWN')}`\n")
                          if check.get("reason"):
                              f.write(f"  - Reason: {check.get('reason')}\n")
                  else:
                      f.write("No checks were recorded.\n")
                  notes = result.get("notes") or []
                  if notes:
                      f.write("\n## Notes\n\n")
                      for note in notes:
                          f.write(f"- {note}\n")
                  if result.get("unified_diff"):
                      f.write("\n## Unified diff\n\n")
                      f.write("```diff\n")
                      f.write(str(result["unified_diff"])[:20000])
                      if len(str(result["unified_diff"])) > 20000:
                          f.write("\n... diff truncated in Markdown; see JSON artifact for full draft data.\n")
                      f.write("\n```\n")
                  if result.get("full_draft"):
                      f.write("\n## Full draft\n\n")
                      f.write("```markdown\n")
                      f.write(str(result["full_draft"])[:30000])
                      if len(str(result["full_draft"])) > 30000:
                          f.write("\n... full draft truncated in Markdown; see JSON artifact for full draft data.\n")
                      f.write("\n```\n")

          def sha256_file(path: Path) -> str:
              try:
                  h = hashlib.sha256()
                  with path.open("rb") as f:
                      for chunk in iter(lambda: f.read(1024 * 1024), b""):
                          h.update(chunk)
                  return h.hexdigest()
              except Exception:
                  return ""

          def canonical_json_bytes(obj: Any) -> bytes:
              return json.dumps(
                  obj,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              ).encode("utf-8")

          def chain_hash(prev_hash: str, row_hash: str) -> str:
              return hashlib.sha256(f"{prev_hash}:{row_hash}".encode("utf-8")).hexdigest()

          def optional_hmac_sha256(value: str) -> str:
              key = os.environ.get("TASUKERU_ARL_HMAC_KEY", "")
              if not key:
                  return ""
              return hmac.new(key.encode("utf-8"), value.encode("utf-8"), hashlib.sha256).hexdigest()

          def build_arl_row(
              *,
              seq: int,
              run_id: str,
              layer: str,
              decision: str,
              sealed: bool,
              overrideable: bool,
              final_decider: str,
              reason_code: str,
              prev_hash: str,
              evidence: dict[str, Any] | None = None,
          ) -> dict[str, Any]:
              row: dict[str, Any] = {
                  "schema_version": "1.0",
                  "seq": seq,
                  "run_id": run_id,
                  "layer": layer,
                  "decision": decision,
                  "sealed": sealed,
                  "overrideable": overrideable,
                  "final_decider": final_decider,
                  "reason_code": reason_code,
                  "prev_hash": prev_hash,
                  "evidence": evidence or {},
                  "modifies_repository": False,
                  "auto_apply_allowed": False,
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "human_decision_required": True,
              }
              row_hash = hashlib.sha256(canonical_json_bytes(row)).hexdigest()
              current_chain_hash = chain_hash(prev_hash, row_hash)
              row["row_hash"] = row_hash
              row["chain_hash"] = current_chain_hash
              hmac_value = optional_hmac_sha256(current_chain_hash)
              if hmac_value:
                  row["hmac_sha256"] = hmac_value
              return row

          def verify_tasukeru_arl_hash_chain(path: Path) -> dict[str, Any]:
              errors: list[dict[str, Any]] = []
              prev_hash = "GENESIS"
              row_count = 0
              head_hash = "GENESIS"
              hmac_key_present = bool(os.environ.get("TASUKERU_ARL_HMAC_KEY", ""))

              if not path.exists():
                  return {
                      "schema_version": "1.0",
                      "tool": "tasukeru_arl_hash_chain_verify",
                      "verified": False,
                      "row_count": 0,
                      "head_hash": "",
                      "hmac_enabled": hmac_key_present,
                      "errors": [{"seq": None, "reason": "ARL file was not generated."}],
                      "policy": {
                          "modifies_repository": False,
                          "auto_apply_allowed": False,
                          "auto_branch_allowed": False,
                          "auto_pr_creation_allowed": False,
                          "auto_commit_allowed": False,
                          "auto_push_allowed": False,
                          "autofix_allowed": False,
                          "auto_merge_allowed": False,
                          "human_decision_required": True,
                      },
                  }

              with path.open("r", encoding="utf-8", errors="replace") as f:
                  for line_no, line in enumerate(f, start=1):
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          row = json.loads(line)
                      except Exception as exc:
                          errors.append({"line": line_no, "reason": f"invalid_json: {exc}"})
                          continue
                      if not isinstance(row, dict):
                          errors.append({"line": line_no, "reason": "row is not an object"})
                          continue

                      row_count += 1
                      seq = row.get("seq", row_count)
                      expected_prev = row.get("prev_hash")
                      actual_row_hash = row.get("row_hash")
                      actual_chain_hash = row.get("chain_hash")
                      row_for_hash = dict(row)
                      row_for_hash.pop("row_hash", None)
                      row_for_hash.pop("chain_hash", None)
                      row_for_hash.pop("hmac_sha256", None)
                      expected_row_hash = hashlib.sha256(canonical_json_bytes(row_for_hash)).hexdigest()
                      expected_chain_hash = chain_hash(prev_hash, expected_row_hash)

                      if expected_prev != prev_hash:
                          errors.append(
                              {
                                  "seq": seq,
                                  "reason": "prev_hash_mismatch",
                                  "expected": prev_hash,
                                  "actual": expected_prev,
                              }
                          )
                      if actual_row_hash != expected_row_hash:
                          errors.append(
                              {
                                  "seq": seq,
                                  "reason": "row_hash_mismatch",
                                  "expected": expected_row_hash,
                                  "actual": actual_row_hash,
                              }
                          )
                      if actual_chain_hash != expected_chain_hash:
                          errors.append(
                              {
                                  "seq": seq,
                                  "reason": "chain_hash_mismatch",
                                  "expected": expected_chain_hash,
                                  "actual": actual_chain_hash,
                              }
                          )
                      if hmac_key_present:
                          expected_hmac = optional_hmac_sha256(expected_chain_hash)
                          actual_hmac = row.get("hmac_sha256")
                          if actual_hmac != expected_hmac:
                              errors.append(
                                  {
                                      "seq": seq,
                                      "reason": "hmac_mismatch",
                                      "expected": expected_hmac,
                                      "actual": actual_hmac,
                                  }
                              )
                      prev_hash = str(actual_chain_hash or expected_chain_hash)
                      head_hash = prev_hash

              return {
                  "schema_version": "1.0",
                  "tool": "tasukeru_arl_hash_chain_verify",
                  "verified": not errors,
                  "row_count": row_count,
                  "head_hash": head_hash,
                  "hmac_enabled": hmac_key_present,
                  "errors": errors,
                  "policy": {
                      "modifies_repository": False,
                      "auto_apply_allowed": False,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def generate_tasukeru_arl_hash_chain(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
          ) -> dict[str, Any]:
              """Generate an advisory-only ARL hash chain artifact.

              This does not change repository files and does not influence the existing
              finding classification. It records Tasukeru outputs as tamper-evident
              audit rows for human review.
              """
              run_id = os.environ.get("GITHUB_RUN_ID") or os.environ.get("GITHUB_RUN_NUMBER") or "local"
              seq = 1
              prev_hash = "GENESIS"
              rows: list[dict[str, Any]] = []

              summary_decision = "PAUSE_FOR_HITL" if state.get("critical_count", 0) else "RUN"
              summary_reason = "TASUKERU_HITL_REQUIRED_PRESENT" if state.get("critical_count", 0) else "TASUKERU_SUMMARY_RECORDED"
              row = build_arl_row(
                  seq=seq,
                  run_id=run_id,
                  layer="tasukeru_summary",
                  decision=summary_decision,
                  sealed=False,
                  overrideable=summary_decision == "PAUSE_FOR_HITL",
                  final_decider="SYSTEM",
                  reason_code=summary_reason,
                  prev_hash=prev_hash,
                  evidence={
                      "metadata": metadata,
                      "notification_state_summary": {
                          "critical_count": state.get("critical_count", 0),
                          "new_critical_incident_count": state.get("new_critical_incident_count", 0),
                          "suppressed_duplicate_critical_incident_count": state.get("suppressed_duplicate_critical_incident_count", 0),
                      },
                  },
              )
              rows.append(row)
              prev_hash = row["chain_hash"]
              seq += 1

              for entry in entries:
                  advisory_decision = str(entry.get("decision", ""))
                  arl_decision = "PAUSE_FOR_HITL" if advisory_decision == "HITL_REQUIRED" else "RUN"
                  row = build_arl_row(
                      seq=seq,
                      run_id=run_id,
                      layer="tasukeru_finding",
                      decision=arl_decision,
                      sealed=False,
                      overrideable=arl_decision == "PAUSE_FOR_HITL",
                      final_decider="SYSTEM",
                      reason_code=str(entry.get("reason_code", "TASUKERU_FINDING_RECORDED")),
                      prev_hash=prev_hash,
                      evidence={
                          "source": entry.get("source"),
                          "advisory_decision": advisory_decision,
                          "severity": entry.get("severity"),
                          "category": entry.get("category"),
                          "rule_id": entry.get("rule_id"),
                          "file": entry.get("file"),
                          "line": entry.get("line"),
                          "fingerprint_hash": entry.get("fingerprint_hash"),
                          "path_profile": entry.get("path_profile"),
                      },
                  )
                  rows.append(row)
                  prev_hash = row["chain_hash"]
                  seq += 1

              artifact_paths = [
                  summary_path,
                  hitl_md_path,
                  hitl_json_path,
                  notification_state_path,
                  pr_comment_path,
                  dradm_md_path,
                  dradm_json_path,
                  confidence_md_path,
                  confidence_json_path,
                  readme_refinement_md_path,
                  readme_refinement_json_path,
                  self_definition_effective_path,
                  self_definition_chain_path,
                  self_definition_verify_path,
                  log_dir / "logic-review.json",
                  log_dir / "documentation-review.json",
                  log_dir / "ruff.json",
                  log_dir / "bandit.json",
                  log_dir / "pip-audit.json",
              ]
              for artifact_path in artifact_paths:
                  if not artifact_path.exists():
                      continue
                  artifact_sha256 = sha256_file(artifact_path)
                  row = build_arl_row(
                      seq=seq,
                      run_id=run_id,
                      layer="artifact_integrity",
                      decision="RUN",
                      sealed=False,
                      overrideable=False,
                      final_decider="SYSTEM",
                      reason_code="TASUKERU_ARTIFACT_RECORDED",
                      prev_hash=prev_hash,
                      evidence={
                          "artifact": str(artifact_path).replace("\\", "/"),
                          "artifact_sha256": artifact_sha256,
                          "size_bytes": artifact_path.stat().st_size,
                      },
                  )
                  rows.append(row)
                  prev_hash = row["chain_hash"]
                  seq += 1

              with arl_jsonl_path.open("w", encoding="utf-8") as f:
                  for row in rows:
                      f.write(json.dumps(row, ensure_ascii=False, sort_keys=True) + "\n")

              verification = verify_tasukeru_arl_hash_chain(arl_jsonl_path)
              verification.update(
                  {
                      "arl_path": str(arl_jsonl_path),
                      "verify_path": str(arl_verify_json_path),
                      "purpose": "Advisory-only tamper-evident record of Tasukeru outputs.",
                  }
              )
              write_json(arl_verify_json_path, verification)
              return verification

          def build_tasukeru_announcement_payload(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
          ) -> dict[str, Any]:
              """Translate verified ARL/advisory outputs into a human-readable summary.

              This announcer layer is read-only and advisory-only. It does not change
              findings, clear HITL_REQUIRED, modify repository files, or authorize any
              automatic action.
              """
              counts = Counter(entry.get("decision", "UNKNOWN") for entry in entries)
              arl_verified = bool(arl_verification.get("verified"))
              critical_count = int(state.get("critical_count", counts.get("HITL_REQUIRED", 0)) or 0)
              review_count = int(counts.get("FIX_RECOMMENDED", 0) + counts.get("REVIEW_RECOMMENDED", 0))
              noise_count = int(counts.get("NOISE_CANDIDATE", 0))
              info_count = int(counts.get("INFO_ONLY", 0))

              confidence_report = read_json(confidence_json_path, {})
              total_confidence = (
                  confidence_report.get("total") or {}
                  if isinstance(confidence_report, dict)
                  else {}
              )
              dradm_report = read_json(dradm_json_path, {})
              readme_refinement_report = read_json(readme_refinement_json_path, {})
              readme_refinement_draft = {}
              if isinstance(readme_refinement_report, dict):
                  draft_obj = readme_refinement_report.get("draft")
                  if isinstance(draft_obj, dict):
                      readme_refinement_draft = draft_obj
                  else:
                      readme_refinement_draft = readme_refinement_report

              automation_policy = {
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "human_decision_required": True,
              }

              if not arl_verified:
                  conclusion_ja = (
                      "ARLハッシュチェーンの検証に失敗したため、通常要約は制限されています。"
                      "原因・主体・意図は推測せず、tasukeru_arl_verify.json を確認してください。"
                  )
                  mode = "ARL_VERIFY_FAILED_LIMITED_SUMMARY"
                  recommended_next_actions = [
                      "tasukeru_arl_verify.json を確認する",
                      "tasukeru_arl.jsonl の欠損・破損・改ざん検知エラーを確認する",
                      "ARL検証が回復するまで、この要約を最終判断に使わない",
                  ]
              elif critical_count:
                  conclusion_ja = (
                      "HITL_REQUIRED が検出されています。merge前に人間確認が必要です。"
                      "ARLハッシュチェーンは検証済みです。"
                  )
                  mode = "HITL_REQUIRED_SUMMARY"
                  recommended_next_actions = [
                      "tasukeru_hitl_review.md を確認する",
                      "tasukeru_hitl_review.json で対象reason_codeとfileを確認する",
                      "必要に応じて該当artifactとARL行へ戻る",
                      "人間が判断するまでmergeしない",
                  ]
              else:
                  conclusion_ja = (
                      "このrunでは HITL_REQUIRED はありません。"
                      "ARLハッシュチェーンは検証済みです。"
                      "自動PR・自動commit・自動push・自動fix・自動mergeは有効化されていません。"
                  )
                  mode = "NORMAL_HUMAN_SUMMARY"
                  recommended_next_actions = [
                      "tasukeru_advisory_summary.md を確認する",
                      "必要に応じて tasukeru_dradm_draft.md と tasukeru_readme_refinement_draft.md を確認する",
                      "FIX_RECOMMENDED / REVIEW_RECOMMENDED の残件を次の改善候補として扱う",
                  ]

              look_first = [
                  "tasukeru_advisory_summary.md",
                  "tasukeru_hitl_review.md",
                  "tasukeru_hitl_review.json",
                  "tasukeru_arl_verify.json",
              ]
              if dradm_report:
                  look_first.append("tasukeru_dradm_draft.md")
              if readme_refinement_report:
                  look_first.append("tasukeru_readme_refinement_draft.md")
              if confidence_report:
                  look_first.append("tasukeru_confidence_report.md")

              source_constraints = {
                  "source_of_truth": "tasukeru_arl.jsonl + tasukeru_arl_verify.json + advisory artifacts",
                  "arl_verified": arl_verified,
                  "do_not_infer_actor_intent_or_cause": True,
                  "do_not_claim_safety_guarantee": True,
                  "unknowns_must_remain_unknown": True,
                  "summary_is_not_final_decision": True,
              }

              return {
                  "schema_version": "1.0",
                  "tool": "tasukeru_announcer",
                  "status": "ADVISORY_ONLY",
                  "mode": mode,
                  "generated": True,
                  "purpose": "Translate verified Tasukeru ARL/advisory outputs into a concise human-readable summary.",
                  "conclusion_ja": conclusion_ja,
                  "metadata": metadata,
                  "decision_counts": dict(counts),
                  "review_queue": {
                      "hitl_required": critical_count,
                      "fix_recommended": int(counts.get("FIX_RECOMMENDED", 0)),
                      "review_recommended": int(counts.get("REVIEW_RECOMMENDED", 0)),
                      "noise_candidate": noise_count,
                      "info_only": info_count,
                      "remaining_review_items": review_count,
                  },
                  "arl": {
                      "verified": arl_verified,
                      "row_count": arl_verification.get("row_count"),
                      "head_hash": arl_verification.get("head_hash"),
                      "hmac_enabled": arl_verification.get("hmac_enabled"),
                      "error_count": len(arl_verification.get("errors", []) or []),
                      "verify_artifact": "tasukeru_arl_verify.json",
                      "source_artifact": "tasukeru_arl.jsonl",
                  },
                  "confidence": {
                      "score": total_confidence.get("total_confidence_score"),
                      "level": total_confidence.get("total_confidence_level"),
                      "scope": "classification/suggestion confidence only; not permission to auto-apply changes",
                  },
                  "drafts": {
                      "dradm_draft_count": dradm_report.get("draft_count") if isinstance(dradm_report, dict) else None,
                      "readme_refinement_status": readme_refinement_draft.get("draft_status")
                      if isinstance(readme_refinement_draft, dict)
                      else None,
                      "readme_refinement_target": readme_refinement_draft.get("target_file")
                      if isinstance(readme_refinement_draft, dict)
                      else None,
                  },
                  "look_first": look_first,
                  "recommended_next_actions": recommended_next_actions,
                  "source_constraints": source_constraints,
                  "self_definition": metadata.get("self_definition", {}),
                  "policy": automation_policy,
              }

          def write_tasukeru_announcement(payload: dict[str, Any]) -> None:
              write_json(announcement_json_path, payload)
              review_queue = payload.get("review_queue", {}) if isinstance(payload, dict) else {}
              arl = payload.get("arl", {}) if isinstance(payload, dict) else {}
              confidence = payload.get("confidence", {}) if isinstance(payload, dict) else {}
              drafts = payload.get("drafts", {}) if isinstance(payload, dict) else {}
              policy = payload.get("policy", {}) if isinstance(payload, dict) else {}
              source_constraints = payload.get("source_constraints", {}) if isinstance(payload, dict) else {}

              with announcement_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru Announcement\n\n")
                  f.write("This artifact is an announcer-style natural-language summary. ")
                  f.write("It translates verified Tasukeru ARL/advisory outputs for human review and does not make decisions.\n\n")
                  f.write("## 結論\n\n")
                  f.write(str(payload.get("conclusion_ja", "No conclusion generated.")) + "\n\n")
                  f.write("## 確認結果\n\n")
                  f.write(f"- Mode: `{payload.get('mode')}`\n")
                  f.write(f"- ARL verified: `{arl.get('verified')}`\n")
                  f.write(f"- ARL rows: `{arl.get('row_count')}`\n")
                  f.write(f"- ARL head hash: `{arl.get('head_hash')}`\n")
                  f.write(f"- ARL HMAC enabled: `{arl.get('hmac_enabled')}`\n")
                  f.write(f"- ARL error count: `{arl.get('error_count')}`\n")
                  f.write(f"- HITL_REQUIRED: `{review_queue.get('hitl_required')}`\n")
                  f.write(f"- FIX_RECOMMENDED: `{review_queue.get('fix_recommended')}`\n")
                  f.write(f"- REVIEW_RECOMMENDED: `{review_queue.get('review_recommended')}`\n")
                  f.write(f"- NOISE_CANDIDATE: `{review_queue.get('noise_candidate')}`\n")
                  f.write(f"- INFO_ONLY: `{review_queue.get('info_only')}`\n")
                  f.write(f"- Confidence: `{confidence.get('score')}` / `1.0` ({confidence.get('level')})\n")
                  f.write(f"- DRADM draft count: `{drafts.get('dradm_draft_count')}`\n")
                  f.write(f"- README refinement status: `{drafts.get('readme_refinement_status')}`\n")
                  self_definition = payload.get("self_definition", {}) if isinstance(payload, dict) else {}
                  if isinstance(self_definition, dict) and self_definition:
                      f.write(f"- Self-definition verified: `{self_definition.get('verified')}`\n")
                      f.write(f"- Self-definition hash: `{self_definition.get('definition_sha256')}`\n")
                      f.write(f"- Self-definition chain head: `{self_definition.get('chain_head')}`\n")
                  f.write("\n")

                  f.write("## 人間が先に見るもの\n\n")
                  for item in payload.get("look_first", []) or []:
                      f.write(f"- `{item}`\n")
                  f.write("\n## 推奨される次の確認\n\n")
                  for item in payload.get("recommended_next_actions", []) or []:
                      f.write(f"- {item}\n")

                  f.write("\n## 権限と制限\n\n")
                  f.write("- This announcement does not clear `HITL_REQUIRED`.\n")
                  f.write("- This announcement does not modify repository files.\n")
                  f.write("- This announcement does not create branches, PRs, commits, pushes, fixes, or merges.\n")
                  f.write(f"- Auto branch creation: `{policy.get('auto_branch_allowed')}`\n")
                  f.write(f"- Auto PR creation: `{policy.get('auto_pr_creation_allowed')}`\n")
                  f.write(f"- Auto commit: `{policy.get('auto_commit_allowed')}`\n")
                  f.write(f"- Auto push: `{policy.get('auto_push_allowed')}`\n")
                  f.write(f"- Auto fix: `{policy.get('autofix_allowed')}`\n")
                  f.write(f"- Auto merge: `{policy.get('auto_merge_allowed')}`\n")
                  f.write(f"- Human decision required: `{policy.get('human_decision_required')}`\n")

                  f.write("\n## NCF / fact-boundary note\n\n")
                  f.write("- This announcement only summarizes recorded ARL/advisory artifacts.\n")
                  f.write("- It must not infer cause, actor, or intent beyond the logs.\n")
                  f.write("- It must not claim production safety or compliance certification.\n")
                  f.write(f"- Source of truth: `{source_constraints.get('source_of_truth')}`\n")

          def generate_tasukeru_announcement(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
          ) -> dict[str, Any]:
              payload = build_tasukeru_announcement_payload(entries, state, metadata, arl_verification)
              write_tasukeru_announcement(payload)
              return payload

          def clamp_score(value: float, minimum: float = 0.0, maximum: float = 1.0) -> float:
              return round(max(minimum, min(maximum, value)), 3)

          def confidence_level(score: float) -> str:
              if score >= 0.90:
                  return "VERY_HIGH"
              if score >= 0.75:
                  return "HIGH"
              if score >= 0.55:
                  return "MEDIUM"
              if score >= 0.35:
                  return "LOW"
              return "VERY_LOW"

          def calculate_entry_confidence(entry: dict[str, Any]) -> dict[str, Any]:
              basis: list[str] = []
              penalties: list[str] = []
              components = {
                  "evidence_quality": 0.0,
                  "rule_profile_confidence": 0.0,
                  "path_profile_confidence": 0.0,
                  "classification_clarity": 0.0,
                  "fix_prediction_clarity": 0.0,
                  "fix_verification_status": 0.0,
              }

              evidence = entry.get("evidence", {}) if isinstance(entry.get("evidence"), dict) else {}
              source = str(entry.get("source", ""))
              rule_id = str(entry.get("rule_id", ""))
              file_path = str(entry.get("file", ""))
              line = entry.get("line")
              snippet = str(entry.get("code_snippet", ""))
              artifact = str(evidence.get("artifact", ""))
              path_profile = str(entry.get("path_profile", ""))
              classification_reason = str(entry.get("classification_reason", ""))
              rule_profile = entry.get("rule_profile", {}) if isinstance(entry.get("rule_profile"), dict) else {}
              fix_prediction = entry.get("fix_prediction", {}) if isinstance(entry.get("fix_prediction"), dict) else {}
              fix_verification = entry.get("fix_verification", {}) if isinstance(entry.get("fix_verification"), dict) else {}

              if source:
                  components["evidence_quality"] += 0.05
                  basis.append("source tool is recorded")
              if rule_id:
                  components["evidence_quality"] += 0.05
                  basis.append("rule_id is recorded")
              if file_path:
                  components["evidence_quality"] += 0.05
                  basis.append("target file is recorded")
              if line or source in {"Documentation Review", "pip-audit"}:
                  components["evidence_quality"] += 0.04
                  basis.append("line or document-level scope is recorded")
              if snippet or source in {"Documentation Review", "pip-audit"}:
                  components["evidence_quality"] += 0.03
                  basis.append("snippet or document-level evidence is available")
              if artifact:
                  components["evidence_quality"] += 0.03
                  basis.append("artifact reference is recorded")
              components["evidence_quality"] = min(0.25, components["evidence_quality"])

              if rule_id in RULE_PROFILES:
                  components["rule_profile_confidence"] = 0.20
                  basis.append("rule_id has an explicit RULE_PROFILES entry")
              elif source in {"Documentation Review", "Tasukeru Logic Review", "pip-audit"}:
                  components["rule_profile_confidence"] = 0.16
                  basis.append("source-specific repository policy handles this finding type")
              elif rule_profile:
                  components["rule_profile_confidence"] = 0.12
                  basis.append("fallback rule profile is present")
              else:
                  components["rule_profile_confidence"] = 0.08
                  penalties.append("rule_id is not explicitly profiled")

              if path_profile and path_profile not in {"unknown", "general"}:
                  components["path_profile_confidence"] = 0.20
                  basis.append(f"path_profile is resolved as {path_profile}")
              elif path_profile == "general":
                  components["path_profile_confidence"] = 0.14
                  basis.append("path_profile is general but explicitly resolved")
              else:
                  components["path_profile_confidence"] = 0.08
                  penalties.append("path_profile is missing or unknown")

              if classification_reason:
                  components["classification_clarity"] = 0.15
                  basis.append("classification_reason explains the decision")
              else:
                  components["classification_clarity"] = 0.07
                  penalties.append("classification_reason is missing")

              if fix_prediction.get("expected_effect_ja"):
                  components["fix_prediction_clarity"] = 0.10
                  basis.append("fix_prediction includes expected effect")
              else:
                  components["fix_prediction_clarity"] = 0.04
                  penalties.append("fix_prediction is incomplete")

              if fix_verification.get("verified") is True:
                  components["fix_verification_status"] = 0.10
                  basis.append("fix_verification is verified")
              elif fix_verification:
                  components["fix_verification_status"] = 0.02
                  penalties.append("fix_verification is advisory-only and not verified")
              else:
                  components["fix_verification_status"] = 0.0
                  penalties.append("fix_verification data is missing")

              score = sum(components.values())

              if source in {"Ruff", "Bandit"} and not line:
                  score -= 0.03
                  penalties.append("tool finding has no line number")
              if source in {"Ruff", "Bandit"} and not snippet:
                  score -= 0.03
                  penalties.append("tool finding has no code snippet")
              if entry.get("decision") == "HITL_REQUIRED" and fix_verification.get("verified") is not True:
                  score -= 0.02
                  penalties.append("critical finding still requires human review")

              cap = 1.0 if fix_verification.get("verified") is True else 0.90
              if cap < 1.0:
                  basis.append("score is capped below 1.0 because fix_verification is not verified")
              score = clamp_score(score, 0.0, cap)

              return {
                  "confidence_score": score,
                  "confidence_level": confidence_level(score),
                  "score_semantics": "Confidence in Tasukeru's classification/suggestion evidence, not a safety guarantee.",
                  "components": {key: round(value, 3) for key, value in components.items()},
                  "basis": basis,
                  "penalties": penalties,
                  "policy": {
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def attach_confidence_scores(entries: list[dict[str, Any]]) -> list[dict[str, Any]]:
              for entry in entries:
                  assessment = calculate_entry_confidence(entry)
                  entry["confidence_assessment"] = assessment
                  entry["confidence_score"] = assessment["confidence_score"]
                  entry["confidence_level"] = assessment["confidence_level"]
              return entries

          def build_file_confidence_summary(entries: list[dict[str, Any]]) -> list[dict[str, Any]]:
              grouped: dict[str, list[dict[str, Any]]] = defaultdict(list)
              for entry in entries:
                  grouped[str(entry.get("file", "repository"))].append(entry)

              summaries: list[dict[str, Any]] = []
              for file_path, file_entries in sorted(grouped.items()):
                  scores = [float(entry.get("confidence_score", 0.0)) for entry in file_entries]
                  avg_score = clamp_score(sum(scores) / len(scores)) if scores else 0.0
                  decision_counts = Counter(str(entry.get("decision", "UNKNOWN")) for entry in file_entries)
                  reason_codes = sorted({str(entry.get("reason_code", "")) for entry in file_entries if entry.get("reason_code")})
                  path_profiles = sorted({str(entry.get("path_profile", "")) for entry in file_entries if entry.get("path_profile")})
                  basis = [
                      f"{len(file_entries)} finding(s) grouped for this file",
                      f"decision_counts={dict(decision_counts)}",
                  ]
                  if path_profiles:
                      basis.append(f"path_profiles={path_profiles}")
                  penalties: list[str] = []
                  if any(entry.get("decision") in {"HITL_REQUIRED", "REVIEW_RECOMMENDED"} for entry in file_entries):
                      penalties.append("file still contains findings that require human review or contextual review")
                  if any(entry.get("fix_verification", {}).get("verified") is not True for entry in file_entries):
                      penalties.append("one or more findings are not verified by fix_verification")
                  summaries.append(
                      {
                          "file": file_path,
                          "file_confidence_score": avg_score,
                          "file_confidence_level": confidence_level(avg_score),
                          "finding_count": len(file_entries),
                          "decision_counts": dict(decision_counts),
                          "reason_codes": reason_codes,
                          "path_profiles": path_profiles,
                          "basis": basis,
                          "penalties": penalties,
                      }
                  )
              return summaries

          def build_total_confidence_summary(entries: list[dict[str, Any]], state: dict[str, Any], metadata: dict[str, Any]) -> dict[str, Any]:
              scores = [float(entry.get("confidence_score", 0.0)) for entry in entries]
              entry_average = sum(scores) / len(scores) if scores else 0.0
              basis: list[str] = []
              penalties: list[str] = []

              structural_score = 0.70
              if metadata.get("ruff_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("Ruff findings are zero")
              if metadata.get("pip_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("pip-audit vulnerabilities are zero")
              if metadata.get("logic_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("Tasukeru logic review findings are zero")
              if state.get("critical_count", 0) == 0:
                  structural_score += 0.05
                  basis.append("HITL_REQUIRED critical incidents are zero")
              structural_score = clamp_score(structural_score)

              total = (entry_average * 0.75) + (structural_score * 0.25)

              if metadata.get("documentation_count", 0):
                  penalties.append("documentation review still has findings")
                  total -= 0.02
              if state.get("critical_count", 0):
                  penalties.append("HITL_REQUIRED incidents remain")
                  total -= 0.08
              if not any(entry.get("fix_verification", {}).get("verified") is True for entry in entries):
                  penalties.append("no finding is fully verified by fix_verification; scores remain advisory")
                  total = min(total, 0.90)
              if not entries:
                  penalties.append("no entries were available to score")

              total = clamp_score(total)
              return {
                  "total_confidence_score": total,
                  "total_confidence_level": confidence_level(total),
                  "entry_average_score": clamp_score(entry_average),
                  "structural_score": structural_score,
                  "basis": basis,
                  "penalties": penalties,
                  "score_semantics": "Confidence in this Tasukeru review run's classification/suggestion evidence, not a guarantee that the repository is safe.",
                  "policy": {
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def build_confidence_report_payload(entries: list[dict[str, Any]], state: dict[str, Any], metadata: dict[str, Any]) -> dict[str, Any]:
              file_summaries = build_file_confidence_summary(entries)
              total_summary = build_total_confidence_summary(entries, state, metadata)
              return {
                  "schema_version": "1.0",
                  "tool": "tasukeru_confidence_scoring",
                  "status": "ADVISORY_ONLY",
                  "score_max": 1.0,
                  "score_semantics": "Scores represent confidence in Tasukeru's evidence/classification/suggestion, not permission to auto-apply changes.",
                  "total": total_summary,
                  "files": file_summaries,
                  "entries": [
                      {
                          "source": entry.get("source"),
                          "decision": entry.get("decision"),
                          "reason_code": entry.get("reason_code"),
                          "file": entry.get("file"),
                          "line": entry.get("line"),
                          "confidence_score": entry.get("confidence_score"),
                          "confidence_level": entry.get("confidence_level"),
                          "confidence_basis": entry.get("confidence_assessment", {}).get("basis", []),
                          "confidence_penalties": entry.get("confidence_assessment", {}).get("penalties", []),
                          "classification_reason": entry.get("classification_reason"),
                          "path_profile": entry.get("path_profile"),
                      }
                      for entry in entries
                  ],
                  "policy": {
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def write_confidence_report(payload: dict[str, Any]) -> None:
              write_json(confidence_json_path, payload)
              total = payload.get("total", {})
              with confidence_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru Confidence Report\n\n")
                  f.write("This report is advisory-only. Scores do not authorize auto-fix, auto-PR, auto-push, or auto-merge.\n\n")
                  f.write("## Total confidence\n\n")
                  f.write(f"- Score: `{total.get('total_confidence_score', 0.0)}` / `1.0`\n")
                  f.write(f"- Level: `{total.get('total_confidence_level', 'UNKNOWN')}`\n")
                  f.write(f"- Entry average: `{total.get('entry_average_score', 0.0)}`\n")
                  f.write(f"- Structural score: `{total.get('structural_score', 0.0)}`\n\n")
                  f.write("## Basis\n\n")
                  for item in total.get("basis", []) or ["No positive basis recorded."]:
                      f.write(f"- {item}\n")
                  f.write("\n## Penalties / limitations\n\n")
                  for item in total.get("penalties", []) or ["No penalties recorded."]:
                      f.write(f"- {item}\n")
                  f.write("\n## File confidence\n\n")
                  files = payload.get("files", [])
                  if not files:
                      f.write("No file-level confidence entries.\n")
                  else:
                      for item in files[:100]:
                          f.write(f"- `{item.get('file')}`: `{item.get('file_confidence_score')}` / `1.0` ({item.get('file_confidence_level')}); findings={item.get('finding_count')}\n")
                      if len(files) > 100:
                          f.write(f"\n... and {len(files) - 100} more files in `tasukeru_confidence_report.json`.\n")
                  f.write("\n## Policy\n\n")
                  f.write("- Auto branch creation: `false`\n")
                  f.write("- Auto PR creation: `false`\n")
                  f.write("- Auto commit: `false`\n")
                  f.write("- Auto push: `false`\n")
                  f.write("- Auto fix: `false`\n")
                  f.write("- Auto merge: `false`\n")
                  f.write("- Human decision required: `true`\n")

          def write_outputs(entries: list[dict[str, Any]], state: dict[str, Any], metadata: dict[str, Any]) -> None:
              counts = Counter(entry["decision"] for entry in entries)
              path_profile_counts = Counter(str(entry.get("path_profile", "unknown")) for entry in entries)
              autofix_policy_counts = Counter(
                  entry.get("autofix", {}).get("policy", "UNKNOWN") for entry in entries
              )
              safe_autofix_count = sum(
                  1 for entry in entries
                  if entry.get("autofix", {}).get("safe_autofix_candidate")
              )
              confidence_payload = build_confidence_report_payload(entries, state, metadata)
              write_confidence_report(confidence_payload)
              payload = {
                  "schema_version": "1.0",
                  "tool": "tasukeru_hitl_decision_support",
                  "counts": dict(counts),
                  "path_profile_counts": dict(path_profile_counts),
                  "metadata": metadata,
                  "confidence": {
                      "total": confidence_payload["total"],
                      "file_count": len(confidence_payload["files"]),
                      "report_artifacts": [
                          "tasukeru_confidence_report.md",
                          "tasukeru_confidence_report.json",
                      ],
                  },
                  "documentation_review": {
                      "count": sum(1 for entry in entries if entry.get("source") == "Documentation Review"),
                      "critical_count": sum(
                          1 for entry in entries
                          if entry.get("source") == "Documentation Review"
                          and entry.get("decision") == "HITL_REQUIRED"
                      ),
                  },
                  "autofix_policy": {
                      "safe_autofix_candidates": safe_autofix_count,
                      "auto_merge_allowed": False,
                      "policy_counts": dict(autofix_policy_counts),
                      "rule": (
                          "SAFE_AUTOFIX_CANDIDATE is decision-support metadata only. "
                          "No file is automatically modified. Auto-merge is prohibited."
                      ),
                  },
                  "entries": entries,
              }
              write_json(hitl_json_path, payload)
              write_json(notification_state_path, state)

              priority = [entry for entry in entries if entry["decision"] in {"HITL_REQUIRED", "FIX_RECOMMENDED"}]
              review_entries = [entry for entry in entries if entry["decision"] == "REVIEW_RECOMMENDED"]
              noise_entries = [entry for entry in entries if entry["decision"] == "NOISE_CANDIDATE"]
              info_entries = [entry for entry in entries if entry["decision"] == "INFO_ONLY"]

              with hitl_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru HITL review\n\n")
                  f.write("This report is advisory-only. It does not create branches, create PRs, commit, push, auto-fix, or auto-merge.\n\n")
                  f.write("## Counts\n\n")
                  for level in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY"):
                      f.write(f"- {level}: {counts.get(level, 0)}\n")
                  total_confidence = confidence_payload["total"]
                  f.write("\n## Confidence\n\n")
                  f.write(f"- Total confidence: `{total_confidence['total_confidence_score']}` / `1.0`\n")
                  f.write(f"- Level: `{total_confidence['total_confidence_level']}`\n")
                  f.write("- Meaning: confidence in Tasukeru's classification/suggestion evidence; not a safety guarantee.\n")
                  f.write("\n## Path profiles\n\n")
                  for profile, count in sorted(path_profile_counts.items()):
                      f.write(f"- {profile}: {count}\n")
                  f.write("\n## Automation policy\n\n")
                  f.write("- Auto branch creation: false\n")
                  f.write("- Auto PR creation: false\n")
                  f.write("- Auto commit: false\n")
                  f.write("- Auto push: false\n")
                  f.write("- Auto fix: false\n")
                  f.write("- Auto merge: false\n")
                  f.write("- Human decision required: true\n\n")
                  f.write("## Autofix policy\n\n")
                  f.write(f"- SAFE_AUTOFIX_CANDIDATE: {safe_autofix_count}\n")
                  f.write("- Auto fix: false\n")
                  f.write("- Auto merge: false\n")
                  f.write("- Rule: safe candidates are manual decision-support metadata only.\n\n")
                  f.write("## Priority review queue\n\n")
                  if priority:
                      for entry in priority[:80]:
                          write_entry_bullet(f, entry)
                  else:
                      f.write("No HITL_REQUIRED or FIX_RECOMMENDED entries.\n")
                  f.write("\n")

              with summary_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru advisory summary\n\n")
                  f.write(f"- Ruff findings: {metadata['ruff_count']}\n")
                  f.write(f"- Bandit findings: {metadata['bandit_count']}\n")
                  f.write(f"- pip-audit vulnerabilities: {metadata['pip_count']}\n")
                  f.write(f"- Tasukeru logic review findings: {metadata['logic_count']}\n")
                  f.write(f"- Documentation review findings: {metadata['documentation_count']}\n\n")
                  f.write("## HITL decision support\n\n")
                  for level in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY"):
                      f.write(f"- {level}: {counts.get(level, 0)}\n")
                  total_confidence = confidence_payload["total"]
                  f.write("\n## Confidence score\n\n")
                  f.write(f"- Total confidence: `{total_confidence['total_confidence_score']}` / `1.0`\n")
                  f.write(f"- Level: `{total_confidence['total_confidence_level']}`\n")
                  f.write("- Scope: confidence in Tasukeru's evidence/classification/suggestion, not permission to auto-apply changes.\n")
                  f.write("- Report: `tasukeru_confidence_report.md` / `tasukeru_confidence_report.json`\n")
                  f.write("\n## Path profile counts\n\n")
                  for profile, count in sorted(path_profile_counts.items()):
                      f.write(f"- {profile}: {count}\n")
                  f.write("\n## Critical notifications\n\n")
                  f.write(f"- New critical incidents: {state['new_critical_incident_count']}\n")
                  f.write(f"- Suppressed duplicate critical incidents: {state['suppressed_duplicate_critical_incident_count']}\n\n")
                  f.write("## Automation policy\n\n")
                  f.write("- Auto branch creation: false\n")
                  f.write("- Auto PR creation: false\n")
                  f.write("- Auto commit: false\n")
                  f.write("- Auto push: false\n")
                  f.write("- Auto fix: false\n")
                  f.write("- Auto merge: false\n\n")
                  f.write("## Security output policy\n\n")
                  f.write("- Public PR comments must not include exploit payloads.\n")
                  f.write("- Public PR comments must not include attack steps.\n")
                  f.write("- Public PR comments must focus on detection and safe remediation.\n\n")
                  f.write("## Detailed artifacts\n\n")
                  f.write("- `tasukeru_hitl_review.md`\n")
                  f.write("- `tasukeru_hitl_review.json`\n")
                  f.write("- `tasukeru_advisory_summary.md`\n")
                  f.write("- `tasukeru_notification_state.json`\n")
                  f.write("- `tasukeru_pr_comment.md`\n")
                  f.write("- `tasukeru_dradm_draft.md`\n")
                  f.write("- `tasukeru_dradm_draft.json`\n")
                  f.write("- `tasukeru_confidence_report.md`\n")
                  f.write("- `tasukeru_confidence_report.json`\n")
                  f.write("- `tasukeru_readme_refinement_draft.md`\n")
                  f.write("- `tasukeru_readme_refinement_draft.json`\n")
                  f.write("- `tasukeru_announcement.md`\n")
                  f.write("- `tasukeru_announcement.json`\n")
                  f.write("- `tasukeru_arl.jsonl`\n")
                  f.write("- `tasukeru_arl_verify.json`\n")
                  f.write("- `tasukeru_logs/`\n\n")

                  def collapsible(title: str, data: list[dict[str, Any]], limit: int = 30) -> None:
                      f.write(f"<details>\n<summary>{title}</summary>\n\n")
                      if not data:
                          f.write("No entries.\n\n")
                      else:
                          for entry in data[:limit]:
                              write_entry_bullet(f, entry)
                          if len(data) > limit:
                              f.write(f"\n... and {len(data) - limit} more entries in `tasukeru_hitl_review.json`.\n")
                          f.write("\n")
                      f.write("</details>\n\n")

                  collapsible(f"REVIEW_RECOMMENDED details ({len(review_entries)})", review_entries, 50)
                  collapsible(f"NOISE_CANDIDATE sample ({len(noise_entries)})", noise_entries, 20)
                  collapsible(f"INFO_ONLY details ({len(info_entries)})", info_entries, 20)

              with pr_comment_path.open("w", encoding="utf-8") as f:
                  critical = [entry for entry in entries if entry["decision"] == "HITL_REQUIRED"]
                  if not critical:
                      counts_for_comment = Counter(entry["decision"] for entry in entries)
                      f.write("<!-- tasukeru-analysis:announcement-summary -->\n\n")
                      f.write("## Tasukeru Announcement\n\n")
                      f.write("### Summary: `NO HITL_REQUIRED`\n\n")
                      f.write("No `HITL_REQUIRED` findings were detected in this run.\n\n")
                      f.write("このrunでは `HITL_REQUIRED` はありません。\n")
                      f.write("このコメントは advisory status summary であり、安全保証ではありません。\n\n")
                      f.write("### Quick check\n\n")
                      f.write("- HITL_REQUIRED: `0`\n")
                      f.write(f"- FIX_RECOMMENDED: `{counts_for_comment.get('FIX_RECOMMENDED', 0)}`\n")
                      f.write(f"- REVIEW_RECOMMENDED: `{counts_for_comment.get('REVIEW_RECOMMENDED', 0)}`\n")
                      f.write("- Auto branch creation: `false`\n")
                      f.write("- Auto PR creation: `false`\n")
                      f.write("- Auto commit: `false`\n")
                      f.write("- Auto push: `false`\n")
                      f.write("- Auto fix: `false`\n")
                      f.write("- Auto merge: `false`\n\n")
                      f.write("<details>\n<summary>Details</summary>\n\n")
                      f.write("See `tasukeru_announcement.md`, `tasukeru_arl_verify.json`, and `tasukeru_hitl_review.md` in the workflow artifacts for the full advisory summary.\n\n")
                      f.write("This comment is advisory-only. It does not replace human review and does not authorize automatic fixes or merges.\n\n")
                      f.write("</details>\n")
                      return
                  f.write("<!-- tasukeru-analysis:critical-summary -->\n\n")
                  f.write("## Tasukeru Analysis: 重大確認が必要です\n\n")
                  f.write("### 判定\n\nHITL_REQUIRED\n\n")
                  f.write("### 何が変わったか\n\n")
                  f.write("このPRで、Tasukeru Analysis が重大確認対象の変更を検出しました。\n")
                  f.write("HITLロジック、安全不変条件、主要ワークフロー、または公開文書方針に影響する可能性があります。\n\n")
                  f.write("### 対象\n\n")
                  for entry in critical[:10]:
                      f.write(f"- `{entry.get('incident_id') or ''}` `{entry['reason_code']}` `{entry['file']}`")
                      if entry.get("line"):
                          f.write(f":{entry['line']}")
                      f.write(f" — `{entry['fingerprint_hash']}`\n")
                  if len(critical) > 10:
                      f.write(f"- ... and {len(critical) - 10} more critical entries in artifacts.\n")
                  f.write("\n### 推奨対応\n\n")
                  f.write("- 該当箇所を人間が確認してください。\n")
                  f.write("- 自動修正・自動PR作成・自動マージは行わないでください。\n")
                  f.write("- 公開PRコメントには攻撃手段・悪用手順・payload は載せません。\n")
                  f.write("- 詳細は `tasukeru_hitl_review.md` と `tasukeru_hitl_review.json` を確認してください。\n\n")
                  f.write("### 自動化制限\n\n")
                  f.write("- Auto branch creation: `false`\n")
                  f.write("- Auto PR creation: `false`\n")
                  f.write("- Auto commit: `false`\n")
                  f.write("- Auto push: `false`\n")
                  f.write("- Auto fix: `false`\n")
                  f.write("- Auto merge: `false`\n")
                  f.write("- Human decision required: `true`\n\n")
                  f.write("<details>\n<summary>English details</summary>\n\n")
                  f.write("## Tasukeru Analysis: Critical review required\n\n")
                  f.write("This PR introduced one or more changes that may affect HITL logic, safety invariants, the review workflow, or public documentation policy.\n\n")
                  f.write("Please review the affected files manually. Do not auto-fix, auto-create a PR, or auto-merge this change.\n\n")
                  f.write("Security details are intentionally limited to defensive review and safe remediation guidance. Exploit payloads, attack steps, and offensive reproduction instructions must not be included in public PR comments.\n\n")
                  f.write("</details>\n")

              github_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
              if github_summary:
                  with Path(github_summary).open("a", encoding="utf-8") as out:
                      out.write(summary_path.read_text(encoding="utf-8"))

          ruff_raw = read_json(log_dir / "ruff.json", [])
          bandit_raw = read_json(log_dir / "bandit.json", {})
          pip_raw = read_json(log_dir / "pip-audit.json", {})

          ruff_entries = entries_from_ruff(ruff_raw)
          bandit_entries = entries_from_bandit(bandit_raw)
          pip_entries = entries_from_pip_audit(pip_raw)
          logic_entries, _logic_result = run_logic_review()
          doc_entries, _doc_result = run_documentation_review()
          self_definition_entries, self_definition_result = run_self_definition_guard()

          all_entries = (
              ruff_entries
              + bandit_entries
              + pip_entries
              + logic_entries
              + doc_entries
              + self_definition_entries
          )
          all_entries = assign_incidents(all_entries)
          all_entries = attach_confidence_scores(all_entries)
          notification_state = build_notification_state(all_entries)

          metadata = {
              "ruff_count": len(ruff_entries),
              "bandit_count": len(bandit_entries),
              "pip_count": len(pip_entries),
              "logic_count": len(logic_entries),
              "documentation_count": len(doc_entries),
              "self_definition_count": len(self_definition_entries),
              "self_definition": self_definition_result,
              "ruff_exit": read_exit("ruff.exit"),
              "bandit_exit": read_exit("bandit.exit"),
              "pip_audit_exit": read_exit("pip-audit.exit"),
          }

          write_outputs(all_entries, notification_state, metadata)
          generate_dradm_draft_artifacts(all_entries, notification_state, metadata)
          generate_readme_refinement_artifacts(metadata)
          arl_verification = generate_tasukeru_arl_hash_chain(all_entries, notification_state, metadata)
          announcement = generate_tasukeru_announcement(all_entries, notification_state, metadata, arl_verification)

          print("# Tasukeru advisory summary")
          print(f"Ruff findings: {metadata['ruff_count']}")
          print(f"Bandit findings: {metadata['bandit_count']}")
          print(f"pip-audit vulnerabilities: {metadata['pip_count']}")
          print(f"Tasukeru logic review findings: {metadata['logic_count']}")
          print(f"Documentation review findings: {metadata['documentation_count']}")
          print(f"Self-definition guard findings: {metadata['self_definition_count']}")
          print("")
          counts = Counter(entry["decision"] for entry in all_entries)
          print("HITL decision support")
          for level in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY"):
              print(f"{level}: {counts.get(level, 0)}")
          print("")
          confidence_report = read_json(confidence_json_path, {})
          total_confidence = (confidence_report.get("total") or {}) if isinstance(confidence_report, dict) else {}
          if total_confidence:
              print("Confidence")
              print(f"Total confidence: {total_confidence.get('total_confidence_score')} / 1.0")
              print(f"Confidence level: {total_confidence.get('total_confidence_level')}")
              print("")
          print("ARL hash chain")
          print(f"ARL verified: {arl_verification.get('verified')}")
          print(f"ARL rows: {arl_verification.get('row_count')}")
          print("")
          print("Self-definition guard")
          print(f"Self-definition verified: {self_definition_result.get('verified')}")
          print(f"Self-definition hash: {self_definition_result.get('definition_sha256')}")
          print(f"Self-definition chain head: {self_definition_result.get('chain_head')}")
          print("")
          print("Tasukeru announcement")
          print(f"Announcement generated: {announcement.get('generated')}")
          print(f"Announcement mode: {announcement.get('mode')}")
          print("")
          print("Automation policy")
          print("Auto branch creation: false")
          print("Auto PR creation: false")
          print("Auto commit: false")
          print("Auto push: false")
          print("Auto fix: false")
          print("Auto merge: false")
          PY

      - name: Upload advisory logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tasukeru-advisory-logs
          path: |
            tasukeru_logs/
            tasukeru_advisory_summary.md
            tasukeru_hitl_review.md
            tasukeru_hitl_review.json
            tasukeru_notification_state.json
            tasukeru_pr_comment.md
            tasukeru_dradm_draft.md
            tasukeru_dradm_draft.json
            tasukeru_confidence_report.md
            tasukeru_confidence_report.json
            tasukeru_readme_refinement_draft.md
            tasukeru_readme_refinement_draft.json
            tasukeru_announcement.md
            tasukeru_announcement.json
            tasukeru_self_definition_effective.json
            tasukeru_self_definition_chain.jsonl
            tasukeru_self_definition_verify.json
            tasukeru_arl.jsonl
            tasukeru_arl_verify.json
          if-no-files-found: ignore

      - name: Complete advisory phase
        if: always()
        run: |
          set -euo pipefail
          echo "Tasukeru advisory analysis completed."
          echo "No branch, PR, commit, push, auto-fix, or auto-merge was performed."

  post-critical-comment:
    name: post critical PR comment
    runs-on: ubuntu-latest
    needs: advisory-analysis
    if: always() && github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        shell: bash

    steps:
      - name: Download advisory logs
        uses: actions/download-artifact@v6
        with:
          name: tasukeru-advisory-logs
          path: .

      - name: Post Tasukeru PR announcement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POST_SCRIPT: |
            from __future__ import annotations
            
            import json
            import os
            import urllib.error
            import urllib.request
            from pathlib import Path
            from typing import Any
            
            state_path = Path("tasukeru_notification_state.json")
            critical_comment_path = Path("tasukeru_pr_comment.md")
            hitl_json_path = Path("tasukeru_hitl_review.json")
            announcement_md_path = Path("tasukeru_announcement.md")
            announcement_json_path = Path("tasukeru_announcement.json")
            
            if not state_path.exists():
                print("Tasukeru notification state not found; skipping comment.")
                raise SystemExit(0)
            
            event_path = os.environ.get("GITHUB_EVENT_PATH", "")
            token = os.environ.get("GITHUB_TOKEN", "")
            repo_name = os.environ.get("GITHUB_REPOSITORY", "")
            
            if not event_path or not token or not repo_name:
                print("Missing GitHub event/token/repository context; skipping comment.")
                raise SystemExit(0)
            
            event = json.loads(Path(event_path).read_text(encoding="utf-8"))
            pull_request = event.get("pull_request")
            if not isinstance(pull_request, dict):
                print("No pull_request context; skipping comment.")
                raise SystemExit(0)
            
            pr_number = pull_request.get("number")
            owner, repo = repo_name.split("/", 1)
            state = json.loads(state_path.read_text(encoding="utf-8"))
            
            def read_json_file(path: Path, default: Any) -> Any:
                try:
                    if not path.exists():
                        return default
                    text = path.read_text(encoding="utf-8").strip()
                    if not text:
                        return default
                    return json.loads(text)
                except Exception:
                    return default
            
            announcement = read_json_file(announcement_json_path, {})
            hitl_review = read_json_file(hitl_json_path, {})
            announcement_md = (
                announcement_md_path.read_text(encoding="utf-8")
                if announcement_md_path.exists()
                else "Tasukeru announcement artifact was not generated."
            )
            critical_comment = (
                critical_comment_path.read_text(encoding="utf-8")
                if critical_comment_path.exists()
                else ""
            )
            
            review_queue = announcement.get("review_queue", {}) if isinstance(announcement, dict) else {}
            arl = announcement.get("arl", {}) if isinstance(announcement, dict) else {}
            confidence = announcement.get("confidence", {}) if isinstance(announcement, dict) else {}
            policy = announcement.get("policy", {}) if isinstance(announcement, dict) else {}
            drafts = announcement.get("drafts", {}) if isinstance(announcement, dict) else {}
            look_first = announcement.get("look_first", []) if isinstance(announcement, dict) else []
            recommended_next_actions = (
                announcement.get("recommended_next_actions", [])
                if isinstance(announcement, dict)
                else []
            )
            conclusion_ja = str(
                announcement.get("conclusion_ja")
                or "Tasukeru announcement summary is unavailable. Check workflow artifacts."
            )
            mode = str(announcement.get("mode") or "UNKNOWN")
            
            incidents = [
                incident for incident in state.get("incidents", [])
                if incident.get("notification_required")
            ]
            hitl_required = int(
                review_queue.get("hitl_required")
                if review_queue.get("hitl_required") is not None
                else state.get("critical_count", 0)
            )
            arl_verified = arl.get("verified")
            
            # Keep PR noise low and keep policy consistent:
            # comment only when human intervention is required, or when ARL verification failed.
            if hitl_required <= 0 and arl_verified is not False:
                print("No HITL_REQUIRED findings and ARL verification did not fail; skipping PR comment.")
                raise SystemExit(0)
            
            if hitl_required > 0:
                status_label = "REVIEW REQUIRED"
                headline = "HITL_REQUIRED was detected. Human review is required before merge."
            else:
                status_label = "ARL VERIFY FAILED"
                headline = "ARL verification failed. Check artifacts before using this summary for review."
            
            auto_policy_lines = [
                f"- Auto branch creation: `{policy.get('auto_branch_allowed', False)}`",
                f"- Auto PR creation: `{policy.get('auto_pr_creation_allowed', False)}`",
                f"- Auto commit: `{policy.get('auto_commit_allowed', False)}`",
                f"- Auto push: `{policy.get('auto_push_allowed', False)}`",
                f"- Auto fix: `{policy.get('autofix_allowed', False)}`",
                f"- Auto merge: `{policy.get('auto_merge_allowed', False)}`",
            ]
            
            def collect_hitl_entries(payload: Any) -> list[dict[str, Any]]:
                if not isinstance(payload, dict):
                    return []
                candidates: list[Any] = []
                for key in ("findings", "entries", "hitl_required", "items"):
                    value = payload.get(key)
                    if isinstance(value, list):
                        candidates.extend(value)
                # Some artifacts nest findings under review_queue or results.
                for key in ("review_queue", "results"):
                    value = payload.get(key)
                    if isinstance(value, dict):
                        nested = value.get("findings") or value.get("entries") or []
                        if isinstance(nested, list):
                            candidates.extend(nested)

                hitl: list[dict[str, Any]] = []
                for item in candidates:
                    if not isinstance(item, dict):
                        continue
                    decision = str(item.get("decision", item.get("level", "")))
                    if decision == "HITL_REQUIRED":
                        hitl.append(item)
                return hitl

            def sanitize_for_public_comment(value: Any, limit: int = 220) -> str:
                text = str(value or "").replace("\n", " ").strip()
                text = text.replace("`", "'")
                # Keep public comments detection-oriented. Detailed snippets stay in artifacts.
                for token in ("payload", "exploit", "attack steps", "exfiltrate"):
                    text = text.replace(token, "[redacted-detail]")
                if len(text) > limit:
                    return text[: limit - 1] + "…"
                return text

            hitl_entries = collect_hitl_entries(hitl_review)
            folded_hitl_lines: list[str] = []
            if hitl_required > 0:
                folded_hitl_lines.extend(
                    [
                        "Sanitized HITL summary. Full details are in `tasukeru_hitl_review.md` and `tasukeru_hitl_review.json`.",
                        "",
                    ]
                )
                if hitl_entries:
                    for index, entry in enumerate(hitl_entries[:10], start=1):
                        location = str(entry.get("file") or "repository")
                        if entry.get("line"):
                            location = f"{location}:{entry.get('line')}"
                        folded_hitl_lines.extend(
                            [
                                f"{index}. `{sanitize_for_public_comment(entry.get('reason_code'))}`",
                                f"   - Source: `{sanitize_for_public_comment(entry.get('source'))}`",
                                f"   - Location: `{sanitize_for_public_comment(location)}`",
                                f"   - Gate: `{sanitize_for_public_comment(entry.get('gate_decision', ''))}`",
                                f"   - Message: {sanitize_for_public_comment(entry.get('message'))}",
                            ]
                        )
                    if len(hitl_entries) > 10:
                        folded_hitl_lines.append(f"- ... {len(hitl_entries) - 10} more HITL entries are kept in artifacts.")
                else:
                    for index, incident in enumerate(incidents[:10], start=1):
                        folded_hitl_lines.append(
                            f"{index}. `{sanitize_for_public_comment(incident.get('reason_code'))}` "
                            f"at `{sanitize_for_public_comment(incident.get('representative_file'))}`"
                        )
                    if not incidents:
                        folded_hitl_lines.append("- HITL entries were not expanded; open the artifacts listed below.")

            artifact_names = [
                "tasukeru_advisory_summary.md",
                "tasukeru_hitl_review.md",
                "tasukeru_hitl_review.json",
                "tasukeru_arl_verify.json",
                "tasukeru_dradm_draft.md",
                "tasukeru_readme_refinement_draft.md",
                "tasukeru_confidence_report.md",
            ]
            detail_lines = [
                "Full details are kept in workflow artifacts, not expanded in this PR comment.",
                "",
                "Review artifacts:",
                *[f"- `{name}`" for name in artifact_names],
            ]
            if recommended_next_actions:
                detail_lines.extend(["", "Recommended next checks:"])
                detail_lines.extend(f"- {item}" for item in recommended_next_actions)
            if look_first:
                detail_lines.extend(["", "Look first:"])
                detail_lines.extend(f"- `{item}`" for item in look_first)
            if hitl_required > 0 and critical_comment and "tasukeru-analysis:no-critical" not in critical_comment:
                detail_lines.extend(
                    [
                        "",
                        "Critical finding details were generated in `tasukeru_pr_comment.md`.",
                        "Open the artifact before taking action.",
                    ]
                )
            
            marker = "<!-- tasukeru-analysis:critical-summary -->"
            comment_body = "\n".join(
                [
                    marker,
                    "",
                    "## Tasukeru Announcement",
                    "",
                    f"### Summary: `{status_label}`",
                    "",
                    headline,
                    "",
                    conclusion_ja,
                    "",
                    "### Quick check",
                    "",
                    f"- Mode: `{mode}`",
                    f"- HITL_REQUIRED: `{hitl_required}`",
                    f"- ARL verified: `{arl_verified}`",
                    f"- ARL rows: `{arl.get('row_count')}`",
                    f"- ARL error count: `{arl.get('error_count')}`",
                    f"- Self-definition verified: `{(announcement.get('self_definition') or {}).get('verified') if isinstance(announcement, dict) else None}`",
                    f"- Confidence: `{confidence.get('score')}` / `1.0` ({confidence.get('level')})",
                    f"- FIX_RECOMMENDED: `{review_queue.get('fix_recommended')}`",
                    f"- REVIEW_RECOMMENDED: `{review_queue.get('review_recommended')}`",
                    f"- README refinement: `{drafts.get('readme_refinement_status')}`",
                    "",
                    "### Automation policy",
                    "",
                    *auto_policy_lines,
                    "",
                    *(
                        [
                            "<details>",
                            f"<summary>Sanitized HITL_REQUIRED summary ({hitl_required})</summary>",
                            "",
                            "\n".join(folded_hitl_lines),
                            "",
                            "</details>",
                            "",
                        ]
                        if hitl_required > 0
                        else []
                    ),
                    "<details>",
                    "<summary>Review artifacts and next checks</summary>",
                    "",
                    "\n".join(detail_lines),
                    "",
                    "</details>",
                    "",
                    "This comment is an advisory status summary only. It is not a safety guarantee and does not replace human review.",
                ]
            )
            
            api_root = f"https://api.github.com/repos/{owner}/{repo}/issues/{pr_number}/comments?per_page=100"
            
            def request_json(method: str, url: str, payload: dict[str, Any] | None = None) -> Any:
                data = json.dumps(payload).encode("utf-8") if payload is not None else None
                req = urllib.request.Request(
                    url,
                    data=data,
                    method=method,
                    headers={
                        "Authorization": f"Bearer {token}",
                        "Accept": "application/vnd.github+json",
                        "X-GitHub-Api-Version": "2022-11-28",
                        "Content-Type": "application/json",
                    },
                )
                with urllib.request.urlopen(req, timeout=20) as response:
                    body = response.read().decode("utf-8")
                    return json.loads(body) if body else None
            
            try:
                comments: list[dict[str, Any]] = []
                next_url: str | None = api_root

                while next_url:
                    req = urllib.request.Request(
                        next_url,
                        method="GET",
                        headers={
                            "Authorization": f"Bearer {token}",
                            "Accept": "application/vnd.github+json",
                            "X-GitHub-Api-Version": "2022-11-28",
                        },
                    )
                    with urllib.request.urlopen(req, timeout=20) as response:
                        page = json.loads(response.read().decode("utf-8"))
                        if isinstance(page, list):
                            comments.extend(page)

                        link = response.headers.get("Link", "")
                        next_url = None
                        for part in link.split(","):
                            if 'rel="next"' in part:
                                next_url = part[part.find("<") + 1 : part.find(">")]
                                break
            except urllib.error.HTTPError as err:
                print(f"Could not list PR comments: HTTP {err.code}. Skipping comment.")
                raise SystemExit(0)
            
            markers = (
                "<!-- tasukeru-analysis:announcement-summary -->",
                "<!-- tasukeru-analysis:critical-summary -->",
                "<!-- tasukeru-analysis:no-critical -->",
            )
            existing = None
            for comment in comments:
                if not isinstance(comment, dict):
                    continue
                body = str(comment.get("body", ""))
                user = comment.get("user") or {}
                if user.get("login") == "github-actions[bot]" and any(marker in body for marker in markers):
                    existing = comment
                    break
            
            try:
                if existing and existing.get("url"):
                    request_json("PATCH", str(existing["url"]), {"body": comment_body})
                    print("Updated existing Tasukeru PR announcement comment.")
                else:
                    request_json("POST", api_root, {"body": comment_body})
                    print("Posted Tasukeru PR announcement comment.")
            except urllib.error.HTTPError as err:
                print(f"Could not post/update PR comment: HTTP {err.code}. Skipping comment.")
                raise SystemExit(0)
        run: |
          set -euo pipefail
          python -c "$POST_SCRIPT"

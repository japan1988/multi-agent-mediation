name: Tasukeru Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/tasukeru-analysis.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  MAX_ZIP_MB: "10"
  MAX_FILES: "2000"
  INCLUDE_PATTERNS: |
    *.py
    *.ipynb
    pyproject.toml
    requirements*.txt

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          license-check: false

  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        shell: bash
        run: |
          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          elif [[ -f pyproject.toml ]]; then
            python -m pip install .
          else
            echo "No requirements.txt or pyproject.toml found. Skipping project dependency install."
          fi

      - name: Install QA / security tools
        run: |
          python -m pip install ruff pytest bandit[toml]

      - name: Ruff
        run: ruff check .

      - name: Bandit
        run: |
          bandit -r . \
            -x .git,.venv,venv,__pycache__,.pytest_cache,build,dist

      - name: Pytest
        shell: bash
        run: |
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -q
          else
            echo "No pytest test files found. Skipping pytest."
          fi

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Audit requirements.txt
        if: hashFiles('requirements.txt') != ''
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

      - name: Audit pyproject project
        if: hashFiles('requirements.txt') == '' && hashFiles('pyproject.toml') != ''
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .

      - name: No dependency manifest found
        if: hashFiles('requirements.txt') == '' && hashFiles('pyproject.toml') == ''
        run: echo "No requirements.txt or pyproject.toml found. Skipping pip-audit."

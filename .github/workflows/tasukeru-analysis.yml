name: Tasukeru Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".bandit"
      - ".github/workflows/tasukeru-analysis.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]" reviewdog

      - name: Run Bandit (JSON for PR comments)
        run: |
          bandit -r . \
            -f json \
            -o bandit.json \
            -x .git,.venv,venv,__pycache__,build,dist,node_modules,.pytest_cache,.mypy_cache \
            || true

      - name: Run Bandit (SARIF for Security tab)
        run: |
          bandit -r . \
            -f sarif \
            -o bandit.sarif \
            -x .git,.venv,venv,__pycache__,build,dist,node_modules,.pytest_cache,.mypy_cache \
            || true

      - name: Convert Bandit JSON to reviewdog format
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def suggest(test_id: str) -> str:
              tips = {
                  "B101": "assert を実行時検証に使わず、明示的な条件分岐と例外送出に置き換える。",
                  "B110": "except: pass を避け、捕捉する例外を絞り、ログまたは再送出を行う。",
                  "B303": "MD5/SHA1 などの弱いハッシュを避け、SHA-256 以上を使う。",
                  "B324": "用途に応じて安全なハッシュ/乱数APIへ切り替える。",
                  "B602": "subprocess で shell=True を避け、引数リスト + shell=False にする。",
                  "B603": "subprocess の引数を固定化・検証し、ユーザー入力を直接渡さない。",
                  "B605": "シェル起動関数の使用を避け、直接コマンドを実行する。",
                  "B607": "実行ファイルを絶対パス指定するか、許可済みコマンドに限定する。",
                  "B608": "SQL は文字列連結ではなくプレースホルダ付きクエリを使う。",
                  "B701": "jinja2 は autoescape を有効化し、HTML出力を明示的にエスケープする。",
              }
              return tips.get(test_id, "入力検証・権限最小化・安全な標準APIへの置換を検討する。")

          src = Path("bandit.json")
          if not src.exists():
              Path("bandit.rdjson").write_text(
                  json.dumps({"source": {"name": "bandit"}, "diagnostics": []}, ensure_ascii=False),
                  encoding="utf-8",
              )
              raise SystemExit(0)

          data = json.loads(src.read_text(encoding="utf-8"))
          level_map = {"LOW": "INFO", "MEDIUM": "WARNING", "HIGH": "ERROR"}
          diagnostics = []

          for item in data.get("results", []):
              path = item.get("filename") or "."
              line = int(item.get("line_number") or 1)
              severity = (item.get("issue_severity") or "LOW").upper()
              confidence = (item.get("issue_confidence") or "LOW").upper()
              test_id = item.get("test_id") or "BANDIT"
              issue = (item.get("issue_text") or "").strip()
              more_info = (item.get("more_info") or "").strip()

              message = (
                  f"[{test_id}] {issue}\n"
                  f"severity={severity} / confidence={confidence}\n"
                  f"修正案: {suggest(test_id)}"
              )
              if more_info:
                  message += f"\n参考: {more_info}"

              diagnostics.append(
                  {
                      "message": message,
                      "severity": level_map.get(severity, "WARNING"),
                      "code": {"value": test_id},
                      "location": {
                          "path": path,
                          "range": {
                              "start": {"line": line, "column": 1},
                          },
                      },
                  }
              )

          Path("bandit.rdjson").write_text(
              json.dumps({"source": {"name": "bandit"}, "diagnostics": diagnostics}, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

      - name: Leave PR review comments
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog \
            -f=rdjson \
            -name="bandit" \
            -reporter=github-pr-review \
            -filter-mode=diff_context \
            < bandit.rdjson \
            || true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Add summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from collections import Counter
          from pathlib import Path

          path = Path("bandit.json")
          if not path.exists():
              print("## Tasukeru security summary")
              print("")
              print("Bandit の結果ファイルがありません。")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))
          results = data.get("results", [])
          sev = Counter((r.get("issue_severity") or "LOW").upper() for r in results)
          by_file = Counter((r.get("filename") or "?") for r in results)

          print("## Tasukeru security summary")
          print("")
          print(f"- findings: {len(results)}")
          print(f"- high: {sev['HIGH']}")
          print(f"- medium: {sev['MEDIUM']}")
          print(f"- low: {sev['LOW']}")
          print("")

          if results:
              print("### Top files")
              for filename, count in by_file.most_common(10):
                  print(f"- `{filename}`: {count}")
          else:
              print("問題は見つかりませんでした。")
          PY
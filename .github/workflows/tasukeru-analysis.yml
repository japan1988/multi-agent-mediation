name: Tasukeru Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/tasukeru-analysis.yml"
      - "README*.md"
      - "LICENSE*"
      - "docs/**"
      - "log_codebook*.json"
      - "**/*.jsonl"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  advisory-analysis:
    name: advisory analysis
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
            pylock.*.toml

      - name: Install dependencies and advisory tools
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install "ruff==0.6.9" "bandit[toml]" "pip-audit"

      - name: Run advisory tools
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs

          set +e

          ruff check . --output-format=json > tasukeru_logs/ruff.json 2> tasukeru_logs/ruff.stderr
          ruff_exit=$?

          bandit -r . \
            -x "./.git,./.venv,./venv,./archive" \
            -f json \
            -o tasukeru_logs/bandit.json \
            > tasukeru_logs/bandit.stdout \
            2> tasukeru_logs/bandit.stderr
          bandit_exit=$?

          if [ -f requirements-dev.txt ]; then
            python -m pip_audit \
              -r requirements-dev.txt \
              -f json \
              -o tasukeru_logs/pip-audit.json \
              > tasukeru_logs/pip-audit.stdout \
              2> tasukeru_logs/pip-audit.stderr
          elif [ -f requirements.txt ]; then
            python -m pip_audit \
              -r requirements.txt \
              -f json \
              -o tasukeru_logs/pip-audit.json \
              > tasukeru_logs/pip-audit.stdout \
              2> tasukeru_logs/pip-audit.stderr
          else
            python -m pip_audit \
              -f json \
              -o tasukeru_logs/pip-audit.json \
              > tasukeru_logs/pip-audit.stdout \
              2> tasukeru_logs/pip-audit.stderr
          fi
          pip_exit=$?

          set -e

          echo "${ruff_exit}" > tasukeru_logs/ruff.exit
          echo "${bandit_exit}" > tasukeru_logs/bandit.exit
          echo "${pip_exit}" > tasukeru_logs/pip-audit.exit

          echo "ruff_exit=${ruff_exit}"
          echo "bandit_exit=${bandit_exit}"
          echo "pip_exit=${pip_exit}"

      - name: Run Tasukeru logic review
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs

          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          from collections import Counter
          from pathlib import Path
          from typing import Any

          repo = Path(".")
          log_dir = Path("tasukeru_logs")
          out_json = log_dir / "logic-review.json"
          out_md = log_dir / "logic-review.md"

          skip_dirs = {
              ".git",
              ".venv",
              "venv",
              "__pycache__",
              ".pytest_cache",
              ".mypy_cache",
              ".ruff_cache",
              "archive",
          }

          text_exts = {
              ".py",
              ".yml",
              ".yaml",
              ".md",
              ".txt",
              ".json",
              ".jsonl",
              ".toml",
              ".cfg",
              ".ini",
              ".rst",
          }

          allowed_decisions = {"RUN", "PAUSE_FOR_HITL", "STOPPED"}
          ethics_or_acc_layers = {"ethics_gate", "acc_gate"}
          rfl_layers = {"relativity_gate", "rfl", "RFL"}
          required_arl_keys = {
              "run_id",
              "layer",
              "decision",
              "sealed",
              "overrideable",
              "final_decider",
              "reason_code",
          }

          findings: list[dict[str, Any]] = []

          def add(
              severity: str,
              category: str,
              code: str,
              message: str,
              path: str = "",
              line: int | None = None,
              detail: dict[str, Any] | None = None,
          ) -> None:
              findings.append(
                  {
                      "severity": severity,
                      "category": category,
                      "code": code,
                      "message": message,
                      "path": path,
                      "line": line,
                      "detail": detail or {},
                  }
              )

          def is_skipped(path: Path) -> bool:
              return any(part in skip_dirs for part in path.parts)

          def is_text_candidate(path: Path) -> bool:
              if is_skipped(path):
                  return False
              if not path.is_file():
                  return False
              if path.stat().st_size > 2_000_000:
                  return False
              return path.suffix in text_exts or path.name in {"LICENSE", "NOTICE"}

          def read_text(path: Path) -> str:
              try:
                  return path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  return path.read_text(encoding="utf-8", errors="replace")
              except Exception:
                  return ""

          def iter_text_files() -> list[Path]:
              return sorted(path for path in repo.rglob("*") if is_text_candidate(path))

          def check_conflict_markers(path: Path, text: str) -> None:
              for idx, line in enumerate(text.splitlines(), start=1):
                  stripped = line.strip()
                  if (
                      stripped.startswith("<<<<<<< ")
                      or stripped == "======="
                      or stripped.startswith(">>>>>>> ")
                  ):
                      add(
                          "CRITICAL_ADVISORY",
                          "repo_integrity",
                          "MERGE_CONFLICT_MARKER",
                          "Unresolved merge conflict marker was found.",
                          str(path),
                          idx,
                      )

          def check_license_consistency() -> None:
              license_path = repo / "LICENSE"
              policy_path = repo / "LICENSE_POLICY.md"
              readme_path = repo / "README.md"
              readme_ja_path = repo / "README.ja.md"

              license_text = read_text(license_path) if license_path.exists() else ""
              policy_text = read_text(policy_path) if policy_path.exists() else ""
              readme_text = read_text(readme_path) if readme_path.exists() else ""
              readme_ja_text = read_text(readme_ja_path) if readme_ja_path.exists() else ""

              if license_text:
                  has_apache = "Apache License" in license_text
                  has_cc = "Creative Commons" in license_text or "CC BY-NC-SA" in license_text
                  if has_apache and has_cc:
                      add(
                          "WARN",
                          "license",
                          "LICENSE_MIXED_APACHE_AND_CC",
                          "LICENSE appears to contain both Apache and Creative Commons terms. Prefer Apache text in LICENSE and split policy in LICENSE_POLICY.md.",
                          "LICENSE",
                      )

              combined_readme = f"{readme_text}\n{readme_ja_text}"
              if "CC BY-NC-SA" in combined_readme and "LICENSE_POLICY.md" not in combined_readme:
                  add(
                      "WARN",
                      "license",
                      "README_CC_WITHOUT_POLICY_LINK",
                      "README mentions CC BY-NC-SA but does not link to LICENSE_POLICY.md.",
                      "README.md / README.ja.md",
                  )

              if policy_path.exists():
                  if "Apache License" not in policy_text or "CC BY-NC-SA" not in policy_text:
                      add(
                          "WARN",
                          "license",
                          "LICENSE_POLICY_INCOMPLETE_SPLIT_LICENSE",
                          "LICENSE_POLICY.md should mention both Apache License 2.0 and CC BY-NC-SA 4.0.",
                          "LICENSE_POLICY.md",
                      )

          def collect_reason_codes(obj: Any, found: set[str]) -> None:
              if isinstance(obj, dict):
                  for key, value in obj.items():
                      if key == "reason_code" and isinstance(value, str):
                          found.add(value)
                      elif key in {"reason_codes", "allowed_reason_codes"} and isinstance(value, list):
                          for item in value:
                              if isinstance(item, str):
                                  found.add(item)
                              elif isinstance(item, dict):
                                  code = item.get("code") or item.get("reason_code")
                                  if isinstance(code, str):
                                      found.add(code)
                      elif isinstance(value, str) and re.fullmatch(r"[A-Z][A-Z0-9_]+", value):
                          if value.startswith(
                              (
                                  "REL_",
                                  "EVIDENCE_",
                                  "TRUST_",
                                  "DRAFT_",
                                  "FINALIZE_",
                                  "ACC_",
                                  "ETHICS_",
                              )
                          ):
                              found.add(value)
                      else:
                          collect_reason_codes(value, found)
              elif isinstance(obj, list):
                  for item in obj:
                      collect_reason_codes(item, found)

          def check_codebook() -> None:
              candidates = sorted(repo.glob("log_codebook*.json"))
              required = {
                  "REL_BOUNDARY_UNSTABLE",
                  "REL_REF_MISSING",
                  "REL_SYMMETRY_BREAK",
              }

              if not candidates:
                  add(
                      "WARN",
                      "codebook",
                      "CODEBOOK_NOT_FOUND",
                      "No log_codebook*.json file was found.",
                  )
                  return

              for path in candidates:
                  try:
                      data = json.loads(read_text(path))
                  except Exception as err:
                      add(
                          "WARN",
                          "codebook",
                          "CODEBOOK_JSON_PARSE_FAILED",
                          "Codebook JSON could not be parsed.",
                          str(path),
                          detail={"error": repr(err)},
                      )
                      continue

                  found: set[str] = set()
                  collect_reason_codes(data, found)
                  raw_text = read_text(path)
                  found.update(code for code in required if code in raw_text)

                  missing = sorted(required - found)
                  if missing:
                      add(
                          "CRITICAL_ADVISORY",
                          "codebook",
                          "REQUIRED_REASON_CODES_MISSING",
                          "Required RFL reason codes are missing from the codebook.",
                          str(path),
                          detail={"missing": missing},
                      )

          def parse_bool(value: Any) -> bool:
              if isinstance(value, bool):
                  return value
              if isinstance(value, str):
                  return value.strip().lower() in {"true", "1", "yes", "y"}
              return bool(value)

          def check_arl_row(path: Path, line_no: int, row: dict[str, Any]) -> None:
              missing = sorted(key for key in required_arl_keys if key not in row)
              if missing:
                  add(
                      "WARN",
                      "arl",
                      "ARL_REQUIRED_KEYS_MISSING",
                      "ARL row is missing required keys.",
                      str(path),
                      line_no,
                      detail={"missing": missing},
                  )

              layer = str(row.get("layer", ""))
              decision = str(row.get("decision", ""))
              final_decider = str(row.get("final_decider", ""))
              reason_code = str(row.get("reason_code", ""))
              sealed = parse_bool(row.get("sealed", False))
              overrideable = parse_bool(row.get("overrideable", False))

              if decision and decision not in allowed_decisions:
                  add(
                      "WARN",
                      "arl",
                      "ARL_UNKNOWN_DECISION",
                      "ARL decision is outside the canonical decision set.",
                      str(path),
                      line_no,
                      detail={"decision": decision},
                  )

              if not reason_code:
                  add(
                      "WARN",
                      "arl",
                      "ARL_REASON_CODE_EMPTY",
                      "ARL reason_code is empty.",
                      str(path),
                      line_no,
                  )

              if sealed and layer not in ethics_or_acc_layers:
                  add(
                      "CRITICAL_ADVISORY",
                      "arl_invariant",
                      "SEALED_LAYER_NOT_ETHICS_OR_ACC",
                      "sealed=true is only allowed for ethics_gate or acc_gate.",
                      str(path),
                      line_no,
                      detail={"layer": layer},
                  )

              if layer in rfl_layers and sealed:
                  add(
                      "CRITICAL_ADVISORY",
                      "arl_invariant",
                      "RFL_MUST_NOT_BE_SEALED",
                      "RFL / relativity_gate rows must never be sealed.",
                      str(path),
                      line_no,
                  )

              if sealed and overrideable:
                  add(
                      "CRITICAL_ADVISORY",
                      "arl_invariant",
                      "SEALED_MUST_NOT_BE_OVERRIDEABLE",
                      "sealed=true implies overrideable=false.",
                      str(path),
                      line_no,
                  )

              if sealed and final_decider != "SYSTEM":
                  add(
                      "CRITICAL_ADVISORY",
                      "arl_invariant",
                      "SEALED_FINAL_DECIDER_MUST_BE_SYSTEM",
                      "sealed=true implies final_decider=SYSTEM.",
                      str(path),
                      line_no,
                      detail={"final_decider": final_decider},
                  )

              if decision == "PAUSE_FOR_HITL" and sealed:
                  add(
                      "CRITICAL_ADVISORY",
                      "arl_invariant",
                      "PAUSE_FOR_HITL_MUST_NOT_BE_SEALED",
                      "PAUSE_FOR_HITL must remain unsealed and overrideable.",
                      str(path),
                      line_no,
                  )

          def check_arl_jsonl_files() -> None:
              candidates = []
              for path in iter_text_files():
                  name = path.name.lower()
                  if path.suffix == ".jsonl" and (
                      "arl" in name or "audit" in name or "incident" in name
                  ):
                      candidates.append(path)

              for path in candidates:
                  with path.open("r", encoding="utf-8", errors="replace") as f:
                      for idx, line in enumerate(f, start=1):
                          if idx > 5000:
                              break
                          line = line.strip()
                          if not line:
                              continue
                          try:
                              obj = json.loads(line)
                          except Exception:
                              add(
                                  "WARN",
                                  "arl",
                                  "ARL_JSONL_PARSE_FAILED",
                                  "A JSONL row could not be parsed.",
                                  str(path),
                                  idx,
                              )
                              continue
                          if isinstance(obj, dict):
                              check_arl_row(path, idx, obj)

          def check_python_side_effect_patterns(path: Path, text: str) -> None:
              if path.suffix != ".py":
                  return

              lowered = text.lower()
              has_hitl_guard = (
                  "hitl" in lowered
                  or "pause_for_hitl" in lowered
                  or "approval" in lowered
              )

              patterns = [
                  ("EMAIL_SIDE_EFFECT", r"\b(smtplib|send_email|sendmail)\b"),
                  ("HTTP_MUTATION_SIDE_EFFECT", r"\brequests\.(post|put|patch|delete)\b"),
                  ("SUBPROCESS_SIDE_EFFECT", r"\bsubprocess\.(run|popen|call)\b"),
                  ("FILE_DELETE_SIDE_EFFECT", r"\b(os\.remove|os\.unlink|shutil\.rmtree)\b"),
                  ("DYNAMIC_EXECUTION", r"\b(eval|exec)\s*\("),
              ]

              for code, pattern in patterns:
                  match = re.search(pattern, text)
                  if match and not has_hitl_guard:
                      line_no = text[: match.start()].count("\n") + 1
                      add(
                          "WARN",
                          "side_effect",
                          code,
                          "Potential external side effect or risky dynamic execution without an obvious HITL guard in the same file.",
                          str(path),
                          line_no,
                      )

          def check_workflow_conflicts_and_hazards(path: Path, text: str) -> None:
              if path.suffix not in {".yml", ".yaml"}:
                  return
              if ".github/workflows" not in str(path):
                  return

              reviewdog_dynamic_setup = "reviewdog/action-setup" + "@v1"

              if reviewdog_dynamic_setup in text:
                  add(
                      "WARN",
                      "workflow",
                      "REVIEWDOG_DYNAMIC_SETUP_RISK",
                      f"{reviewdog_dynamic_setup} may fail on network or upstream tag resolution. Prefer avoiding it in non-critical advisory workflows.",
                      str(path),
                  )

          for file_path in iter_text_files():
              content = read_text(file_path)
              check_conflict_markers(file_path, content)
              check_python_side_effect_patterns(file_path, content)
              check_workflow_conflicts_and_hazards(file_path, content)

          check_license_consistency()
          check_codebook()
          check_arl_jsonl_files()

          severity_counts = Counter(str(item["severity"]) for item in findings)
          category_counts = Counter(str(item["category"]) for item in findings)

          result = {
              "schema_version": "1.0",
              "tool": "tasukeru_logic_review",
              "findings_count": len(findings),
              "severity_counts": dict(severity_counts),
              "category_counts": dict(category_counts),
              "findings": findings,
          }

          out_json.write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          with out_md.open("w", encoding="utf-8") as f:
              f.write("### Tasukeru logic review\n\n")
              f.write(f"- Findings: {len(findings)}\n")
              f.write(f"- Critical advisory: {severity_counts.get('CRITICAL_ADVISORY', 0)}\n")
              f.write(f"- Warning: {severity_counts.get('WARN', 0)}\n")
              f.write(f"- Info: {severity_counts.get('INFO', 0)}\n\n")

              if category_counts:
                  f.write("#### Categories\n\n")
                  for category, count in category_counts.most_common():
                      f.write(f"- `{category}`: {count}\n")
                  f.write("\n")

              if findings:
                  f.write("#### First findings\n\n")
                  for item in findings[:30]:
                      location = item["path"] or "repository"
                      if item.get("line"):
                          location = f"{location}:{item['line']}"
                      f.write(
                          f"- **{item['severity']}** `{item['code']}` "
                          f"at `{location}` — {item['message']}\n"
                      )
                  if len(findings) > 30:
                      f.write(f"- ... and {len(findings) - 30} more\n")
                  f.write("\n")
              else:
                  f.write("No Tasukeru logic review findings.\n\n")

          print(out_md.read_text(encoding="utf-8"))
          PY

      - name: Generate advisory summary
        if: always()
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from collections import Counter
          from pathlib import Path
          from typing import Any

          log_dir = Path("tasukeru_logs")
          summary_path = Path.cwd() / "tasukeru_advisory_summary.md"
          hitl_md_path = Path.cwd() / "tasukeru_hitl_review.md"
          hitl_json_path = Path.cwd() / "tasukeru_hitl_review.json"

          def read_text(path: Path, default: str = "") -> str:
              try:
                  return path.read_text(encoding="utf-8")
              except Exception:
                  return default

          def read_exit(name: str) -> int:
              text = read_text(log_dir / name, "0").strip()
              try:
                  return int(text)
              except ValueError:
                  return 0

          def read_json(path: Path, default: Any) -> Any:
              try:
                  text = path.read_text(encoding="utf-8").strip()
                  if not text:
                      return default
                  return json.loads(text)
              except Exception:
                  return default

          def normalize_ruff_items(raw: Any) -> list[dict[str, Any]]:
              if isinstance(raw, list):
                  return [item for item in raw if isinstance(item, dict)]
              if isinstance(raw, dict):
                  for key in ("diagnostics", "results", "items"):
                      value = raw.get(key)
                      if isinstance(value, list):
                          return [item for item in value if isinstance(item, dict)]
              return []

          def normalize_bandit_items(raw: Any) -> list[dict[str, Any]]:
              if isinstance(raw, dict):
                  value = raw.get("results")
                  if isinstance(value, list):
                      return [item for item in value if isinstance(item, dict)]
              if isinstance(raw, list):
                  return [item for item in raw if isinstance(item, dict)]
              return []

          def normalize_pip_vulns(raw: Any) -> list[dict[str, Any]]:
              vulns: list[dict[str, Any]] = []

              if isinstance(raw, dict):
                  dependencies = raw.get("dependencies")
                  if isinstance(dependencies, list):
                      for dep in dependencies:
                          if not isinstance(dep, dict):
                              continue
                          name = str(dep.get("name", "?"))
                          version = str(dep.get("version", "?"))
                          for vuln in dep.get("vulns", []) or []:
                              if not isinstance(vuln, dict):
                                  continue
                              vulns.append(
                                  {
                                      "name": name,
                                      "version": version,
                                      "id": str(vuln.get("id", "?")),
                                      "fix_versions": vuln.get("fix_versions", []) or [],
                                  }
                              )

                  direct = raw.get("vulnerabilities")
                  if isinstance(direct, list):
                      for item in direct:
                          if not isinstance(item, dict):
                              continue
                          vulns.append(
                              {
                                  "name": str(item.get("name", item.get("package", "?"))),
                                  "version": str(item.get("version", "?")),
                                  "id": str(item.get("id", "?")),
                                  "fix_versions": item.get("fix_versions", []) or [],
                              }
                          )

              elif isinstance(raw, list):
                  for item in raw:
                      if not isinstance(item, dict):
                          continue
                      vulns.append(
                          {
                              "name": str(item.get("name", item.get("package", "?"))),
                              "version": str(item.get("version", "?")),
                              "id": str(item.get("id", "?")),
                              "fix_versions": item.get("fix_versions", []) or [],
                          }
                      )

              return vulns

          def md_text(value: Any) -> str:
              return str(value).replace("\n", " ").strip()

          def md_cell(value: Any) -> str:
              text = str(value)
              text = text.replace("\n", "<br>")
              text = text.replace("|", "\\|")
              return text

          def is_test_path(path: str) -> bool:
              normalized = path.replace("\\", "/")
              parts = normalized.split("/")
              return (
                  "tests" in parts
                  or normalized.startswith("test_")
                  or "/test_" in normalized
                  or normalized.endswith("_test.py")
              )

          def is_simulation_path(path: str) -> bool:
              lowered = path.lower()
              return any(
                  token in lowered
                  for token in (
                      "sim",
                      "simulation",
                      "simulator",
                      "demo",
                      "stress",
                      "benchmark",
                      "evaluation",
                      "orchestrator",
                      "mediation",
                      "rank_transition",
                      "pattern_steering",
                      "kage",
                  )
              )

          def is_historical_version_path(path: str) -> bool:
              normalized = path.replace("\\", "/").lower()
              name = normalized.rsplit("/", 1)[-1]
              return any(
                  marker in name
                  for marker in (
                      "_v1",
                      "_v2",
                      "_v3",
                      "_v4",
                      "_v5_0",
                      "v1_",
                      "v2_",
                      "v3_",
                      "v4_",
                      "fixed_regex",
                      "full..",
                  )
              )

          def classify_ruff(item: dict[str, Any]) -> dict[str, str]:
              code = str(item.get("code", "RUFF"))
              filename = str(item.get("filename", "?"))

              if code in {"F401", "F841"}:
                  return {
                      "level": "FIX_RECOMMENDED",
                      "reason": "Unused imports or variables usually reduce clarity and are safe to remove.",
                      "suggestion": "Remove the unused symbol, or keep it only if it is part of a deliberate public re-export with an explicit comment.",
                  }

              if code == "E402":
                  return {
                      "level": "FIX_RECOMMENDED",
                      "reason": "Module-level imports should usually stay at the top of the file for predictable import behavior.",
                      "suggestion": "Move the import to the top of the file, or isolate path/bootstrap logic in a small helper before imports.",
                  }

              if is_test_path(filename):
                  return {
                      "level": "REVIEW_RECOMMENDED",
                      "reason": "This Ruff finding is in a test file. It may be harmless but should still be reviewed.",
                      "suggestion": "Fix if simple. If intentional, add a short comment or a narrow noqa suppression.",
                  }

              return {
                  "level": "FIX_RECOMMENDED",
                  "reason": "Ruff findings usually indicate style, import, or correctness issues that are cheap to fix.",
                  "suggestion": "Apply Ruff's suggested fix when available, or edit the referenced line directly.",
              }

          def classify_bandit(item: dict[str, Any]) -> dict[str, str]:
              code = str(item.get("test_id", "BANDIT"))
              filename = str(item.get("filename", "?"))
              issue = str(item.get("issue_text", ""))

              if code == "B101":
                  if is_test_path(filename):
                      return {
                          "level": "NOISE_CANDIDATE",
                          "reason": "Bandit flags assert usage because Python can remove assert statements under optimization. In pytest tests, assert is normally expected.",
                          "suggestion": "Usually keep as-is in tests. If noise is too high, add a narrow '# nosec B101' with a reason. In runtime code, replace assert with explicit error handling.",
                      }

                  if is_historical_version_path(filename):
                      return {
                          "level": "REVIEW_RECOMMENDED",
                          "reason": "This assert appears in a historical or versioned simulator file. It may be preserved for reproducibility, but runtime safety semantics should still be reviewed.",
                          "suggestion": "If the file is historical, keep as-is or add a narrow '# nosec B101' with a reason. If it is still an active entry point, replace assert with explicit error handling.",
                      }

                  return {
                      "level": "FIX_RECOMMENDED",
                      "reason": "Runtime assert statements can disappear when Python is run with optimization flags.",
                      "suggestion": "Replace 'assert condition' with explicit validation, such as 'if not condition: raise ValueError(...)'.",
                  }

              if code == "B311":
                  if is_test_path(filename):
                      return {
                          "level": "NOISE_CANDIDATE",
                          "reason": "Standard pseudo-random generators are usually acceptable for tests when they are not used for security-sensitive behavior.",
                          "suggestion": "Keep as-is for deterministic tests. If used for secrets, tokens, authentication, or authorization, replace with 'secrets'.",
                      }

                  if is_simulation_path(filename):
                      return {
                          "level": "REVIEW_RECOMMENDED",
                          "reason": "Standard pseudo-random generators are often acceptable for deterministic simulations, but not for security-sensitive behavior.",
                          "suggestion": "If simulation-only, document that the randomness is non-cryptographic. If used for secrets, tokens, authentication, or authorization, replace with 'secrets' or 'random.SystemRandom'.",
                      }

                  return {
                      "level": "FIX_RECOMMENDED",
                      "reason": "Standard pseudo-random generators are not appropriate for security-sensitive values.",
                      "suggestion": "Use the 'secrets' module for security-sensitive randomness. Keep 'random' only for deterministic simulation or test data.",
                  }

              if code == "B404":
                  return {
                      "level": "REVIEW_RECOMMENDED",
                      "reason": "Importing subprocess is not itself an external side effect, but files that import subprocess should be reviewed for actual execution sites.",
                      "suggestion": "Check whether the file actually calls subprocess. If execution occurs, require HITL approval near the call site and prefer argument lists over shell=True.",
                  }

              if code in {"B602", "B603", "B604", "B605", "B606", "B607"}:
                  return {
                      "level": "HITL_REQUIRED",
                      "reason": "Subprocess execution can produce external side effects or command-injection risk depending on inputs.",
                      "suggestion": "Require an explicit HITL approval flag before execution. Prefer argument lists over shell=True and validate inputs.",
                  }

              if "subprocess" in issue.lower():
                  return {
                      "level": "REVIEW_RECOMMENDED",
                      "reason": "The finding appears to involve subprocess. Review whether it is only an import warning or an actual execution path.",
                      "suggestion": "If this is only an import warning, treat as review-only. If execution occurs, add a HITL approval gate near the call site.",
                  }

              if str(item.get("issue_severity", "")).upper() == "MEDIUM":
                  return {
                      "level": "REVIEW_RECOMMENDED",
                      "reason": "Bandit marked this as medium severity. Context determines whether it is actionable or noise.",
                      "suggestion": "Review the referenced file and either fix it, add a narrow suppression with a reason, or document why it is acceptable in this simulator.",
                  }

              return {
                  "level": "NOISE_CANDIDATE" if is_test_path(filename) else "REVIEW_RECOMMENDED",
                  "reason": "Bandit LOW findings are often advisory, especially in tests and research simulations.",
                  "suggestion": "Review context. Suppress only with a narrow '# nosec' and a reason, otherwise fix if simple.",
              }

          def classify_pip_vuln(row: dict[str, Any]) -> dict[str, str]:
              fixes = row.get("fix_versions", []) or []
              fix_text = ", ".join(str(item) for item in fixes) if fixes else "the fixed version recommended by pip-audit"
              return {
                  "level": "FIX_RECOMMENDED",
                  "reason": "Dependency vulnerabilities should normally be fixed by upgrading the affected package.",
                  "suggestion": f"Update the dependency constraint to {fix_text}, then rerun pip-audit and tests.",
              }

          def classify_logic(item: dict[str, Any]) -> dict[str, str]:
              severity = str(item.get("severity", ""))
              category = str(item.get("category", ""))
              code = str(item.get("code", ""))

              if severity == "CRITICAL_ADVISORY":
                  return {
                      "level": "HITL_REQUIRED",
                      "reason": "The custom logic review marked this as a critical advisory.",
                      "suggestion": "Do not merge until a human reviews the finding and either fixes it or records an explicit rationale.",
                  }

              if category == "side_effect":
                  return {
                      "level": "HITL_REQUIRED",
                      "reason": "The file appears to contain an external side effect or risky execution pattern without an obvious HITL guard.",
                      "suggestion": "Add an explicit HITL approval flag or PAUSE_FOR_HITL path before the side effect. Include the affected file, operation, and reason_code.",
                  }

              if category == "license":
                  return {
                      "level": "FIX_RECOMMENDED",
                      "reason": "License wording inconsistencies can confuse reuse conditions.",
                      "suggestion": "Keep Apache-2.0 text in LICENSE, put split-license details in LICENSE_POLICY.md, and link that policy from README files.",
                  }

              if category == "workflow":
                  return {
                      "level": "REVIEW_RECOMMENDED",
                      "reason": "Workflow warnings can be environmental or supply-chain related.",
                      "suggestion": "Review whether the workflow dependency is necessary. Prefer pinned or first-party actions where possible.",
                  }

              if code.startswith("ARL_") or "SEALED" in code or "RFL" in code:
                  return {
                      "level": "HITL_REQUIRED",
                      "reason": "The finding touches orchestration invariants or audit-row semantics.",
                      "suggestion": "Review the ARL row or codebook entry. Preserve invariants: RFL must not be sealed; sealed rows must be SYSTEM-decided and non-overrideable.",
                  }

              return {
                  "level": "REVIEW_RECOMMENDED",
                  "reason": "The custom logic review found a repository-specific advisory.",
                  "suggestion": "Review the location and either fix it, document it, or leave it as accepted advisory noise.",
              }

          def add_hitl_entry(
              entries: list[dict[str, Any]],
              *,
              source: str,
              level: str,
              file: str,
              line: Any,
              code: str,
              message: str,
              reason: str,
              suggestion: str,
          ) -> None:
              entries.append(
                  {
                      "source": source,
                      "level": level,
                      "file": file,
                      "line": line,
                      "code": code,
                      "message": message,
                      "reason": reason,
                      "suggestion": suggestion,
                  }
              )

          def level_sort_key(entry: dict[str, Any]) -> tuple[int, str, str]:
              order = {
                  "HITL_REQUIRED": 0,
                  "FIX_RECOMMENDED": 1,
                  "REVIEW_RECOMMENDED": 2,
                  "NOISE_CANDIDATE": 3,
                  "INFO_ONLY": 4,
              }
              return (
                  order.get(str(entry.get("level", "")), 9),
                  str(entry.get("file", "")),
                  str(entry.get("line", "")),
              )

          def write_entry_bullet(f: Any, entry: dict[str, Any]) -> None:
              location = f"{entry['file']}:{entry['line']}"
              f.write(
                  f"- `{entry['level']}` / {entry['source']} / "
                  f"`{entry['code']}` at `{location}`\n"
              )
              f.write(f"  - Issue: {md_text(entry['message'])}\n")
              f.write(f"  - Suggested action: {md_text(entry['suggestion'])}\n")

          def write_compact_step_summary(
              path: Path,
              *,
              ruff_count: int,
              bandit_advisory_count: int,
              pip_count: int,
              logic_count: int,
              logic_critical: int,
              hitl_counts: Counter[str],
              hitl_entries: list[dict[str, Any]],
          ) -> None:
              priority = [
                  entry
                  for entry in hitl_entries
                  if entry["level"] in {"HITL_REQUIRED", "FIX_RECOMMENDED"}
              ]

              with path.open("a", encoding="utf-8") as out:
                  out.write("# Tasukeru advisory summary\n\n")
                  out.write(f"- Ruff findings: {ruff_count}\n")
                  out.write(f"- Bandit LOW/MEDIUM findings: {bandit_advisory_count}\n")
                  out.write(f"- pip-audit vulnerabilities: {pip_count}\n")
                  out.write(f"- Tasukeru logic review findings: {logic_count}\n")
                  out.write(f"- Tasukeru critical advisories: {logic_critical}\n\n")

                  out.write("## HITL decision support\n\n")
                  out.write("- HITL_REQUIRED: ")
                  out.write(f"{hitl_counts.get('HITL_REQUIRED', 0)}\n")
                  out.write("- FIX_RECOMMENDED: ")
                  out.write(f"{hitl_counts.get('FIX_RECOMMENDED', 0)}\n")
                  out.write("- REVIEW_RECOMMENDED: ")
                  out.write(f"{hitl_counts.get('REVIEW_RECOMMENDED', 0)}\n")
                  out.write("- NOISE_CANDIDATE: ")
                  out.write(f"{hitl_counts.get('NOISE_CANDIDATE', 0)}\n")
                  out.write("- INFO_ONLY: ")
                  out.write(f"{hitl_counts.get('INFO_ONLY', 0)}\n\n")

                  if priority:
                      out.write("## Priority review queue\n\n")
                      for entry in priority[:10]:
                          write_entry_bullet(out, entry)
                      if len(priority) > 10:
                          out.write(
                              f"\n... and {len(priority) - 10} more priority entries.\n"
                          )
                      out.write("\n")
                  else:
                      out.write("## Priority review queue\n\n")
                      out.write("No HITL_REQUIRED or FIX_RECOMMENDED entries.\n\n")

                  out.write("## Detailed artifacts\n\n")
                  out.write("- `tasukeru_advisory_summary.md`\n")
                  out.write("- `tasukeru_hitl_review.md`\n")
                  out.write("- `tasukeru_hitl_review.json`\n\n")
                  out.write(
                      "Detailed guidance is uploaded as workflow artifacts. "
                      "The GitHub step summary is intentionally compact to avoid "
                      "large table rendering issues.\n"
                  )

          ruff_exit = read_exit("ruff.exit")
          bandit_exit = read_exit("bandit.exit")
          pip_exit = read_exit("pip-audit.exit")

          ruff_items = normalize_ruff_items(read_json(log_dir / "ruff.json", []))
          bandit_items = normalize_bandit_items(read_json(log_dir / "bandit.json", {}))
          pip_vulns = normalize_pip_vulns(read_json(log_dir / "pip-audit.json", {}))
          logic_review = read_json(log_dir / "logic-review.json", {})

          bandit_advisory_results = [
              item
              for item in bandit_items
              if str(item.get("issue_severity", "")).upper() in {"LOW", "MEDIUM"}
          ]

          ruff_count = len(ruff_items)
          bandit_advisory_count = len(bandit_advisory_results)
          pip_count = len(pip_vulns)

          logic_findings = (
              logic_review.get("findings", [])
              if isinstance(logic_review, dict)
              else []
          )
          logic_count = len(logic_findings) if isinstance(logic_findings, list) else 0
          logic_severity_counts = (
              logic_review.get("severity_counts", {})
              if isinstance(logic_review, dict)
              else {}
          )
          logic_critical = (
              int(logic_severity_counts.get("CRITICAL_ADVISORY", 0))
              if isinstance(logic_severity_counts, dict)
              else 0
          )

          ruff_by_file = Counter(str(item.get("filename", "?")) for item in ruff_items)
          bandit_by_file = Counter(
              str(item.get("filename", "?")) for item in bandit_advisory_results
          )

          hitl_entries: list[dict[str, Any]] = []

          for item in ruff_items:
              cls = classify_ruff(item)
              loc = item.get("location") or {}
              add_hitl_entry(
                  hitl_entries,
                  source="Ruff",
                  level=cls["level"],
                  file=str(item.get("filename", "?")),
                  line=loc.get("row", 1),
                  code=str(item.get("code", "RUFF")),
                  message=str(item.get("message", "")),
                  reason=cls["reason"],
                  suggestion=cls["suggestion"],
              )

          for item in bandit_advisory_results:
              cls = classify_bandit(item)
              add_hitl_entry(
                  hitl_entries,
                  source="Bandit",
                  level=cls["level"],
                  file=str(item.get("filename", "?")),
                  line=item.get("line_number", 1),
                  code=str(item.get("test_id", "BANDIT")),
                  message=str(item.get("issue_text", "")),
                  reason=cls["reason"],
                  suggestion=cls["suggestion"],
              )

          for row in pip_vulns:
              cls = classify_pip_vuln(row)
              add_hitl_entry(
                  hitl_entries,
                  source="pip-audit",
                  level=cls["level"],
                  file=str(row.get("name", "?")),
                  line="-",
                  code=str(row.get("id", "PIP_AUDIT")),
                  message=f"{row.get('name', '?')}=={row.get('version', '?')}",
                  reason=cls["reason"],
                  suggestion=cls["suggestion"],
              )

          if isinstance(logic_findings, list):
              for item in logic_findings:
                  if not isinstance(item, dict):
                      continue
                  cls = classify_logic(item)
                  add_hitl_entry(
                      hitl_entries,
                      source="Tasukeru logic review",
                      level=cls["level"],
                      file=str(item.get("path", "repository") or "repository"),
                      line=item.get("line") or "-",
                      code=str(item.get("code", "LOGIC_REVIEW")),
                      message=str(item.get("message", "")),
                      reason=cls["reason"],
                      suggestion=cls["suggestion"],
                  )

          hitl_entries = sorted(hitl_entries, key=level_sort_key)
          hitl_counts = Counter(str(item["level"]) for item in hitl_entries)

          hitl_payload = {
              "schema_version": "1.0",
              "tool": "tasukeru_hitl_decision_support",
              "counts": dict(hitl_counts),
              "entries": hitl_entries,
          }

          hitl_json_path.write_text(
              json.dumps(hitl_payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          with hitl_md_path.open("w", encoding="utf-8") as f:
              f.write("# Tasukeru HITL decision support\n\n")
              f.write(
                  "This report separates likely noise from findings that should be "
                  "reviewed or fixed by a human maintainer.\n\n"
              )
              f.write("## Levels\n\n")
              f.write("- `HITL_REQUIRED`: human review is recommended before merge.\n")
              f.write("- `FIX_RECOMMENDED`: a concrete fix is likely appropriate.\n")
              f.write("- `REVIEW_RECOMMENDED`: review the context before deciding.\n")
              f.write("- `NOISE_CANDIDATE`: likely acceptable in tests, demos, or research simulations.\n")
              f.write("- `INFO_ONLY`: informational finding.\n\n")

              f.write("## Counts\n\n")
              for level in (
                  "HITL_REQUIRED",
                  "FIX_RECOMMENDED",
                  "REVIEW_RECOMMENDED",
                  "NOISE_CANDIDATE",
                  "INFO_ONLY",
              ):
                  f.write(f"- {level}: {hitl_counts.get(level, 0)}\n")
              f.write("\n")

              if hitl_entries:
                  f.write("## Review queue\n\n")
                  for entry in hitl_entries[:80]:
                      write_entry_bullet(f, entry)
                  if len(hitl_entries) > 80:
                      f.write(
                          f"\nOnly the first 80 entries are shown. "
                          f"{len(hitl_entries) - 80} additional entries are in "
                          "`tasukeru_hitl_review.json`.\n"
                      )
                  f.write("\n")

                  f.write("## Detailed repair guidance\n\n")
                  for entry in hitl_entries[:25]:
                      f.write(
                          f"### {entry['level']}: {entry['code']} "
                          f"at `{entry['file']}:{entry['line']}`\n\n"
                      )
                      f.write(f"- Source: {entry['source']}\n")
                      f.write(f"- Issue: {entry['message']}\n")
                      f.write(f"- Reason: {entry['reason']}\n")
                      f.write(f"- Suggested fix: {entry['suggestion']}\n\n")
              else:
                  f.write("No HITL decision support entries were generated.\n\n")

          with summary_path.open("w", encoding="utf-8") as f:
              f.write("# Tasukeru advisory summary\n\n")
              f.write(f"- Ruff findings: {ruff_count}\n")
              f.write(f"- Bandit LOW/MEDIUM findings: {bandit_advisory_count}\n")
              f.write(f"- pip-audit vulnerabilities: {pip_count}\n")
              f.write(f"- Tasukeru logic review findings: {logic_count}\n")
              f.write(f"- Tasukeru critical advisories: {logic_critical}\n\n")

              f.write("## HITL decision support\n\n")
              f.write(
                  "This section separates likely noise from findings that should be "
                  "reviewed or fixed. It is advisory by default and does not fail "
                  "the workflow.\n\n"
              )
              f.write(f"- HITL_REQUIRED: {hitl_counts.get('HITL_REQUIRED', 0)}\n")
              f.write(f"- FIX_RECOMMENDED: {hitl_counts.get('FIX_RECOMMENDED', 0)}\n")
              f.write(f"- REVIEW_RECOMMENDED: {hitl_counts.get('REVIEW_RECOMMENDED', 0)}\n")
              f.write(f"- NOISE_CANDIDATE: {hitl_counts.get('NOISE_CANDIDATE', 0)}\n")
              f.write(f"- INFO_ONLY: {hitl_counts.get('INFO_ONLY', 0)}\n\n")
              f.write(
                  "Detailed repair guidance is available in "
                  "`tasukeru_hitl_review.md` and machine-readable entries are "
                  "available in `tasukeru_hitl_review.json`.\n\n"
              )

              if hitl_entries:
                  f.write("### Priority review queue preview\n\n")
                  priority = [
                      entry
                      for entry in hitl_entries
                      if entry["level"] in {"HITL_REQUIRED", "FIX_RECOMMENDED"}
                  ]
                  if priority:
                      for entry in priority[:20]:
                          write_entry_bullet(f, entry)
                      if len(priority) > 20:
                          f.write(f"\n... and {len(priority) - 20} more priority entries.\n")
                      f.write("\n")
                  else:
                      f.write("No HITL_REQUIRED or FIX_RECOMMENDED entries.\n\n")

              if ruff_count:
                  f.write("### Ruff: top files\n\n")
                  for filename, count in ruff_by_file.most_common(10):
                      f.write(f"- `{filename}`: {count}\n")
                  f.write("\n")

                  f.write("### Ruff: first findings\n\n")
                  for item in ruff_items[:20]:
                      loc = item.get("location") or {}
                      f.write(
                          f"- `{item.get('filename','?')}:{loc.get('row',1)}` "
                          f"[{item.get('code','RUFF')}] {item.get('message','')}\n"
                      )
                  f.write("\n")

              if bandit_advisory_count:
                  f.write("### Bandit LOW/MEDIUM: top files\n\n")
                  for filename, count in bandit_by_file.most_common(10):
                      f.write(f"- `{filename}`: {count}\n")
                  f.write("\n")

                  f.write("### Bandit LOW/MEDIUM: first findings\n\n")
                  for item in bandit_advisory_results[:20]:
                      f.write(
                          f"- `{item.get('filename','?')}:{item.get('line_number',1)}` "
                          f"[{item.get('test_id','BANDIT')}] {item.get('issue_text','')}\n"
                      )
                  f.write("\n")

              if pip_count:
                  f.write("### pip-audit findings\n\n")
                  for row in pip_vulns[:20]:
                      fixes = ", ".join(row["fix_versions"]) if row["fix_versions"] else "none"
                      f.write(
                          f"- `{row['name']}=={row['version']}`: `{row['id']}` / fix: {fixes}\n"
                      )
                  if len(pip_vulns) > 20:
                      f.write(f"- ... and {len(pip_vulns) - 20} more\n")
                  f.write("\n")

              logic_md = read_text(log_dir / "logic-review.md").strip()
              if logic_md:
                  f.write(logic_md)
                  f.write("\n")

              if ruff_exit > 1:
                  f.write("### Ruff execution error\n\n")
                  f.write(f"- exit code: {ruff_exit}\n\n")
                  stderr = read_text(log_dir / "ruff.stderr").strip()
                  if stderr:
                      f.write("```text\n")
                      f.write(stderr[:4000])
                      f.write("\n```\n\n")

              if bandit_exit > 1:
                  f.write("### Bandit execution error\n\n")
                  f.write(f"- exit code: {bandit_exit}\n\n")
                  stderr = read_text(log_dir / "bandit.stderr").strip()
                  if stderr:
                      f.write("```text\n")
                      f.write(stderr[:4000])
                      f.write("\n```\n\n")

              if pip_exit > 1 and pip_count == 0:
                  f.write("### pip-audit execution error\n\n")
                  f.write(f"- exit code: {pip_exit}\n\n")
                  stderr = read_text(log_dir / "pip-audit.stderr").strip()
                  if stderr:
                      f.write("```text\n")
                      f.write(stderr[:4000])
                      f.write("\n```\n\n")

          github_summary_value = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if github_summary_value:
              write_compact_step_summary(
                  Path(github_summary_value),
                  ruff_count=ruff_count,
                  bandit_advisory_count=bandit_advisory_count,
                  pip_count=pip_count,
                  logic_count=logic_count,
                  logic_critical=logic_critical,
                  hitl_counts=hitl_counts,
                  hitl_entries=hitl_entries,
              )

          print("# Tasukeru advisory summary")
          print(f"Ruff findings: {ruff_count}")
          print(f"Bandit LOW/MEDIUM findings: {bandit_advisory_count}")
          print(f"pip-audit vulnerabilities: {pip_count}")
          print(f"Tasukeru logic review findings: {logic_count}")
          print(f"Tasukeru critical advisories: {logic_critical}")
          print("")
          print("HITL decision support")
          print(f"HITL_REQUIRED: {hitl_counts.get('HITL_REQUIRED', 0)}")
          print(f"FIX_RECOMMENDED: {hitl_counts.get('FIX_RECOMMENDED', 0)}")
          print(f"REVIEW_RECOMMENDED: {hitl_counts.get('REVIEW_RECOMMENDED', 0)}")
          print(f"NOISE_CANDIDATE: {hitl_counts.get('NOISE_CANDIDATE', 0)}")
          print(f"INFO_ONLY: {hitl_counts.get('INFO_ONLY', 0)}")
          print("")
          print("Detailed artifacts written:")
          print("- tasukeru_advisory_summary.md")
          print("- tasukeru_hitl_review.md")
          print("- tasukeru_hitl_review.json")
          PY

      - name: Upload advisory logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tasukeru-advisory-logs
          path: |
            tasukeru_logs/
            tasukeru_advisory_summary.md
            tasukeru_hitl_review.md
            tasukeru_hitl_review.json
          if-no-files-found: ignore

      - name: Complete advisory phase
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "workflow syntax block is present"
          echo "Advisory analysis completed"

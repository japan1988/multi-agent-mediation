              return textwrap.dedent(
                  """
                  ### Advisory-only 方針

                  Tasukeru Analysis / 助ける君は **advisory-only のレビュー補助** です。

                  以下は行いません。

                  - ブランチの自動作成
                  - Pull Request の自動作成

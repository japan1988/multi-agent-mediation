      - name: Generate Tasukeru 4D inspection report
        if: always()
        env:
          TASUKERU_EVENT_NAME: ${{ github.event_name }}
          TASUKERU_EVENT_PATH: ${{ github.event_path }}
          TASUKERU_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from typing import Any

          def read_json(path: str, default: Any) -> Any:
              file_path = Path(path)
              if not file_path.exists():
                  return default
              try:
                  return json.loads(file_path.read_text(encoding="utf-8"))
              except Exception:
                  return default

          def read_lines(path: str) -> list[str]:
              file_path = Path(path)
              if not file_path.exists():
                  return []
              return [
                  line.strip()
                  for line in file_path.read_text(encoding="utf-8", errors="replace").splitlines()
                  if line.strip()
              ]

          def count_review_levels(data: Any) -> dict[str, int]:
              counts: dict[str, int] = {
                  "HITL_REQUIRED": 0,
                  "FIX_RECOMMENDED": 0,
                  "REVIEW_RECOMMENDED": 0,
                  "NOISE_CANDIDATE": 0,
                  "INFO_ONLY": 0,
              }

              def merge_top_level_counts(raw_counts: Any) -> bool:
                  if not isinstance(raw_counts, dict):
                      return False
                  found = False
                  for key in counts:
                      raw_value = raw_counts.get(key, 0)
                      try:
                          value = int(raw_value or 0)
                      except (TypeError, ValueError):
                          value = 0
                      counts[key] = value
                      found = found or value > 0
                  return found

              def entry_signature(entry: dict[str, Any]) -> str:
                  explicit = entry.get("fingerprint_hash") or entry.get("fingerprint")
                  if isinstance(explicit, str) and explicit:
                      return explicit
                  fields = (
                      entry.get("source"),
                      entry.get("rule_id") or entry.get("code") or entry.get("reason_code"),
                      entry.get("file"),
                      entry.get("line"),
                      entry.get("column"),
                      entry.get("message"),
                  )
                  return json.dumps(fields, ensure_ascii=False, sort_keys=True)

              def count_entries(entries: Any) -> bool:
                  if not isinstance(entries, list):
                      return False
                  seen: set[str] = set()
                  counted = False
                  for entry in entries:
                      if not isinstance(entry, dict):
                          continue
                      level = entry.get("review_level") or entry.get("level") or entry.get("decision")
                      if not isinstance(level, str) or level not in counts:
                          continue
                      signature = entry_signature(entry)
                      if signature in seen:
                          continue
                      seen.add(signature)
                      counts[level] += 1
                      counted = True
                  return counted

              if isinstance(data, dict):
                  # Prefer the canonical HITL review summary counts.
                  # Recursing over the whole object double-counts entries because
                  # each finding may contain both `decision` and `level` fields.
                  if merge_top_level_counts(data.get("counts")):
                      return counts
                  if count_entries(data.get("entries")):
                      return counts

              def walk(value: Any) -> None:
                  if isinstance(value, dict):
                      level = value.get("review_level") or value.get("level") or value.get("decision")
                      if isinstance(level, str) and level in counts:
                          counts[level] += 1
                          return
                      for child in value.values():
                          walk(child)
                  elif isinstance(value, list):
                      for child in value:
                          walk(child)

              walk(data)
              return counts

          event = read_json(os.environ.get("TASUKERU_EVENT_PATH", ""), {})
          pr = event.get("pull_request") or {}

          base = pr.get("base") or {}
          head = pr.get("head") or {}

          changed_files = read_lines("tasukeru_changed_files.txt") or read_lines("tasukeru_logs/changed-files.txt")
          changed_all = read_lines("tasukeru_logs/changed-files-all.txt") or changed_files

          hitl_review = read_json("tasukeru_hitl_review.json", {})
          confidence = read_json("tasukeru_confidence_report.json", {})
          dimension_dependency = read_json("tasukeru_dimension_dependency_report.json", {})
          result_consistency = read_json("tasukeru_result_consistency_report.json", {})
          pel = read_json("tasukeru_probabilistic_escalation_report.json", {})
          finding_validation = read_json("tasukeru_finding_validation_report.json", {})

          review_counts = count_review_levels(hitl_review)

          signals: list[dict[str, Any]] = []

          def add_signal(name: str, weight: int, reason: str, evidence: Any = None) -> None:
              signals.append(
                  {
                      "name": name,
                      "weight": weight,
                      "reason": reason,
                      "evidence": evidence,
                  }
              )

          if review_counts.get("HITL_REQUIRED", 0) > 0:
              add_signal(
                  "hitl_required_findings_present",
                  40,
                  "Current advisory findings include HITL_REQUIRED items.",
                  {"count": review_counts["HITL_REQUIRED"]},
              )

          if review_counts.get("FIX_RECOMMENDED", 0) > 0:
              add_signal(
                  "fix_recommended_findings_present",
                  20,
                  "Current advisory findings include FIX_RECOMMENDED items.",
                  {"count": review_counts["FIX_RECOMMENDED"]},
              )

          if review_counts.get("REVIEW_RECOMMENDED", 0) > 0:
              add_signal(
                  "review_recommended_findings_present",
                  12,
                  "Current advisory findings include REVIEW_RECOMMENDED items.",
                  {"count": review_counts["REVIEW_RECOMMENDED"]},
              )

          if any(path.startswith(".github/workflows/") for path in changed_all):
              add_signal(
                  "workflow_surface_changed",
                  15,
                  "Workflow files changed; automation boundaries should be reviewed.",
                  [path for path in changed_all if path.startswith(".github/workflows/")],
              )

          if any(path.endswith(".py") for path in changed_all):
              add_signal(
                  "python_surface_changed",
                  10,
                  "Python files changed; code-path and test coverage review may be relevant.",
                  [path for path in changed_all if path.endswith(".py")],
              )

          if any(path.startswith("tests/") for path in changed_all):
              add_signal(
                  "test_surface_changed",
                  5,
                  "Test files changed; expected behavior may have shifted.",
                  [path for path in changed_all if path.startswith("tests/")],
              )

          if any(path.startswith("README") or path.startswith("docs/") for path in changed_all):
              add_signal(
                  "documentation_surface_changed",
                  5,
                  "Documentation changed; public claims and safety scope should remain consistent.",
                  [path for path in changed_all if path.startswith("README") or path.startswith("docs/")],
              )

          def first_present_mapping(data: Any) -> dict[str, Any]:
              if isinstance(data, dict):
                  return data
              return {}

          result_consistency_map = first_present_mapping(result_consistency)
          dimension_dependency_map = first_present_mapping(dimension_dependency)
          dimension_dependency_counts = first_present_mapping(dimension_dependency_map.get("counts"))
          pel_map = first_present_mapping(pel)
          pel_counts = first_present_mapping(pel_map.get("counts"))
          pel_probability_summary = first_present_mapping(pel_map.get("probability_summary"))
          confidence_map = first_present_mapping(confidence)
          finding_validation_map = first_present_mapping(finding_validation)

          mismatch_count = int(result_consistency_map.get("mismatch_count") or 0)
          if mismatch_count:
              add_signal(
                  "result_consistency_mismatch",
                  25,
                  "Generated outputs and process records may disagree.",
                  {"mismatch_count": mismatch_count},
              )

          dependency_mismatch_count = int(dimension_dependency_counts.get("dependency_mismatch_count") or 0)
          if dependency_mismatch_count:
              add_signal(
                  "dimension_dependency_mismatch",
                  25,
                  "Finding, impact, dependency, or output classifications may disagree.",
                  {"dependency_mismatch_count": dependency_mismatch_count},
              )

          mandatory_hitl_count = int(pel_counts.get("mandatory_hitl_count") or 0)
          if mandatory_hitl_count:
              add_signal(
                  "pel_mandatory_hitl",
                  30,
                  "Probabilistic escalation layer reports mandatory HITL candidates.",
                  {"mandatory_hitl_count": mandatory_hitl_count},
              )

          low_confidence_count = int(confidence_map.get("low_confidence_count") or 0)
          if low_confidence_count:
              add_signal(
                  "low_confidence_classifications",
                  10,
                  "Classification confidence includes low-confidence items.",
                  {"low_confidence_count": low_confidence_count},
              )

          validation_issue_count = int(finding_validation_map.get("policy_violation_count") or finding_validation_map.get("issue_count") or 0)
          if validation_issue_count:
              add_signal(
                  "finding_validation_issues",
                  15,
                  "Finding validation reports issues that should be reviewed.",
                  {"issue_count": validation_issue_count},
              )

          risk_score = sum(int(signal["weight"]) for signal in signals)
          if risk_score >= 60:
              future_decision = "PAUSE_FOR_HITL"
              review_level = "HITL_REQUIRED"
          elif risk_score >= 25:
              future_decision = "DRAFT_REVIEW"
              review_level = "REVIEW_RECOMMENDED"
          elif risk_score > 0:
              future_decision = "INFO_ONLY_MONITOR"
              review_level = "INFO_ONLY"
          else:
              future_decision = "NO_ACTION_REQUIRED"
              review_level = "INFO_ONLY"

          report = {
              "schema_version": "tasukeru-4d-inspection-v0.1",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "mode": "report-only",
              "advisory_only": True,
              "auto_apply": False,
              "auto_fix": False,
              "auto_commit": False,
              "auto_push": False,
              "auto_merge": False,
              "external_side_effects": False,
              "past": {

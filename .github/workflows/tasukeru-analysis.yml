          def build_security_md_draft() -> str:
              return textwrap.dedent(
                  """
                  # Security Policy

                  ## Scope

                  This repository is a research and educational project for orchestration,
                  fail-closed behavior, HITL escalation, and defensive repository review.

                  Tasukeru Analysis is advisory-only. It does not create branches, create pull

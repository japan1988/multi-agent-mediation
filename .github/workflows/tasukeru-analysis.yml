              and verify["advisory_only"]
              and not verify["auto_apply"]
              and not verify["auto_fix"]
              and not verify["auto_commit"]
              and not verify["auto_push"]
              and not verify["auto_merge"]
              and not verify["external_side_effects"]
          )

          Path("tasukeru_4d_inspection_verify.json").write_text(
              json.dumps(verify, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          print(f"4D inspection decision: {future_decision}")
          print(f"4D inspection risk score: {risk_score}")
          print("Generated tasukeru_4d_inspection_report.md/json and verify json.")

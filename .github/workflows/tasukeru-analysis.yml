          def clamp_float(value: float, lower: float = 0.0, upper: float = 1.0) -> float:
              return max(lower, min(upper, value))


          def decision_risk_signal(decision: str) -> float:
              return {
                  "HITL_REQUIRED": 0.95,
                  "FIX_RECOMMENDED": 0.72,
                  "REVIEW_RECOMMENDED": 0.55,
                  "NOISE_CANDIDATE": 0.12,
                  "INFO_ONLY": 0.08,
              }.get(decision, 0.35)


          def text_risk_signal(*parts: Any) -> float:
              haystack = " ".join(str(part or "") for part in parts).lower()
              signal = 0.10
              high_terms = (
                  "external",
                  "subprocess",
                  "process",
                  "network",
                  "upload",
                  "push",
                  "merge",
                  "autofix",
                  "auto-fix",
                  "token",
                  "secret",
                  "credential",
                  "exploit",
                  "payload",
                  "bypass",
                  "delete",
                  "remove",
              )
              medium_terms = (
                  "checkpoint",
                  "resume",
                  "handoff",
                  "permission",
                  "license",
                  "policy",
                  "dependency",
                  "vulnerability",
                  "bandit",
                  "pip-audit",
              )
              if any(term in haystack for term in high_terms):
                  signal = max(signal, 0.76)
              if any(term in haystack for term in medium_terms):
                  signal = max(signal, 0.48)
              return signal


          def confidence_uncertainty_signal(entry: dict[str, Any]) -> float:
              confidence = entry.get("confidence")
              score: Any = None
              if isinstance(confidence, dict):
                  score = (
                      confidence.get("confidence_score")
                      or confidence.get("total_confidence_score")
                      or confidence.get("score")
                  )
              if score is None:
                  score = entry.get("confidence_score")
              try:
                  return round(1.0 - clamp_float(float(score)), 4)
              except (TypeError, ValueError):
                  return 0.50


          def build_pel_entry(
              entry: dict[str, Any],
              vaf_entry: dict[str, Any] | None,
              sis_entry: dict[str, Any] | None,
          ) -> dict[str, Any]:
              """Build one report-only probabilistic escalation estimate.

              PEL is not a future-prediction authority and never executes control
              actions. It estimates whether a finding should be escalated for
              HITL review based on current evidence and traceable signals.
              """
              decision = str(entry.get("decision", "INFO_ONLY"))
              reason_code = str(entry.get("reason_code", "UNKNOWN"))
              file_path = str(entry.get("file", ""))

              current_contract_deviation = decision_risk_signal(decision)
              planned_action_risk = text_risk_signal(
                  entry.get("source"),
                  reason_code,
                  entry.get("summary"),
                  entry.get("message"),
                  entry.get("suggested_action"),
                  entry.get("fix", {}),
                  file_path,
              )
              uncertainty = confidence_uncertainty_signal(entry)

              history_signal = 0.18
              path_profile = str(entry.get("path_profile", "unknown"))
              if path_profile in {"active", "current", "runtime"}:
                  history_signal = 0.42
              elif path_profile in {"historical", "archive", "versioned_historical"}:
                  history_signal = 0.08
              elif decision in {"HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED"}:
                  history_signal = 0.34

              dependency_impact = 0.20
              if isinstance(vaf_entry, dict):
                  structure_axis = vaf_entry.get("structure_axis", {}) if isinstance(vaf_entry.get("structure_axis"), dict) else {}
                  impact_axis = vaf_entry.get("impact_axis", {}) if isinstance(vaf_entry.get("impact_axis"), dict) else {}
                  if vaf_entry.get("fallback_required"):
                      dependency_impact = max(dependency_impact, 0.72)
                  dynamic_route = structure_axis.get("dynamic_gate_route", [])
                  if isinstance(dynamic_route, list) and len(dynamic_route) >= 3:
                      dependency_impact = max(dependency_impact, 0.55)
                  if str(impact_axis.get("rollback_cost", "")).lower() == "review_required":
                      dependency_impact = max(dependency_impact, 0.62)

              safety_impact = 0.10
              if isinstance(sis_entry, dict):
                  safety_impact = {
                      "HIGH": 0.88,
                      "MEDIUM": 0.62,
                      "LOW": 0.32,
                      "NONE": 0.08,
                  }.get(str(sis_entry.get("risk_level", "NONE")), 0.20)

              interaction_boost = 0.0
              if current_contract_deviation >= 0.70 and dependency_impact >= 0.55:
                  interaction_boost += 0.08
              if planned_action_risk >= 0.70 and uncertainty >= 0.45:
                  interaction_boost += 0.06
              if safety_impact >= 0.62 and dependency_impact >= 0.55:
                  interaction_boost += 0.06
              if decision == "HITL_REQUIRED":
                  interaction_boost += 0.08

              raw_score = (
                  0.24 * current_contract_deviation
                  + 0.18 * planned_action_risk
                  + 0.18 * dependency_impact
                  + 0.16 * uncertainty
                  + 0.14 * safety_impact
                  + 0.10 * history_signal
                  + interaction_boost
              )
              p_escalate = round(clamp_float(raw_score), 4)
              threshold = 0.80

              if decision == "HITL_REQUIRED":
                  pel_decision = "MANDATORY_HITL_ALREADY_REQUIRED"
              elif p_escalate >= threshold:
                  pel_decision = "PAUSE_FOR_HITL_CANDIDATE"
              elif p_escalate >= 0.50:
                  pel_decision = "REVIEW_RECOMMENDED_CANDIDATE"
              else:
                  pel_decision = "MONITOR_ONLY"

              return {
                  "fingerprint_hash": entry.get("fingerprint_hash"),
                  "source": entry.get("source"),
                  "file": file_path,
                  "line": entry.get("line"),
                  "existing_decision": decision,
                  "reason_code": reason_code,
                  "p_escalate": p_escalate,
                  "threshold": threshold,
                  "pel_decision": pel_decision,
                  "escalate_to": "USER_MAESTRO" if pel_decision in {"PAUSE_FOR_HITL_CANDIDATE", "MANDATORY_HITL_ALREADY_REQUIRED"} else None,
                  "auto_control_executed": False,
                  "changes_existing_decision": False,
                  "calculation_trace": {
                      "history_signal": round(history_signal, 4),
                      "current_contract_deviation": round(current_contract_deviation, 4),
                      "planned_action_risk": round(planned_action_risk, 4),
                      "dependency_impact": round(dependency_impact, 4),
                      "safety_impact": round(safety_impact, 4),
                      "uncertainty": round(uncertainty, 4),
                      "interaction_boost": round(interaction_boost, 4),
                      "raw_score": round(raw_score, 4),
                      "normalized_probability": p_escalate,
                  },
                  "explanation": [
                      "PEL is a report-only probabilistic risk-estimation layer.",
                      "The estimate is derived from current finding classification, dependency signals, safety impact, uncertainty, and path/history profile.",
                      "PEL may recommend escalation upward to USER_MAESTRO, but it never downgrades mandatory HITL or executes control actions.",
                  ],
              }


          def generate_tasukeru_probabilistic_escalation_report(
              entries: list[dict[str, Any]],
              three_d_vaf_payload: dict[str, Any],
              sis_payload: dict[str, Any],
              state: dict[str, Any],
              metadata: dict[str, Any],
          ) -> dict[str, Any]:
              """Generate report-only probabilistic escalation artifacts."""
              vaf_entries = three_d_vaf_payload.get("entries", []) if isinstance(three_d_vaf_payload, dict) else []
              sis_entries = sis_payload.get("entries", []) if isinstance(sis_payload, dict) else []
              vaf_by_fingerprint = {
                  str(item.get("fingerprint_hash")): item
                  for item in vaf_entries
                  if isinstance(item, dict) and item.get("fingerprint_hash")
              }
              sis_by_fingerprint = {
                  str(item.get("fingerprint_hash")): item
                  for item in sis_entries
                  if isinstance(item, dict) and item.get("fingerprint_hash")
              }

              pel_entries = [
                  build_pel_entry(
                      entry,
                      vaf_by_fingerprint.get(str(entry.get("fingerprint_hash"))),
                      sis_by_fingerprint.get(str(entry.get("fingerprint_hash"))),
                  )
                  for entry in entries
              ]

              threshold = 0.80
              escalation_candidates = [
                  item for item in pel_entries
                  if item.get("pel_decision") == "PAUSE_FOR_HITL_CANDIDATE"
              ]
              mandatory_hitl = [
                  item for item in pel_entries
                  if item.get("pel_decision") == "MANDATORY_HITL_ALREADY_REQUIRED"
              ]
              review_candidates = [
                  item for item in pel_entries
                  if item.get("pel_decision") == "REVIEW_RECOMMENDED_CANDIDATE"
              ]
              p_values = [float(item.get("p_escalate", 0.0) or 0.0) for item in pel_entries]
              max_probability = round(max(p_values), 4) if p_values else 0.0
              average_probability = round(sum(p_values) / len(p_values), 4) if p_values else 0.0

              payload = {
                  "schema_version": "pel-v0.1",
                  "tool": "tasukeru_probabilistic_escalation_layer",
                  "purpose": (
                      "Estimate escalation risk from current findings, dependency signals, safety impact, "
                      "uncertainty, and path/history profile. This is not a future guarantee."
                  ),
                  "verified": True,
                  "decision": "RUN",
                  "reason_code": "PEL_REPORT_ONLY",
                  "threshold": threshold,
                  "escalation_target": "USER_MAESTRO",
                  "maestro_is_human_user": True,
                  "counts": {
                      "entry_count": len(pel_entries),
                      "escalation_candidate_count": len(escalation_candidates),
                      "mandatory_hitl_count": len(mandatory_hitl),
                      "review_candidate_count": len(review_candidates),
                      "monitor_only_count": sum(1 for item in pel_entries if item.get("pel_decision") == "MONITOR_ONLY"),
                  },
                  "probability_summary": {
                      "max_probability": max_probability,
                      "average_probability": average_probability,
                  },
                  "policy": {
                      "advisory_only": True,
                      "report_only": True,
                      "probability_is_not_a_future_guarantee": True,
                      "changes_existing_decisions": False,
                      "may_escalate_upward_only": True,
                      "may_downgrade_hitl_required": False,
                      "auto_control_executed": False,
                      "user_maestro_is_human": True,
                      "maestro_self_decision_allowed": False,
                      "human_decision_required_for_execution": True,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "external_scanning_allowed": False,
                      "exploit_reproduction_allowed": False,
                  },
                  "entries": pel_entries,
              }
              payload["report_sha256"] = canonical_hash(
                  {
                      "schema_version": payload["schema_version"],
                      "decision": payload["decision"],
                      "reason_code": payload["reason_code"],
                      "threshold": payload["threshold"],
                      "counts": payload["counts"],
                      "probability_summary": payload["probability_summary"],
                  }
              )
              write_json(probabilistic_escalation_json_path, payload)

              verify_payload = {
                  "schema_version": "pel-verify-v0.1",
                  "verified": True,
                  "decision": "RUN",
                  "reason_code": "PEL_REPORT_ONLY_VERIFIED",
                  "threshold": threshold,
                  "escalation_target": "USER_MAESTRO",
                  "maestro_is_human_user": True,
                  "escalation_candidate_count": len(escalation_candidates),
                  "mandatory_hitl_count": len(mandatory_hitl),
                  "changes_existing_decisions": False,
                  "auto_control_executed": False,
                  "report_artifact": str(probabilistic_escalation_json_path),
                  "summary_artifact": str(probabilistic_escalation_md_path),
                  "report_sha256": payload.get("report_sha256"),
              }
              write_json(probabilistic_escalation_verify_path, verify_payload)

              with probabilistic_escalation_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru Probabilistic Escalation Layer\n\n")
                  f.write("This report is advisory-only and report-only. It estimates escalation risk; it does not predict the future or execute control actions.\n\n")
                  f.write("## Result\n\n")
                  f.write(f"- Decision: `{payload['decision']}`\n")
                  f.write(f"- Reason code: `{payload['reason_code']}`\n")
                  f.write(f"- Threshold: `{threshold}`\n")
                  f.write(f"- Entries: `{len(pel_entries)}`\n")
                  f.write(f"- Escalation candidates: `{len(escalation_candidates)}`\n")
                  f.write(f"- Mandatory HITL already required: `{len(mandatory_hitl)}`\n")
                  f.write(f"- Review candidates: `{len(review_candidates)}`\n")
                  f.write(f"- Max probability: `{max_probability}`\n")
                  f.write(f"- Average probability: `{average_probability}`\n")
                  f.write(f"- Report hash: `{payload.get('report_sha256')}`\n\n")
                  f.write("## Policy\n\n")
                  f.write("- Report-only: `true`\n")
                  f.write("- Changes existing decisions: `false`\n")
                  f.write("- May escalate upward only: `true`\n")
                  f.write("- May downgrade HITL_REQUIRED: `false`\n")
                  f.write("- Auto control executed: `false`\n")
                  f.write("- Escalation target: `USER_MAESTRO`\n")
                  f.write("- USER_MAESTRO is human: `true`\n")
                  f.write("- Maestro self-decision allowed: `false`\n")
                  f.write("- Human decision required for execution: `true`\n")
                  f.write("- Auto fix / commit / push / merge: `false`\n\n")
                  f.write("## Calculation trace sample\n\n")
                  sample = sorted(pel_entries, key=lambda item: float(item.get("p_escalate", 0.0) or 0.0), reverse=True)[:80]
                  if not sample:
                      f.write("- No entries.\n")
                  else:
                      for item in sample:
                          f.write(
                              f"- p=`{item.get('p_escalate')}` decision=`{item.get('pel_decision')}` "
                              f"existing=`{item.get('existing_decision')}` reason=`{item.get('reason_code')}` "
                              f"`{item.get('file')}`"
                          )
                          if item.get("line"):
                              f.write(f":{item.get('line')}")
                          f.write("\n")
                          trace = item.get("calculation_trace", {})
                          f.write(
                              "  - trace: "
                              f"history={trace.get('history_signal')} "
                              f"contract={trace.get('current_contract_deviation')} "
                              f"planned={trace.get('planned_action_risk')} "
                              f"dependency={trace.get('dependency_impact')} "
                              f"safety={trace.get('safety_impact')} "
                              f"uncertainty={trace.get('uncertainty')} "
                              f"boost={trace.get('interaction_boost')}\n"
                          )
              return payload


          def build_dimension_dependency_entry(
              entry: dict[str, Any],
              vaf_entry: dict[str, Any] | None,
              sis_entry: dict[str, Any] | None,
          ) -> dict[str, Any]:
              """Audit dependency consistency across finding, 3D axes, SIS, classification, and output.

              3D-DAC is read-only. It does not mutate findings, change decisions,
              apply fixes, create PRs, push commits, or merge changes.
              """
              decision = str(entry.get("decision", entry.get("level", "")))
              file_path = str(entry.get("file", ""))
              reason_code = str(entry.get("reason_code", ""))
              fingerprint_hash = str(entry.get("fingerprint_hash", ""))
              path_profile = str(entry.get("path_profile", classify_path_profile(file_path)))

              dependency_checks: list[dict[str, Any]] = []

              def add_check(name: str, ok: bool, detail: str, *, severity: str = "REVIEW") -> None:
                  dependency_checks.append(
                      {
                          "name": name,
                          "ok": bool(ok),
                          "severity": severity,
                          "detail": detail,
                      }
                  )

              add_check(
                  "finding_reference",
                  bool(fingerprint_hash and file_path and file_path != "?" and reason_code),
                  "finding must retain fingerprint, file, and reason_code references",
              )
              add_check(
                  "vaf_reference",
                  isinstance(vaf_entry, dict) and bool(vaf_entry.get("fingerprint_hash")),
                  "3D-VAF entry must be linked by fingerprint_hash",
              )
              add_check(
                  "sis_reference",
                  isinstance(sis_entry, dict) and bool(sis_entry.get("fingerprint_hash")),
                  "SIS entry must be linked by fingerprint_hash",
              )

              if isinstance(vaf_entry, dict):
                  add_check(
                      "vaf_decision_dependency",
                      str(vaf_entry.get("decision", "")) == decision,
                      "3D-VAF decision must match source finding decision",
                  )
                  add_check(
                      "vaf_structure_dependency",
                      str(vaf_entry.get("file", "")) == file_path,
                      "3D-VAF affected file must match source finding file",
                  )
                  structure_axis = vaf_entry.get("structure_axis", {}) if isinstance(vaf_entry.get("structure_axis"), dict) else {}
                  impact_axis = vaf_entry.get("impact_axis", {}) if isinstance(vaf_entry.get("impact_axis"), dict) else {}
                  add_check(
                      "structure_axis_dependency",
                      str(structure_axis.get("path_profile", "")) == path_profile,
                      "structure axis path_profile must follow source finding path_profile",
                  )
                  fallback_required = bool(vaf_entry.get("fallback_required"))
                  rollback_cost = str(impact_axis.get("rollback_cost", ""))
                  add_check(
                      "impact_fallback_dependency",
                      (not fallback_required) or rollback_cost == "review_required",
                      "fallback_required should be reflected in impact-axis rollback_cost",
                  )

              if isinstance(sis_entry, dict):
                  add_check(
                      "sis_decision_dependency",
                      str(sis_entry.get("decision", "")) == decision,
                      "SIS decision must match source finding decision",
                  )
                  add_check(
                      "sis_reason_dependency",
                      str(sis_entry.get("reason_code", "")) == reason_code,
                      "SIS reason_code must match source finding reason_code",
                  )
                  risk_level = str(sis_entry.get("risk_level", "NONE"))
                  add_check(
                      "classification_impact_dependency",
                      not (decision == "HITL_REQUIRED" and risk_level in {"NONE", "LOW"}),
                      "HITL_REQUIRED findings should not be classified as NONE/LOW safety impact",
                      severity="PAUSE_FOR_HITL",
                  )
                  visibility = sis_entry.get("visibility", {}) if isinstance(sis_entry.get("visibility"), dict) else {}
                  add_check(
                      "public_output_dependency",
                      visibility.get("include_exploit_steps_in_public_comment") is False
                      and visibility.get("include_payloads_in_public_comment") is False
                      and visibility.get("include_attack_paths_in_public_comment") is False,
                      "public output must not include exploit steps, payloads, or attack paths",
                      severity="PAUSE_FOR_HITL",
                  )

              failed_checks = [item for item in dependency_checks if not item.get("ok")]
              review_required = bool(failed_checks)
              review_severity = "PAUSE_FOR_HITL" if any(item.get("severity") == "PAUSE_FOR_HITL" for item in failed_checks) else "REVIEW"

              return {
                  "fingerprint_hash": entry.get("fingerprint_hash"),
                  "source": entry.get("source"),
                  "decision": decision,
                  "reason_code": reason_code,
                  "file": file_path,
                  "line": entry.get("line"),
                  "path_profile": path_profile,
                  "review_required": review_required,
                  "review_severity": review_severity if review_required else "NONE",
                  "dependency_mismatch_count": len(failed_checks),
                  "failed_checks": failed_checks,
                  "dependency_checks": dependency_checks,
                  "checked_dimensions": [
                      "finding",
                      "structure",
                      "impact",
                      "classification",
                      "output",
                  ],
              }

          def generate_tasukeru_dimension_dependency_audit(
              entries: list[dict[str, Any]],
              three_d_vaf_payload: dict[str, Any],
              sis_payload: dict[str, Any],
              state: dict[str, Any],
              metadata: dict[str, Any],
          ) -> dict[str, Any]:
              """Generate 3D-DAC artifacts for read-only dependency consistency audit."""
              vaf_entries = three_d_vaf_payload.get("entries", []) if isinstance(three_d_vaf_payload, dict) else []
              sis_entries = sis_payload.get("entries", []) if isinstance(sis_payload, dict) else []
              vaf_by_fingerprint = {
                  str(item.get("fingerprint_hash")): item
                  for item in vaf_entries
                  if isinstance(item, dict) and item.get("fingerprint_hash")
              }
              sis_by_fingerprint = {
                  str(item.get("fingerprint_hash")): item
                  for item in sis_entries
                  if isinstance(item, dict) and item.get("fingerprint_hash")
              }

              dependency_entries = [
                  build_dimension_dependency_entry(
                      entry,
                      vaf_by_fingerprint.get(str(entry.get("fingerprint_hash"))),
                      sis_by_fingerprint.get(str(entry.get("fingerprint_hash"))),
                  )
                  for entry in entries
              ]
              dependency_mismatch_count = sum(int(item.get("dependency_mismatch_count", 0) or 0) for item in dependency_entries)
              review_required_count = sum(1 for item in dependency_entries if item.get("review_required"))
              pause_for_hitl_count = sum(1 for item in dependency_entries if item.get("review_severity") == "PAUSE_FOR_HITL")
              verified = dependency_mismatch_count == 0
              decision = "RUN" if verified else "PAUSE_FOR_HITL"

              payload = {
                  "schema_version": "3d-dac-v0.1",
                  "tool": "tasukeru_dimension_dependency_audit",
                  "purpose": (
                      "Check dependency consistency across findings, 3D-VAF structure/impact axes, "
                      "SIS risk metadata, classification, and public-output policy."
                  ),
                  "verified": verified,
                  "decision": decision,
                  "reason_code": "DIMENSION_DEPENDENCY_VERIFIED" if verified else "DIMENSION_DEPENDENCY_REVIEW_REQUIRED",
                  "counts": {
                      "entry_count": len(dependency_entries),
                      "dependency_mismatch_count": dependency_mismatch_count,
                      "review_required_count": review_required_count,
                      "pause_for_hitl_count": pause_for_hitl_count,
                  },
                  "checked_dimensions": [
                      "finding",
                      "structure",
                      "impact",
                      "classification",
                      "output",
                  ],
                  "policy": {
                      "advisory_only": True,
                      "report_only": True,
                      "mutates_findings": False,
                      "changes_existing_decisions": False,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "include_exploit_payloads": False,
                      "include_attack_steps": False,
                      "external_scanning_allowed": False,
                  },
                  "entries": dependency_entries,
              }
              payload["report_sha256"] = canonical_hash(
                  {
                      "schema_version": payload["schema_version"],
                      "verified": payload["verified"],
                      "decision": payload["decision"],
                      "reason_code": payload["reason_code"],
                      "counts": payload["counts"],
                  }
              )
              write_json(dimension_dependency_json_path, payload)

              verify_payload = {
                  "schema_version": "3d-dac-verify-v0.1",
                  "verified": verified,
                  "decision": decision,
                  "reason_code": payload["reason_code"],
                  "dependency_mismatch_count": dependency_mismatch_count,
                  "review_required_count": review_required_count,
                  "report_artifact": str(dimension_dependency_json_path),
                  "summary_artifact": str(dimension_dependency_md_path),
                  "report_sha256": payload.get("report_sha256"),
                  "auto_apply_allowed": False,
                  "human_decision_required_on_mismatch": True,
              }
              write_json(dimension_dependency_verify_path, verify_payload)

              with dimension_dependency_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru 3D Dimension Dependency Audit\n\n")
                  f.write("This report is advisory-only and read-only. It checks dependency consistency across 3D review axes, SIS, classification, and output policy.\n\n")
                  f.write("## Result\n\n")
                  f.write(f"- Verified: `{verified}`\n")
                  f.write(f"- Decision: `{decision}`\n")
                  f.write(f"- Reason code: `{payload['reason_code']}`\n")
                  f.write(f"- Entries: `{len(dependency_entries)}`\n")
                  f.write(f"- Dependency mismatches: `{dependency_mismatch_count}`\n")
                  f.write(f"- Review required: `{review_required_count}`\n")
                  f.write(f"- PAUSE_FOR_HITL candidates: `{pause_for_hitl_count}`\n")
                  f.write(f"- Report hash: `{payload.get('report_sha256')}`\n\n")
                  f.write("## Policy\n\n")
                  f.write("- Report-only: `true`\n")
                  f.write("- Mutates findings: `false`\n")
                  f.write("- Changes existing decisions: `false`\n")
                  f.write("- Auto fix: `false`\n")
                  f.write("- Auto merge: `false`\n")
                  f.write("- External scanning: `false`\n")
                  f.write("- Exploit payloads / attack steps: `false`\n\n")
                  f.write("## Review sample\n\n")
                  sample = [item for item in dependency_entries if item.get("review_required")][:80]
                  if not sample:
                      f.write("- No dependency mismatches detected.\n")
                  else:
                      for item in sample:
                          f.write(
                              f"- `{item.get('review_severity')}` `{item.get('reason_code')}` "
                              f"mismatches=`{item.get('dependency_mismatch_count')}` `{item.get('file')}`"
                          )
                          if item.get("line"):
                              f.write(f":{item.get('line')}")
                          f.write("\n")
                          for failed in item.get("failed_checks", [])[:5]:
                              f.write(f"  - `{failed.get('name')}`: {failed.get('detail')}\n")
                      if len(sample) > 80:
                          f.write(f"\n... and {len(sample) - 80} more review-required entries in `tasukeru_dimension_dependency_report.json`.\n")
              return payload

          def write_outputs(entries: list[dict[str, Any]], state: dict[str, Any], metadata: dict[str, Any]) -> None:
              counts = Counter(entry["decision"] for entry in entries)
              path_profile_counts = Counter(str(entry.get("path_profile", "unknown")) for entry in entries)
              autofix_policy_counts = Counter(
                  entry.get("autofix", {}).get("policy", "UNKNOWN") for entry in entries
              )
              safe_autofix_count = sum(
                  1 for entry in entries
                  if entry.get("autofix", {}).get("safe_autofix_candidate")
              )
              confidence_payload = build_confidence_report_payload(entries, state, metadata)
              write_confidence_report(confidence_payload)
              payload = {
                  "schema_version": "1.0",
                  "tool": "tasukeru_hitl_decision_support",
                  "counts": dict(counts),
                  "path_profile_counts": dict(path_profile_counts),
                  "metadata": metadata,
                  "confidence": {
                      "total": confidence_payload["total"],
                      "file_count": len(confidence_payload["files"]),
                      "report_artifacts": [
                          "tasukeru_confidence_report.md",
                          "tasukeru_confidence_report.json",
                      ],
                  },
                  "documentation_review": {
                      "count": sum(1 for entry in entries if entry.get("source") == "Documentation Review"),
                      "critical_count": sum(
                          1 for entry in entries
                          if entry.get("source") == "Documentation Review"
                          and entry.get("decision") == "HITL_REQUIRED"
                      ),
                  },
                  "autofix_policy": {
                      "safe_autofix_candidates": safe_autofix_count,
                      "auto_merge_allowed": False,
                      "policy_counts": dict(autofix_policy_counts),
                      "rule": (
                          "SAFE_AUTOFIX_CANDIDATE is decision-support metadata only. "
                          "No file is automatically modified. Auto-merge is prohibited."
                      ),
                  },
                  "entries": entries,
              }
              write_json(hitl_json_path, payload)
              write_json(notification_state_path, state)

              priority = [entry for entry in entries if entry["decision"] in {"HITL_REQUIRED", "FIX_RECOMMENDED"}]
              review_entries = [entry for entry in entries if entry["decision"] == "REVIEW_RECOMMENDED"]
              noise_entries = [entry for entry in entries if entry["decision"] == "NOISE_CANDIDATE"]
              info_entries = [entry for entry in entries if entry["decision"] == "INFO_ONLY"]

              with hitl_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru HITL review\n\n")
                  f.write("This report is advisory-only. It does not create branches, create PRs, commit, push, auto-fix, or auto-merge.\n\n")
                  f.write("## Counts\n\n")
                  for level in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY"):
                      f.write(f"- {level}: {counts.get(level, 0)}\n")
                  total_confidence = confidence_payload["total"]
                  f.write("\n## Confidence\n\n")
                  f.write(f"- Total confidence: `{total_confidence['total_confidence_score']}` / `1.0`\n")
                  f.write(f"- Level: `{total_confidence['total_confidence_level']}`\n")
                  f.write("- Meaning: confidence in Tasukeru's classification/suggestion evidence; not a safety guarantee.\n")
                  f.write("\n## Path profiles\n\n")
                  for profile, count in sorted(path_profile_counts.items()):
                      f.write(f"- {profile}: {count}\n")
                  f.write("\n## Automation policy\n\n")
                  f.write("- Auto branch creation: false\n")
                  f.write("- Auto PR creation: false\n")
                  f.write("- Auto commit: false\n")
                  f.write("- Auto push: false\n")
                  f.write("- Auto fix: false\n")
                  f.write("- Auto merge: false\n")
                  f.write("- Human decision required: true\n\n")
                  f.write("## Autofix policy\n\n")
                  f.write(f"- SAFE_AUTOFIX_CANDIDATE: {safe_autofix_count}\n")
                  f.write("- Auto fix: false\n")
                  f.write("- Auto merge: false\n")
                  f.write("- Rule: safe candidates are manual decision-support metadata only.\n\n")
                  f.write("## Priority review queue\n\n")
                  if priority:
                      for entry in priority[:80]:
                          write_entry_bullet(f, entry)
                  else:
                      f.write("No HITL_REQUIRED or FIX_RECOMMENDED entries.\n")
                  f.write("\n")

              with summary_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru advisory summary\n\n")
                  f.write(f"- Ruff findings: {metadata['ruff_count']}\n")
                  f.write(f"- Bandit findings: {metadata['bandit_count']}\n")
                  f.write(f"- pip-audit vulnerabilities: {metadata['pip_count']}\n")
                  f.write(f"- Tasukeru logic review findings: {metadata['logic_count']}\n")
                  f.write(f"- Documentation review findings: {metadata['documentation_count']}\n\n")
                  f.write("## HITL decision support\n\n")
                  for level in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY"):
                      f.write(f"- {level}: {counts.get(level, 0)}\n")
                  total_confidence = confidence_payload["total"]
                  f.write("\n## Confidence score\n\n")
                  f.write(f"- Total confidence: `{total_confidence['total_confidence_score']}` / `1.0`\n")
                  f.write(f"- Level: `{total_confidence['total_confidence_level']}`\n")
                  f.write("- Scope: confidence in Tasukeru's evidence/classification/suggestion, not permission to auto-apply changes.\n")
                  f.write("- Report: `tasukeru_confidence_report.md` / `tasukeru_confidence_report.json`\n")
                  f.write("\n## Path profile counts\n\n")
                  for profile, count in sorted(path_profile_counts.items()):
                      f.write(f"- {profile}: {count}\n")
                  f.write("\n## Critical notifications\n\n")
                  f.write(f"- New critical incidents: {state['new_critical_incident_count']}\n")
                  f.write(f"- Suppressed duplicate critical incidents: {state['suppressed_duplicate_critical_incident_count']}\n\n")
                  f.write("## Automation policy\n\n")
                  f.write("- Auto branch creation: false\n")
                  f.write("- Auto PR creation: false\n")
                  f.write("- Auto commit: false\n")
                  f.write("- Auto push: false\n")
                  f.write("- Auto fix: false\n")
                  f.write("- Auto merge: false\n\n")
                  f.write("## Security output policy\n\n")
                  f.write("- PR comment DRAFT artifacts must not include exploit payloads.\n")
                  f.write("- PR comment DRAFT artifacts must not include attack steps.\n")
                  f.write("- PR comment DRAFT artifacts must focus on detection and safe remediation.\n\n")
                  f.write("## Detailed artifacts\n\n")
                  f.write("- `tasukeru_hitl_review.md`\n")
                  f.write("- `tasukeru_hitl_review.json`\n")
                  f.write("- `tasukeru_advisory_summary.md`\n")
                  f.write("- `tasukeru_notification_state.json`\n")
                  f.write("- `tasukeru_pr_comment.md`\n")
                  f.write("- `tasukeru_dradm_draft.md`\n")
                  f.write("- `tasukeru_dradm_draft.json`\n")
                  f.write("- `tasukeru_confidence_report.md`\n")
                  f.write("- `tasukeru_confidence_report.json`\n")
                  f.write("- `tasukeru_readme_refinement_draft.md`\n")
                  f.write("- `tasukeru_readme_refinement_draft.json`\n")
                  f.write("- `tasukeru_announcement.md`\n")
                  f.write("- `tasukeru_announcement.json`\n")
                  f.write("- `tasukeru_3d_vulnerability_review.md`\n")
                  f.write("- `tasukeru_3d_vulnerability_review.json`\n")
                  f.write("- `tasukeru_arl.jsonl`\n")
                  f.write("- `tasukeru_arl_verify.json`\n")
                  f.write("- `tasukeru_logs/`\n\n")

                  def collapsible(title: str, data: list[dict[str, Any]], limit: int = 30) -> None:
                      f.write(f"<details>\n<summary>{title}</summary>\n\n")
                      if not data:
                          f.write("No entries.\n\n")
                      else:
                          for entry in data[:limit]:
                              write_entry_bullet(f, entry)
                          if len(data) > limit:
                              f.write(f"\n... and {len(data) - limit} more entries in `tasukeru_hitl_review.json`.\n")
                          f.write("\n")
                      f.write("</details>\n\n")

                  collapsible(f"REVIEW_RECOMMENDED details ({len(review_entries)})", review_entries, 50)
                  collapsible(f"NOISE_CANDIDATE sample ({len(noise_entries)})", noise_entries, 20)
                  collapsible(f"INFO_ONLY details ({len(info_entries)})", info_entries, 20)

              with pr_comment_path.open("w", encoding="utf-8") as f:
                  critical = [entry for entry in entries if entry["decision"] == "HITL_REQUIRED"]
                  sis_metadata = metadata.get("safety_impact_simulation", {}) if isinstance(metadata, dict) else {}
                  sis_risk_level = str(sis_metadata.get("overall_risk_level") or ("MEDIUM" if critical else "NONE"))
                  if not critical:
                      f.write("<!-- tasukeru-analysis:no-critical -->\n")
                      f.write("No HITL_REQUIRED incidents. No PR comment DRAFT is required.\n")
                      f.write("Details, if any, are stored in workflow artifacts/logs.\n")
                      return

                  f.write("<!-- tasukeru-analysis:critical-summary -->\n\n")
                  f.write("## Tasukeru Safety Review\n\n")
                  f.write("3D safety review detected a potential risk.\n\n")
                  f.write(f"- Risk level: `{sis_risk_level}`\n")
                  f.write("- Decision: `HITL_REQUIRED`\n")
                  f.write(f"- HITL_REQUIRED: `{len(critical)}`\n")
                  f.write("- Details: see workflow artifacts / Tasukeru logs.\n")
                  f.write("- Key artifacts: `tasukeru_safety_impact_simulation.md`, `tasukeru_safety_impact_simulation.json`, `tasukeru_3d_vulnerability_review.md`, `tasukeru_3d_vulnerability_review.json`, `tasukeru_hitl_review.md`, `tasukeru_hitl_review.json`\n\n")
                  f.write("This PR comment DRAFT contains only coarse risk metadata; detailed findings stay in workflow artifacts/logs. It is not posted automatically.\n")
                  f.write("This is advisory-only and requires human review before any action.\n")

              github_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
              if github_summary:
                  with Path(github_summary).open("a", encoding="utf-8") as out:
                      out.write(summary_path.read_text(encoding="utf-8"))

          ruff_raw = read_json(log_dir / "ruff.json", [])
          bandit_raw = read_json(log_dir / "bandit.json", {})
          pip_raw = read_json(log_dir / "pip-audit.json", {})

          ruff_entries = entries_from_ruff(ruff_raw)
          bandit_entries = entries_from_bandit(bandit_raw)
          pip_entries = entries_from_pip_audit(pip_raw)
          logic_entries, _logic_result = run_logic_review()
          doc_entries, _doc_result = run_documentation_review()
          self_definition_entries, self_definition_result = run_self_definition_guard()

          all_entries = (
              ruff_entries
              + bandit_entries
              + pip_entries
              + logic_entries
              + doc_entries
              + self_definition_entries
          )
          all_entries = assign_incidents(all_entries)
          all_entries = attach_confidence_scores(all_entries)
          notification_state = build_notification_state(all_entries)

          metadata = {
              "ruff_count": len(ruff_entries),
              "bandit_count": len(bandit_entries),
              "pip_count": len(pip_entries),
              "logic_count": len(logic_entries),
              "documentation_count": len(doc_entries),
              "self_definition_count": len(self_definition_entries),
              "self_definition": self_definition_result,
              "ruff_exit": read_exit("ruff.exit"),
              "bandit_exit": read_exit("bandit.exit"),
              "pip_audit_exit": read_exit("pip-audit.exit"),
          }

          three_d_vaf_result = generate_tasukeru_3d_vulnerability_review(
              all_entries,
              notification_state,
              metadata,
          )
          metadata["three_d_vaf"] = {
              "schema_version": three_d_vaf_result.get("schema_version"),
              "entry_count": three_d_vaf_result.get("counts", {}).get("entry_count"),
              "fallback_required": three_d_vaf_result.get("counts", {}).get("fallback_required"),
              "route_counts": three_d_vaf_result.get("counts", {}).get("routes", {}),
              "artifacts": [
                  "tasukeru_3d_vulnerability_review.md",
                  "tasukeru_3d_vulnerability_review.json",
              ],
          }

          sis_result = generate_tasukeru_safety_impact_simulation(
              all_entries,
              three_d_vaf_result,
              notification_state,
              metadata,
          )
          metadata["safety_impact_simulation"] = {
              "schema_version": sis_result.get("schema_version"),
              "overall_risk_level": sis_result.get("overall_risk_level"),
              "risk_counts": sis_result.get("counts", {}).get("risk_levels", {}),
              "hitl_required": sis_result.get("counts", {}).get("hitl_required"),
              "comment_policy": sis_result.get("comment_policy", {}),
              "artifacts": [
                  "tasukeru_safety_impact_simulation.md",
                  "tasukeru_safety_impact_simulation.json",
              ],
          }

          trust_boundary_risk_result = generate_tasukeru_trust_boundary_risk_report(
              all_entries,
              notification_state,
              metadata,
          )
          metadata["trust_boundary_risk"] = {

                          rule_id=str(vuln_id),
                          file="requirements.txt / requirements-dev.txt",
                          message=f"Dependency vulnerability found: {package} {vuln.get('version')} ({vuln_id})",
                          suggestion=f"依存更新候補を確認してください。fix_versions: {fixes}",
                          why_problematic_ja="依存パッケージの既知脆弱性は、利用文脈によってリスクになる可能性があります。",
                          why_fix_ja="修正版へ更新すると、既知の問題を避けられる可能性があります。",
                          impact_ja="依存関係リスクを下げられることが期待されます。ただし互換性テストが必要です。",
                          confidence="MEDIUM",
                          risk_type="dependency",
                          classification_reason="Dependency vulnerabilities are FIX_RECOMMENDED unless critical policy requires HITL.",
                          path_profile="dependency",
                      )
                  )
              return entries

          def stable_json_text(obj: Any) -> str:
              return json.dumps(
                  obj,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )

          def self_definition_sha256(definition: dict[str, Any]) -> str:
              return hashlib.sha256(stable_json_text(definition).encode("utf-8")).hexdigest()

          def load_effective_self_definition() -> tuple[dict[str, Any], str]:
              if self_definition_source_path.exists():
                  loaded = read_json(self_definition_source_path, {})
                  if isinstance(loaded, dict) and loaded:
                      return loaded, "repository"
              return dict(DEFAULT_SELF_DEFINITION), "embedded_default"

          def changed_files_set() -> set[str]:
              changed_path = Path("tasukeru_changed_files.txt")
              if not changed_path.exists():
                  return set()
              return {
                  normalize_path(line.strip())
                  for line in changed_path.read_text(encoding="utf-8", errors="replace").splitlines()
                  if line.strip()
              }

          def validate_self_definition_contract(definition: dict[str, Any]) -> list[str]:
              errors: list[str] = []
              must_not = definition.get("must_not")
              must = definition.get("must")
              change_policy = definition.get("change_policy")

              if not isinstance(must_not, dict):
                  errors.append("must_not_missing_or_invalid")
                  must_not = {}
              if not isinstance(must, dict):
                  errors.append("must_missing_or_invalid")
                  must = {}
              if not isinstance(change_policy, dict):
                  errors.append("change_policy_missing_or_invalid")
                  change_policy = {}

              required_false = {
                  "auto_branch_allowed",
                  "auto_pr_creation_allowed",
                  "auto_commit_allowed",
                  "auto_push_allowed",
                  "autofix_allowed",
                  "auto_merge_allowed",
                  "self_definition_auto_update_allowed",
                  "rule_auto_tuning_allowed",
                  "workflow_auto_edit_allowed",
              }
              required_true = {
                  "hitl_required_must_require_human_review",
                  "public_comments_must_not_include_payloads",
                  "public_comments_must_not_include_attack_steps",
                  "rfl_must_not_be_sealed",
                  "pause_for_hitl_must_not_be_sealed",
                  "sealed_only_by_ethics_or_acc",
                  "self_definition_change_requires_hitl",
                  "self_definition_change_must_be_recorded",
              }

              for key in sorted(required_false):
                  if must_not.get(key) is not False:
                      errors.append(f"must_not.{key}_must_be_false")
              for key in sorted(required_true):
                  if must.get(key) is not True:
                      errors.append(f"must.{key}_must_be_true")

              if change_policy.get("auto_apply_allowed") is not False:
                  errors.append("change_policy.auto_apply_allowed_must_be_false")
              if change_policy.get("human_decision_required") is not True:
                  errors.append("change_policy.human_decision_required_must_be_true")
              if change_policy.get("change_detection_decision") != "HITL_REQUIRED":
                  errors.append("change_policy.change_detection_decision_must_be_HITL_REQUIRED")
              if change_policy.get("change_gate_decision") != "STOPPED":
                  errors.append("change_policy.change_gate_decision_must_be_STOPPED")

              identity = str(definition.get("identity", "")).lower()
              if "advisory-only" not in identity or "review assistant" not in identity:
                  errors.append("identity_must_state_advisory_only_review_assistant")

              return errors

          def build_self_definition_chain_row(
              *,
              seq: int,
              event: str,
              definition_hash: str,
              source: str,
              previous_definition_hash: str,
              decision: str,
              gate_decision: str,
              reason_code: str,
              prev_hash: str,
              evidence: dict[str, Any],
          ) -> dict[str, Any]:
              row = {
                  "seq": seq,
                  "event": event,
                  "definition_sha256": definition_hash,
                  "previous_definition_sha256": previous_definition_hash,
                  "source": source,
                  "decision": decision,
                  "gate_decision": gate_decision,
                  "layer": "self_definition_guard",
                  "sealed": gate_decision == "STOPPED",
                  "overrideable": gate_decision != "STOPPED",
                  "final_decider": "SYSTEM",
                  "reason_code": reason_code,
                  "auto_apply_allowed": False,
                  "human_decision_required": True,
                  "prev_hash": prev_hash,
                  "evidence": evidence,
              }
              payload = {
                  key: value
                  for key, value in row.items()
                  if key != "chain_hash"
              }
              row["chain_hash"] = canonical_hash({"prev_hash": prev_hash, "row": payload})
              return row

          def read_existing_self_definition_chain() -> tuple[list[dict[str, Any]], list[dict[str, Any]], str, str]:
              rows: list[dict[str, Any]] = []
              errors: list[dict[str, Any]] = []
              prev_hash = "GENESIS"
              head_hash = "GENESIS"
              previous_definition_hash = ""
              if not self_definition_chain_path.exists():
                  return rows, errors, head_hash, previous_definition_hash

              for seq, line in enumerate(self_definition_chain_path.read_text(encoding="utf-8", errors="replace").splitlines(), start=1):
                  if not line.strip():
                      continue
                  try:
                      row = json.loads(line)
                  except Exception as exc:
                      errors.append({"seq": seq, "reason": "json_decode_failed", "error": str(exc)})
                      continue
                  if not isinstance(row, dict):
                      errors.append({"seq": seq, "reason": "row_not_object"})
                      continue
                  actual = row.get("chain_hash")
                  payload = {
                      key: value
                      for key, value in row.items()
                      if key != "chain_hash"
                  }
                  expected = canonical_hash({"prev_hash": row.get("prev_hash", prev_hash), "row": payload})
                  if row.get("prev_hash") != prev_hash:
                      errors.append({"seq": seq, "reason": "prev_hash_mismatch", "expected": prev_hash, "actual": row.get("prev_hash")})
                  if actual != expected:
                      errors.append({"seq": seq, "reason": "chain_hash_mismatch", "expected": expected, "actual": actual})
                  prev_hash = str(actual or expected)
                  head_hash = prev_hash
                  if row.get("definition_sha256"):
                      previous_definition_hash = str(row.get("definition_sha256"))
                  rows.append(row)
              return rows, errors, head_hash, previous_definition_hash

          def add_self_definition_hitl(
              entries: list[dict[str, Any]],
              reason_code: str,
              message: str,
              evidence: dict[str, Any],
          ) -> None:
              entry = make_entry(
                  source="Tasukeru Self-Definition Guard",
                  decision="HITL_REQUIRED",
                  severity="CRITICAL",
                  category="self_definition",
                  reason_code=reason_code,
                  rule_id=reason_code,
                  file=str(self_definition_source_path),
                  message=message,
                  suggestion="自己定義は助ける君の境界条件です。変更・破損・契約違反が意図したものかを人間が確認してください。",
                  why_problematic_ja="自己定義がズレると、HITL、自動化禁止、公開コメント制限、RFL/ACC境界の意味が静かに変わる可能性があります。",
                  why_fix_ja="自己定義変更をHITLで止め、ハッシュチェーンに記録することで、サイレントエロージョンと自己修正化を抑制できます。",
                  impact_ja="人間確認により、助ける君が補助AIの範囲を超えないことを確認できます。",
                  confidence="HIGH",
                  risk_type="self_definition",
                  classification_reason="Self-definition changes or contract violations are non-automatic HITL events.",
                  path_profile="safety_or_hitl",
              )
              entry.update(
                  {
                      "gate_decision": "STOPPED",
                      "layer": "acc_gate",
                      "sealed": True,
                      "overrideable": False,
                      "final_decider": "SYSTEM",
                      "self_definition_evidence": evidence,
                  }
              )
              entries.append(entry)

          def run_self_definition_guard() -> tuple[list[dict[str, Any]], dict[str, Any]]:
              entries: list[dict[str, Any]] = []
              definition, source = load_effective_self_definition()
              definition_hash = self_definition_sha256(definition)
              contract_errors = validate_self_definition_contract(definition)
              existing_rows, chain_errors, existing_head, previous_definition_hash = read_existing_self_definition_chain()
              changed = normalize_path(str(self_definition_source_path)) in changed_files_set()
              change_detected = bool(previous_definition_hash and previous_definition_hash != definition_hash)
              first_registration = not previous_definition_hash

              event = "SELF_DEFINITION_VERIFIED"
              reason_code = "SELF_DEFINITION_VERIFIED"
              decision = "RUN"
              gate_decision = "RUN"

              if first_registration:
                  event = "SELF_DEFINITION_REGISTERED"
                  reason_code = "SELF_DEFINITION_REGISTERED"

              if changed or change_detected:
                  event = "SELF_DEFINITION_CHANGE_DETECTED"
                  reason_code = "SELF_DEFINITION_CHANGE_REQUIRES_HITL"
                  decision = "HITL_REQUIRED"
                  gate_decision = "STOPPED"
                  add_self_definition_hitl(
                      entries,
                      reason_code,
                      "Self-definition file was changed or differs from the previous recorded definition hash.",
                      {
                          "definition_source": source,
                          "definition_sha256": definition_hash,
                          "previous_definition_sha256": previous_definition_hash,
                          "changed_in_pr": changed,
                          "change_detected_from_chain": change_detected,
                      },
                  )

              if contract_errors:
                  event = "SELF_DEFINITION_CONTRACT_VIOLATION"
                  reason_code = "SELF_DEFINITION_CONTRACT_VIOLATION"
                  decision = "HITL_REQUIRED"
                  gate_decision = "STOPPED"
                  add_self_definition_hitl(
                      entries,
                      reason_code,
                      "Self-definition contract violation was detected.",
                      {
                          "definition_source": source,
                          "definition_sha256": definition_hash,
                          "contract_errors": contract_errors,
                      },
                  )

              if chain_errors:
                  event = "SELF_DEFINITION_CHAIN_VERIFY_FAILED"
                  reason_code = "SELF_DEFINITION_CHAIN_VERIFY_FAILED"
                  decision = "HITL_REQUIRED"
                  gate_decision = "STOPPED"
                  add_self_definition_hitl(
                      entries,
                      reason_code,
                      "Self-definition hash chain verification failed.",
                      {
                          "definition_source": source,
                          "definition_sha256": definition_hash,
                          "chain_errors": chain_errors,
                      },
                  )

              output_rows = list(existing_rows)
              prev_hash = existing_head if existing_rows else "GENESIS"
              row = build_self_definition_chain_row(
                  seq=len(output_rows) + 1,
                  event=event,
                  definition_hash=definition_hash,
                  source=source,
                  previous_definition_hash=previous_definition_hash,
                  decision=decision,
                  gate_decision=gate_decision,
                  reason_code=reason_code,
                  prev_hash=prev_hash,
                  evidence={
                      "contract_errors": contract_errors,
                      "changed_in_pr": changed,
                      "change_detected_from_chain": change_detected,
                      "existing_chain_error_count": len(chain_errors),
                      "auto_apply_allowed": False,
                  },
              )
              output_rows.append(row)

              write_json(self_definition_effective_path, definition)
              with self_definition_chain_path.open("w", encoding="utf-8") as file_obj:
                  for item in output_rows:
                      file_obj.write(json.dumps(item, ensure_ascii=False, sort_keys=True) + "\n")

              verify = {
                  "schema_version": "self-definition-verify-v1",
                  "verified": not contract_errors and not chain_errors,
                  "source": source,
                  "definition_sha256": definition_hash,
                  "previous_definition_sha256": previous_definition_hash,
                  "chain_head": row["chain_hash"],
                  "row_count": len(output_rows),
                  "changed_in_pr": changed,
                  "change_detected_from_chain": change_detected,
                  "contract_errors": contract_errors,
                  "chain_errors": chain_errors,
                  "policy": {
                      "read_only_verify_allowed": True,
                      "auto_apply_allowed": False,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required_for_change": True,
                  },
              }
              write_json(self_definition_verify_path, verify)
              return entries, verify

          def write_jsonl(path: Path, rows: list[dict[str, Any]]) -> None:
              with path.open("w", encoding="utf-8") as file_obj:
                  for row in rows:
                      file_obj.write(json.dumps(row, ensure_ascii=False, sort_keys=True) + "\n")

          def sha256_file(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def safe_for_diary(entry: dict[str, Any]) -> dict[str, Any]:
              """Keep the diary useful without exposing raw reasoning or payload-like detail."""
              return {
                  "source": entry.get("source"),
                  "decision": entry.get("decision"),
                  "severity": entry.get("severity"),
                  "category": entry.get("category"),
                  "reason_code": entry.get("reason_code"),
                  "rule_id": entry.get("rule_id"),
                  "file": entry.get("file"),
                  "line": entry.get("line"),
                  "path_profile": entry.get("path_profile"),
                  "classification_reason": one_line(entry.get("classification_reason", ""), 300),
                  "suggestion": one_line(entry.get("suggestion", ""), 300),
                  "fingerprint_hash": entry.get("fingerprint_hash"),
                  "auto_apply_allowed": False,
              }

          def build_gate_adoption_row(
              *,
              seq: int,
              run_id: str,
              stage: int,
              feature: str,
              status: str,
              adopted_as_gate: bool,
              reason_code: str,
              blocking_reason: str,
              prev_hash: str,
              flags: dict[str, Any],
          ) -> dict[str, Any]:
              row = {
                  "seq": seq,
                  "run_id": run_id,
                  "gate_pack": "middle-layer-pack-v1",
                  "stage": stage,
                  "feature": feature,
                  "status": status,
                  "adopted_as_gate": adopted_as_gate,
                  "reason_code": reason_code,
                  "blocking_reason": blocking_reason,
                  "retry_required": status in {"BLOCKED", "FAILED"},
                  "auto_apply_allowed": False,
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "human_decision_required": True,
                  "prev_hash": prev_hash,
                  "flags": flags,
              }
              payload = {key: value for key, value in row.items() if key != "chain_hash"}
              row["chain_hash"] = canonical_hash({"prev_hash": prev_hash, "row": payload})
              return row

          def run_middle_layer_pack(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              self_definition_result: dict[str, Any],
              arl_verification: dict[str, Any],
              announcement: dict[str, Any],
          ) -> dict[str, Any]:
              """Flag-Collected Gate Adoption for Tasukeru Middle Layer Pack v1.

              This evaluates pre-defined candidate layers and adopts only the
              consecutive PASSED stages. It does not edit workflow files, update
              self-definition files, create PRs, commit, push, auto-fix, or merge.
              """
              run_id = os.environ.get("GITHUB_RUN_ID") or os.environ.get("GITHUB_RUN_NUMBER") or "local"
              stages: list[dict[str, Any]] = []
              log_rows: list[dict[str, Any]] = []
              adoption_open = True
              prev_hash = "GENESIS"

              def add_stage(
                  *,
                  stage: int,
                  feature: str,
                  status: str,
                  reason_code: str,
                  blocking_reason: str = "",
                  flags: dict[str, Any] | None = None,
              ) -> None:
                  nonlocal adoption_open, prev_hash
                  flags = flags or {}
                  if not adoption_open:
                      status = "NOT_EVALUATED"
                      if not blocking_reason:
                          blocking_reason = "previous_stage_not_adopted"
                      adopted = False
                  else:
                      adopted = status == "PASSED"
                      if not adopted:
                          adoption_open = False

                  stage_payload = {
                      "stage": stage,
                      "feature": feature,
                      "status": status,
                      "adopted_as_gate": adopted,
                      "reason_code": reason_code,
                      "blocking_reason": blocking_reason,
                      "retry_required": status in {"BLOCKED", "FAILED"},
                      "flags": flags,
                  }
                  stages.append(stage_payload)

                  row = build_gate_adoption_row(
                      seq=len(log_rows) + 1,
                      run_id=run_id,
                      stage=stage,
                      feature=feature,
                      status=status,
                      adopted_as_gate=adopted,
                      reason_code=reason_code,
                      blocking_reason=blocking_reason,
                      prev_hash=prev_hash,
                      flags=flags,
                  )
                  log_rows.append(row)
                  prev_hash = row["chain_hash"]

              # Stage 1: Definition Contract Layer.
              policy = self_definition_result.get("policy") if isinstance(self_definition_result, dict) else {}
              policy = policy if isinstance(policy, dict) else {}
              contract_errors = self_definition_result.get("contract_errors", []) if isinstance(self_definition_result, dict) else []
              chain_errors = self_definition_result.get("chain_errors", []) if isinstance(self_definition_result, dict) else []
              stage1_errors: list[str] = []

              if not self_definition_result.get("verified"):
                  stage1_errors.append("self_definition_not_verified")
              if contract_errors:
                  stage1_errors.append("self_definition_contract_errors_present")
              if chain_errors:
                  stage1_errors.append("self_definition_chain_errors_present")

              for key in (
                  "auto_apply_allowed",
                  "auto_branch_allowed",
                  "auto_pr_creation_allowed",
                  "auto_commit_allowed",
                  "auto_push_allowed",
                  "autofix_allowed",
                  "auto_merge_allowed",
              ):
                  if policy.get(key) is not False:
                      stage1_errors.append(f"{key}_must_be_false")

              if policy.get("human_decision_required_for_change") is not True:
                  stage1_errors.append("human_decision_required_for_change_must_be_true")

              add_stage(
                  stage=1,
                  feature="definition_contract_layer",
                  status="PASSED" if not stage1_errors else "BLOCKED",
                  reason_code="DEFINITION_CONTRACT_LAYER_PASSED" if not stage1_errors else "DEFINITION_CONTRACT_LAYER_BLOCKED",
                  blocking_reason=", ".join(stage1_errors),
                  flags={
                      "self_definition_verified": bool(self_definition_result.get("verified")),
                      "contract_error_count": len(contract_errors) if isinstance(contract_errors, list) else 1,
                      "chain_error_count": len(chain_errors) if isinstance(chain_errors, list) else 1,
                      "auto_apply_allowed": policy.get("auto_apply_allowed"),
                      "auto_merge_allowed": policy.get("auto_merge_allowed"),
                      "human_decision_required_for_change": policy.get("human_decision_required_for_change"),
                  },
              )

              # Stage 2: Erosion Guard.
              counts = Counter(entry.get("decision", "UNKNOWN") for entry in entries)
              source_counts = Counter(entry.get("source", "UNKNOWN") for entry in entries)
              total_findings = max(len(entries), 1)
              hitl_count = int(counts.get("HITL_REQUIRED", 0))
              critical_count = int(state.get("critical_count", 0) or 0)
              review_count = int(counts.get("FIX_RECOMMENDED", 0) + counts.get("REVIEW_RECOMMENDED", 0))
              noise_count = int(counts.get("NOISE_CANDIDATE", 0))
              info_count = int(counts.get("INFO_ONLY", 0))
              erosion_errors: list[str] = []
              if critical_count != hitl_count:
                  erosion_errors.append("critical_count_does_not_match_hitl_required")
              if int(state.get("suppressed_duplicate_critical_incident_count", 0) or 0) > critical_count:
                  erosion_errors.append("suppressed_duplicate_count_exceeds_critical_count")

              erosion_metrics = {
                  "hitl_required": hitl_count,
                  "critical_count": critical_count,
                  "fix_or_review_recommended": review_count,
                  "noise_candidate": noise_count,
                  "info_only": info_count,
                  "noise_ratio": round(noise_count / total_findings, 4),
                  "info_ratio": round(info_count / total_findings, 4),
                  "source_counts": dict(source_counts),
                  "silent_suppression_detected": bool(erosion_errors),
              }
              add_stage(
                  stage=2,
                  feature="erosion_guard",
                  status="PASSED" if not erosion_errors else "BLOCKED",
                  reason_code="EROSION_GUARD_METRICS_COLLECTED" if not erosion_errors else "EROSION_GUARD_BLOCKED",
                  blocking_reason=", ".join(erosion_errors),
                  flags=erosion_metrics,
              )

              # Stage 3: Decision Diary.
              diary_errors: list[str] = []
              diary_rows: list[dict[str, Any]] = [safe_for_diary(entry) for entry in entries]
              try:
                  write_jsonl(decision_diary_jsonl_path, diary_rows)
                  with decision_diary_md_path.open("w", encoding="utf-8") as file_obj:
                      file_obj.write("# Tasukeru Decision Diary\n\n")
                      file_obj.write("This diary is advisory-only. It records classification context without raw reasoning, raw prompts, exploit payloads, or attack steps.\n\n")
                      file_obj.write("## Summary\n\n")
                      for key in ("HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED", "NOISE_CANDIDATE", "INFO_ONLY"):
                          file_obj.write(f"- {key}: {counts.get(key, 0)}\n")
                      file_obj.write("\n## Sample entries\n\n")
                      for row in diary_rows[:20]:
                          file_obj.write(
                              f"- `{row.get('decision')}` `{row.get('reason_code')}` "
                              f"{row.get('file')}:{row.get('line')} — {row.get('classification_reason')}\n"
                          )
                  diary_verify = {
                      "schema_version": "decision-diary-verify-v1",
                      "verified": True,
                      "row_count": len(diary_rows),
                      "md_path": str(decision_diary_md_path),
                      "jsonl_path": str(decision_diary_jsonl_path),
                      "no_raw_reasoning": True,
                      "no_auto_apply": True,
                      "auto_apply_allowed": False,
                      "sha256": {
                          "md": sha256_file(decision_diary_md_path),
                          "jsonl": sha256_file(decision_diary_jsonl_path),
                      },
                  }
                  write_json(decision_diary_verify_path, diary_verify)
              except Exception as exc:
                  diary_errors.append(f"decision_diary_write_failed:{type(exc).__name__}")

              add_stage(
                  stage=3,
                  feature="decision_diary",
                  status="PASSED" if not diary_errors else "FAILED",
                  reason_code="DECISION_DIARY_CREATED" if not diary_errors else "DECISION_DIARY_FAILED",
                  blocking_reason=", ".join(diary_errors),
                  flags={
                      "diary_md_created": decision_diary_md_path.exists(),
                      "diary_jsonl_created": decision_diary_jsonl_path.exists(),
                      "diary_verify_created": decision_diary_verify_path.exists(),
                      "entry_count": len(entries),
                      "no_raw_reasoning": True,
                      "auto_apply_allowed": False,
                  },
              )

              # Stage 4: Announcement Proof.
              announcement_errors: list[str] = []
              announcement_policy = announcement.get("policy") if isinstance(announcement, dict) else {}
              announcement_policy = announcement_policy if isinstance(announcement_policy, dict) else {}
              source_constraints = announcement.get("source_constraints") if isinstance(announcement, dict) else {}
              source_constraints = source_constraints if isinstance(source_constraints, dict) else {}

              if not isinstance(announcement, dict) or not announcement:
                  announcement_errors.append("announcement_payload_missing")
              if not announcement.get("conclusion_ja"):
                  announcement_errors.append("announcement_conclusion_missing")
              if not isinstance(announcement.get("decision_counts"), dict):
                  announcement_errors.append("announcement_decision_counts_missing")
              if not bool(announcement.get("arl", {}).get("verified")):
                  announcement_errors.append("announcement_arl_verified_missing_or_false")
              for key in (
                  "auto_branch_allowed",
                  "auto_pr_creation_allowed",
                  "auto_commit_allowed",
                  "auto_push_allowed",
                  "autofix_allowed",
                  "auto_merge_allowed",
              ):
                  if announcement_policy.get(key) is not False:
                      announcement_errors.append(f"announcement_policy_{key}_must_be_false")
              if source_constraints.get("public_comments_must_not_include_payloads") is not True:
                  announcement_errors.append("public_payload_constraint_missing")
              if source_constraints.get("public_comments_must_not_include_attack_steps") is not True:
                  announcement_errors.append("public_attack_steps_constraint_missing")

              add_stage(
                  stage=4,
                  feature="announcement_proof",
                  status="PASSED" if not announcement_errors else "BLOCKED",
                  reason_code="ANNOUNCEMENT_PROOF_PASSED" if not announcement_errors else "ANNOUNCEMENT_PROOF_BLOCKED",
                  blocking_reason=", ".join(announcement_errors),
                  flags={
                      "announcement_claims_mapped": not announcement_errors,
                      "source_artifact_hashes_verified": bool(arl_verification.get("verified")),
                      "no_unbacked_claims": not announcement_errors,
                      "public_payload_constraint": source_constraints.get("public_comments_must_not_include_payloads"),
                      "public_attack_steps_constraint": source_constraints.get("public_comments_must_not_include_attack_steps"),
                      "auto_apply_allowed": False,
                  },
              )

              adopted_count = sum(1 for stage in stages if stage.get("adopted_as_gate"))
              first_blocked = next((stage for stage in stages if not stage.get("adopted_as_gate")), None)
              flags_payload = {
                  "schema_version": "gate-flags-v1",
                  "gate_pack": "middle-layer-pack-v1",
                  "adoption_strategy": "Flag-Collected Gate Adoption",
                  "stage_order_fixed": True,
                  "consecutive_adoption_only": True,
                  "adopted_stage_count": adopted_count,
                  "first_blocked_stage": first_blocked,
                  "stages": stages,
                  "policy": {
                      "auto_apply_allowed": False,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "self_definition_auto_update_allowed": False,
                      "workflow_auto_edit_allowed": False,
                  },
              }
              write_json(gate_flags_path, flags_payload)
              write_jsonl(gate_adoption_log_path, log_rows)

              # Verify the adoption log chain.
              verify_errors: list[dict[str, Any]] = []
              verify_prev = "GENESIS"
              for row in log_rows:
                  actual = row.get("chain_hash")
                  payload = {key: value for key, value in row.items() if key != "chain_hash"}
                  expected = canonical_hash({"prev_hash": verify_prev, "row": payload})
                  if row.get("prev_hash") != verify_prev:
                      verify_errors.append({"seq": row.get("seq"), "reason": "prev_hash_mismatch"})
                  if actual != expected:
                      verify_errors.append({"seq": row.get("seq"), "reason": "chain_hash_mismatch"})
                  verify_prev = str(actual or expected)

              verify_payload = {
                  "schema_version": "gate-adoption-verify-v1",
                  "verified": not verify_errors,
                  "gate_pack": "middle-layer-pack-v1",
                  "stage_count": len(stages),
                  "adopted_stage_count": adopted_count,
                  "chain_head": verify_prev,
                  "errors": verify_errors,
                  "flags_path": str(gate_flags_path),
                  "log_path": str(gate_adoption_log_path),
                  "auto_apply_allowed": False,
                  "human_decision_required": True,
              }
              write_json(gate_adoption_verify_path, verify_payload)

              return {
                  "flags": flags_payload,
                  "verify": verify_payload,
              }

          def assign_incidents(entries: list[dict[str, Any]]) -> list[dict[str, Any]]:
              critical = [entry for entry in entries if entry["decision"] == "HITL_REQUIRED"]
              by_hash: dict[str, list[dict[str, Any]]] = defaultdict(list)
              for entry in critical:
                  by_hash[entry["fingerprint_hash"]].append(entry)
              incident_for_hash = {
                  fp_hash: f"INC#{idx:06d}"
                  for idx, fp_hash in enumerate(sorted(by_hash.keys()), start=1)
              }
              for entry in entries:
                  fp_hash = entry["fingerprint_hash"]
                  if fp_hash in incident_for_hash:
                      entry["incident_id"] = incident_for_hash[fp_hash]
                      entry["fix_verification"]["target_incident_id"] = incident_for_hash[fp_hash]
              return entries

          def build_notification_state(entries: list[dict[str, Any]]) -> dict[str, Any]:
              critical = [entry for entry in entries if entry["decision"] == "HITL_REQUIRED"]
              by_hash: dict[str, list[dict[str, Any]]] = defaultdict(list)
              for entry in critical:
                  by_hash[entry["fingerprint_hash"]].append(entry)
              incidents: list[dict[str, Any]] = []
              for fp_hash, grouped in sorted(by_hash.items()):
                  rep = grouped[0]
                  incidents.append(
                      {
                          "incident_id": rep.get("incident_id") or "",
                          "fingerprint_hash": fp_hash,
                          "decision": "HITL_REQUIRED",
                          "severity": rep.get("severity", "CRITICAL"),
                          "reason_code": rep.get("reason_code", ""),
                          "category": rep.get("category", ""),
                          "count": len(grouped),
                          "representative_file": rep.get("file", ""),
                          "representative_line": rep.get("line"),
                          "notification_required": True,
                          "already_notified": False,
                      }
                  )
              counts = Counter(entry["decision"] for entry in entries)
              safe_autofix = sum(
                  1 for entry in entries
                  if entry.get("autofix", {}).get("safe_autofix_candidate")
              )
              return {
                  "schema_version": "1.0",
                  "notification_policy": "critical_only_single_comment",
                  "critical_decision": "HITL_REQUIRED",
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "auto_merge_allowed": False,
                  "autofix_allowed": False,
                  "critical_count": counts.get("HITL_REQUIRED", 0),
                  "noncritical_count": len(entries) - counts.get("HITL_REQUIRED", 0),
                  "noise_count": counts.get("NOISE_CANDIDATE", 0),
                  "safe_autofix_candidate_count": safe_autofix,
                  "documentation_review_count": sum(
                      1 for entry in entries if entry.get("source") == "Documentation Review"
                  ),
                  "abuse_pattern_review_count": sum(
                      1 for entry in entries if entry.get("source") == "Tasukeru Abuse Pattern Review"
                  ),
                  "self_definition_guard_count": sum(
                      1 for entry in entries if entry.get("source") == "Tasukeru Self-Definition Guard"
                  ),
                  "stopped_gate_count": sum(
                      1 for entry in entries if entry.get("gate_decision") == "STOPPED"
                  ),
                  "fix_verification_count": sum(
                      1 for entry in entries
                      if entry.get("fix_verification", {}).get("enabled")
                  ),
                  "new_critical_incident_count": len(incidents),
                  "suppressed_duplicate_critical_incident_count": max(0, len(critical) - len(incidents)),
                  "incidents": incidents,
              }

          def write_entry_bullet(file_obj: Any, entry: dict[str, Any]) -> None:
              location = entry.get("file") or "repository"
              if entry.get("line"):
                  location = f"{location}:{entry['line']}"
              file_obj.write(f"- **{entry['decision']}** `{entry['reason_code']}` at `{location}`\n")
              file_obj.write(f"  - Source: {entry['source']}\n")
              file_obj.write(f"  - Message: {one_line(entry['message'], 260)}\n")
              file_obj.write(f"  - Classification: {one_line(entry.get('classification_reason', ''), 260)}\n")
              file_obj.write(f"  - Suggested action: {one_line(entry['suggestion'], 260)}\n")
              file_obj.write(f"  - Path profile: `{entry.get('path_profile', '')}`\n")
              file_obj.write(f"  - Autofix policy: `{entry.get('autofix', {}).get('policy', 'AUTOFIX_BLOCKED')}`\n")
              file_obj.write(f"  - Fingerprint: `{entry['fingerprint_hash']}`\n")

          def make_unified_diff(
              *,
              file_path: str,
              before: str,
              after: str,
          ) -> str:
              if before == after:
                  return ""
              before_lines = before.splitlines()
              after_lines = after.splitlines()
              diff_lines = list(
                  difflib.unified_diff(
                      before_lines,
                      after_lines,
                      fromfile=f"a/{file_path}",
                      tofile=f"b/{file_path}",
                      lineterm="\n",
                  )
              )
              if not diff_lines:
                  return ""
              return "\n".join(diff_lines) + "\n"

          def insert_after_marker_once(text: str, marker: str, addition: str) -> str:
              if addition.strip() in text:
                  return text
              index = text.find(marker)
              if index == -1:
                  suffix = "" if text.endswith("\n") else "\n"
                  return text + suffix + "\n" + addition.strip() + "\n"
              insert_at = index + len(marker)
              return text[:insert_at] + "\n\n" + addition.strip() + text[insert_at:]

          def build_readme_advisory_addition() -> str:
              return textwrap.dedent(
                  """
                  ### Advisory-only policy

                  Tasukeru Analysis is an **advisory-only** review helper.

                  It does not:

                  - create branches automatically
                  - create pull requests automatically
                  - commit changes automatically
                  - push changes automatically
                  - apply fixes automatically
                  - merge pull requests automatically

                  Only `HITL_REQUIRED` findings may produce a PR comment DRAFT artifact for human review.

                  Other findings, including `FIX_RECOMMENDED`, `REVIEW_RECOMMENDED`,
                  `NOISE_CANDIDATE`, and `INFO_ONLY`, are collected in the GitHub Step Summary
                  and workflow artifacts for human review.

                  Tasukeru Analysis is intended to reduce human review load, not to replace human
                  decision-making.
                  """
              ).strip()


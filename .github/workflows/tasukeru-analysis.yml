          def sha256_file(path: Path) -> str:
              try:
                  h = hashlib.sha256()
                  with path.open("rb") as f:
                      for chunk in iter(lambda: f.read(1024 * 1024), b""):
                          h.update(chunk)
                  return h.hexdigest()
              except Exception:
                  return ""

          def canonical_json_bytes(obj: Any) -> bytes:
              return json.dumps(
                  obj,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              ).encode("utf-8")

          def chain_hash(prev_hash: str, row_hash: str) -> str:
              return hashlib.sha256(f"{prev_hash}:{row_hash}".encode("utf-8")).hexdigest()

          def optional_hmac_sha256(value: str) -> str:
              key = os.environ.get("TASUKERU_ARL_HMAC_KEY", "")
              if not key:
                  return ""
              return hmac.new(key.encode("utf-8"), value.encode("utf-8"), hashlib.sha256).hexdigest()

          def build_arl_row(
              *,
              seq: int,
              run_id: str,
              layer: str,
              decision: str,
              sealed: bool,
              overrideable: bool,
              final_decider: str,
              reason_code: str,
              prev_hash: str,
              evidence: dict[str, Any] | None = None,
          ) -> dict[str, Any]:
              row: dict[str, Any] = {
                  "schema_version": "1.0",
                  "seq": seq,
                  "run_id": run_id,
                  "layer": layer,
                  "decision": decision,
                  "sealed": sealed,
                  "overrideable": overrideable,
                  "final_decider": final_decider,
                  "reason_code": reason_code,
                  "prev_hash": prev_hash,
                  "evidence": evidence or {},
                  "modifies_repository": False,
                  "auto_apply_allowed": False,
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "human_decision_required": True,
              }
              row_hash = hashlib.sha256(canonical_json_bytes(row)).hexdigest()
              current_chain_hash = chain_hash(prev_hash, row_hash)
              row["row_hash"] = row_hash
              row["chain_hash"] = current_chain_hash
              hmac_value = optional_hmac_sha256(current_chain_hash)
              if hmac_value:
                  row["hmac_sha256"] = hmac_value
              return row

          def verify_tasukeru_arl_hash_chain(path: Path) -> dict[str, Any]:
              errors: list[dict[str, Any]] = []
              prev_hash = "GENESIS"
              row_count = 0
              head_hash = "GENESIS"
              hmac_key_present = bool(os.environ.get("TASUKERU_ARL_HMAC_KEY", ""))

              if not path.exists():
                  return {
                      "schema_version": "1.0",
                      "tool": "tasukeru_arl_hash_chain_verify",
                      "verified": False,
                      "row_count": 0,
                      "head_hash": "",
                      "hmac_enabled": hmac_key_present,
                      "errors": [{"seq": None, "reason": "ARL file was not generated."}],
                      "policy": {
                          "modifies_repository": False,
                          "auto_apply_allowed": False,
                          "auto_branch_allowed": False,
                          "auto_pr_creation_allowed": False,
                          "auto_commit_allowed": False,
                          "auto_push_allowed": False,
                          "autofix_allowed": False,
                          "auto_merge_allowed": False,
                          "human_decision_required": True,
                      },
                  }

              with path.open("r", encoding="utf-8", errors="replace") as f:
                  for line_no, line in enumerate(f, start=1):
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          row = json.loads(line)
                      except Exception as exc:
                          errors.append({"line": line_no, "reason": f"invalid_json: {exc}"})
                          continue
                      if not isinstance(row, dict):
                          errors.append({"line": line_no, "reason": "row is not an object"})
                          continue

                      row_count += 1
                      seq = row.get("seq", row_count)
                      expected_prev = row.get("prev_hash")
                      actual_row_hash = row.get("row_hash")
                      actual_chain_hash = row.get("chain_hash")
                      row_for_hash = dict(row)
                      row_for_hash.pop("row_hash", None)
                      row_for_hash.pop("chain_hash", None)
                      row_for_hash.pop("hmac_sha256", None)
                      expected_row_hash = hashlib.sha256(canonical_json_bytes(row_for_hash)).hexdigest()
                      expected_chain_hash = chain_hash(prev_hash, expected_row_hash)

                      if expected_prev != prev_hash:
                          errors.append(
                              {
                                  "seq": seq,
                                  "reason": "prev_hash_mismatch",
                                  "expected": prev_hash,
                                  "actual": expected_prev,
                              }
                          )
                      if actual_row_hash != expected_row_hash:
                          errors.append(
                              {
                                  "seq": seq,
                                  "reason": "row_hash_mismatch",
                                  "expected": expected_row_hash,
                                  "actual": actual_row_hash,
                              }
                          )
                      if actual_chain_hash != expected_chain_hash:
                          errors.append(
                              {
                                  "seq": seq,
                                  "reason": "chain_hash_mismatch",
                                  "expected": expected_chain_hash,
                                  "actual": actual_chain_hash,
                              }
                          )
                      if hmac_key_present:
                          expected_hmac = optional_hmac_sha256(expected_chain_hash)
                          actual_hmac = row.get("hmac_sha256")
                          if actual_hmac != expected_hmac:
                              errors.append(
                                  {
                                      "seq": seq,
                                      "reason": "hmac_mismatch",
                                      "expected": expected_hmac,
                                      "actual": actual_hmac,
                                  }
                              )
                      prev_hash = str(actual_chain_hash or expected_chain_hash)
                      head_hash = prev_hash

              return {
                  "schema_version": "1.0",
                  "tool": "tasukeru_arl_hash_chain_verify",
                  "verified": not errors,
                  "row_count": row_count,
                  "head_hash": head_hash,
                  "hmac_enabled": hmac_key_present,
                  "errors": errors,
                  "policy": {
                      "modifies_repository": False,
                      "auto_apply_allowed": False,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
              }

          def generate_tasukeru_arl_hash_chain(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
          ) -> dict[str, Any]:
              """Generate an advisory-only ARL hash chain artifact.

              This does not change repository files and does not influence the existing
              finding classification. It records Tasukeru outputs as tamper-evident
              audit rows for human review.
              """
              run_id = os.environ.get("GITHUB_RUN_ID") or os.environ.get("GITHUB_RUN_NUMBER") or "local"
              seq = 1
              prev_hash = "GENESIS"
              rows: list[dict[str, Any]] = []

              summary_decision = "PAUSE_FOR_HITL" if state.get("critical_count", 0) else "RUN"
              summary_reason = "TASUKERU_HITL_REQUIRED_PRESENT" if state.get("critical_count", 0) else "TASUKERU_SUMMARY_RECORDED"
              row = build_arl_row(
                  seq=seq,
                  run_id=run_id,
                  layer="tasukeru_summary",
                  decision=summary_decision,
                  sealed=False,
                  overrideable=summary_decision == "PAUSE_FOR_HITL",
                  final_decider="SYSTEM",
                  reason_code=summary_reason,
                  prev_hash=prev_hash,
                  evidence={
                      "metadata": metadata,
                      "notification_state_summary": {
                          "critical_count": state.get("critical_count", 0),
                          "new_critical_incident_count": state.get("new_critical_incident_count", 0),
                          "suppressed_duplicate_critical_incident_count": state.get("suppressed_duplicate_critical_incident_count", 0),
                      },
                  },
              )
              rows.append(row)
              prev_hash = row["chain_hash"]
              seq += 1

              for entry in entries:
                  advisory_decision = str(entry.get("decision", ""))
                  entry_gate_decision = str(entry.get("gate_decision", "")).strip()
                  if entry_gate_decision in ALLOWED_DECISIONS:
                      arl_decision = entry_gate_decision
                  elif advisory_decision == "HITL_REQUIRED":
                      arl_decision = "PAUSE_FOR_HITL"
                  else:
                      arl_decision = "RUN"

                  arl_layer = str(entry.get("layer") or "tasukeru_finding")
                  if entry.get("sealed") is None:
                      arl_sealed = False
                  else:
                      arl_sealed = parse_bool(entry.get("sealed"))

                  if entry.get("overrideable") is None:
                      arl_overrideable = arl_decision == "PAUSE_FOR_HITL" and not arl_sealed
                  else:
                      arl_overrideable = parse_bool(entry.get("overrideable"))

                  # Preserve stronger gate semantics from the finding layer, while
                  # keeping ARL invariants valid. Sealed rows must be final SYSTEM
                  # decisions from ethics/ACC, and sealed rows are never overrideable.
                  if arl_sealed:
                      arl_overrideable = False
                      if arl_layer not in ETHICS_OR_ACC_LAYERS:
                          arl_layer = "acc_gate"

                  row = build_arl_row(
                      seq=seq,
                      run_id=run_id,
                      layer=arl_layer,
                      decision=arl_decision,
                      sealed=arl_sealed,
                      overrideable=arl_overrideable,
                      final_decider=str(entry.get("final_decider") or "SYSTEM"),
                      reason_code=str(entry.get("reason_code", "TASUKERU_FINDING_RECORDED")),
                      prev_hash=prev_hash,
                      evidence={
                          "source": entry.get("source"),
                          "advisory_decision": advisory_decision,
                          "severity": entry.get("severity"),
                          "category": entry.get("category"),
                          "rule_id": entry.get("rule_id"),
                          "file": entry.get("file"),
                          "line": entry.get("line"),
                          "fingerprint_hash": entry.get("fingerprint_hash"),
                          "path_profile": entry.get("path_profile"),
                      },
                  )
                  rows.append(row)
                  prev_hash = row["chain_hash"]
                  seq += 1

              artifact_paths = [
                  summary_path,
                  hitl_md_path,
                  hitl_json_path,
                  notification_state_path,
                  pr_comment_path,
                  dradm_md_path,
                  dradm_json_path,
                  confidence_md_path,
                  confidence_json_path,
                  readme_refinement_md_path,
                  readme_refinement_json_path,
                  self_definition_effective_path,
                  self_definition_chain_path,
                  self_definition_verify_path,
                  gate_flags_path,
                  gate_adoption_log_path,
                  gate_adoption_verify_path,
                  decision_diary_md_path,
                  decision_diary_jsonl_path,
                  decision_diary_verify_path,
                  finding_validation_report_md_path,
                  finding_validation_report_json_path,
                  finding_validation_verify_path,
                  clean_run_draft_md_path,
                  clean_run_draft_json_path,
                  clean_run_draft_verify_path,
                  pr_draft_md_path,
                  pr_draft_json_path,
                  pr_draft_verify_path,
                  three_d_vaf_md_path,
                  three_d_vaf_json_path,
                  sis_md_path,
                  sis_json_path,
                  trust_boundary_risk_md_path,
                  trust_boundary_risk_json_path,
                  trust_boundary_risk_verify_path,
                  dimension_dependency_md_path,
                  dimension_dependency_json_path,
                  dimension_dependency_verify_path,
                  probabilistic_escalation_md_path,
                  probabilistic_escalation_json_path,
                  probabilistic_escalation_verify_path,
                  log_dir / "logic-review.json",
                  log_dir / "documentation-review.json",
                  log_dir / "ruff.json",
                  log_dir / "bandit.json",
                  log_dir / "pip-audit.json",
                  *sorted(log_dir.glob("pip-audit-*.json")),
              ]
              for artifact_path in artifact_paths:
                  if not artifact_path.exists():
                      continue
                  artifact_sha256 = sha256_file(artifact_path)
                  row = build_arl_row(
                      seq=seq,
                      run_id=run_id,
                      layer="artifact_integrity",
                      decision="RUN",
                      sealed=False,
                      overrideable=False,
                      final_decider="SYSTEM",
                      reason_code="TASUKERU_ARTIFACT_RECORDED",
                      prev_hash=prev_hash,
                      evidence={
                          "artifact": str(artifact_path).replace("\\", "/"),
                          "artifact_sha256": artifact_sha256,
                          "size_bytes": artifact_path.stat().st_size,
                      },
                  )
                  rows.append(row)
                  prev_hash = row["chain_hash"]
                  seq += 1

              with arl_jsonl_path.open("w", encoding="utf-8") as f:
                  for row in rows:
                      f.write(json.dumps(row, ensure_ascii=False, sort_keys=True) + "\n")

              verification = verify_tasukeru_arl_hash_chain(arl_jsonl_path)
              verification.update(
                  {
                      "arl_path": str(arl_jsonl_path),
                      "verify_path": str(arl_verify_json_path),
                      "purpose": "Advisory-only tamper-evident record of Tasukeru outputs.",
                  }
              )
              write_json(arl_verify_json_path, verification)
              return verification

          def build_tasukeru_announcement_payload(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
          ) -> dict[str, Any]:
              """Translate verified ARL/advisory outputs into a human-readable summary.

              This announcer layer is read-only and advisory-only. It does not change
              findings, clear HITL_REQUIRED, modify repository files, or authorize any
              automatic action.
              """
              counts = Counter(entry.get("decision", "UNKNOWN") for entry in entries)
              arl_verified = bool(arl_verification.get("verified"))
              critical_count = int(state.get("critical_count", counts.get("HITL_REQUIRED", 0)) or 0)
              review_count = int(counts.get("FIX_RECOMMENDED", 0) + counts.get("REVIEW_RECOMMENDED", 0))
              noise_count = int(counts.get("NOISE_CANDIDATE", 0))
              info_count = int(counts.get("INFO_ONLY", 0))

              confidence_report = read_json(confidence_json_path, {})
              total_confidence = (
                  confidence_report.get("total") or {}
                  if isinstance(confidence_report, dict)
                  else {}
              )
              dradm_report = read_json(dradm_json_path, {})
              readme_refinement_report = read_json(readme_refinement_json_path, {})
              readme_refinement_draft = {}
              if isinstance(readme_refinement_report, dict):
                  draft_obj = readme_refinement_report.get("draft")
                  if isinstance(draft_obj, dict):
                      readme_refinement_draft = draft_obj
                  else:
                      readme_refinement_draft = readme_refinement_report

              automation_policy = {
                  "auto_branch_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "human_decision_required": True,
              }

              if not arl_verified:
                  conclusion_ja = (
                      "ARLハッシュチェーンの検証に失敗したため、通常要約は制限されています。"
                      "原因・主体・意図は推測せず、tasukeru_arl_verify.json を確認してください。"
                  )
                  mode = "ARL_VERIFY_FAILED_LIMITED_SUMMARY"
                  recommended_next_actions = [
                      "tasukeru_arl_verify.json を確認する",
                      "tasukeru_arl.jsonl の欠損・破損・改ざん検知エラーを確認する",
                      "ARL検証が回復するまで、この要約を最終判断に使わない",
                  ]
              elif critical_count:
                  conclusion_ja = (
                      "HITL_REQUIRED が検出されています。merge前に人間確認が必要です。"
                      "ARLハッシュチェーンは検証済みです。"
                  )
                  mode = "HITL_REQUIRED_SUMMARY"
                  recommended_next_actions = [
                      "tasukeru_hitl_review.md を確認する",
                      "tasukeru_hitl_review.json で対象reason_codeとfileを確認する",
                      "必要に応じて該当artifactとARL行へ戻る",
                      "人間が判断するまでmergeしない",
                  ]
              else:
                  conclusion_ja = (
                      "このrunでは HITL_REQUIRED はありません。"
                      "ARLハッシュチェーンは検証済みです。"
                      "自動PR・自動commit・自動push・自動fix・自動mergeは有効化されていません。"
                  )
                  mode = "NORMAL_HUMAN_SUMMARY"
                  recommended_next_actions = [
                      "tasukeru_advisory_summary.md を確認する",
                      "必要に応じて tasukeru_dradm_draft.md と tasukeru_readme_refinement_draft.md を確認する",
                      "FIX_RECOMMENDED / REVIEW_RECOMMENDED の残件を次の改善候補として扱う",
                  ]

              look_first = [
                  "tasukeru_advisory_summary.md",
                  "tasukeru_hitl_review.md",
                  "tasukeru_hitl_review.json",
                  "tasukeru_arl_verify.json",
              ]
              if dradm_report:
                  look_first.append("tasukeru_dradm_draft.md")
              if readme_refinement_report:
                  look_first.append("tasukeru_readme_refinement_draft.md")
              if confidence_report:
                  look_first.append("tasukeru_confidence_report.md")

              source_constraints = {
                  "source_of_truth": "tasukeru_arl.jsonl + tasukeru_arl_verify.json + advisory artifacts",
                  "arl_verified": arl_verified,
                  "do_not_infer_actor_intent_or_cause": True,
                  "do_not_claim_safety_guarantee": True,
                  "unknowns_must_remain_unknown": True,
                  "summary_is_not_final_decision": True,
                  "public_comments_must_not_include_payloads": True,
                  "public_comments_must_not_include_attack_steps": True,
              }

              return {
                  "schema_version": "1.0",
                  "tool": "tasukeru_announcer",
                  "status": "ADVISORY_ONLY",
                  "mode": mode,
                  "generated": True,
                  "purpose": "Translate verified Tasukeru ARL/advisory outputs into a concise human-readable summary.",
                  "conclusion_ja": conclusion_ja,
                  "metadata": metadata,
                  "decision_counts": dict(counts),
                  "review_queue": {
                      "hitl_required": critical_count,
                      "fix_recommended": int(counts.get("FIX_RECOMMENDED", 0)),
                      "review_recommended": int(counts.get("REVIEW_RECOMMENDED", 0)),
                      "noise_candidate": noise_count,
                      "info_only": info_count,
                      "remaining_review_items": review_count,
                  },
                  "arl": {
                      "verified": arl_verified,
                      "row_count": arl_verification.get("row_count"),
                      "head_hash": arl_verification.get("head_hash"),
                      "hmac_enabled": arl_verification.get("hmac_enabled"),
                      "error_count": len(arl_verification.get("errors", []) or []),
                      "verify_artifact": "tasukeru_arl_verify.json",
                      "source_artifact": "tasukeru_arl.jsonl",
                  },
                  "confidence": {
                      "score": total_confidence.get("total_confidence_score"),
                      "level": total_confidence.get("total_confidence_level"),
                      "scope": "classification/suggestion confidence only; not permission to auto-apply changes",
                  },
                  "drafts": {
                      "dradm_draft_count": dradm_report.get("draft_count") if isinstance(dradm_report, dict) else None,
                      "readme_refinement_status": readme_refinement_draft.get("draft_status")
                      if isinstance(readme_refinement_draft, dict)
                      else None,
                      "readme_refinement_target": readme_refinement_draft.get("target_file")
                      if isinstance(readme_refinement_draft, dict)
                      else None,
                  },
                  "look_first": look_first,
                  "recommended_next_actions": recommended_next_actions,
                  "source_constraints": source_constraints,
                  "self_definition": metadata.get("self_definition", {}),
                  "middle_layer": metadata.get("middle_layer", {}),
                  "policy": automation_policy,
              }

          def write_tasukeru_announcement(payload: dict[str, Any]) -> None:
              write_json(announcement_json_path, payload)
              review_queue = payload.get("review_queue", {}) if isinstance(payload, dict) else {}
              arl = payload.get("arl", {}) if isinstance(payload, dict) else {}
              confidence = payload.get("confidence", {}) if isinstance(payload, dict) else {}
              drafts = payload.get("drafts", {}) if isinstance(payload, dict) else {}
              policy = payload.get("policy", {}) if isinstance(payload, dict) else {}
              source_constraints = payload.get("source_constraints", {}) if isinstance(payload, dict) else {}

              with announcement_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru Announcement\n\n")
                  f.write("This artifact is an announcer-style natural-language summary. ")
                  f.write("It translates verified Tasukeru ARL/advisory outputs for human review and does not make decisions.\n\n")
                  f.write("## 結論\n\n")
                  f.write(str(payload.get("conclusion_ja", "No conclusion generated.")) + "\n\n")
                  f.write("## 確認結果\n\n")
                  f.write(f"- Mode: `{payload.get('mode')}`\n")
                  f.write(f"- ARL verified: `{arl.get('verified')}`\n")
                  f.write(f"- ARL rows: `{arl.get('row_count')}`\n")
                  f.write(f"- ARL head hash: `{arl.get('head_hash')}`\n")
                  f.write(f"- ARL HMAC enabled: `{arl.get('hmac_enabled')}`\n")
                  f.write(f"- ARL error count: `{arl.get('error_count')}`\n")
                  f.write(f"- HITL_REQUIRED: `{review_queue.get('hitl_required')}`\n")
                  f.write(f"- FIX_RECOMMENDED: `{review_queue.get('fix_recommended')}`\n")
                  f.write(f"- REVIEW_RECOMMENDED: `{review_queue.get('review_recommended')}`\n")
                  f.write(f"- NOISE_CANDIDATE: `{review_queue.get('noise_candidate')}`\n")
                  f.write(f"- INFO_ONLY: `{review_queue.get('info_only')}`\n")
                  f.write(f"- Confidence: `{confidence.get('score')}` / `1.0` ({confidence.get('level')})\n")
                  f.write(f"- DRADM draft count: `{drafts.get('dradm_draft_count')}`\n")
                  f.write(f"- README refinement status: `{drafts.get('readme_refinement_status')}`\n")
                  self_definition = payload.get("self_definition", {}) if isinstance(payload, dict) else {}
                  if isinstance(self_definition, dict) and self_definition:
                      f.write(f"- Self-definition verified: `{self_definition.get('verified')}`\n")
                      f.write(f"- Self-definition hash: `{self_definition.get('definition_sha256')}`\n")
                      f.write(f"- Self-definition chain head: `{self_definition.get('chain_head')}`\n")
                  middle_layer = payload.get("middle_layer", {}) if isinstance(payload, dict) else {}
                  if isinstance(middle_layer, dict) and middle_layer:
                      ml_flags = middle_layer.get("flags", {}) if isinstance(middle_layer.get("flags"), dict) else {}
                      f.write(f"- Middle Layer adopted stages: `{ml_flags.get('adopted_stage_count')}`\n")
                      f.write(f"- Middle Layer strategy: `{ml_flags.get('adoption_strategy')}`\n")
                  f.write("\n")

                  f.write("## 人間が先に見るもの\n\n")
                  for item in payload.get("look_first", []) or []:
                      f.write(f"- `{item}`\n")
                  f.write("\n## 推奨される次の確認\n\n")
                  for item in payload.get("recommended_next_actions", []) or []:
                      f.write(f"- {item}\n")

                  f.write("\n## 権限と制限\n\n")
                  f.write("- This announcement does not clear `HITL_REQUIRED`.\n")
                  f.write("- This announcement does not modify repository files.\n")
                  f.write("- This announcement does not create branches, PRs, commits, pushes, fixes, or merges.\n")
                  f.write(f"- Auto branch creation: `{policy.get('auto_branch_allowed')}`\n")
                  f.write(f"- Auto PR creation: `{policy.get('auto_pr_creation_allowed')}`\n")
                  f.write(f"- Auto commit: `{policy.get('auto_commit_allowed')}`\n")
                  f.write(f"- Auto push: `{policy.get('auto_push_allowed')}`\n")
                  f.write(f"- Auto fix: `{policy.get('autofix_allowed')}`\n")
                  f.write(f"- Auto merge: `{policy.get('auto_merge_allowed')}`\n")
                  f.write(f"- Human decision required: `{policy.get('human_decision_required')}`\n")

                  f.write("\n## NCF / fact-boundary note\n\n")
                  f.write("- This announcement only summarizes recorded ARL/advisory artifacts.\n")
                  f.write("- It must not infer cause, actor, or intent beyond the logs.\n")
                  f.write("- It must not claim production safety or compliance certification.\n")
                  f.write(f"- Source of truth: `{source_constraints.get('source_of_truth')}`\n")

          def generate_tasukeru_announcement(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
          ) -> dict[str, Any]:
              payload = build_tasukeru_announcement_payload(entries, state, metadata, arl_verification)
              write_tasukeru_announcement(payload)
              return payload

          def classify_finding_validation_class(entry: dict[str, Any]) -> tuple[str, str]:
              decision = str(entry.get("decision", entry.get("level", "INFO_ONLY")))
              path_profile = str(entry.get("path_profile", classify_path_profile(str(entry.get("file", "")))))
              source = str(entry.get("source", ""))

              if decision == "HITL_REQUIRED":
                  return (
                      "ACTIVE_REPAIR_CANDIDATE",
                      "HITL_REQUIRED finding: must remain visible for human review before merge or further action.",
                  )
              if decision == "FIX_RECOMMENDED":
                  return (
                      "ACTIVE_REPAIR_CANDIDATE",
                      "FIX_RECOMMENDED finding: likely actionable, but still requires human review and manual adoption.",
                  )
              if decision == "REVIEW_RECOMMENDED":
                  return (
                      "REVIEW_ONLY",
                      "Review-only finding: context should be checked before deciding whether to fix, document, suppress, or accept.",
                  )
              if path_profile in {"historical", "archive"}:
                  return (
                      "HISTORICAL_WARNING",
                      "Historical or archive finding: kept visible for auditability, but not treated as an active repair target.",
                  )
              if decision == "NOISE_CANDIDATE":
                  return (
                      "NOISE_CANDIDATE",
                      "Likely expected noise for tests, demos, research simulations, or known low-risk context.",
                  )
              if decision == "INFO_ONLY":
                  return (
                      "INFO_ONLY",
                      "Informational finding: retained for traceability without active repair priority.",
                  )
              return (
                  "REVIEW_ONLY",
                  f"Unrecognized decision from {source}: defaulting to review-only validation.",
              )

          def validate_finding_policy(entry: dict[str, Any]) -> list[dict[str, Any]]:
              violations: list[dict[str, Any]] = []
              blocked_flags = (
                  "auto_branch_allowed",
                  "auto_pr_creation_allowed",
                  "auto_commit_allowed",
                  "auto_push_allowed",
                  "auto_merge_allowed",
                  "autofix_allowed",
              )
              for flag in blocked_flags:
                  if bool(entry.get(flag)):
                      violations.append(
                          {
                              "reason_code": "FINDING_VALIDATION_AUTO_POLICY_VIOLATION",
                              "field": flag,
                              "value": entry.get(flag),
                              "file": entry.get("file", ""),
                              "rule_id": entry.get("rule_id", ""),
                          }
                      )

              autofix = entry.get("autofix", {})
              if isinstance(autofix, dict):
                  for flag in ("autofix_allowed", "auto_merge_allowed"):
                      if bool(autofix.get(flag)):
                          violations.append(
                              {
                                  "reason_code": "FINDING_VALIDATION_AUTOFIX_POLICY_VIOLATION",
                                  "field": f"autofix.{flag}",
                                  "value": autofix.get(flag),
                                  "file": entry.get("file", ""),
                                  "rule_id": entry.get("rule_id", ""),
                              }
                          )

              verification = entry.get("fix_verification", {})
              if isinstance(verification, dict) and bool(verification.get("modifies_repository")):
                  violations.append(
                      {
                          "reason_code": "FINDING_VALIDATION_REPOSITORY_MUTATION_ATTEMPT",
                          "field": "fix_verification.modifies_repository",
                          "value": verification.get("modifies_repository"),
                          "file": entry.get("file", ""),
                          "rule_id": entry.get("rule_id", ""),
                      }
                  )

              public_policy = entry.get("public_output_policy", {})
              if isinstance(public_policy, dict):
                  if bool(public_policy.get("include_exploit_payloads")) or bool(public_policy.get("include_attack_steps")):
                      violations.append(
                          {
                              "reason_code": "FINDING_VALIDATION_PUBLIC_OUTPUT_POLICY_VIOLATION",
                              "field": "public_output_policy",
                              "value": public_policy,
                              "file": entry.get("file", ""),
                              "rule_id": entry.get("rule_id", ""),
                          }
                      )

              return violations

          def build_tasukeru_finding_validation_report(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
          ) -> dict[str, Any]:
              """Validate finding classifications without modifying findings.

              This layer is report-only. It does not rewrite findings, tune rules,
              generate patches, create PRs, commit, push, auto-fix, or auto-merge.
              """
              validated_findings: list[dict[str, Any]] = []
              policy_violations: list[dict[str, Any]] = []

              for index, entry in enumerate(entries, start=1):
                  validation_class, validation_reason = classify_finding_validation_class(entry)
                  entry_violations = validate_finding_policy(entry)
                  policy_violations.extend(entry_violations)
                  validated_findings.append(
                      {
                          "index": index,
                          "source": entry.get("source", ""),
                          "decision": entry.get("decision", entry.get("level", "")),
                          "validation_class": validation_class,
                          "validation_reason": validation_reason,
                          "severity": entry.get("severity", ""),
                          "rule_id": entry.get("rule_id", entry.get("code", "")),
                          "reason_code": entry.get("reason_code", ""),
                          "file": entry.get("file", ""),
                          "line": entry.get("line"),
                          "path_profile": entry.get("path_profile", classify_path_profile(str(entry.get("file", "")))),
                          "fingerprint_hash": entry.get("fingerprint_hash", ""),
                          "requires_human_review": entry.get("decision", entry.get("level", "")) in {
                              "HITL_REQUIRED",
                              "FIX_RECOMMENDED",
                              "REVIEW_RECOMMENDED",
                          },
                          "patch_draft_allowed": False,
                          "auto_apply_allowed": False,
                      }
                  )

              validation_counts = Counter(item["validation_class"] for item in validated_findings)
              decision_counts = Counter(str(entry.get("decision", entry.get("level", "UNKNOWN"))) for entry in entries)
              source_counts = Counter(str(entry.get("source", "UNKNOWN")) for entry in entries)
              path_profile_counts = Counter(str(item.get("path_profile", "UNKNOWN")) for item in validated_findings)
              verified = not policy_violations
              report = {
                  "schema_version": "finding-validation-layer-v1",
                  "verified": verified,
                  "decision": "RUN" if verified else "PAUSE_FOR_HITL",
                  "reason_code": "FINDING_VALIDATION_VERIFIED" if verified else "FINDING_VALIDATION_REVIEW_REQUIRED",
                  "report_only": True,
                  "finding_count": len(entries),
                  "validation_counts": dict(sorted(validation_counts.items())),
                  "decision_counts": dict(sorted(decision_counts.items())),
                  "source_counts": dict(sorted(source_counts.items())),
                  "path_profile_counts": dict(sorted(path_profile_counts.items())),
                  "policy_violation_count": len(policy_violations),
                  "policy_violations": policy_violations,
                  "validated_findings": validated_findings,
                  "policy": {
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "workflow_auto_edit_allowed": False,
                      "self_definition_auto_update_allowed": False,
                      "patch_generation_enabled": False,
                      "human_decision_required_for_adoption": True,
                  },
              }
              report["report_sha256"] = canonical_hash(
                  {
                      "schema_version": report["schema_version"],
                      "verified": report["verified"],
                      "decision": report["decision"],
                      "reason_code": report["reason_code"],
                      "finding_count": report["finding_count"],
                      "validation_counts": report["validation_counts"],
                      "policy_violation_count": report["policy_violation_count"],
                      "policy_violations": report["policy_violations"],
                  }
              )
              return report

          def write_tasukeru_finding_validation_report(report: dict[str, Any]) -> None:
              write_json(finding_validation_report_json_path, report)
              verify_payload = {
                  "schema_version": "finding-validation-verify-v1",
                  "verified": bool(report.get("verified")),
                  "decision": report.get("decision"),
                  "reason_code": report.get("reason_code"),
                  "finding_count": report.get("finding_count"),
                  "validation_counts": report.get("validation_counts", {}),
                  "policy_violation_count": report.get("policy_violation_count"),
                  "report_artifact": str(finding_validation_report_json_path),
                  "summary_artifact": str(finding_validation_report_md_path),
                  "report_sha256": report.get("report_sha256"),
                  "report_only": True,
                  "auto_apply_allowed": False,
                  "patch_generation_enabled": False,
                  "human_decision_required_for_adoption": True,
              }
              write_json(finding_validation_verify_path, verify_payload)

              with finding_validation_report_md_path.open("w", encoding="utf-8") as file_obj:
                  file_obj.write("# Tasukeru Finding Validation Layer v1\n\n")
                  file_obj.write("This report is advisory-only and report-only. It validates finding classifications without rewriting findings or applying fixes.\n\n")
                  file_obj.write("## Result\n\n")
                  file_obj.write(f"- Verified: `{report.get('verified')}`\n")
                  file_obj.write(f"- Decision: `{report.get('decision')}`\n")
                  file_obj.write(f"- Reason code: `{report.get('reason_code')}`\n")
                  file_obj.write(f"- Finding count: `{report.get('finding_count')}`\n")
                  file_obj.write(f"- Policy violation count: `{report.get('policy_violation_count')}`\n")
                  file_obj.write(f"- Report hash: `{report.get('report_sha256')}`\n")
                  file_obj.write("\n## Validation classes\n\n")
                  for key, count in (report.get("validation_counts", {}) or {}).items():
                      file_obj.write(f"- {key}: `{count}`\n")
                  file_obj.write("\n## Decision counts\n\n")
                  for key, count in (report.get("decision_counts", {}) or {}).items():
                      file_obj.write(f"- {key}: `{count}`\n")
                  file_obj.write("\n## Policy violations\n\n")
                  violations = report.get("policy_violations", []) or []
                  if not violations:
                      file_obj.write("- None\n")
                  else:
                      for item in violations:
                          file_obj.write(
                              f"- `{item.get('reason_code')}` field=`{item.get('field')}` "
                              f"file=`{item.get('file')}` rule=`{item.get('rule_id')}`\n"
                          )
                  file_obj.write("\n## Policy\n\n")
                  file_obj.write("- Report-only: `true`\n")
                  file_obj.write("- Patch generation: `false`\n")
                  file_obj.write("- Auto branch creation: `false`\n")
                  file_obj.write("- Auto PR creation: `false`\n")
                  file_obj.write("- Auto commit: `false`\n")
                  file_obj.write("- Auto push: `false`\n")
                  file_obj.write("- Auto fix: `false`\n")
                  file_obj.write("- Auto merge: `false`\n")
                  file_obj.write("- Human adoption required: `true`\n")

          def generate_tasukeru_finding_validation_report(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
          ) -> dict[str, Any]:
              report = build_tasukeru_finding_validation_report(entries, state, metadata)
              write_tasukeru_finding_validation_report(report)
              return report

          def build_tasukeru_clean_run_draft(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
              announcement: dict[str, Any],
              result_consistency: dict[str, Any],
          ) -> dict[str, Any]:
              """Generate a draft-only clean-run or review-status note.

              This layer does not change findings, rewrite artifacts, create PRs,
              commit, push, auto-fix, or auto-merge. It exists only to make the
              no-active-repair state reviewable for humans.
              """
              counts = Counter(entry.get("decision", "UNKNOWN") for entry in entries)
              finding_validation = metadata.get("finding_validation", {}) if isinstance(metadata, dict) else {}
              self_definition = metadata.get("self_definition", {}) if isinstance(metadata, dict) else {}
              middle_layer = metadata.get("middle_layer", {}) if isinstance(metadata, dict) else {}
              middle_verify = middle_layer.get("verify", {}) if isinstance(middle_layer, dict) else {}
              probabilistic_escalation = metadata.get("probabilistic_escalation", {}) if isinstance(metadata, dict) else {}
              trust_boundary_risk = metadata.get("trust_boundary_risk", {}) if isinstance(metadata, dict) else {}
              pr_draft = metadata.get("pr_draft", {}) if isinstance(metadata, dict) else {}
              pr_draft_seen = "verified" in pr_draft

              checks = {
                  "hitl_required_zero": int(counts.get("HITL_REQUIRED", 0)) == 0,
                  "arl_verified": bool(arl_verification.get("verified")),
                  "result_consistency_verified": bool(result_consistency.get("verified")),
                  "finding_validation_verified": bool(finding_validation.get("verified")),
                  "finding_validation_policy_violations_zero": int(finding_validation.get("policy_violation_count", 0) or 0) == 0,
                  "self_definition_verified": bool(self_definition.get("verified")),
                  "middle_layer_verified": bool(middle_verify.get("verified")),
                  "pel_report_only": str(probabilistic_escalation.get("decision", "RUN")) == "RUN",
                  "pel_auto_control_disabled": True,
                  "tbrl_report_only": str(trust_boundary_risk.get("decision", "RUN")) == "RUN",
                  "tbrl_defensive_advice_only": True,
                  "pr_draft_verified_if_generated": (not pr_draft_seen) or bool(pr_draft.get("verified")),
                  "pr_draft_changed_files_available_if_pr": (
                      (not pr_draft_seen)
                      or os.environ.get("GITHUB_EVENT_NAME") != "pull_request"
                      or int(pr_draft.get("changed_file_count", 0) or 0) > 0
                  ),
                  "automation_policy_locked": True,
              }
              blockers = [key for key, value in checks.items() if not value]
              clean_ready = not blockers
              mode = "CLEAN_RUN_REVIEW_DRAFT" if clean_ready else "REVIEW_STATUS_DRAFT"
              reason_code = "CLEAN_RUN_DRAFT_GENERATED" if clean_ready else "CLEAN_RUN_DRAFT_BLOCKED_BY_REVIEW_ITEMS"

              review_queue = {
                  "HITL_REQUIRED": int(counts.get("HITL_REQUIRED", 0)),
                  "FIX_RECOMMENDED": int(counts.get("FIX_RECOMMENDED", 0)),
                  "REVIEW_RECOMMENDED": int(counts.get("REVIEW_RECOMMENDED", 0)),
                  "NOISE_CANDIDATE": int(counts.get("NOISE_CANDIDATE", 0)),
                  "INFO_ONLY": int(counts.get("INFO_ONLY", 0)),
              }
              draft = {
                  "schema_version": "clean-run-draft-layer-v1",
                  "generated": True,
                  "clean_run_ready": clean_ready,
                  "mode": mode,
                  "decision": "RUN" if clean_ready else "PAUSE_FOR_HITL",
                  "reason_code": reason_code,
                  "blockers": blockers,
                  "checks": checks,
                  "review_queue": review_queue,
                  "summary": {
                      "finding_count": len(entries),
                      "arl_rows": arl_verification.get("row_count"),
                      "announcement_mode": announcement.get("mode"),
                      "result_consistency_mismatch_count": result_consistency.get("mismatch_count"),
                      "finding_validation_policy_violation_count": finding_validation.get("policy_violation_count"),
                      "pel_escalation_candidate_count": probabilistic_escalation.get("escalation_candidate_count"),
                      "pel_max_probability": probabilistic_escalation.get("max_probability"),
                      "tbrl_review_candidate_count": trust_boundary_risk.get("review_candidate_count"),
                      "tbrl_high_signal_count": trust_boundary_risk.get("high_signal_count"),
                      "pr_draft_verified": pr_draft.get("verified") if pr_draft_seen else None,
                      "pr_draft_changed_file_count": pr_draft.get("changed_file_count") if pr_draft_seen else None,
                  },
                  "human_review_note": (
                      "No active HITL blocker was detected and verification layers passed."
                      if clean_ready
                      else "This is a review-status draft because one or more clean-run checks did not pass."
                  ),
                  "policy": {
                      "report_only": True,
                      "draft_only": True,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "workflow_auto_edit_allowed": False,
                      "self_definition_auto_update_allowed": False,
                      "auto_apply_allowed": False,
                      "human_decision_required_for_adoption": True,
                  },
              }
              draft["draft_sha256"] = canonical_hash(
                  {
                      "schema_version": draft["schema_version"],
                      "generated": draft["generated"],
                      "clean_run_ready": draft["clean_run_ready"],
                      "mode": draft["mode"],
                      "decision": draft["decision"],
                      "reason_code": draft["reason_code"],
                      "blockers": draft["blockers"],
                      "checks": draft["checks"],
                      "review_queue": draft["review_queue"],
                  }
              )
              return draft

          def write_tasukeru_clean_run_draft(draft: dict[str, Any]) -> None:
              write_json(clean_run_draft_json_path, draft)
              verify_payload = {
                  "schema_version": "clean-run-draft-verify-v1",
                  "verified": True,
                  "generated": bool(draft.get("generated")),
                  "clean_run_ready": bool(draft.get("clean_run_ready")),
                  "mode": draft.get("mode"),
                  "decision": draft.get("decision"),
                  "reason_code": draft.get("reason_code"),
                  "blockers": draft.get("blockers", []),
                  "report_artifact": str(clean_run_draft_json_path),
                  "summary_artifact": str(clean_run_draft_md_path),
                  "draft_sha256": draft.get("draft_sha256"),
                  "report_only": True,
                  "draft_only": True,
                  "auto_apply_allowed": False,
                  "auto_pr_creation_allowed": False,
                  "auto_commit_allowed": False,
                  "auto_push_allowed": False,
                  "auto_fix_allowed": False,
                  "auto_merge_allowed": False,
                  "human_decision_required_for_adoption": True,
              }
              write_json(clean_run_draft_verify_path, verify_payload)

              with clean_run_draft_md_path.open("w", encoding="utf-8") as file_obj:
                  file_obj.write("# Tasukeru Clean Run Draft Layer v1\n\n")
                  file_obj.write("This artifact is draft-only and report-only. It does not apply fixes, create PRs, commit, push, or merge.\n\n")
                  file_obj.write("## Result\n\n")
                  file_obj.write(f"- Generated: `{draft.get('generated')}`\n")
                  file_obj.write(f"- Clean run ready: `{draft.get('clean_run_ready')}`\n")
                  file_obj.write(f"- Mode: `{draft.get('mode')}`\n")
                  file_obj.write(f"- Decision: `{draft.get('decision')}`\n")
                  file_obj.write(f"- Reason code: `{draft.get('reason_code')}`\n")
                  file_obj.write(f"- Draft hash: `{draft.get('draft_sha256')}`\n")
                  file_obj.write("\n## Checks\n\n")
                  for key, value in (draft.get("checks", {}) or {}).items():
                      file_obj.write(f"- {key}: `{value}`\n")
                  file_obj.write("\n## Review queue\n\n")
                  for key, value in (draft.get("review_queue", {}) or {}).items():
                      file_obj.write(f"- {key}: `{value}`\n")
                  file_obj.write("\n## Blockers\n\n")
                  blockers = draft.get("blockers", []) or []
                  if not blockers:
                      file_obj.write("- None\n")
                  else:
                      for blocker in blockers:
                          file_obj.write(f"- `{blocker}`\n")
                  file_obj.write("\n## Human review note\n\n")
                  file_obj.write(str(draft.get("human_review_note", "")) + "\n")
                  file_obj.write("\n## Policy\n\n")
                  file_obj.write("- Report-only: `true`\n")
                  file_obj.write("- Draft-only: `true`\n")
                  file_obj.write("- Auto branch creation: `false`\n")
                  file_obj.write("- Auto PR creation: `false`\n")
                  file_obj.write("- Auto commit: `false`\n")
                  file_obj.write("- Auto push: `false`\n")
                  file_obj.write("- Auto fix: `false`\n")
                  file_obj.write("- Auto merge: `false`\n")
                  file_obj.write("- Human adoption required: `true`\n")

          def generate_tasukeru_clean_run_draft(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
              arl_verification: dict[str, Any],
              announcement: dict[str, Any],
              result_consistency: dict[str, Any],
          ) -> dict[str, Any]:
              draft = build_tasukeru_clean_run_draft(entries, state, metadata, arl_verification, announcement, result_consistency)
              write_tasukeru_clean_run_draft(draft)
              return draft

          def read_lines_as_normalized_paths(path: Path) -> list[str]:
              if not path.exists():
                  return []
              files = [
                  normalize_path(line.strip())
                  for line in read_text(path, "").splitlines()
                  if line.strip()
              ]
              return sorted(dict.fromkeys(files))


          def read_pr_draft_changed_files() -> list[str]:
              # Changed files should represent the actual PR diff. Prefer the
              # unfiltered PR-file list captured in changed-files-all.txt, and
              # fall back to the filtered list only when older artifacts or local
              # simulations do not provide the unfiltered source.
              candidates = [
                  log_dir / "changed-files-all.txt",
                  Path("tasukeru_changed_files.txt"),
                  log_dir / "changed-files.txt",
              ]
              for path in candidates:
                  files = read_lines_as_normalized_paths(path)
                  if files:
                      return files
              return []


          def read_pr_draft_relevant_changed_files() -> list[str]:
              # Relevant changed files are the subset that Tasukeru actually scans
              # or reviews under this workflow's path filters.
              candidates = [
                  Path("tasukeru_changed_files.txt"),
                  log_dir / "changed-files.txt",
              ]
              for path in candidates:
                  files = read_lines_as_normalized_paths(path)
                  if files:
                      return files
              return []

          def read_pr_draft_scanned_files() -> list[str]:
              path = log_dir / "scanned-files.txt"
              if not path.exists():
                  return []
              files = [
                  normalize_path(line.strip())
                  for line in read_text(path, "").splitlines()
                  if line.strip()
              ]
              return sorted(dict.fromkeys(files))


          def read_text(path: Path, default: str = "") -> str:
              try:
                  return path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  try:
                      return path.read_text(encoding="utf-8", errors="replace")
                  except Exception:
                      return default
              except Exception:
                  return default

          def read_json(path: Path, default: Any) -> Any:
              try:
                  text = path.read_text(encoding="utf-8").strip()
                  if not text:
                      return default
                  return json.loads(text)
              except Exception:
                  return default

          def write_json(path: Path, obj: Any) -> None:
              path.write_text(
                  json.dumps(obj, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          def read_exit(name: str) -> int:
              text = read_text(log_dir / name, "0").strip()
              try:
                  return int(text)
              except ValueError:
                  return 0

          def is_skipped(path: Path) -> bool:
              return any(part in SKIP_DIRS for part in path.parts)

          def is_text_candidate(path: Path) -> bool:
              if is_skipped(path) or not path.is_file():
                  return False
              try:
                  if path.stat().st_size > 2_000_000:
                      return False
              except OSError:
                  return False
              return path.suffix in TEXT_EXTS or path.name in {"LICENSE", "NOTICE"}

          def iter_text_files() -> list[Path]:
              return sorted(path for path in repo.rglob("*") if is_text_candidate(path))

          def sha256_text(text: str) -> str:
              return hashlib.sha256(text.encode("utf-8")).hexdigest()

          def canonical_hash(obj: Any) -> str:
              payload = json.dumps(
                  obj,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )
              return hashlib.sha256(payload.encode("utf-8")).hexdigest()

          def normalize_path(path: str) -> str:
              normalized = path.replace("\\", "/")
              while normalized.startswith("./"):
                  normalized = normalized[2:]
              return normalized

          def normalized_message(message: str) -> str:
              text = message.lower()
              text = re.sub(r"\b\d+\b", "<num>", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def one_line(value: Any, limit: int = 240) -> str:
              text = str(value).replace("\n", " ").strip()
              if len(text) > limit:
                  return text[: limit - 1] + "…"
              return text

          def safe_snippet(path: str, line: int | None, radius: int = 0) -> str:
              if not path or path == "?":
                  return ""
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              try:
                  lines = p.read_text(encoding="utf-8", errors="replace").splitlines()
              except Exception:
                  return ""
              if not line or line < 1 or line > len(lines):
                  return ""
              start = max(1, line - radius)
              end = min(len(lines), line + radius)
              return "\n".join(lines[start - 1:end])[:1200]

          def is_test_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              parts = normalized.split("/")
              return (
                  "tests" in parts
                  or normalized.startswith("test_")
                  or "/test_" in normalized
                  or normalized.endswith("_test.py")
              )

          def is_workflow_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              return normalized.startswith(".github/workflows/")

          def is_documentation_or_policy_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              protected_names = {
                  "readme.md",
                  "readme.ja.md",
                  "security.md",
                  "license",
                  "license_policy.md",
                  "contributing.md",
                  "code_of_conduct.md",
                  "notice",
                  "trademarks.md",
                  "pull_request_template.md",
              }
              return (
                  normalized.startswith("docs/")
                  or normalized.startswith(".github/issue_template/")
                  or name in protected_names
                  or name.startswith("readme")
                  or name.startswith("license")
              )

          def is_safety_or_hitl_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              safety_markers = (
                  "tasukeru",
                  "kage",
                  "orchestrator",
                  "mediation",
                  "hitl",
                  "rfl",
                  "arl",
                  "ethics",
                  "acc",
                  "checkpoint",
                  "audit",
                  "codebook",
                  "emergency_contract",
                  "task_contract",
              )
              return any(marker in name or marker in normalized for marker in safety_markers)

          def is_active_safety_or_hitl_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              active_exact_names = {
                  "tasukeru-analysis.yml",
                  "log_codebook.json",
                  "log_codebook_demo.json",
                  "emergency_contract_kage_orchestrator_v1_0.py",
                  "test_emergency_contract_kage_orchestrator_v1_0.py",
                  "ai_doc_orchestrator_kage3_v1_3_5.py",
                  "ai_doc_orchestrator_kage3_v1_2_7_task_contract_dispatch.py",
                  "mediation_emergency_contract_sim_v5_1_2.py",
                  "ai_doc_orchestrator_with_mediator_v1_0.py",
              }
              active_markers = (
                  "v5_1_2",
                  "v1_3_5",
                  "v1_2_7_task_contract_dispatch",
                  "tasukeru-analysis",
                  "log_codebook",
              )
              if name in active_exact_names:
                  return True
              return any(marker in name or marker in normalized for marker in active_markers)

          def is_active_mainline_or_metadata_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              active_names = {
                  "readme.md",
                  "readme.ja.md",
                  "security.md",
                  "license",
                  "license_policy.md",
                  "contributing.md",
                  "code_of_conduct.md",
                  "notice",
                  "trademarks.md",
                  "requirements.txt",
                  "requirements-dev.txt",
                  "pyproject.toml",
                  "emergency_contract_kage_orchestrator_v1_0.py",
                  "test_emergency_contract_kage_orchestrator_v1_0.py",
                  "ai_doc_orchestrator_kage3_v1_3_5.py",
                  "ai_doc_orchestrator_kage3_v1_2_7_task_contract_dispatch.py",
                  "mediation_emergency_contract_sim_v5_1_2.py",
                  "ai_doc_orchestrator_with_mediator_v1_0.py",
              }
              if name in active_names:
                  return True
              if is_test_path(path):
                  return True
              if is_workflow_path(path):
                  return True
              if is_documentation_or_policy_path(path):
                  return True
              if normalized.startswith(("log_codebook", ".github/")):
                  return True
              if is_active_safety_or_hitl_path(path):
                  return True
              return False

          def is_superseded_historical_path(path: str) -> bool:
              normalized = normalize_path(path).lower()
              name = normalized.rsplit("/", 1)[-1]
              parts = normalized.split("/")
              if is_active_mainline_or_metadata_path(path):
                  return False
              if "archive" in parts or normalized.startswith("archive/"):
                  return True

              active_markers = ("v5_1_2", "v1_3_5", "v1_2_7")
              historical_markers = (
                  "_v1",
                  "_v2",
                  "_v3",
                  "_v4",
                  "_v5_0",
                  "v1_",
                  "v2_",
                  "v3_",
                  "v4_",
                  "v5_0_",
                  "fixed_regex",
                  "full..",
                  "legacy",
                  "deprecated",
                  "old",
              )
              if any(marker in name for marker in active_markers):
                  return False
              return any(marker in name for marker in historical_markers)

          def classify_path_profile(file_path: str) -> str:
              normalized = normalize_path(file_path).lower()
              if is_workflow_path(normalized):
                  return "workflow"
              if is_test_path(normalized):
                  return "tests"
              if is_documentation_or_policy_path(normalized):
                  return "docs_or_policy"
              if is_active_safety_or_hitl_path(normalized):
                  return "safety_or_hitl"
              if is_superseded_historical_path(normalized):
                  return "historical"
              if normalized.startswith("archive/") or "/archive/" in normalized:
                  return "archive"
              if is_safety_or_hitl_path(normalized):
                  return "safety_or_hitl_inactive_candidate"
              if is_active_mainline_or_metadata_path(normalized):
                  return "active_mainline"
              return "general"

          def get_rule_profile(rule_id: str) -> dict[str, str]:
              return RULE_PROFILES.get(
                  rule_id,
                  {
                      "default_decision": "REVIEW_RECOMMENDED",
                      "summary_ja": "明示プロファイル未定義のため、人間確認候補として扱います。",
                  },
              )

          def classify_ruff_decision(rule_id: str, file_path: str, message: str) -> tuple[str, str, str]:
              profile = get_rule_profile(rule_id)
              path_profile = classify_path_profile(file_path)
              mechanical_rule = rule_id in {"F401", "F841", "I001", "W291", "W293"}

              if path_profile in {"workflow", "docs_or_policy", "safety_or_hitl", "active_mainline"}:
                  if mechanical_rule:
                      return (
                          "FIX_RECOMMENDED",
                          f"{rule_id} on {path_profile}: active/protected path; manual mechanical fix candidate.",
                          "active/protected領域の機械的修正候補です。自動修正せず、人間が差分を確認してください。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} on {path_profile}: protected path requires human review.",
                      "active/protected領域の指摘です。仕様・公開方針・安全境界への影響を確認してください。",
                  )

              if path_profile == "tests":
                  if mechanical_rule:
                      return (
                          "FIX_RECOMMENDED",
                          f"{rule_id} in tests: mechanical fix candidate, but tests are protected from autofix.",
                          "tests配下の機械的修正候補です。テスト意図を確認してから手動修正してください。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} in tests: review test intent before changing.",
                      "tests配下の指摘です。テスト意図を確認してください。",
                  )

              if path_profile in {"historical", "archive"}:
                  if mechanical_rule:
                      return (
                          "INFO_ONLY",
                          f"{rule_id} in inactive {path_profile}: stored as info; no PR notification.",
                          "inactive historical/archive の機械的指摘です。即時対応せずartifactに集約します。",
                      )
                  return (
                      "NOISE_CANDIDATE",
                      f"{rule_id} in inactive {path_profile}: not active execution path.",
                      "inactive historical/archive の指摘です。active化する場合のみ確認してください。",
                  )

              if mechanical_rule:
                  return (
                      "FIX_RECOMMENDED",
                      f"{rule_id} default mechanical rule: manual fix recommended.",
                      profile["summary_ja"],
                  )

              return (
                  "REVIEW_RECOMMENDED",
                  f"{rule_id} default: human review recommended.",
                  profile["summary_ja"],
              )

          def classify_bandit_decision(
              rule_id: str,
              file_path: str,
              message: str,
              bandit_severity: str,
          ) -> tuple[str, str, str]:
              profile = get_rule_profile(rule_id)
              path_profile = classify_path_profile(file_path)
              severity = bandit_severity.upper()

              if severity == "HIGH":
                  return (
                      "HITL_REQUIRED",
                      f"{rule_id} severity HIGH: requires human review regardless of path profile {path_profile}.",
                      "HIGH security finding です。防御目的の範囲で人間が確認してください。",
                  )

              if path_profile == "workflow":
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} in workflow: CI permissions/execution behavior may be affected.",
                      "workflow配下のsecurity findingです。CI権限・実行条件への影響を確認してください。",
                  )

              if path_profile in {"docs_or_policy", "safety_or_hitl", "active_mainline"}:
                  if severity == "MEDIUM":
                      return (
                          "REVIEW_RECOMMENDED",
                          f"{rule_id} MEDIUM on {path_profile}: protected path requires human review.",
                          "active/protected領域のMEDIUM security findingです。文脈確認が必要です。",
                      )
                  if rule_id == "B311":
                      return (
                          "NOISE_CANDIDATE",
                          f"{rule_id} LOW on {path_profile}: likely acceptable for simulation if not used for secrets.",
                          "非暗号用途のrandomであればPR通知不要ですが、秘密値・認証用途でないことをartifactで確認可能にします。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} LOW on {path_profile}: protected path stays reviewable.",
                      "active/protected領域のLOW security findingです。重大通知は不要ですが、確認候補に残します。",
                  )

              if path_profile == "tests":
                  if rule_id == "B101":
                      return (
                          "NOISE_CANDIDATE",
                          "B101 in tests: pytest assert is expected unless used as runtime safety gate.",
                          "tests配下のpytest assertとして妥当な可能性が高いため、PR通知対象外にします。",
                      )
                  if rule_id == "B311":
                      return (
                          "NOISE_CANDIDATE",
                          "B311 in tests: deterministic/randomized test data is usually acceptable.",
                          "tests配下の非暗号randomは通常テストデータ用途のため、PR通知対象外にします。",
                      )
                  if rule_id == "B110":
                      return (
                          "REVIEW_RECOMMENDED",
                          "B110 in tests: except/pass can hide broken tests and should remain reviewable.",
                          "tests配下でも except/pass はテスト失敗を隠す可能性があるため確認候補に残します。",
                      )
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} in tests: review test intent before changing.",
                      "tests配下のsecurity findingです。テスト意図を確認してください。",
                  )

              if path_profile in {"historical", "archive"}:
                  if rule_id in {"B101", "B311"}:
                      return (
                          "NOISE_CANDIDATE",
                          f"{rule_id} in inactive {path_profile}: low-risk known pattern in non-active file.",
                          "inactive historical/archive の低リスク既知パターンとしてPR通知対象外にします。",
                      )
                  return (
                      "INFO_ONLY",
                      f"{rule_id} in inactive {path_profile}: info-only unless file becomes active.",
                      "inactive historical/archive の指摘です。active化する場合のみ確認してください。",
                  )

              if severity == "MEDIUM":
                  return (
                      "REVIEW_RECOMMENDED",
                      f"{rule_id} MEDIUM default: human review recommended.",
                      profile["summary_ja"],
                  )

              if rule_id in {"B101", "B311"}:
                  return (
                      "NOISE_CANDIDATE",
                      f"{rule_id} LOW default: likely acceptable in non-security context.",
                      profile["summary_ja"],
                  )

              return (
                  "NOISE_CANDIDATE",
                  f"{rule_id} LOW default: stored in artifacts only.",
                  profile["summary_ja"],
              )

          def classify_autofix_policy(entry: dict[str, Any]) -> dict[str, Any]:
              level = str(entry.get("decision", entry.get("level", "")))
              file_path = str(entry.get("file", ""))
              source = str(entry.get("source", ""))
              rule_id = str(entry.get("rule_id", entry.get("code", "")))
              path_profile = str(entry.get("path_profile", classify_path_profile(file_path)))

              base = {
                  "safe_autofix_candidate": False,
                  "autofix_allowed": False,
                  "auto_merge_allowed": False,
                  "policy": "AUTOFIX_BLOCKED",
                  "reason": "Autofix is disabled by default.",
              }

              if level in {"HITL_REQUIRED", "FIX_RECOMMENDED", "REVIEW_RECOMMENDED"}:
                  return {
                      **base,
                      "policy": "HUMAN_REVIEW_REQUIRED",
                      "reason": "Active review queue findings must not be automatically modified.",
                  }

              if path_profile in {"workflow", "docs_or_policy", "safety_or_hitl", "active_mainline", "tests"}:
                  return {
                      **base,
                      "policy": "BLOCKED_PROTECTED_PATH",
                      "reason": "Protected paths must not be automatically modified.",
                  }

              if path_profile not in {"historical", "archive"}:
                  return {
                      **base,
                      "policy": "BLOCKED_NOT_INACTIVE_HISTORICAL",
                      "reason": "Autofix candidates are limited to inactive historical/archive files.",
                  }

              if source == "Ruff" and rule_id in {"F401", "F841", "W291", "W293", "I001"}:
                  return {
                      **base,
                      "safe_autofix_candidate": True,
                      "policy": "SAFE_AUTOFIX_CANDIDATE",
                      "reason": "Inactive historical/archive file with a low-risk mechanical Ruff finding. Human review is still required.",
                  }

              if source == "Bandit" and rule_id == "B311":
                  return {
                      **base,
                      "safe_autofix_candidate": True,
                      "policy": "SAFE_AUTOFIX_CANDIDATE",
                      "reason": "Inactive historical/archive simulator file with a low-risk advisory finding. Human review is still required.",
                  }

              return base

          def make_entry(
              *,
              source: str,
              decision: str,
              severity: str,
              category: str,
              reason_code: str,
              rule_id: str,
              file: str,
              message: str,
              suggestion: str,
              why_problematic_ja: str,
              why_fix_ja: str,
              impact_ja: str,
              line: int | None = None,
              column: int | None = None,
              confidence: str = "MEDIUM",
              risk_type: str = "review",
              classification_reason: str = "",
              path_profile: str = "",
              rule_profile: dict[str, str] | None = None,
          ) -> dict[str, Any]:
              code_snippet = safe_snippet(file, line)
              resolved_path_profile = path_profile or classify_path_profile(file)
              resolved_rule_profile = rule_profile or get_rule_profile(rule_id)
              fingerprint = {
                  "rule_id": rule_id,
                  "category": category,
                  "reason_code": reason_code,
                  "normalized_message": normalized_message(message),
                  "normalized_file_path": normalize_path(file),
                  "normalized_code_pattern": normalized_message(code_snippet or rule_id),
                  "risk_type": risk_type,
                  "path_profile": resolved_path_profile,
              }
              fingerprint_hash = canonical_hash(fingerprint)

              before_hash = ""
              if file and Path(file).exists():
                  before_hash = sha256_text(read_text(Path(file)))

              entry = {
                  "source": source,
                  "decision": decision,
                  "level": decision,
                  "severity": severity,
                  "category": category,
                  "reason_code": reason_code,
                  "rule_id": rule_id,
                  "code": rule_id,
                  "file": file,
                  "line": line,
                  "column": column,
                  "message": one_line(message, 600),
                  "code_snippet": code_snippet,
                  "suggestion": suggestion,
                  "classification_reason": classification_reason,
                  "path_profile": resolved_path_profile,
                  "rule_profile": resolved_rule_profile,
                  "fingerprint": fingerprint,
                  "fingerprint_hash": fingerprint_hash,
                  "incident_id": "",
                  **AUTO_FALSE,
                  "evidence": {
                      "source": source,
                      "rule_id": rule_id,
                      "file": file,
                      "line": line,
                      "column": column,
                      "code_snippet": code_snippet,
                      "policy_reference": "Tasukeru Security Review Output Policy",
                      "reason_code": reason_code,
                      "classification_reason": classification_reason,
                      "path_profile": resolved_path_profile,
                      "artifact": f"tasukeru_logs/{source.lower().replace(' ', '-')}.json",
                  },
                  "explanation": {
                      "why_problematic_ja": why_problematic_ja,
                      "why_fix_ja": why_fix_ja,
                      "why_this_classification_ja": classification_reason or "分類理由は rule/path profile に基づきます。",
                      "human_review_checklist_ja": [
                          "active mainline / tests / workflows / docs / safety invariant / HITL logic に関係するか確認する",
                          "既存仕様への影響を確認する",
                          "必要なら人間が手動で修正・コミット・PR作成・マージする",
                      ],
                  },
                  "fix_prediction": {
                      "expected_effect_ja": impact_ja,
                      "expected_effect_en": "This change may improve maintainability, traceability, or safety depending on the reviewed context.",
                      "risk_reduction_ja": "対象リスクを下げる可能性がありますが、最終確認には人間レビューとテストが必要です。",
                      "side_effects_to_check_ja": [
                          "既存の正常系動作が変わらないこと",
                          "ログや出力に秘密情報が含まれないこと",
                          "修正が契約外の変更を含まないこと",
                      ],
                      "confidence": confidence,
                      "verified": False,
                  },
                  "fix_verification": {
                      "enabled": False,
                      "mode": "ephemeral_candidate_only",
                      "modifies_repository": False,
                      "auto_commit_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_merge_allowed": False,
                      "target_fingerprint_hash": fingerprint_hash,
                      "before": {
                          "file": file,
                          "sha256": before_hash,
                      },
                      "after_candidate": {
                          "file": file,
                          "sha256": "",
                      },
                      "diff_artifact": "",
                      "rescan_result": {
                          "target_hitl_required_resolved": None,
                          "remaining_hitl_required": None,
                          "remaining_review_recommended": None,
                      },
                      "verified": False,
                      "verification_note": "No repository files were modified. Candidate verification is advisory-only.",
                  },
              }
              entry["autofix"] = classify_autofix_policy(entry)
              return entry

          def normalize_ruff_items(raw: Any) -> list[dict[str, Any]]:
              if isinstance(raw, list):
                  return [item for item in raw if isinstance(item, dict)]
              if isinstance(raw, dict):
                  for key in ("diagnostics", "results", "items"):
                      value = raw.get(key)
                      if isinstance(value, list):
                          return [item for item in value if isinstance(item, dict)]
              return []

          def normalize_bandit_items(raw: Any) -> list[dict[str, Any]]:
              if isinstance(raw, dict):
                  value = raw.get("results")
                  if isinstance(value, list):
                      return [item for item in value if isinstance(item, dict)]
              if isinstance(raw, list):
                  return [item for item in raw if isinstance(item, dict)]
              return []

          def normalize_pip_vulns(raw: Any) -> list[dict[str, Any]]:
              vulns: list[dict[str, Any]] = []
              if isinstance(raw, dict):
                  dependencies = raw.get("dependencies")
                  if isinstance(dependencies, list):
                      for dep in dependencies:
                          if not isinstance(dep, dict):
                              continue
                          name = str(dep.get("name", "?"))
                          version = str(dep.get("version", "?"))
                          for vuln in dep.get("vulns", []) or []:
                              if isinstance(vuln, dict):
                                  vulns.append(
                                      {
                                          "name": name,
                                          "version": version,
                                          "id": str(vuln.get("id", "?")),
                                          "fix_versions": vuln.get("fix_versions", []) or [],
                                      }
                                  )
                  direct = raw.get("vulnerabilities")
                  if isinstance(direct, list):
                      for item in direct:
                          if isinstance(item, dict):
                              vulns.append(
                                  {
                                      "name": str(item.get("name", item.get("package", "?"))),
                                      "version": str(item.get("version", "?")),
                                      "id": str(item.get("id", "?")),
                                      "fix_versions": item.get("fix_versions", []) or [],
                                  }
                              )
              elif isinstance(raw, list):
                  for item in raw:
                      if isinstance(item, dict):
                          vulns.append(
                              {
                                  "name": str(item.get("name", item.get("package", "?"))),
                                  "version": str(item.get("version", "?")),
                                  "id": str(item.get("id", "?")),
                                  "fix_versions": item.get("fix_versions", []) or [],
                              }
                          )
              return vulns

          def parse_bool(value: Any) -> bool:
              if isinstance(value, bool):
                  return value
              if isinstance(value, str):
                  return value.strip().lower() in {"true", "1", "yes", "y"}
              return bool(value)

          def collect_reason_codes(obj: Any, found: set[str]) -> None:
              if isinstance(obj, dict):
                  for key, value in obj.items():
                      if key == "reason_code" and isinstance(value, str):
                          found.add(value)
                      elif key in {"reason_codes", "allowed_reason_codes"} and isinstance(value, list):
                          for item in value:
                              if isinstance(item, str):
                                  found.add(item)
                              elif isinstance(item, dict):
                                  code = item.get("code") or item.get("reason_code")
                                  if isinstance(code, str):
                                      found.add(code)
                      else:
                          collect_reason_codes(value, found)
              elif isinstance(obj, list):
                  for item in obj:
                      collect_reason_codes(item, found)

          def add_logic_hitl(
              entries: list[dict[str, Any]],
              code: str,
              msg: str,
              file: str = "repository",
              line: int | None = None,
          ) -> None:
              entries.append(
                  make_entry(
                      source="Tasukeru Logic Review",
                      decision="HITL_REQUIRED",
                      severity="CRITICAL",
                      category="safety_invariant_violation",
                      reason_code=code,
                      rule_id=code,
                      file=file,
                      line=line,
                      message=msg,
                      suggestion="人間が該当箇所を確認し、KAGE/Tasukeru 不変条件に従って手動修正してください。",
                      why_problematic_ja="安全不変条件またはHITL境界に関わるため、自動判断で進めるべきではありません。",
                      why_fix_ja="人間確認を挟むことで、sealed / overrideable / final_decider / reason_code の整合を維持できます。",
                      impact_ja="人間確認により、HITL迂回や封印条件の破損を防ぎやすくなることが期待されます。",
                      confidence="HIGH",
                      risk_type="safety_invariant",
                      classification_reason="Safety invariant violations always require HITL.",
                  )
              )

          def add_abuse_pattern_entry(
              entries: list[dict[str, Any]],
              code: str,
              msg: str,
              file: str,
              line: int | None = None,
              *,
              path_profile: str = "",
              decision: str | None = None,
              severity: str | None = None,
              gate_decision: str | None = None,
              sealed: bool | None = None,
              overrideable: bool | None = None,
              classification_reason: str = "",
          ) -> None:
              resolved_path_profile = path_profile or classify_path_profile(file)

              if decision is None:
                  if resolved_path_profile in {"tests"}:
                      decision = "REVIEW_RECOMMENDED"
                  elif resolved_path_profile in {"historical", "archive"}:
                      decision = "INFO_ONLY"
                  else:
                      decision = "HITL_REQUIRED"

              if gate_decision is None:
                  gate_decision = "STOPPED" if decision == "HITL_REQUIRED" else "PAUSE_FOR_HITL"
              if severity is None:
                  severity = "CRITICAL" if decision == "HITL_REQUIRED" else "MEDIUM"
              if sealed is None:
                  sealed = decision == "HITL_REQUIRED"
              if overrideable is None:
                  overrideable = not sealed

              entry = make_entry(
                  source="Tasukeru Abuse Pattern Review",
                  decision=decision,
                  severity=severity,
                  category="offensive_or_abuse_pattern",
                  reason_code=code,
                  rule_id=code,
                  file=file,
                  line=line,
                  message=msg,
                  suggestion="安全な防御・テスト目的か、未承認の外部送信・破壊的副作用・HITL迂回がないかを人間が確認してください。",
                  why_problematic_ja="攻撃的または悪用可能な意図を持つコードに見える場合、通常のOK判定として通すべきではありません。",
                  why_fix_ja="人間確認へ戻すことで、危険な副作用や未承認の外部効果を通常経路から排除できます。",
                  impact_ja="検知時にTasukeru上で停止し、詳細はartifactに残すことで、CIを失敗させずに人間確認へ戻せます。",
                  confidence="MEDIUM",
                  risk_type="abuse_pattern",
                  classification_reason=classification_reason
                  or "Phase 1.1 abuse-pattern review detected a potentially unsafe code pattern.",
                  path_profile=resolved_path_profile,
              )
              entry.update(
                  {
                      "gate_decision": gate_decision,
                      "layer": "acc_gate",
                      "sealed": sealed,
                      "overrideable": overrideable,
                      "final_decider": "SYSTEM",
                      "failure_mode": "tasukeru_stopped_not_ci_failed",
                      "public_output_policy": {
                          "include_exploit_payloads": False,
                          "include_attack_steps": False,
                          "focus": "detection_and_safe_remediation",
                      },
                  }
              )
              entries.append(entry)

          def line_has_network_send(line: str) -> bool:
              return any(pattern.search(line) for pattern in ABUSE_NETWORK_SEND_PATTERNS)

          def line_has_destructive_effect(line: str) -> bool:
              return any(pattern.search(line) for pattern in ABUSE_DESTRUCTIVE_PATTERNS)

          def line_has_dynamic_execution(line: str) -> bool:
              return any(pattern.search(line) for pattern in ABUSE_DYNAMIC_EXEC_PATTERNS)

          def line_has_credential_reference(line: str) -> bool:
              if "_tokens" in line.lower() or "side_effect_tokens" in line.lower():
                  return False
              return bool(ABUSE_CREDENTIAL_WORDS.search(line))

          def is_allowed_self_workflow_path(path: Path) -> bool:
              normalized = normalize_path(str(path)).lower()
              return normalized in ABUSE_ALLOWED_SELF_WORKFLOW_PATHS

          def is_known_state_store_reset_line(line: str) -> bool:
              lower = line.lower()
              return ".unlink" in lower and any(marker in lower for marker in ABUSE_KNOWN_STATE_RESET_MARKERS)

          def is_safe_hitl_gated_subprocess_line(line: str) -> bool:
              lower = line.lower()
              return (
                  "subprocess.run" in lower
                  and "nosec" in lower
                  and "hitl-gated" in lower
                  and "shell=false" in lower
              )

          def should_skip_abuse_pattern_file(path: Path) -> bool:
              if is_allowed_self_workflow_path(path):
                  # Avoid self-triggering on the advisory workflow's own GitHub API
                  # comment posting code. Dedicated self-review remains covered by
                  # control-bypass, permissions, and HITL boundary checks.
                  return True
              return path.suffix not in {".py", ".yml", ".yaml"}

          def run_abuse_pattern_review_for_file(
              entries: list[dict[str, Any]],
              path: Path,
              text: str,
          ) -> None:
              if should_skip_abuse_pattern_file(path):
                  return

              normalized_path = normalize_path(str(path))
              profile = classify_path_profile(normalized_path)
              hits = 0

              for idx, line in enumerate(text.splitlines(), start=1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  lower = stripped.lower()

                  if line_has_network_send(stripped):
                      if "approved" not in lower and "hitl" not in lower and "allowlist" not in lower:
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_UNAPPROVED_EXTERNAL_EFFECT",
                              "Potential unapproved external-effect code was detected.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              classification_reason="Network send/update pattern without an obvious approval/HITL marker.",
                          )
                          hits += 1

                  if line_has_credential_reference(stripped) and (
                      line_has_network_send(stripped)
                      or "send" in lower
                      or "upload" in lower
                      or "exfil" in lower
                  ):
                      add_abuse_pattern_entry(
                          entries,
                          "ABUSE_CREDENTIAL_ACCESS_PATTERN",
                          "Potential credential access combined with outbound or transfer behavior was detected.",
                          normalized_path,
                          idx,
                          path_profile=profile,
                          classification_reason="Credential-like term appears near outbound/transfer behavior.",
                      )
                      hits += 1

                  if line_has_destructive_effect(stripped):
                      if is_known_state_store_reset_line(stripped):
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_STATE_STORE_RESET_REVIEW",
                              "Known state-store reset operation was detected and downgraded for review.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              decision="REVIEW_RECOMMENDED",
                              severity="MEDIUM",
                              gate_decision="PAUSE_FOR_HITL",
                              sealed=False,
                              overrideable=True,
                              classification_reason="Known trust/grant/eval state-store reset path; reviewable but not a critical abuse stop.",
                          )
                          hits += 1
                      elif "tmp_path" not in lower and "temporary" not in lower and "test" not in lower:
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_DESTRUCTIVE_SIDE_EFFECT_PATTERN",
                              "Potential destructive file-system side effect was detected.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              classification_reason="Destructive file operation without an obvious test/temporary context.",
                          )
                          hits += 1

                  if line_has_dynamic_execution(stripped):
                      if is_safe_hitl_gated_subprocess_line(stripped):
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_DYNAMIC_EXECUTION_REVIEW_ONLY",
                              "HITL-gated subprocess execution was detected and downgraded for review.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              decision="REVIEW_RECOMMENDED",
                              severity="MEDIUM",
                              gate_decision="PAUSE_FOR_HITL",
                              sealed=False,
                              overrideable=True,
                              classification_reason="nosec + HITL-gated + shell=False subprocess line; reviewable but not a critical abuse stop.",
                          )
                          hits += 1
                      elif "literal_eval" not in lower and "pytest" not in lower:
                          add_abuse_pattern_entry(
                              entries,
                              "ABUSE_EVASION_OR_DYNAMIC_EXECUTION_PATTERN",
                              "Potential dynamic execution or command execution pattern was detected.",
                              normalized_path,
                              idx,
                              path_profile=profile,
                              classification_reason="Dynamic execution can bypass static review or hide unsafe behavior.",
                          )
                          hits += 1

                  if hits >= 5:
                      break

          def add_rfl_readability_review(
              entries: list[dict[str, Any]],
              code: str,
              msg: str,
              file: str,
              line: int | None = None,
          ) -> None:
              entries.append(
                  make_entry(
                      source="Tasukeru RFL Review",
                      decision="REVIEW_RECOMMENDED",
                      severity="MEDIUM",
                      category="relativity_human_readability",
                      reason_code=code,
                      rule_id=code,
                      file=file,
                      line=line,
                      message=msg,
                      suggestion="AIにとって処理しやすくても、人間が安全に読める形へ分割・命名・コメント補助を検討してください。",
                      why_problematic_ja="AI向けに圧縮・抽象化されたコードは、人間の確認負荷を増やし、安全性・仕様・副作用の確認を難しくする可能性があります。",
                      why_fix_ja="人間が読みやすい粒度に戻すことで、レビュー品質・保守性・HITL判断の信頼性を維持できます。",
                      impact_ja="人間の可読性と保守性が改善し、AI側の最適化が人間側の負荷増につながるリスクを下げられる可能性があります。",
                      confidence="MEDIUM",
                      risk_type="human_readability",
                      classification_reason="RFL human readability check: AI-readable code must not reduce human readability, maintainability, or reviewability.",
                  )
              )

          def is_human_readability_risk_line(line: str) -> bool:
              stripped = line.strip()
              if not stripped or stripped.startswith("#"):
                  return False
              if "# noqa" in stripped or "# type: ignore" in stripped:
                  return False
              if len(stripped) < 180:
                  return False
              logic_markers = (
                  " and ",
                  " or ",
                  " if ",
                  " else ",
                  " for ",
                  " lambda ",
                  " with ",
              )
              marker_score = sum(stripped.count(marker) for marker in logic_markers)
              structure_score = sum(stripped.count(char) for char in "([{,")
              chain_score = stripped.count(".") + stripped.count("[")
              return marker_score >= 3 or structure_score >= 10 or chain_score >= 10

          def run_logic_review() -> tuple[list[dict[str, Any]], dict[str, Any]]:
              logic_entries: list[dict[str, Any]] = []
              for path in iter_text_files():
                  text = read_text(path)
                  for idx, line in enumerate(text.splitlines(), start=1):
                      stripped = line.strip()
                      if stripped.startswith("<<<<<<< ") or stripped == "=======" or stripped.startswith(">>>>>>> "):
                          add_logic_hitl(
                              logic_entries,
                              "MERGE_CONFLICT_MARKER",
                              "Unresolved merge conflict marker was found.",
                              str(path),
                              idx,
                          )

                  # Do not skip the self workflow for logic review.
                  # Only the abuse/network self-noise check is skipped inside
                  # run_abuse_pattern_review_for_file(). Control-bypass patterns
                  # must still be detected in .github/workflows/tasukeru-analysis.yml.
                  for code, pattern in CONTROL_BYPASS_PATTERNS:
                      for match in pattern.finditer(text):
                          line_no = text[: match.start()].count("\n") + 1
                          add_logic_hitl(
                              logic_entries,
                              "CONTROL_BYPASS_ATTEMPT",
                              f"Automation control-bypass pattern detected: {code}.",
                              str(path),
                              line_no,
                          )

                  run_abuse_pattern_review_for_file(logic_entries, path, text)

                  if path.suffix == ".py" and not is_superseded_historical_path(str(path)):
                      readability_hits = 0
                      for idx, line in enumerate(text.splitlines(), start=1):
                          if is_human_readability_risk_line(line):
                              add_rfl_readability_review(
                                  logic_entries,
                                  "REL_HUMAN_READABILITY_LOST",
                                  "AI-readable but human-readability-risky dense code pattern detected.",
                                  str(path),
                                  idx,
                              )
                              readability_hits += 1
                              if readability_hits >= 3:
                                  break

              required_rfl = {
                  "REL_BOUNDARY_UNSTABLE",
                  "REL_REF_MISSING",
                  "REL_SYMMETRY_BREAK",
                  "REL_HUMAN_READABILITY_LOST",
              }
              codebooks = sorted(repo.glob("log_codebook*.json"))
              if codebooks:
                  for path in codebooks:
                      data = read_json(path, {})
                      found: set[str] = set()
                      collect_reason_codes(data, found)
                      raw = read_text(path)
                      found.update(code for code in required_rfl if code in raw)
                      missing = sorted(required_rfl - found)
                      if missing:
                          add_logic_hitl(
                              logic_entries,
                              "REQUIRED_REASON_CODES_MISSING",
                              f"Required RFL reason codes are missing from codebook: {', '.join(missing)}",
                              str(path),
                          )

              for path in iter_text_files():
                  name = path.name.lower()
                  if path.suffix != ".jsonl" or not any(token in name for token in ("arl", "audit", "incident")):
                      continue
                  with path.open("r", encoding="utf-8", errors="replace") as file_obj:
                      for idx, line in enumerate(file_obj, start=1):
                          if idx > 5000:
                              break
                          line = line.strip()
                          if not line:
                              continue
                          try:
                              row = json.loads(line)
                          except Exception:
                              continue
                          if not isinstance(row, dict):
                              continue

                          layer = str(row.get("layer", ""))
                          decision = str(row.get("decision", ""))
                          sealed = parse_bool(row.get("sealed", False))
                          overrideable = parse_bool(row.get("overrideable", False))
                          final_decider = str(row.get("final_decider", ""))

                          missing = sorted(key for key in REQUIRED_ARL_KEYS if key not in row)
                          if missing:
                              logic_entries.append(
                                  make_entry(
                                      source="Tasukeru Logic Review",
                                      decision="REVIEW_RECOMMENDED",
                                      severity="MEDIUM",
                                      category="arl",
                                      reason_code="ARL_REQUIRED_KEYS_MISSING",
                                      rule_id="ARL_REQUIRED_KEYS_MISSING",
                                      file=str(path),
                                      line=idx,
                                      message=f"ARL row is missing required keys: {', '.join(missing)}",
                                      suggestion="ARL必須キーを補い、監査行として一貫した形式にしてください。",
                                      why_problematic_ja="必須キーが欠けると、後から停止理由や責任分界を追跡しにくくなります。",
                                      why_fix_ja="必須キーを揃えることで、監査と再現確認がしやすくなります。",
                                      impact_ja="ARLの追跡性が改善することが期待されます。",
                                      confidence="MEDIUM",
                                      risk_type="arl",
                                      classification_reason="ARL schema inconsistency is reviewable but not critical unless core invariants are broken.",
                                  )
                              )

                          if decision and decision not in ALLOWED_DECISIONS:
                              logic_entries.append(
                                  make_entry(
                                      source="Tasukeru Logic Review",
                                      decision="REVIEW_RECOMMENDED",
                                      severity="MEDIUM",
                                      category="arl",
                                      reason_code="ARL_UNKNOWN_DECISION",
                                      rule_id="ARL_UNKNOWN_DECISION",
                                      file=str(path),
                                      line=idx,
                                      message=f"ARL decision is outside canonical decision set: {decision}",
                                      suggestion="decision を RUN / PAUSE_FOR_HITL / STOPPED のいずれかに揃えてください。",
                                      why_problematic_ja="decision語彙が揺れると、CIや監査で判定しにくくなります。",
                                      why_fix_ja="語彙を固定すると、集計・監査・テストが安定します。",
                                      impact_ja="ログ解析の安定性が上がることが期待されます。",
                                      confidence="MEDIUM",
                                      risk_type="arl",
                                      classification_reason="Unknown ARL decisions reduce audit consistency.",
                                  )
                              )

                          if sealed and layer not in ETHICS_OR_ACC_LAYERS:
                              add_logic_hitl(
                                  logic_entries,
                                  "SEALED_LAYER_NOT_ETHICS_OR_ACC",
                                  "sealed=true is only allowed for ethics_gate or acc_gate.",
                                  str(path),
                                  idx,
                              )
                          if layer in RFL_LAYERS and sealed:
                              add_logic_hitl(
                                  logic_entries,
                                  "RFL_MUST_NOT_BE_SEALED",
                                  "RFL / relativity_gate rows must never be sealed.",
                                  str(path),
                                  idx,
                              )
                          if sealed and overrideable:
                              add_logic_hitl(
                                  logic_entries,
                                  "SEALED_MUST_NOT_BE_OVERRIDEABLE",
                                  "sealed=true implies overrideable=false.",
                                  str(path),
                                  idx,
                              )
                          if sealed and final_decider != "SYSTEM":
                              add_logic_hitl(
                                  logic_entries,
                                  "SEALED_FINAL_DECIDER_MUST_BE_SYSTEM",
                                  "sealed=true implies final_decider=SYSTEM.",
                                  str(path),
                                  idx,
                              )
                          if decision == "PAUSE_FOR_HITL" and sealed:
                              add_logic_hitl(
                                  logic_entries,
                                  "PAUSE_FOR_HITL_MUST_NOT_BE_SEALED",
                                  "PAUSE_FOR_HITL must remain unsealed.",
                                  str(path),
                                  idx,
                              )

              result = {
                  "schema_version": "1.0",
                  "tool": "tasukeru_logic_review",
                  "findings_count": len(logic_entries),
                  "severity_counts": dict(Counter(entry["severity"] for entry in logic_entries)),
                  "category_counts": dict(Counter(entry["category"] for entry in logic_entries)),
                  "findings": logic_entries,
              }
              write_json(log_dir / "logic-review.json", result)
              with (log_dir / "logic-review.md").open("w", encoding="utf-8") as f:
                  f.write("### Tasukeru logic review\n\n")
                  f.write(f"- Findings: {len(logic_entries)}\n")
                  f.write(f"- HITL_REQUIRED: {sum(1 for e in logic_entries if e['decision'] == 'HITL_REQUIRED')}\n")
                  f.write(f"- REVIEW_RECOMMENDED: {sum(1 for e in logic_entries if e['decision'] == 'REVIEW_RECOMMENDED')}\n\n")
              return logic_entries, result

          def run_documentation_review() -> tuple[list[dict[str, Any]], dict[str, Any]]:
              entries: list[dict[str, Any]] = []
              readme = read_text(Path("README.md"))
              readme_ja = read_text(Path("README.ja.md"))
              security = read_text(Path("SECURITY.md"))
              license_policy = read_text(Path("LICENSE_POLICY.md"))
              contributing = read_text(Path("CONTRIBUTING.md"))
              combined_readme = f"{readme}\n{readme_ja}".lower()

              def add_doc(decision: str, reason_code: str, file: str, message: str, suggestion: str) -> None:
                  entries.append(
                      make_entry(
                          source="Documentation Review",
                          decision=decision,
                          severity="CRITICAL" if decision == "HITL_REQUIRED" else "MEDIUM",
                          category="documentation_policy",
                          reason_code=reason_code,
                          rule_id=reason_code,
                          file=file,
                          message=message,
                          suggestion=suggestion,
                          why_problematic_ja="公開文書の説明と実装方針がずれると、利用者がTasukeruを自動修正Botまたは自動マージBotと誤解する可能性があります。",
                          why_fix_ja="advisory-only、自動PRなし、自動修正なし、自動マージなしを明記すると、利用者の誤解と運用リスクを下げられます。",
                          impact_ja="OSS利用者がプロジェクトの安全境界を理解しやすくなることが期待されます。",
                          confidence="MEDIUM",
                          risk_type="documentation",
                          classification_reason="Documentation review findings are advisory unless they create serious public safety or license ambiguity.",
                      )
                  )

              if readme or readme_ja:
                  if "advisory-only" not in combined_readme and "review helper" not in combined_readme:
                      add_doc(
                          "REVIEW_RECOMMENDED",
                          "DOC_ADVISORY_ONLY_NOT_CLEAR",
                          "README.md / README.ja.md",
                          "README does not clearly describe Tasukeru Analysis as advisory-only.",
                          "READMEに、Tasukeru Analysis は advisory-only のレビュー補助であり、自動修正・自動PR・自動マージを行わないと明記してください。",
                      )

                  combined_raw = f"{readme}\n{readme_ja}"
                  auto_merge_policy_present = (
                      "auto-merge" in combined_readme
                      or "auto merge" in combined_readme
                      or "merge pull requests automatically" in combined_readme
                      or "merge prs automatically" in combined_readme
                      or "自動マージ" in combined_raw
                  )
                  if not auto_merge_policy_present:
                      add_doc(
                          "REVIEW_RECOMMENDED",
                          "DOC_AUTO_MERGE_POLICY_MISSING",
                          "README.md / README.ja.md",
                          "README may not clearly state that auto-merge is prohibited.",
                          "READMEのTasukeru説明に Auto merge: false / 自動マージなし を追加してください。",
                      )
              else:
                  add_doc(
                      "FIX_RECOMMENDED",
                      "DOC_POLICY_MISSING",
                      "README.md",
                      "README.md / README.ja.md was not found.",
                      "プロジェクト目的、advisory-only、安全方針、ライセンス参照を含むREADMEを追加してください。",
                  )

              if not security:
                  add_doc(
                      "FIX_RECOMMENDED",
                      "DOC_SECURITY_POLICY_MISSING",
                      "SECURITY.md",
                      "SECURITY.md was not found.",
                      "SECURITY.mdを追加し、攻撃手段・payload・悪用手順を公開PRコメントに載せない方針を明記してください。",
                  )

              if not license_policy:
                  add_doc(
                      "REVIEW_RECOMMENDED",
                      "DOC_LICENSE_POLICY_REFERENCE_MISSING",
                      "LICENSE_POLICY.md",
                      "LICENSE_POLICY.md was not found.",
                      "必要であれば、コード・文書・名称の扱いを LICENSE_POLICY.md に分離して整理してください。",
                  )

              if not contributing:
                  add_doc(
                      "REVIEW_RECOMMENDED",
                      "DOC_CONTRIBUTING_POLICY_MISSING",
                      "CONTRIBUTING.md",
                      "CONTRIBUTING.md was not found.",
                      "CONTRIBUTING.mdに、advisory-only、自動修正禁止、自動マージ禁止、HITL_REQUIREDの扱いを明記してください。",
                  )

              result = {
                  "schema_version": "1.0",
                  "tool": "tasukeru_documentation_review",
                  "findings_count": len(entries),
                  "counts": dict(Counter(entry["decision"] for entry in entries)),
                  "findings": entries,
              }
              write_json(log_dir / "documentation-review.json", result)
              with (log_dir / "documentation-review.md").open("w", encoding="utf-8") as f:
                  f.write("### Tasukeru documentation review\n\n")
                  f.write(f"- Findings: {len(entries)}\n")
                  for key, count in Counter(entry["decision"] for entry in entries).items():
                      f.write(f"- {key}: {count}\n")
              return entries, result

          def entries_from_ruff(raw: Any) -> list[dict[str, Any]]:
              items = normalize_ruff_items(raw)
              entries: list[dict[str, Any]] = []
              for item in items:
                  rule_id = str(item.get("code", "RUFF"))
                  file = str(item.get("filename", "?"))
                  location = item.get("location") or {}
                  line = location.get("row") if isinstance(location, dict) else None
                  column = location.get("column") if isinstance(location, dict) else None
                  message = str(item.get("message", "Ruff finding"))
                  decision, classification_reason, suggestion = classify_ruff_decision(rule_id, file, message)
                  profile = get_rule_profile(rule_id)
                  entries.append(
                      make_entry(
                          source="Ruff",
                          decision=decision,
                          severity="LOW",
                          category="style_or_correctness",
                          reason_code=f"RUFF_{rule_id}",
                          rule_id=rule_id,
                          file=file,
                          line=line,
                          column=column,
                          message=message,
                          suggestion=suggestion,
                          why_problematic_ja="静的解析上、可読性・保守性・軽微な正しさに関わる可能性があります。",
                          why_fix_ja="指摘箇所を整理すると、不要な差分や将来の誤読を減らしやすくなります。",
                          impact_ja="コードの読みやすさとCI安定性が改善することが期待されます。",
                          confidence="MEDIUM",
                          risk_type="lint",
                          classification_reason=classification_reason,
                          path_profile=classify_path_profile(file),
                          rule_profile=profile,
                      )
                  )
              return entries


name: Tasukeru Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/tasukeru-analysis.yml"
      - "README*.md"
      - "SECURITY.md"
      - "LICENSE*"
      - "LICENSE_POLICY.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "NOTICE"
      - "TRADEMARKS.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "log_codebook*.json"
      - "**/*.jsonl"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  advisory-analysis:
    name: advisory analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install advisory tools only
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" "bandit[toml]" "pip-audit"

      - name: Run advisory tools
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates

          set +e

          ruff check . --output-format=json > tasukeru_logs/ruff.json 2> tasukeru_logs/ruff.stderr
          ruff_exit=$?

          bandit -r . \
            -x "./.git,./.venv,./venv,./archive" \
            -f json \
            -o tasukeru_logs/bandit.json \
            > tasukeru_logs/bandit.stdout \
            2> tasukeru_logs/bandit.stderr
          bandit_exit=$?

          if [ -f requirements-dev.txt ]; then
            python -m pip_audit \
              -r requirements-dev.txt \
              -f json \
              -o tasukeru_logs/pip-audit.json \
              > tasukeru_logs/pip-audit.stdout \
              2> tasukeru_logs/pip-audit.stderr
            pip_exit=$?
          elif [ -f requirements.txt ]; then
            python -m pip_audit \
              -r requirements.txt \
              -f json \
              -o tasukeru_logs/pip-audit.json \
              > tasukeru_logs/pip-audit.stdout \
              2> tasukeru_logs/pip-audit.stderr
            pip_exit=$?
          else
            printf '{"dependencies":[],"vulnerabilities":[]}\n' > tasukeru_logs/pip-audit.json
            printf 'No requirements.txt or requirements-dev.txt found; dependency audit skipped.\n' > tasukeru_logs/pip-audit.stdout
            : > tasukeru_logs/pip-audit.stderr
            pip_exit=0
          fi

          set -e

          echo "${ruff_exit}" > tasukeru_logs/ruff.exit
          echo "${bandit_exit}" > tasukeru_logs/bandit.exit
          echo "${pip_exit}" > tasukeru_logs/pip-audit.exit

          echo "ruff_exit=${ruff_exit}"
          echo "bandit_exit=${bandit_exit}"
          echo "pip_exit=${pip_exit}"

      - name: Generate Tasukeru advisory review
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs/fix_candidates

          # Keep the existing embedded Python generator body here unchanged.
          #
          # The safety fix is intentionally outside the generator:
          # - do not pip install PR-provided requirements
          # - only audit dependency manifests
          # - treat missing requirements as skipped, not environment audit
          #
          # Paste your existing Python block from:
          #   from __future__ import annotations
          # through:
          #   PY
          #
          # No Tasukeru classification / ARL / announcement logic needs to change.

          python - <<'PY'
          # PASTE THE EXISTING TASUKERU GENERATOR PYTHON HERE UNCHANGED.
          #
          # This placeholder is only here because the generator body you pasted is
          # very large. The corrected workflow logic is in the surrounding YAML.
          #
          # If you want this as a literal single-file workflow, replace this block
          # with your current generator body exactly as-is.
          raise SystemExit(
              "Replace this placeholder with the existing Tasukeru generator Python body."
          )
          PY

      - name: Upload advisory logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tasukeru-advisory-logs
          path: |
            tasukeru_logs/
            tasukeru_advisory_summary.md
            tasukeru_hitl_review.md
            tasukeru_hitl_review.json
            tasukeru_notification_state.json
            tasukeru_pr_comment.md
            tasukeru_dradm_draft.md
            tasukeru_dradm_draft.json
            tasukeru_confidence_report.md
            tasukeru_confidence_report.json
            tasukeru_readme_refinement_draft.md
            tasukeru_readme_refinement_draft.json
            tasukeru_announcement.md
            tasukeru_announcement.json
            tasukeru_arl.jsonl
            tasukeru_arl_verify.json
          if-no-files-found: ignore

      - name: Complete advisory phase
        if: always()
        run: |
          set -euo pipefail
          echo "Tasukeru advisory analysis completed."
          echo "No branch, PR, commit, push, auto-fix, or auto-merge was performed."

  post-critical-comment:
    name: post critical PR comment
    runs-on: ubuntu-latest
    needs: advisory-analysis
    if: always() && github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        shell: bash

    steps:
      - name: Download advisory logs
        uses: actions/download-artifact@v6
        with:
          name: tasukeru-advisory-logs
          path: .

      - name: Post Tasukeru critical PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POST_SCRIPT: |
            from __future__ import annotations

            import json
            import os
            import urllib.error
            import urllib.request
            from pathlib import Path
            from typing import Any

            state_path = Path("tasukeru_notification_state.json")
            critical_comment_path = Path("tasukeru_pr_comment.md")
            announcement_md_path = Path("tasukeru_announcement.md")
            announcement_json_path = Path("tasukeru_announcement.json")

            if not state_path.exists():
                print("Tasukeru notification state not found; skipping comment.")
                raise SystemExit(0)

            def read_json_file(path: Path, default: Any) -> Any:
                try:
                    if not path.exists():
                        return default
                    text = path.read_text(encoding="utf-8").strip()
                    if not text:
                        return default
                    return json.loads(text)
                except Exception:
                    return default

            state = read_json_file(state_path, {})
            announcement = read_json_file(announcement_json_path, {})

            review_queue = announcement.get("review_queue", {}) if isinstance(announcement, dict) else {}
            arl = announcement.get("arl", {}) if isinstance(announcement, dict) else {}

            hitl_required = int(
                review_queue.get("hitl_required")
                if review_queue.get("hitl_required") is not None
                else state.get("critical_count", 0)
            )
            arl_verified = arl.get("verified")

            # Keep PR noise low and keep policy consistent:
            # comment only when human intervention is required, or when ARL verification failed.
            if hitl_required <= 0 and arl_verified is not False:
                print("No HITL_REQUIRED findings and ARL verification did not fail; skipping PR comment.")
                raise SystemExit(0)

            event_path = os.environ.get("GITHUB_EVENT_PATH", "")
            token = os.environ.get("GITHUB_TOKEN", "")
            repo_name = os.environ.get("GITHUB_REPOSITORY", "")

            if not event_path or not token or not repo_name:
                print("Missing GitHub event/token/repository context; skipping comment.")
                raise SystemExit(0)

            event = json.loads(Path(event_path).read_text(encoding="utf-8"))
            pull_request = event.get("pull_request")
            if not isinstance(pull_request, dict):
                print("No pull_request context; skipping comment.")
                raise SystemExit(0)

            pr_number = pull_request.get("number")
            owner, repo = repo_name.split("/", 1)

            announcement_md = (
                announcement_md_path.read_text(encoding="utf-8")
                if announcement_md_path.exists()
                else "Tasukeru announcement artifact was not generated."
            )
            critical_comment = (
                critical_comment_path.read_text(encoding="utf-8")
                if critical_comment_path.exists()
                else ""
            )

            confidence = announcement.get("confidence", {}) if isinstance(announcement, dict) else {}
            policy = announcement.get("policy", {}) if isinstance(announcement, dict) else {}
            conclusion_ja = str(
                announcement.get("conclusion_ja")
                or "Tasukeru announcement summary is unavailable. Check workflow artifacts."
            )
            mode = str(announcement.get("mode") or "UNKNOWN")

            if hitl_required > 0:
                status_label = "REVIEW REQUIRED"
                headline = "HITL_REQUIRED was detected. Human review is required before merge."
            else:
                status_label = "ARL VERIFY FAILED"
                headline = "ARL verification failed. Check artifacts before using this summary for review."

            auto_policy_lines = [
                f"- Auto branch creation: `{policy.get('auto_branch_allowed', False)}`",
                f"- Auto PR creation: `{policy.get('auto_pr_creation_allowed', False)}`",
                f"- Auto commit: `{policy.get('auto_commit_allowed', False)}`",
                f"- Auto push: `{policy.get('auto_push_allowed', False)}`",
                f"- Auto fix: `{policy.get('autofix_allowed', False)}`",
                f"- Auto merge: `{policy.get('auto_merge_allowed', False)}`",
            ]

            details_parts = [announcement_md]
            if hitl_required > 0 and critical_comment:
                details_parts.append("\n---\n\n## Critical finding details\n\n" + critical_comment)

            marker = "<!-- tasukeru-analysis:critical-summary -->"
            comment_body = "\n".join(
                [
                    marker,
                    "",
                    "## Tasukeru Analysis",
                    "",
                    f"### Summary: `{status_label}`",
                    "",
                    headline,
                    "",
                    conclusion_ja,
                    "",
                    "### Quick check",
                    "",
                    f"- Mode: `{mode}`",
                    f"- HITL_REQUIRED: `{hitl_required}`",
                    f"- ARL verified: `{arl_verified}`",
                    f"- ARL rows: `{arl.get('row_count')}`",
                    f"- ARL error count: `{arl.get('error_count')}`",
                    f"- Confidence: `{confidence.get('score')}` / `1.0` ({confidence.get('level')})",
                    f"- FIX_RECOMMENDED: `{review_queue.get('fix_recommended')}`",
                    f"- REVIEW_RECOMMENDED: `{review_queue.get('review_recommended')}`",
                    "",
                    "### Automation policy",
                    "",
                    *auto_policy_lines,
                    "",
                    "<details>",
                    "<summary>Details from Tasukeru artifacts</summary>",
                    "",
                    "\n\n".join(details_parts),
                    "",
                    "</details>",
                    "",
                    "This comment is advisory-only. It is not a safety guarantee and does not replace human review.",
                ]
            )

            api_root = f"https://api.github.com/repos/{owner}/{repo}/issues/{pr_number}/comments"

            def request_json(method: str, url: str, payload: dict[str, Any] | None = None) -> Any:
                data = None
                if payload is not None:
                    data = json.dumps(payload).encode("utf-8")
                req = urllib.request.Request(
                    url,
                    data=data,
                    method=method,
                    headers={
                        "Authorization": f"Bearer {token}",
                        "Accept": "application/vnd.github+json",
                        "X-GitHub-Api-Version": "2022-11-28",
                        "Content-Type": "application/json",
                    },
                )
                with urllib.request.urlopen(req, timeout=20) as response:
                    body = response.read().decode("utf-8")
                    if not body:
                        return None
                    return json.loads(body)

            try:
                existing_comments = request_json("GET", api_root)
            except urllib.error.HTTPError as err:
                print(f"Could not list PR comments: HTTP {err.code}. Skipping comment.")
                raise SystemExit(0)

            markers = (
                "<!-- tasukeru-analysis:announcement-summary -->",
                "<!-- tasukeru-analysis:critical-summary -->",
                "<!-- tasukeru-analysis:no-critical -->",
            )

            existing = None
            if isinstance(existing_comments, list):
                for comment in existing_comments:
                    if not isinstance(comment, dict):
                        continue
                    body = str(comment.get("body", ""))
                    if any(existing_marker in body for existing_marker in markers):
                        existing = comment
                        break

            try:
                if existing and existing.get("url"):
                    request_json("PATCH", str(existing["url"]), {"body": comment_body})
                    print("Updated existing Tasukeru PR comment.")
                else:
                    request_json("POST", api_root, {"body": comment_body})
                    print("Posted Tasukeru PR comment.")
            except urllib.error.HTTPError as err:
                print(f"Could not post/update PR comment: HTTP {err.code}. Skipping comment.")
                raise SystemExit(0)
        run: |
          set -euo pipefail
          python -c "$POST_SCRIPT"

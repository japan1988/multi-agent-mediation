              },
              "current": {
                  "meaning": "head/current observed state",
                  "head_ref": head.get("ref"),
                  "head_sha": head.get("sha") or os.environ.get("TASUKERU_SHA"),
                  "changed_files": changed_files,
                  "changed_files_all": changed_all,
                  "review_counts": review_counts,
              },
              "prediction": {
                  "meaning": "delta-derived risk estimate, not a factual claim",
                  "risk_score": risk_score,
                  "signals": signals,
                  "statement": (
                      "Prediction is based on changed surfaces and advisory metadata. "
                      "It is not a guarantee and must not trigger automatic fixes or merges."
                  ),
              },
              "future_judgment": {
                  "meaning": "advisory next-step recommendation",
                  "decision": future_decision,
                  "review_level": review_level,
                  "allowed_outputs": [
                      "DRAFT_FIX",
                      "DRAFT_REVIEW",
                      "REVIEW_RECOMMENDED",
                      "PAUSE_FOR_HITL",
                      "INFO_ONLY",
                  ],
                  "blocked_actions": [
                      "automatic fixes",
                      "automatic commits",
                      "automatic pushes",
                      "automatic merges",
                      "external actions",
                  ],
              },
          }

          Path("tasukeru_4d_inspection_report.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          md_lines = [
              "# Tasukeru 4D Inspection Report",
              "",
              "This report is advisory-only and report-only.",
              "",
              "## 4D model",
              "",
              "- Past: base/reference state and existing advisory metadata",
              "- Current: PR head/current observed files and findings",
              "- Prediction: delta-derived risk estimate, not a factual claim",
              "- Future judgment: advisory next step such as HITL or draft review",
              "",
              "## Automation boundary",
              "",
              "- Auto apply: false",
              "- Auto fix: false",
              "- Auto commit: false",
              "- Auto push: false",
              "- Auto merge: false",
              "- External side effects: false",
              "",
              "## Summary",
              "",
              f"- Risk score: {risk_score}",
              f"- Future decision: `{future_decision}`",
              f"- Review level: `{review_level}`",
              "",
              "## Review counts",
              "",
          ]
          for key, value in review_counts.items():
              md_lines.append(f"- {key}: {value}")

          md_lines.extend(["", "## Prediction signals", ""])
          if signals:
              for signal in signals:
                  md_lines.append(f"- `{signal['name']}` (+{signal['weight']}): {signal['reason']}")
          else:
              md_lines.append("- No risk-increasing 4D signals were detected.")


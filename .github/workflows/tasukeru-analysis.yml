          def propose_documentation_full_draft(
              *,
              reason_code: str,
              file_path: str,
          ) -> dict[str, Any] | None:
              candidates: list[tuple[str, str]] = []
              if "README" in file_path or reason_code in {"DOC_ADVISORY_ONLY_NOT_CLEAR", "DOC_AUTO_MERGE_POLICY_MISSING"}:
                  if Path("README.md").exists():
                      candidates.append(("README.md", build_readme_advisory_addition()))
                  if Path("README.ja.md").exists():
                      candidates.append(("README.ja.md", build_readme_ja_advisory_addition()))
              elif reason_code == "DOC_SECURITY_POLICY_MISSING":
                  candidates.append(("SECURITY.md", build_security_md_draft()))
              elif reason_code == "DOC_LICENSE_POLICY_REFERENCE_MISSING":
                  candidates.append(("LICENSE_POLICY.md", build_license_policy_draft()))
              else:
                  return None

              drafts: list[dict[str, Any]] = []
              for target, addition_or_full in candidates:
                  path = Path(target)
                  before = read_text(path) if path.exists() else ""
                  if target == "README.md":
                      marker = (
                          "Tasukeru Analysis does not aim to hide warnings. Instead, it separates active\n"
                          "repair candidates, review-only findings, historical-version warnings, and likely\n"
                          "noise so maintainers can focus on the right items first.\n"
                      )
                      after = insert_after_marker_once(before, marker, addition_or_full)
                  elif target == "README.ja.md":
                      marker = "Tasukeru Analysis は warning を隠すことを目的としていません。"
                      after = insert_after_marker_once(before, marker, addition_or_full)
                  else:
                      after = addition_or_full
                  if before == after:
                      continue
                  diff = make_unified_diff(file_path=target, before=before, after=after)
                  drafts.append(
                      {
                          "target_file": target,
                          "draft_status": "DRAFT_READY",
                          "current_sha256": sha256_text(before),
                          "draft_sha256": sha256_text(after),
                          "unified_diff": diff,
                          "full_draft": after,
                          "modifies_repository": False,
                          "auto_apply_allowed": False,
                          "human_decision_required": True,
                      }
                  )
              if not drafts:
                  return None
              return {"reason_code": reason_code, "source_file": file_path, "drafts": drafts}

          def generate_dradm_draft_artifacts(
              entries: list[dict[str, Any]],
              state: dict[str, Any],
              metadata: dict[str, Any],
          ) -> None:
              doc_candidates = [
                  entry for entry in entries
                  if entry.get("source") == "Documentation Review"
              ]
              draft_items: list[dict[str, Any]] = []
              for entry in doc_candidates:
                  proposal = propose_documentation_full_draft(
                      reason_code=str(entry.get("reason_code", "")),
                      file_path=str(entry.get("file", "")),
                  )
                  if not proposal:
                      continue
                  draft_items.append(
                      {
                          "decision": "DRAFT_ONLY",
                          "human_decision_required": True,
                          "auto_branch_allowed": False,
                          "auto_pr_creation_allowed": False,
                          "auto_commit_allowed": False,
                          "auto_push_allowed": False,
                          "autofix_allowed": False,
                          "auto_merge_allowed": False,
                          "source_finding": {
                              "decision": entry.get("decision"),
                              "reason_code": entry.get("reason_code"),
                              "file": entry.get("file"),
                              "fingerprint_hash": entry.get("fingerprint_hash"),
                              "message": entry.get("message"),
                              "evidence": entry.get("evidence"),
                              "explanation": entry.get("explanation"),
                              "fix_prediction": entry.get("fix_prediction"),
                          },
                          "proposal": proposal,
                      }
                  )

              payload = {
                  "schema_version": "1.0",
                  "tool": "tasukeru_dradm_draft_generator",
                  "status": "DRAFT_ONLY",
                  "purpose": "Generate current-content-aware draft artifacts for human review.",
                  "metadata": metadata,
                  "notification_state_summary": {
                      "critical_count": state.get("critical_count", 0),
                      "new_critical_incident_count": state.get("new_critical_incident_count", 0),
                  },
                  "policy": {
                      "modifies_repository": False,
                      "auto_apply_allowed": False,
                      "auto_branch_allowed": False,
                      "auto_pr_creation_allowed": False,
                      "auto_commit_allowed": False,
                      "auto_push_allowed": False,
                      "autofix_allowed": False,
                      "auto_merge_allowed": False,
                      "human_decision_required": True,
                  },
                  "draft_count": len(draft_items),
                  "drafts": draft_items,
              }
              write_json(dradm_json_path, payload)

              with dradm_md_path.open("w", encoding="utf-8") as f:
                  f.write("# Tasukeru DRADM Draft\n\n")
                  f.write("## Decision\n\n")
                  f.write("- Status: `DRAFT_ONLY`\n")
                  f.write("- Human decision required: `true`\n")
                  f.write("- Auto apply: `false`\n")
                  f.write("- Auto branch creation: `false`\n")
                  f.write("- Auto PR creation: `false`\n")
                  f.write("- Auto commit: `false`\n")
                  f.write("- Auto push: `false`\n")
                  f.write("- Auto fix: `false`\n")
                  f.write("- Auto merge: `false`\n\n")
                  f.write("This artifact contains draft-only documentation proposals. It does not modify repository files.\n\n")
                  f.write("## Summary\n\n")
                  f.write(f"- Draft proposals: {len(draft_items)}\n")
                  f.write(f"- HITL_REQUIRED: {state.get('critical_count', 0)}\n")
                  f.write(f"- Documentation findings: {metadata.get('documentation_count', 0)}\n\n")
                  if not draft_items:
                      f.write("No DRADM documentation drafts were generated.\n")
                      return
                  for index, item in enumerate(draft_items, start=1):
                      finding = item["source_finding"]
                      f.write(f"## Draft {index}: `{finding.get('reason_code')}`\n\n")
                      f.write("### Source finding\n\n")
                      f.write(f"- File: `{finding.get('file')}`\n")
                      f.write(f"- Decision: `{finding.get('decision')}`\n")
                      f.write(f"- Fingerprint: `{finding.get('fingerprint_hash')}`\n")
                      f.write(f"- Message: {finding.get('message')}\n\n")
                      f.write("### Why this draft exists\n\n")
                      explanation = finding.get("explanation") or {}
                      f.write(f"{explanation.get('why_problematic_ja', 'Documentation review suggested a human-readable draft.')}\n\n")
                      f.write("### Human review checklist\n\n")
                      f.write("- Confirm that the proposed text is accurate.\n")
                      f.write("- Confirm that the change is minimal and does not overstate capabilities.\n")
                      f.write("- Confirm that advisory-only, no auto-fix, and no auto-merge semantics remain clear.\n")
                      f.write("- Apply manually only if accepted by the human maintainer.\n\n")
                      for draft in item["proposal"]["drafts"]:
                          f.write(f"### Target file: `{draft['target_file']}`\n\n")
                          f.write(f"- Draft status: `{draft.get('draft_status', 'DRAFT_READY')}`\n\n")
                          f.write("#### Hashes\n\n")
                          f.write(f"- Current SHA-256: `{draft['current_sha256']}`\n")
                          f.write(f"- Draft SHA-256: `{draft['draft_sha256']}`\n\n")
                          f.write("#### Unified diff\n\n")
                          f.write("```diff\n")
                          f.write(draft["unified_diff"][:20000])
                          if len(draft["unified_diff"]) > 20000:
                              f.write("\n... diff truncated in Markdown; see JSON artifact for full draft data.\n")
                          f.write("\n```\n\n")
                          f.write("#### Full draft after proposed change\n\n")
                          f.write("```markdown\n")
                          f.write(draft["full_draft"][:30000])
                          if len(draft["full_draft"]) > 30000:
                              f.write("\n... full draft truncated in Markdown; see JSON artifact for full draft data.\n")
                          f.write("\n```\n\n")

          def build_human_readability_policy_addition() -> str:
              return textwrap.dedent(
                  """
                  ## Human readability policy

                  Tasukeru Analysis prioritizes code that humans can safely read, review, and maintain.

                  A change should not be treated as a good fix merely because it is easier for AI or automated tools to process. If a change may reduce human readability, reviewability, or maintainability, it should be routed back for human review.
                  """
              ).strip()

          def discover_batch_script_lines() -> list[str]:
              scripts_dir = Path("scripts")
              if not scripts_dir.exists():
                  return []
              return [
                  f"- `{normalize_path(str(path))}`"
                  for path in sorted(scripts_dir.glob("*.bat"))
                  if path.is_file()
              ]

          def build_batch_scripts_addition(script_lines: list[str]) -> str:
              listed_scripts = "\n".join(script_lines) if script_lines else "- No `.bat` scripts were discovered under `scripts/` during this run."
              return textwrap.dedent(
                  f"""
                  ## Batch scripts

                  Batch scripts may be used as convenience wrappers for local simulation runs.

                  Discovered batch scripts:

                  {listed_scripts}

                  These scripts should be treated as local developer utilities only.

                  They should not:

                  - embed production HMAC keys
                  - upload or submit artifacts automatically
                  - bypass HITL confirmation
                  - delete files automatically
                  - process real personal or confidential data
                  - change license or safety semantics
                  - weaken tests or gate invariants

                  For local demonstrations, a demo key mode may be used only when the simulator explicitly supports it. Production-like runs should use an environment variable or a protected key file for HMAC keys.
                  """
              ).strip()

          def build_beginner_reading_guide_addition() -> str:
              return textwrap.dedent(
                  """
                  ## Beginner reading guide

                  For a first pass, read this repository in the following order:

                  1. Safety and scope
                  2. Tasukeru Analysis
                  3. Advisory-only policy
                  4. HITL decision support
                  5. Current simulator lines
                  6. Gate and decision model
                  7. Disclaimer

                  Treat simulator outputs as research artifacts, not production approvals. When behavior is unclear, read the relevant implementation together with its tests before applying any change.
                  """
              ).strip()

          def insert_before_heading_once(text: str, heading: str, addition: str) -> str:
              if addition.strip() in text:
                  return text
              index = text.find(heading)
              if index == -1:
                  suffix = "" if text.endswith("\n") else "\n"
                  return text + suffix + "\n" + addition.strip() + "\n"
              return text[:index].rstrip() + "\n\n" + addition.strip() + "\n\n" + text[index:].lstrip()

          def build_readme_refinement_result() -> dict[str, Any]:
              target = "README.md"
              path = Path(target)
              before = read_text(path) if path.exists() else ""
              after = before
              additions: list[str] = []
              notes: list[str] = []
              checks: list[dict[str, Any]] = []

              if not before.strip():
                  notes.append("README.md was not found or was empty; no refinement draft was generated.")
                  return {
                      "target_file": target,
                      "draft_status": "NO_README_FOUND",
                      "current_sha256": sha256_text(before),
                      "draft_sha256": sha256_text(after),
                      "unified_diff": "",
                      "full_draft": after,
                      "modifies_repository": False,
                      "auto_apply_allowed": False,
                      "human_decision_required": True,
                      "checks": checks,
                      "notes": notes,
                  }

              lower = before.lower()

              if "human readability policy" not in lower:
                  addition = build_human_readability_policy_addition()
                  after = insert_before_heading_once(after, "## Security review output policy", addition)
                  additions.append("Human readability policy")
                  checks.append(
                      {
                          "name": "human_readability_policy",
                          "status": "DRAFT_ADDED",
                          "reason": "README did not clearly state that human readability takes priority over AI/tool readability.",
                      }
                  )
              else:
                  checks.append({"name": "human_readability_policy", "status": "PRESENT"})

              script_lines = discover_batch_script_lines()
              if "## batch scripts" not in lower and script_lines:
                  addition = build_batch_scripts_addition(script_lines)
                  after = insert_before_heading_once(after, "## Recommended reading order", addition)
                  additions.append("Batch scripts")
                  checks.append(
                      {
                          "name": "batch_scripts",
                          "status": "DRAFT_ADDED",
                          "script_count": len(script_lines),
                          "reason": "Batch scripts were discovered but README did not contain a Batch scripts section.",
                      }
                  )
              elif "## batch scripts" in lower:
                  checks.append({"name": "batch_scripts", "status": "PRESENT"})
              else:
                  checks.append(
                      {
                          "name": "batch_scripts",
                          "status": "SKIPPED_NO_BATCH_FILES",
                          "reason": "No .bat files were discovered under scripts/ during this run.",
                      }
                  )

              if "beginner reading guide" not in lower:
                  addition = build_beginner_reading_guide_addition()
                  after = insert_before_heading_once(after, "## Current simulator lines", addition)
                  additions.append("Beginner reading guide")
                  checks.append(
                      {
                          "name": "beginner_reading_guide",
                          "status": "DRAFT_ADDED",
                          "reason": "README can be easier for first-time readers with a short reading path.",
                      }
                  )
              else:
                  checks.append({"name": "beginner_reading_guide", "status": "PRESENT"})

              overclaim_patterns = [
                  ("COMPLETE_SAFETY_CLAIM", re.compile(r"complete\s+AI\s+safety\s+coverage", re.IGNORECASE)),
                  ("PRODUCTION_SAFETY_CLAIM", re.compile(r"production\s+safety\s+system", re.IGNORECASE)),
                  ("GUARANTEE_SAFE_AUTONOMY", re.compile(r"guarantee\s+of\s+safe\s+autonomous\s+behavior", re.IGNORECASE)),
              ]
              for code, pattern in overclaim_patterns:
                  if pattern.search(before):
                      notes.append(
                          f"{code}: phrase appears in README. Confirm it is used as a disclaimer/negative claim, not as a capability claim."
                      )

              diff = make_unified_diff(file_path=target, before=before, after=after)
              return {
                  "target_file": target,
                  "draft_status": "DRAFT_READY" if diff else "NO_CHANGE_NEEDED",
                  "added_sections": additions,
                  "current_sha256": sha256_text(before),
                  "draft_sha256": sha256_text(after),
                  "unified_diff": diff,
                  "full_draft": after,
                  "modifies_repository": False,
                  "auto_apply_allowed": False,
                  "human_decision_required": True,
                  "checks": checks,
                  "notes": notes,
              }

          def generate_readme_refinement_artifacts(metadata: dict[str, Any]) -> None:
              result = build_readme_refinement_result()
              payload = {

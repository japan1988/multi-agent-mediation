name: Tasukeru Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/tasukeru-analysis.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          set -euo pipefail
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          elif [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          elif [[ -f pyproject.toml ]]; then
            python -m pip install .
          else
            echo "No requirements*.txt or pyproject.toml found. Skipping project dependency install."
          fi

      - name: Install analysis tools
        run: |
          set -euo pipefail
          python -m pip install ruff pytest "bandit[toml]"

      - name: Prepare log dir
        run: |
          set -euo pipefail
          mkdir -p tasukeru_logs

      - name: Ruff (inline annotations + JSON)
        id: ruff
        continue-on-error: true
        run: |
          set -euo pipefail

          set +e
          ruff check . --output-format=github 2>&1 | tee tasukeru_logs/ruff.txt
          ruff_status=${PIPESTATUS[0]}

          ruff check . --output-format=json > tasukeru_logs/ruff.json
          ruff_json_status=$?
          set -e

          if [[ $ruff_json_status -ne 0 && ! -s tasukeru_logs/ruff.json ]]; then
            echo "[]" > tasukeru_logs/ruff.json
          fi

          exit "$ruff_status"

      - name: Bandit (advisory + inline warnings)
        id: bandit
        continue-on-error: true
        run: |
          set -euo pipefail

          set +e
          bandit -r . \
            -x .git,.venv,venv,__pycache__,.pytest_cache,build,dist \
            -f json \
            -o tasukeru_logs/bandit.json
          bandit_status=$?
          set -e

          python - <<'PY'
          import json
          from pathlib import Path

          json_path = Path("tasukeru_logs/bandit.json")
          txt_path = Path("tasukeru_logs/bandit.txt")

          if not json_path.exists() or not json_path.read_text(encoding="utf-8", errors="ignore").strip():
              txt_path.write_text("Bandit JSON output not found.\n", encoding="utf-8")
              raise SystemExit(0)

          try:
              data = json.loads(json_path.read_text(encoding="utf-8"))
          except Exception as e:
              txt_path.write_text(f"Failed to parse Bandit JSON: {e}\n", encoding="utf-8")
              raise SystemExit(0)

          results = data.get("results", []) or []
          lines = []
          limit = 20

          for idx, item in enumerate(results[:limit], start=1):
              filename = item.get("filename", "")
              line = item.get("line_number", 1)
              test_id = item.get("test_id", "BANDIT")
              sev = item.get("issue_severity", "UNKNOWN")
              conf = item.get("issue_confidence", "UNKNOWN")
              msg = (item.get("issue_text", "") or "").strip()

              safe_msg = msg.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::warning file={filename},line={line}::{test_id} {sev}/{conf}: {safe_msg}")

              lines.append(f"{idx}. {filename}:{line} [{test_id}] {sev}/{conf} - {msg}")

          if len(results) > limit:
              lines.append(f"... truncated: showing first {limit} of {len(results)} findings")

          if not lines:
              lines.append("Bandit found no issues.")

          txt_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          exit "$bandit_status"

      - name: Pytest
        id: pytest
        continue-on-error: true
        run: |
          set -euo pipefail

          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            set +e
            pytest -q -x --tb=short --junitxml=tasukeru_logs/pytest-junit.xml 2>&1 | tee tasukeru_logs/pytest.txt
            pytest_status=${PIPESTATUS[0]}
            set -e
            exit "$pytest_status"
          else
            echo "No pytest test files found. Skipping pytest." | tee tasukeru_logs/pytest.txt
          fi

      - name: Pytest traceback annotations
        if: ${{ !cancelled() }}
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("tasukeru_logs/pytest.txt")
          if not path.exists():
              raise SystemExit(0)

          text = path.read_text(encoding="utf-8", errors="ignore")
          seen = set()
          count = 0

          pattern = re.compile(r'(?m)^([A-Za-z0-9_./\\-]+\.py):(\d+):')

          for m in pattern.finditer(text):
              file_path = m.group(1)
              line_no = m.group(2)
              key = (file_path, line_no)
              if key in seen:
                  continue
              seen.add(key)
              print(f"::error file={file_path},line={line_no}::Pytest traceback references {file_path}:{line_no}")
              count += 1
              if count >= 10:
                  break
          PY

      - name: Build local summary files
        if: ${{ !cancelled() }}
        env:
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          logdir = Path("tasukeru_logs")
          logdir.mkdir(exist_ok=True)

          def load_json(path, default):
              p = Path(path)
              if not p.exists():
                  return default
              try:
                  return json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return default

          def safe(text):
              return str(text).replace("\r", " ").replace("\n", " ").strip()

          def first_lines(path, n=40):
              p = Path(path)
              if not p.exists():
                  return "(no output captured)"
              lines = p.read_text(encoding="utf-8", errors="ignore").splitlines()
              return "\n".join(lines[:n]).strip() or "(no output captured)"

          ruff_raw = load_json(logdir / "ruff.json", [])
          if isinstance(ruff_raw, dict):
              ruff_items = (
                  ruff_raw.get("diagnostics")
                  or ruff_raw.get("messages")
                  or ruff_raw.get("results")
                  or []
              )
          else:
              ruff_items = ruff_raw

          ruff_lines = []
          for item in ruff_items[:10]:
              filename = item.get("filename") or item.get("file") or "(unknown)"
              location = item.get("location") or {}
              line = location.get("row") or item.get("line") or item.get("line_number") or 1
              code = item.get("code") or item.get("rule") or "RUFF"
              message = item.get("message") or item.get("body") or ""
              ruff_lines.append(f"- `{filename}:{line}` `{code}` {safe(message)}")

          bandit_raw = load_json(logdir / "bandit.json", {})
          bandit_items = bandit_raw.get("results", []) or []
          bandit_lines = []
          for item in bandit_items[:10]:
              filename = item.get("filename", "(unknown)")
              line = item.get("line_number", 1)
              test_id = item.get("test_id", "BANDIT")
              sev = item.get("issue_severity", "UNKNOWN")
              conf = item.get("issue_confidence", "UNKNOWN")
              message = item.get("issue_text", "")
              bandit_lines.append(f"- `{filename}:{line}` `{test_id}` {sev}/{conf} {safe(message)}")

          pytest_xml = logdir / "pytest-junit.xml"
          pytest_failed = []
          tests = failures = errors = skipped = 0

          if pytest_xml.exists():
              try:
                  root = ET.parse(pytest_xml).getroot()
                  suites = [root] if root.tag == "testsuite" else root.findall(".//testsuite")
                  for suite in suites:
                      tests += int(suite.attrib.get("tests", 0) or 0)
                      failures += int(suite.attrib.get("failures", 0) or 0)
                      errors += int(suite.attrib.get("errors", 0) or 0)
                      skipped += int(suite.attrib.get("skipped", 0) or 0)

                  for case in root.findall(".//testcase"):
                      if case.find("failure") is not None or case.find("error") is not None:
                          classname = case.attrib.get("classname", "")
                          name = case.attrib.get("name", "")
                          label = "::".join([x for x in [classname, name] if x]) or "(unknown testcase)"
                          pytest_failed.append(f"- `{safe(label)}`")
                          if len(pytest_failed) >= 10:
                              break
              except Exception:
                  pass

          pytest_text = first_lines(logdir / "pytest.txt", n=60)
          import_hints = []
          if "ModuleNotFoundError" in pytest_text or "ImportError" in pytest_text:
              import_hints.append("- import path / install step / package layout を確認。")
          if "AssertionError" in pytest_text:
              import_hints.append("- 最初の failing assertion を先に修正。")
          if re.search(r"fixture .* not found", pytest_text):
              import_hints.append("- fixture 名と conftest.py の配置を確認。")

          ruff_outcome = os.environ.get("RUFF_OUTCOME", "unknown")
          bandit_outcome = os.environ.get("BANDIT_OUTCOME", "unknown")
          pytest_outcome = os.environ.get("PYTEST_OUTCOME", "unknown")

          parts = []
          parts.append("<!-- tasukeru-analysis-fix-suggestions -->")
          parts.append("")
          parts.append("## Tasukeru analysis result")
          parts.append("")
          parts.append(f"- Ruff: `{ruff_outcome}`")
          parts.append(f"- Bandit: `{bandit_outcome}`")
          parts.append(f"- Pytest: `{pytest_outcome}`")
          parts.append("")

          parts.append("### Summary")
          parts.append(f"- Ruff findings: **{len(ruff_items)}**")
          parts.append(f"- Bandit findings: **{len(bandit_items)}**")
          if tests or failures or errors or skipped:
              parts.append(f"- Pytest: **tests={tests} failures={failures} errors={errors} skipped={skipped}**")
          else:
              parts.append("- Pytest: junit summary unavailable")
          parts.append("")

          parts.append("### Top repair points")
          if ruff_lines:
              parts.append("")
              parts.append("**Ruff**")
              parts.extend(ruff_lines)
          if bandit_lines:
              parts.append("")
              parts.append("**Bandit**")
              parts.extend(bandit_lines)
          if pytest_failed:
              parts.append("")
              parts.append("**Pytest**")
              parts.extend(pytest_failed)
          if not (ruff_lines or bandit_lines or pytest_failed):
              parts.append("- No pinpoint items captured.")
          parts.append("")

          if import_hints:
              parts.append("### Pytest quick hints")
              parts.extend(import_hints)
              parts.append("")

          parts.append("<details><summary>log excerpt</summary>")
          parts.append("")
          parts.append("```text")
          parts.append(pytest_text)
          parts.append("```")
          parts.append("</details>")
          parts.append("")
          parts.append("Artifacts: `tasukeru-analysis-logs`")

          comment_md = "\n".join(parts).strip() + "\n"
          (logdir / "comment.md").write_text(comment_md, encoding="utf-8")

          summary_lines = []
          summary_lines.append("# Tasukeru analysis")
          summary_lines.append("")
          summary_lines.append(f"- Ruff: `{ruff_outcome}` / findings={len(ruff_items)}")
          summary_lines.append(f"- Bandit: `{bandit_outcome}` / findings={len(bandit_items)}")
          if tests or failures or errors or skipped:
              summary_lines.append(f"- Pytest: `{pytest_outcome}` / tests={tests}, failures={failures}, errors={errors}, skipped={skipped}")
          else:
              summary_lines.append(f"- Pytest: `{pytest_outcome}`")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              Path(step_summary).write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          PY

      - name: Upload analysis logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: tasukeru-analysis-logs
          path: tasukeru_logs
          if-no-files-found: warn
          retention-days: 7

      - name: Post / update PR comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");

            const header = "<!-- tasukeru-analysis-fix-suggestions -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;

            let body = "";
            try {
              body = fs.readFileSync("tasukeru_logs/comment.md", "utf8");
            } catch {
              body = `${header}\n\n## Tasukeru analysis result\n\nNo comment body generated. See artifact: \`tasukeru-analysis-logs\``;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => (c.body || "").includes(header));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Final gate
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          fail=0

          if [[ "${{ steps.ruff.outcome }}" == "failure" ]]; then
            echo "::error::Ruff failed"
            fail=1
          fi

          if [[ "${{ steps.pytest.outcome }}" == "failure" ]]; then
            echo "::error::Pytest failed"
            fail=1
          fi

          exit "$fail"

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Audit requirements.txt
        if: ${{ hashFiles('requirements.txt') != '' }}
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

      - name: Audit pyproject project
        if: ${{ hashFiles('requirements.txt') == '' && hashFiles('pyproject.toml') != '' }}
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .

      - name: No dependency manifest found
        if: ${{ hashFiles('requirements.txt') == '' && hashFiles('pyproject.toml') == '' }}
        run: echo "No requirements.txt or pyproject.toml found. Skipping dependency audit."

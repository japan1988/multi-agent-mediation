name: tasukeru-analysis

on:
pull_request:
types: [opened, synchronize, reopened]
paths:
- "**/*.py"
- "**/*.ipynb"
- "pyproject.toml"
- "requirements*.txt"
- ".github/workflows/tasukeru-analysis.yml"
workflow_dispatch:

permissions:


concurrency:
group: tasukeru-${{ github.event.pull_request.number || github.run_id }}
cancel-in-progress: true

jobs:
quality-and-security:
runs-on: ubuntu-latest
timeout-minutes: 20

defaults:
run:
shell: bash

steps:
- name: Checkout
uses: actions/checkout@v6

- name: Setup Python
uses: actions/setup-python@v6
with:
python-version: "3.11"
cache: "pip"
cache-dependency-path: |
requirements-dev.txt
requirements.txt
pyproject.toml


- name: Upgrade pip
run: |
set -euo pipefail
python -m pip install --upgrade pip

- name: Install project dependencies
run: |
set -euo pipefail
if [[ -f requirements-dev.txt ]]; then
python -m pip install -r requirements-dev.txt
elif [[ -f requirements.txt ]]; then
python -m pip install -r requirements.txt
elif [[ -f pyproject.toml ]]; then
python -m pip install .
else
echo "No requirements*.txt or pyproject.toml found. Skipping project dependency install."
fi

- name: Install analysis tools
run: |
set -euo pipefail
python -m pip install ruff pytest "bandit[toml]"

- name: Prepare log dir
run: |
set -euo pipefail
mkdir -p tasukeru_logs

- name: Ruff (inline annotations + JSON)
id: ruff
continue-on-error: true
run: |
set -euo pipefail

set +e
ruff check . --output-format=github 2>&1 | tee tasukeru_logs/ruff.txt
ruff_status=${PIPESTATUS[0]}

ruff check . --output-format=json > tasukeru_logs/ruff.json
ruff_json_status=$?
set -e

if [[ $ruff_json_status -ne 0 && ! -s tasukeru_logs/ruff.json ]]; then
echo "[]" > tasukeru_logs/ruff.json
fi

exit "$ruff_status"

- name: Bandit (advisory + inline warnings)
id: bandit
continue-on-error: true
run: |
set -euo pipefail

set +e
bandit -r . \
-x .git,.venv,venv,__pycache__,.pytest_cache,build,dist \
-f json \
-o tasukeru_logs/bandit.json
bandit_status=$?
set -e

python - <<'PY'
import json
from pathlib import Path

json_path = Path("tasukeru_logs/bandit.json")
txt_path = Path("tasukeru_logs/bandit.txt")

if not json_path.exists() or not json_path.read_text(encoding="utf-8", errors="ignore").strip():
txt_path.write_text("Bandit JSON output not found.\n", encoding="utf-8")
raise SystemExit(0)

try:
data = json.loads(json_path.read_text(encoding="utf-8"))
except Exception as e:
txt_path.write_text(f"Failed to parse Bandit JSON: {e}\n", encoding="utf-8")
raise SystemExit(0)

results = data.get("results", []) or []
lines = []
limit = 20

for idx, item in enumerate(results[:limit], start=1):
filename = item.get("filename", "")
line = item.get("line_number", 1)
test_id = item.get("test_id", "BANDIT")
sev = item.get("issue_severity", "UNKNOWN")
conf = item.get("issue_confidence", "UNKNOWN")
msg = (item.get("issue_text", "") or "").strip()

safe_msg = msg.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
print(f"::warning file={filename},line={line}::{test_id} {sev}/{conf}: {safe_msg}")

lines.append(f"{idx}. {filename}:{line} [{test_id}] {sev}/{conf} - {msg}")

if len(results) > limit:
lines.append(f"... truncated: showing first {limit} of {len(results)} findings")

if not lines:
lines.append("Bandit found no issues.")

txt_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
PY

exit "$bandit_status"

- name: Pytest
id: pytest
continue-on-error: true
run: |
set -euo pipefail

if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
set +e
pytest -q -x --tb=short --junitxml=tasukeru_logs/pytest-junit.xml 2>&1 | tee tasukeru_logs/pytest.txt
pytest_status=${PIPESTATUS[0]}
set -e
exit "$pytest_status"
else
echo "No pytest test files found. Skipping pytest." | tee tasukeru_logs/pytest.txt
fi

- name: Pytest traceback annotations
if: ${{ !cancelled() }}
run: |
python - <<'PY'
import re
from pathlib import Path

path = Path("tasukeru_logs/pytest.txt")
if not path.exists():
raise SystemExit(0)

text = path.read_text(encoding="utf-8", errors="ignore")
seen = set()
count = 0

pattern = re.compile(r'(?m)^([A-Za-z0-9_./\\-]+\.py):(\d+):')

for m in pattern.finditer(text):
file_path = m.group(1)
line_no = m.group(2)
key = (file_path, line_no)
if key in seen:
continue
seen.add(key)
print(f"::error file={file_path},line={line_no}::Pytest traceback references {file_path}:{line_no}")
count += 1
if count >= 10:
break
PY

- name: Build local summary files
if: ${{ !cancelled() }}
env:
RUFF_OUTCOME: ${{ steps.ruff.outcome }}
BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
run: |
python - <<'PY'
import json
import os
import re
import xml.etree.ElementTree as ET
from pathlib import Path

